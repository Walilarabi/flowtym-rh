function openClockingForm(c, presetEmpId){
  // c = pointage existant (édition) ou null (création)
  // presetEmpId = id employé pré-sélectionné (création depuis une ligne)
  const isEdit = !!c;
  const emp = isEdit ? staff.find(s=>s.id===c.employee_id) : (presetEmpId ? staff.find(s=>s.id===presetEmpId) : null);
  const day = isEdit ? c.day : pDay;
  const tin  = isEdit && c.clock_in_ts  ? new Date(c.clock_in_ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
  const tout = isEdit && c.clock_out_ts ? new Date(c.clock_out_ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
  const empOptions = staff.filter(s=>s.active).sort((a,b)=>a.last_name.localeCompare(b.last_name))
    .map(s=>`<option value="${s.id}" ${(emp&&s.id===emp.id)?'selected':''}>${s.first_name} ${s.last_name}${s.role?' · '+s.role:''}</option>`).join('');

  $('modal').innerHTML = mhHTML('fa-regular fa-clock', isEdit?'Modifier le pointage':'Nouveau pointage') + `
  <div class="mb">
    <div class="row2">
      <div class="fld"><label>Collaborateur *</label>
        <select id="ck_emp" ${isEdit?'disabled':''}><option value="">— choisir —</option>${empOptions}</select>
      </div>
      <div class="fld"><label>Jour *</label>
        <input type="date" id="ck_day" value="${day}" max="${isoToday()}">
      </div>
    </div>
    <div class="row2">
      <div class="fld"><label>Heure d'arrivée *</label><input type="time" id="ck_in" value="${tin}"></div>
      <div class="fld"><label>Heure de départ <span style="font-weight:400;color:var(--muted)">(laisser vide si en cours)</span></label><input type="time" id="ck_out" value="${tout}"></div>
    </div>
    <div class="fld" style="max-width:200px"><label>Pause (min, non rémunérée)</label>
      <input type="number" id="ck_brk" value="${c?.break_minutes||0}" min="0" max="480" step="5">
    </div>
    <div class="fld"><label>Notes <span style="font-weight:400;color:var(--muted)">(facultatif)</span></label>
      <textarea id="ck_notes" rows="2" placeholder="ex : remplacement de X, heures sup validées par…">${c?.notes||''}</textarea>
    </div>
  </div>
  <div class="mact">
    ${isEdit?'<button class="btn d" id="ck_del" style="margin-right:auto"><i class="fa-solid fa-trash"></i> Supprimer</button>':''}
    <button class="btn g" id="ck_cancel">Annuler</button>
    <button class="btn p" id="ck_save"><i class="fa-solid fa-check"></i> ${isEdit?'Enregistrer':'Créer'}</button>
  </div>`;
  $('modalbg').classList.add('on');
  $('ck_cancel').onclick = closeModal;
  $('ck_save').onclick = async () => {
    const eid  = $('ck_emp').value || c?.employee_id;
    const d    = $('ck_day').value;
    const tinV = $('ck_in').value;
    const toutV= $('ck_out').value;
    const brk  = parseInt($('ck_brk').value||'0',10) || 0;
    const notes= $('ck_notes').value.trim() || null;
    if(!eid){ flash('Choisissez un collaborateur'); return; }
    if(!d || !tinV){ flash('Le jour et l\'heure d\'arrivée sont obligatoires'); return; }
    const clock_in_ts  = buildTs(d, tinV);
    let clock_out_ts   = toutV ? buildTs(d, toutV) : null;
    if(clock_out_ts && new Date(clock_out_ts) <= new Date(clock_in_ts)){
      // heure de sortie avant l'heure d'entrée → on suppose une fin de service le lendemain
      clock_out_ts = buildTs(new Date(new Date(d).getTime()+86400000).toISOString().slice(0,10), toutV);
    }
    try{
      if(isEdit){
        await BE.updateClocking(c.id, {day:d, clock_in_ts, clock_out_ts, break_minutes:brk, notes, employee_id:eid});
      }else{
        await BE.addClocking(hotelId, {employee_id:eid, day:d, clock_in_ts, clock_out_ts, break_minutes:brk, notes, source:'manual'});
      }
      closeModal(); flash(isEdit?'Pointage mis à jour':'Pointage créé');
      pDay = d;
      if(view==='pointage') redrawPointage();
    }catch(e){ flash('Erreur : '+(e.message||e)); }
  };
  const del = $('ck_del');
  if(del) del.onclick = async () => {
    if(!confirm(`Supprimer ce pointage ?`)) return;
    try{
      await BE.deleteClocking(c.id);
      closeModal(); flash('Pointage supprimé');
      if(view==='pointage') redrawPointage();
    }catch(e){ flash('Erreur : '+(e.message||e)); }
  };
}

function countAbsenceDays(startDate, endDate, halfDayStart, halfDayEnd) {
  const s = new Date(startDate), e = new Date(endDate);
  let days = 0;
  const c = new Date(s);
  while(c <= e) { days++; c.setDate(c.getDate()+1); }
  if(halfDayStart) days -= 0.5;
  if(halfDayEnd) days -= 0.5;
  return Math.max(days, 0.5);
}

async function syncAbsenceToPlanning(req) {
  const planCode = req.absence_types?.planning_code || absenceTypes.find(t=>t.code===req.type_code)?.planning_code;
  if(!planCode) return;
  const upserts = [];
  const s = new Date(req.start_date), e = new Date(req.end_date);
  const c = new Date(s); let day = 0;
  while(c <= e) {
    const dayIso = c.toISOString().slice(0,10);
    let duration = 1.0;
    const isLast = c.getTime() === e.getTime();
    if(day === 0 && req.half_day_start && isLast && req.half_day_end) duration = 0.5;
    else if(day === 0 && req.half_day_start) duration = 0.5;
    else if(isLast && req.half_day_end) duration = 0.5;
    upserts.push({hotel_id:req.hotel_id, employee_id:req.employee_id, day:dayIso, status:planCode, duration});
    c.setDate(c.getDate()+1); day++;
  }
  await BE.savePlanning(req.hotel_id, upserts, []);
}

async function removeAbsenceFromPlanning(req) {
  const planCode = req.absence_types?.planning_code || absenceTypes.find(t=>t.code===req.type_code)?.planning_code;
  if(!planCode) return;
  const deletes = [];
  const s = new Date(req.start_date), e = new Date(req.end_date);
  const c = new Date(s);
  while(c <= e) {
    deletes.push({hotel_id:req.hotel_id, employee_id:req.employee_id, day:c.toISOString().slice(0,10)});
    c.setDate(c.getDate()+1);
  }
  await BE.savePlanning(req.hotel_id, [], deletes);
}

        <div class="fld"><label>RTT — Ajustement</label><input type="number" id="bal_rtt_a" step="0.5" value="0"></div>
      </div>
    </div>
    <div class="mact">
      <button class="btn g" id="balCancel">Annuler</button>
      <button class="btn p" id="balSave"><i class="fa-solid fa-check"></i> Enregistrer</button>
    </div>`;
  $('modalbg').classList.add('on');
  $('balCancel').onclick = closeModal;
  // Pre-fill
  BE.listAbsenceBalances(hotelId, absBalYear).then(bals => {
    const cp = bals.find(b=>b.employee_id===empId&&b.type_code==='CP');
    const rtt = bals.find(b=>b.employee_id===empId&&b.type_code==='RTT');
    if(cp) { $('bal_cp_e').value = cp.entitled; $('bal_cp_a').value = cp.adjusted; }
    if(rtt) { $('bal_rtt_e').value = rtt.entitled; $('bal_rtt_a').value = rtt.adjusted; }
  });
  $('balSave').onclick = async () => {
    try {
      await BE.upsertAbsenceBalance(hotelId, empId, absBalYear, 'CP', {entitled:+$('bal_cp_e').value, adjusted:+$('bal_cp_a').value});
      await BE.upsertAbsenceBalance(hotelId, empId, absBalYear, 'RTT', {entitled:+$('bal_rtt_e').value, adjusted:+$('bal_rtt_a').value});
      closeModal(); flash('Soldes mis à jour'); renderAbsBalances();
    } catch(e) { flash('Erreur : '+(e.message||e)); }
  };
}

    <button class="btn p" id="abs_submit"><i class="fa-solid fa-paper-plane"></i> Soumettre</button>
  </div>`;

  const updateDays = () => {
    const s=$('abs_start').value, e=$('abs_end').value;
    const hds=$('abs_hds').checked, hde=$('abs_hde').checked;
    if(!s||!e||e<s){ $('abs_days_preview').textContent='—'; return; }
    const d = countAbsenceDays(s,e,hds,hde);
    $('abs_days_preview').textContent = d + ' jour(s)';
    // Balance warning for CP/RTT
    const typeCode = $('abs_type').value;
    const t = absenceTypes.find(x=>x.code===typeCode);
    if(t?.debit_balance) {
      const empId = $('abs_emp').value;
      if(empId) {
        BE.listAbsenceBalances(hotelId, new Date().getFullYear()).then(bals => {
          const b = bals.find(x=>x.employee_id===empId && x.type_code===typeCode);
          const remaining = b ? (b.entitled - b.taken + b.adjusted) : 0;
          const warn = $('abs_bal_warn');
          if(warn) warn.textContent = d > remaining ? `⚠ Solde insuffisant (${remaining} j disponibles)` : '';
        }).catch(()=>{});
      }
    } else { const w=$('abs_bal_warn'); if(w) w.textContent=''; }
  };

  wireDropzone('abs_file', ()=>{});

  $('abs_hds').onchange = e => { $('abs_hds_p').style.display=e.target.checked?'':'none'; updateDays(); };
  $('abs_hde').onchange = e => { $('abs_hde_p').style.display=e.target.checked?'':'none'; updateDays(); };
  $('abs_start').onchange = updateDays;
  $('abs_end').onchange = updateDays;
  $('abs_type').onchange = () => {
    const t = absenceTypes.find(x=>x.code===$('abs_type').value);
    const req = $('abs_file_req');
    if(req) req.textContent = t?.requires_attachment ? '(obligatoire)' : '(facultatif)';
    updateDays();
  };
  $('abs_emp').onchange = updateDays;

  $('abs_submit').onclick = async () => {
    const empId = $('abs_emp').value;
    const typeCode = $('abs_type').value;
    const start = $('abs_start').value;
    const end = $('abs_end').value;
    if(!empId||!typeCode||!start||!end){ flash('Champs obligatoires manquants'); return; }
    if(end < start){ flash('La date de fin doit être ≥ à la date de début'); return; }
    const hds = $('abs_hds').checked, hde = $('abs_hde').checked;
    const days = countAbsenceDays(start, end, hds, hde);
    const payload = {
      employee_id: empId,
      type_code: typeCode,
      start_date: start,
      end_date: end,
      half_day_start: hds,
      half_day_start_period: hds ? $('abs_hds_p').value : null,
      half_day_end: hde,
      half_day_end_period: hde ? $('abs_hde_p').value : null,
      days_count: days,
      note: $('abs_note').value.trim() || null,
    };
    try {
      $('abs_submit').disabled = true;
      const req = await BE.createAbsenceRequest(hotelId, payload);
      // Log submit action in history
      try { await BE.listApprovalHistory(hotelId, req.id); } catch(e2) {} // read-only
      // If direction/admin auto-approve
      if(canApproveAbsences()) {
        // option to auto-approve, but for now just submit
      }
      closeModal(); flash('Demande soumise'); renderAbsRequests();
    } catch(e) { flash('Erreur : '+(e.message||e)); $('abs_submit').disabled=false; }
  };
}

async function openApproveRejectModal(reqId, action) {
  const allReqs = await BE.listAbsenceRequests(hotelId, {});
  const req = allReqs.find(r=>r.id===reqId); if(!req) return;
  const emp = staff.find(e=>e.id===req.employee_id);
  const isApprove = action==='approve', isReject = action==='reject', isCancel = action==='cancel';
  const title = isApprove ? 'Approuver la demande' : isReject ? 'Refuser la demande' : 'Annuler la demande';
  const color = isApprove ? 'var(--green)' : 'var(--red)';
  const icon = isApprove ? 'fa-check' : isReject ? 'fa-xmark' : 'fa-ban';

  $('modal').innerHTML = `
    <div class="mh">
      <div class="mh-ic" style="background:${isApprove?'var(--green-bg)':isReject?'var(--red-bg)':'#fff3cd'};color:${color}"><i class="fa-solid ${icon}"></i></div>
      <div class="mh-ti"><h2>${title}</h2></div>
      <button class="mh-x" onclick="closeModal()" title="Fermer"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="mb">
      <div style="background:#f8f9fb;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:13.5px">
        <div style="font-weight:700;margin-bottom:4px">${emp ? emp.first_name+' '+emp.last_name : '—'}</div>
        <div style="color:var(--ink2)">${req.absence_types?.label||req.type_code} · ${req.start_date}${req.end_date!==req.start_date?' → '+req.end_date:''} · <b>${req.days_count}</b> jour(s)</div>
      </div>
      <div class="fld">
        <label>Commentaire${isReject?' <span style="color:var(--red)">*</span>':' <span style="font-weight:400;color:var(--muted)">(facultatif)</span>'}</label>
        <textarea id="appr_comment" rows="3" placeholder="${isReject?'Motif du refus obligatoire':'Commentaire optionnel…'}"></textarea>
        <div class="field-err" id="appr_comment_err">Le motif de refus est obligatoire.</div>
      </div>
    </div>
    <div class="mact">
      <button class="btn g" id="appr_cancel">Annuler</button>
      <button class="btn" id="appr_confirm" style="background:${color};color:#fff"><i class="fa-solid ${icon}"></i> ${isApprove?'Approuver':isReject?'Refuser':'Annuler la demande'}</button>
    </div>`;
  $('modalbg').classList.add('on');
  $('appr_cancel').onclick = closeModal;
  $('appr_confirm').onclick = async () => {
    const comment = $('appr_comment').value.trim();
    if(isReject && !comment){ $('appr_comment_err')?.classList.add('on'); return; }
    try {
      $('appr_confirm').disabled = true;
      const newStatus = isApprove ? 'approved' : isReject ? 'rejected' : 'cancelled';
      await BE.updateAbsenceRequestStatus(reqId, newStatus, null, userEmail, comment||null, hotelId, req.employee_id);
      if(isApprove) {
        await syncAbsenceToPlanning(req);
        // Debit balance if CP/RTT
        const t = req.absence_types;
        if(t?.debit_balance && t?.balance_type) {
          const year = new Date(req.start_date).getFullYear();
          const bals = await BE.listAbsenceBalances(hotelId, year);
          const bal = bals.find(b=>b.employee_id===req.employee_id && b.type_code===t.balance_type);
          const newTaken = (bal?.taken||0) + req.days_count;
          await BE.upsertAbsenceBalance(hotelId, req.employee_id, year, t.balance_type, {taken: newTaken});
          await BE.addBalanceMovement(hotelId, req.employee_id, t.balance_type, year, -req.days_count, `Approbation demande ${reqId}`, reqId, null);
        }
      }
      if(isCancel) {
        await removeAbsenceFromPlanning(req);
        // Recredit balance
        const t = req.absence_types;
        if(t?.debit_balance && t?.balance_type) {
          const year = new Date(req.start_date).getFullYear();
          const bals = await BE.listAbsenceBalances(hotelId, year);
          const bal = bals.find(b=>b.employee_id===req.employee_id && b.type_code===t.balance_type);
          const newTaken = Math.max(0, (bal?.taken||0) - req.days_count);
          await BE.upsertAbsenceBalance(hotelId, req.employee_id, year, t.balance_type, {taken: newTaken});
          await BE.addBalanceMovement(hotelId, req.employee_id, t.balance_type, year, +req.days_count, `Annulation demande ${reqId}`, reqId, null);
        }
      }
      closeModal(); flash(isApprove?'Demande approuvée':isReject?'Demande refusée':'Demande annulée');
      renderAbsRequests();
    } catch(e) { flash('Erreur : '+(e.message||e)); $('appr_confirm').disabled=false; }
  };
}

async function drawRecruitBoard(){
  const bd=$('recBoard'); if(!bd)return;
  try{
    const [allCands,postings]=await Promise.all([BE.listCandidates(hotelId),BE.listJobPostings(hotelId)]);

    // Stats bar
    const statsEl=$('recStats');
    if(statsEl){
      const total=allCands.length;
      const embauches=allCands.filter(c=>c.stage==='embauche').length;
      const enCours=allCands.filter(c=>!['embauche','refuse'].includes(c.stage)).length;
      const viviers=allCands.filter(c=>c.vivier).length;
      const hired30=allCands.filter(c=>{
        if(c.stage!=='embauche'||!c.updated_at)return false;
        return (Date.now()-new Date(c.updated_at))<30*864e5;
      }).length;
      statsEl.innerHTML=[
        {label:'Total candidats',val:total,icon:'fa-users',bg:'#EEF2FF',fg:'#4338CA'},
        {label:'En cours',val:enCours,icon:'fa-spinner',bg:'#FEF3C7',fg:'#92400E'},
        {label:'Embauchés',val:embauches,icon:'fa-user-check',bg:'#F0FDF4',fg:'#166534'},
        {label:'Embauches 30j',val:hired30,icon:'fa-star',bg:'#FDF4FF',fg:'#7C3AED'},
        {label:'Vivier',val:viviers,icon:'fa-bookmark',bg:'#FFF7ED',fg:'#C2410C'},
        {label:'Postes ouverts',val:postings.filter(p=>p.status==='open').length,icon:'fa-briefcase',bg:'#F0F9FF',fg:'#0369A1'},
      ].map(s=>`<div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;min-width:130px">
        <div style="width:30px;height:30px;background:${s.bg};border-radius:8px;display:grid;place-items:center;flex-shrink:0">
          <i class="fa-solid ${s.icon}" style="color:${s.fg};font-size:12px"></i>
        </div>
        <div><div style="font-size:18px;font-weight:800;color:var(--ink)">${s.val}</div>
          <div style="font-size:11px;color:var(--muted)">${s.label}</div></div>
      </div>`).join('');
    }

    // Appliquer filtres
    const q=(recruitFilter.search||'').toLowerCase();
    const fStage=recruitFilter.stage||'';
    const fVivier=recruitFilter.vivier;
    const cands=allCands.filter(c=>{
      if(fVivier&&!c.vivier)return false;
      if(fStage&&c.stage!==fStage)return false;
      if(q&&!`${c.first_name||''} ${c.last_name||''} ${c.job_title||''} ${c.email||''} ${c.job_postings?.title||''}`.toLowerCase().includes(q))return false;
      return true;
    });

    bd.innerHTML=`<div style="display:flex;gap:14px;min-width:max-content;padding-bottom:8px">
      ${RECRUIT_STAGES.filter(st=>!fStage||st.key===fStage).map(st=>{
        const col=cands.filter(c=>c.stage===st.key);
        return `<div style="width:260px;flex-shrink:0">
          <div style="background:${st.bg};color:${st.fg};padding:7px 12px;border-radius:10px 10px 0 0;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between">
            ${st.label}<span style="background:rgba(0,0,0,.1);border-radius:20px;padding:1px 8px;font-size:11px">${col.length}</span></div>
          <div class="kanban-col" style="background:#f9f9fb;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 10px 10px;min-height:120px;padding:8px;display:flex;flex-direction:column;gap:8px" data-stage="${st.key}">
            ${col.map(c=>recruitCard(c)).join('')}
            ${canDo('recruitment','create')&&st.key!=='embauche'&&st.key!=='refuse'?`<button class="btn g" data-addstage="${st.key}" style="font-size:11px;padding:5px 8px;margin-top:4px;opacity:.7"><i class="fa-solid fa-plus"></i> Ajouter</button>`:''}
          </div></div>`;
      }).join('')}
    </div>`;

    // Drag & drop
    let dragCid=null;
    bd.querySelectorAll('[data-cid]').forEach(card=>{
      card.draggable=true;
      card.addEventListener('dragstart',e=>{dragCid=card.dataset.cid;card.style.opacity='.45';e.dataTransfer.effectAllowed='move';});
      card.addEventListener('dragend',()=>{card.style.opacity='';dragCid=null;});
      card.onclick=()=>openCandidateFiche(card.dataset.cid,cands.find(c=>c.id===card.dataset.cid));
    });
    bd.querySelectorAll('.kanban-col').forEach(col=>{
      col.addEventListener('dragover',e=>{e.preventDefault();col.style.background='#ede9fe';});
      col.addEventListener('dragleave',()=>{col.style.background='#f9f9fb';});
      col.addEventListener('drop',async e=>{
        e.preventDefault();col.style.background='#f9f9fb';
        if(!dragCid)return;
        const newStage=col.dataset.stage;
        const c=cands.find(x=>x.id===dragCid);
        if(!c||c.stage===newStage)return;
        try{await BE.updateCandidate(dragCid,{stage:newStage});flash(`Déplacé → ${RECRUIT_STAGES_MAP[newStage]?.label||newStage}`);await drawRecruitBoard();}
        catch(e){flash('Erreur : '+e.message,'ko');}
      });

let trainingSubTab='catalog'; // catalog | matrix

async function renderTraining(){
  const hName=hotels.find(h=>h.id===hotelId)?.name||'';
  $('view').innerHTML=`<div class="page">
    <div class="phead"><div><h1>Formations obligatoires</h1><div class="sub">${hName}</div></div></div>
    <div style="display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--line)">
      <button class="ctab ${trainingSubTab==='catalog'?'on':''}" data-sub="catalog"><i class="fa-solid fa-book"></i> Catalogue</button>
      <button class="ctab ${trainingSubTab==='matrix'?'on':''}" data-sub="matrix"><i class="fa-solid fa-table"></i> Matrice</button>
      <button class="ctab ${trainingSubTab==='alerts'?'on':''}" data-sub="alerts"><i class="fa-solid fa-bell"></i> Alertes</button>
      <button class="ctab ${trainingSubTab==='conformite'?'on':''}" data-sub="conformite"><i class="fa-solid fa-shield-check"></i> Conformité</button>

    <div id="trainsub"></div>
  </div>`;

async function renderTrainingCatalog(){
  const el=$('trainsub'); if(!el)return;
  el.innerHTML=`<div style="display:flex;justify-content:flex-end;margin-bottom:12px">
    <button class="btn p" id="trainNew"><i class="fa-solid fa-plus"></i> Nouvelle formation</button></div>
    <div id="trainList">Chargement…</div>`;
  $('trainNew').onclick=()=>openTrainingForm(null);
  try{
    const list=await BE.listTrainingCatalog(hotelId);
    if(!list.length){$('trainList').innerHTML='<div style="padding:30px;text-align:center;color:var(--muted)">Aucune formation. Créez la première.</div>';return;}
    $('trainList').innerHTML=`<table class="tbl"><thead><tr><th>Formation</th><th>Catégorie</th><th>Fréquence</th><th>Tous postes</th><th>Statut</th><th></th></tr></thead><tbody>
      ${list.map(t=>`<tr><td><b>${t.title}</b>${t.description?`<br><span style="font-size:11px;color:var(--muted)">${t.description}</span>`:''}</td>
        <td>${t.category||'—'}</td>
        <td>${t.frequency_months===12?'Annuelle':t.frequency_months===24?'Biennale':t.frequency_months===36?'Triennale':t.frequency_months+' mois'}</td>
        <td>${t.required_for_all?'<span class="ok">Oui</span>':'Non'}</td>
        <td>${t.active?'<span class="ok">Active</span>':'<span class="ko">Archivée</span>'}</td>
        <td><button data-edit="${t.id}" title="Modifier"><i class="fa-solid fa-pen"></i></button>
            <button data-del="${t.id}" title="Supprimer" style="color:var(--red)"><i class="fa-solid fa-trash"></i></button></td>
      </tr>`).join('')}
    </tbody></table>`;
    $('trainList').querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openTrainingForm(list.find(t=>t.id===b.dataset.edit)));
    $('trainList').querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Supprimer cette formation ?'))return;
      try{await BE.deleteTrainingCatalog(b.dataset.del);flash('Supprimé');await renderTrainingCatalog();}catch(e){flash('Erreur : '+e.message);}
    });
  }catch(e){$('trainList').innerHTML=`<div style="padding:20px;color:var(--red)">Erreur : ${e.message}</div>`;}
}

    const activeCatalog=catalog.filter(t=>t.active);
    if(!activeCatalog.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--muted)">Aucune formation active. Créez des formations dans le catalogue.</div>';return;}
    const today=new Date().toISOString().slice(0,10);
    const etMap=new Map(); ets.forEach(e=>etMap.set(e.employee_id+'|'+e.training_id,e));
    el.innerHTML=`<div style="overflow-x:auto"><table class="tbl" style="font-size:11.5px">
      <thead><tr><th style="white-space:nowrap">Collaborateur</th>${activeCatalog.map(t=>`<th style="max-width:90px;word-break:break-word;text-align:center" title="${t.title}">${t.title}<br><span style="font-weight:400;color:var(--muted)">${t.frequency_months} mois</span></th>`).join('')}</tr></thead>
      <tbody>${actStaff.sort((a,b)=>a.last_name.localeCompare(b.last_name)).map(emp=>`<tr>

function openEmployeeTrainingForm(emp,training,et,onSave){
  $('modal').innerHTML=mhHTML('fa-solid fa-graduation-cap',`${emp.first_name} ${emp.last_name}`,training.title)+`

    <div class="row3">
      <div class="fld"><label>Statut</label><select id="etf_st">
        <option value="todo" ${(!et||et.status==='todo')?'selected':''}>À faire</option>
        <option value="done" ${et?.status==='done'?'selected':''}>Effectuée</option>
        <option value="expired" ${et?.status==='expired'?'selected':''}>Expirée</option>
        <option value="na" ${et?.status==='na'?'selected':''}>Non applicable</option>
      </select></div>
      <div class="fld"><label>Date réalisation</label><input type="date" id="etf_cd" value="${et?.completed_date||''}"></div>
      <div class="fld"><label>Date expiration</label><input type="date" id="etf_ed" value="${et?.expiry_date||''}"></div>
    </div>
    <div class="fld"><label>Notes</label><textarea id="etf_no" rows="2">${et?.notes||''}</textarea></div>
  </div>
  <div class="mact">
    <button class="btn g" onclick="closeModal()">Annuler</button>
    <button class="btn p" id="etf_save"><i class="fa-solid fa-check"></i> Enregistrer</button>
  </div>`;
  $('modalbg').classList.add('on');
  $('etf_save').onclick=async()=>{
    const p={status:$('etf_st').value,completed_date:$('etf_cd').value||null,expiry_date:$('etf_ed').value||null,notes:$('etf_no').value||null};
    // auto-compute expiry if done and no expiry
    if(p.status==='done'&&p.completed_date&&!p.expiry_date){
      const d=new Date(p.completed_date); d.setMonth(d.getMonth()+training.frequency_months);
      p.expiry_date=d.toISOString().slice(0,10);

  };
}

async function renderTrainingAlerts(){
  const el=$('trainsub'); if(!el)return;
  el.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted)">Chargement…</div>';
  try{
    const [catalog,ets]=await Promise.all([BE.listTrainingCatalog(hotelId),BE.listEmployeeTrainings(hotelId)]);
    const today=new Date().toISOString().slice(0,10);
    const d90=new Date(Date.now()+90*86400000).toISOString().slice(0,10);
    const actStaff=staff.filter(s=>s.active);

    // Build alert rows
    const rows=[];
    actStaff.forEach(emp=>{
      catalog.filter(t=>t.active).forEach(t=>{
        const et=ets.find(e=>e.employee_id===emp.id&&e.training_id===t.id);
        if(!et||!et.expiry_date){
          if(!et) rows.push({emp,t,et:null,level:'missing',label:'Non renseigné',daysLeft:null});
        }else if(et.expiry_date<today){
          rows.push({emp,t,et,level:'expired',label:'Expirée',daysLeft:Math.floor((Date.now()-new Date(et.expiry_date).getTime())/86400000)+'j de retard'});
        }else if(et.expiry_date<=d90){
          const d=Math.ceil((new Date(et.expiry_date).getTime()-Date.now())/86400000);
          rows.push({emp,t,et,level:d<=30?'warn30':d<=60?'warn60':'warn90',label:`Expire dans ${d}j`,daysLeft:d});
        }
      });
    });

    const counts={expired:rows.filter(r=>r.level==='expired').length,warn30:rows.filter(r=>r.level==='warn30').length,warn60:rows.filter(r=>r.level==='warn60').length,warn90:rows.filter(r=>r.level==='warn90').length,missing:rows.filter(r=>r.level==='missing').length};
    const lvlStyle={expired:{bg:'#FEE2E2',fg:'#991B1B',ic:'fa-circle-xmark'},warn30:{bg:'#FEE2E2',fg:'#991B1B',ic:'fa-clock'},warn60:{bg:'#FEF3C7',fg:'#92400E',ic:'fa-clock'},warn90:{bg:'#FEF9C3',fg:'#ca8a04',ic:'fa-clock'},missing:{bg:'#F3F4F6',fg:'#6B7280',ic:'fa-circle'}};

    if(!rows.length){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--green)"><i class="fa-solid fa-circle-check" style="font-size:32px;display:block;margin-bottom:12px"></i><b>Aucune alerte !</b> Toutes les formations sont à jour.</div>';return;}

    el.innerHTML=`<div class="kpis" style="grid-template-columns:repeat(5,1fr);margin-bottom:16px">
      ${[{k:'expired',l:'Expirées',v:counts.expired},{k:'warn30',l:'< 30 jours',v:counts.warn30},{k:'warn60',l:'30-60 jours',v:counts.warn60},{k:'warn90',l:'60-90 jours',v:counts.warn90},{k:'missing',l:'Non renseignées',v:counts.missing}]
        .map(({k,l,v})=>`<div class="kpi" style="border-left:3px solid ${lvlStyle[k].fg}"><div class="val" style="color:${lvlStyle[k].fg}">${v}</div><div class="lab">${l}</div></div>`).join('')}
    </div>
    <div class="box" style="padding:0"><table class="rtable">
      <thead><tr><th>Collaborateur</th><th>Service</th><th>Formation</th><th>Statut</th><th>Expiration</th><th></th></tr></thead>
      <tbody>${rows.sort((a,b)=>{const o={expired:0,warn30:1,warn60:2,warn90:3,missing:4};return (o[a.level]||4)-(o[b.level]||4);}).map(r=>{
        const ls=lvlStyle[r.level];
        return `<tr>
          <td><b>${r.emp.first_name} ${r.emp.last_name}</b></td>
          <td style="font-size:12px">${r.emp.department||'—'}</td>
          <td style="font-size:12px">${r.t.title}</td>
          <td><span style="background:${ls.bg};color:${ls.fg};padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600"><i class="fa-solid ${ls.ic}"></i> ${r.label}</span></td>
          <td style="font-size:12px;color:${r.et?.expiry_date<today?'var(--red)':'inherit'}">${r.et?.expiry_date||'—'}</td>
          <td><button onclick="openEmployeeTrainingForm(staff.find(s=>s.id==='${r.emp.id}'),${JSON.stringify({id:r.t.id,title:r.t.title,frequency_months:r.t.frequency_months}).replace(/"/g,'&quot;')},${JSON.stringify(r.et||null).replace(/"/g,'&quot;')},renderTraining)" style="font-size:11px;padding:3px 8px" class="btn p" title="Mettre à jour"><i class="fa-solid fa-pen"></i></button></td>
        </tr>`;
      }).join('')}
      </tbody>
    </table></div>`;
  }catch(e){el.innerHTML=`<div style="padding:20px;color:var(--red)">Erreur : ${e.message}</div>`;}
}

async function renderTrainingConformite(){
  const el=$('trainsub'); if(!el)return;
  el.innerHTML='<div style="padding:20px;text-align:center;color:var(--muted)"><i class="fa-solid fa-spinner fa-spin"></i> Chargement…</div>';
  try{
    const today=new Date().toISOString().slice(0,10);
    const in30=new Date(Date.now()+30*864e5).toISOString().slice(0,10);
    const in60=new Date(Date.now()+60*864e5).toISOString().slice(0,10);
    const in90=new Date(Date.now()+90*864e5).toISOString().slice(0,10);
    const [catalog,ets,rrts,actStaff]=await Promise.all([
      BE.listTrainingCatalog(hotelId),
      BE.listEmployeeTrainings(hotelId),
      BE.listRoleRequiredTrainings(hotelId),
      Promise.resolve(staff.filter(s=>s.active))
    ]);
    // Build compliance per employee
    const empResults=actStaff.map(emp=>{
      const reqs=rrts.filter(r=>r.role_name===emp.role);
      if(!reqs.length)return{emp,status:'na',missing:[],expiring:[],expired:[]};
      const missing=[],expiring=[],expired=[];
      reqs.forEach(req=>{
        const et=ets.find(e=>e.employee_id===emp.id&&e.training_id===req.training_id);
        const title=req.training_catalog?.title||catalog.find(c=>c.id===req.training_id)?.title||'Formation';
        if(!et||et.status==='todo'){missing.push(title);}
        else if(et.expiry_date){
          if(et.expiry_date<today)expired.push({title,date:et.expiry_date});
          else if(et.expiry_date<=in30)expiring.push({title,date:et.expiry_date,days:30});
          else if(et.expiry_date<=in60)expiring.push({title,date:et.expiry_date,days:60});
          else if(et.expiry_date<=in90)expiring.push({title,date:et.expiry_date,days:90});
        }
      });
      const total=reqs.length;
      const ok=total-missing.length-expired.length;
      const pct=Math.round(ok/total*100);
      const status=pct===100?'conforme':pct>=50?'partiel':'non_conforme';
      return{emp,status,missing,expiring,expired,pct,total,ok};
    }).filter(r=>r.status!=='na');

    // Dept rates
    const depts=[...new Set(empResults.map(r=>r.emp.department))].filter(Boolean);
    const deptRates=depts.map(d=>{
      const rows=empResults.filter(r=>r.emp.department===d);
      const avg=rows.length?Math.round(rows.reduce((s,r)=>s+(r.pct||0),0)/rows.length):0;
      return{dept:d,pct:avg,count:rows.length,ok:rows.filter(r=>r.status==='conforme').length};
    });

    const conforme=empResults.filter(r=>r.status==='conforme').length;
    const partiel=empResults.filter(r=>r.status==='partiel').length;
    const nonConf=empResults.filter(r=>r.status==='non_conforme').length;
    const totalAlerts=empResults.reduce((s,r)=>s+r.expired.length+r.expiring.length,0);

    const statusBadge=(s,pct)=>{
      if(s==='conforme')return`<span style="background:#DCFCE7;color:#166534;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600">✓ Conforme</span>`;
      if(s==='partiel')return`<span style="background:#FEF3C7;color:#92400E;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600">~ Partiel ${pct}%</span>`;
      return`<span style="background:#FEE2E2;color:#991B1B;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600">✗ Non conforme ${pct}%</span>`;
    };

    el.innerHTML=`
      <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
        <button class="btn p" onclick="openRoleRequiredTrainingsForm()"><i class="fa-solid fa-cog"></i> Paramétrer formations par rôle</button>
      </div>
      <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:18px">
        <div class="kpi"><div class="val" style="color:var(--green)">${conforme}</div><div class="lab">Conformes</div></div>
        <div class="kpi"><div class="val" style="color:#D97706">${partiel}</div><div class="lab">Partiels</div></div>
        <div class="kpi"><div class="val" style="color:var(--red)">${nonConf}</div><div class="lab">Non conformes</div></div>
        <div class="kpi"><div class="val" style="color:var(--red)">${totalAlerts}</div><div class="lab">Alertes</div></div>
      </div>
      ${deptRates.length?`<h4 style="font-size:13px;font-weight:700;margin:0 0 10px">Par service</h4>
      <div style="display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px">
        ${deptRates.map(d=>`<div class="box" style="padding:10px 14px;min-width:160px">
          <div style="font-weight:700;font-size:13px;margin-bottom:4px">${d.dept}</div>
          <div style="font-size:11px;color:var(--muted)">${d.ok}/${d.count} conformes</div>
          <div style="margin-top:6px;background:#e5e7eb;border-radius:4px;height:6px"><div style="background:${d.pct>=80?'var(--green)':d.pct>=50?'#F59E0B':'var(--red)'};width:${d.pct}%;height:6px;border-radius:4px"></div></div>
          <div style="font-size:11px;font-weight:700;margin-top:3px">${d.pct}%</div>
        </div>`).join('')}
      </div>`:''}
      ${empResults.length?`<h4 style="font-size:13px;font-weight:700;margin:0 0 10px">Par collaborateur</h4>
      <div class="box" style="padding:0">
        <table class="tbl"><thead><tr><th>Collaborateur</th><th>Poste</th><th>Statut</th><th>Manquantes</th><th>Expirées</th><th>À renouveler ≤90j</th></tr></thead>
        <tbody>
          ${empResults.sort((a,b)=>(a.pct||0)-(b.pct||0)).map(r=>`<tr>
            <td><b>${r.emp.first_name} ${r.emp.last_name}</b></td>
            <td style="font-size:12px;color:var(--muted)">${r.emp.department||''}</td>
            <td>${statusBadge(r.status,r.pct)}</td>
            <td style="font-size:12px;color:var(--red)">${r.missing.join(', ')||'—'}</td>
            <td style="font-size:12px;color:var(--red)">${r.expired.map(x=>x.title).join(', ')||'—'}</td>
            <td style="font-size:12px;color:#D97706">${r.expiring.map(x=>x.title+' ('+x.date+')').join(', ')||'—'}</td>
          </tr>`).join('')}
        </tbody></table>
      </div>`:'<div style="padding:20px;text-align:center;color:var(--muted)">Aucune formation obligatoire configurée. Cliquez sur "Paramétrer" pour commencer.</div>'}
    `;
  }catch(e){el.innerHTML=`<div style="padding:20px;color:var(--red)">Erreur : ${e.message}</div>`;}
}

async function openRoleRequiredTrainingsForm(){
  const [catalog,rrts]=await Promise.all([BE.listTrainingCatalog(hotelId),BE.listRoleRequiredTrainings(hotelId)]);
  const roles=[...new Set(staff.filter(s=>s.active).map(s=>s.role).filter(Boolean))].sort();
  const catOpts=catalog.map(c=>`<option value="${c.id}">${c.title}</option>`).join('');
  const roleOpts=roles.map(r=>`<option value="${r}">${r}</option>`).join('');
  const draw=()=>{
    const el=$('rrtList'); if(!el)return;
    el.innerHTML=rrts.length?`<table class="tbl"><thead><tr><th>Rôle</th><th>Formation</th><th>Obligatoire</th><th></th></tr></thead><tbody>
      ${rrts.map(r=>`<tr>
        <td style="font-weight:600;font-size:12px">${r.role_name}</td>
        <td style="font-size:12px">${r.training_catalog?.title||catalog.find(c=>c.id===r.training_id)?.title||r.training_id}</td>
        <td>${r.mandatory?'<span style="color:var(--green);font-weight:600">Oui</span>':'Non'}</td>
        <td><button data-del="${r.id}" style="color:var(--red)"><i class="fa-solid fa-trash"></i></button></td>
      </tr>`).join('')}
    </tbody></table>`:
    '<div style="padding:14px;text-align:center;color:var(--muted);font-size:13px">Aucune formation obligatoire configurée</div>';
    el.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
      await BE.deleteRoleRequiredTraining(b.dataset.del);
      const idx=rrts.findIndex(r=>r.id===b.dataset.del);if(idx>=0)rrts.splice(idx,1);
      draw();
    });
  };
  $('modal').innerHTML=mhHTML('fa-solid fa-cog','Formations obligatoires par rôle')+`
  <div class="mb">
    <div class="row3" style="margin-bottom:12px">
      <div class="fld"><label>Rôle</label><select id="rrt_role"><option value="">— choisir —</option>${roleOpts}</select></div>
      <div class="fld"><label>Formation</label><select id="rrt_cat"><option value="">— choisir —</option>${catOpts}</select></div>
      <div class="fld" style="display:flex;align-items:flex-end;gap:8px">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:6px"><input type="checkbox" id="rrt_mand" checked> Obligatoire</label>
        <button class="btn p" id="rrt_add"><i class="fa-solid fa-plus"></i> Ajouter</button>
      </div>
    </div>
    <div id="rrtList">Chargement…</div>
  </div>
  <div class="mact"><button class="btn g" onclick="closeModal()">Fermer</button></div>`;
  $('modalbg').classList.add('on');
  draw();
  $('rrt_add').onclick=async()=>{
    const role=$('rrt_role').value; if(!role){flash('Rôle requis');return;}
    const tid=$('rrt_cat').value; if(!tid){flash('Formation requise');return;}
    if(rrts.some(r=>r.role_name===role&&r.training_id===tid)){flash('Déjà configuré');return;}
    const r=await BE.saveRoleRequiredTraining(hotelId,{role_name:role,training_id:tid,mandatory:$('rrt_mand').checked});
    r.training_catalog=catalog.find(c=>c.id===r.training_id)||null;
    rrts.push(r);draw();flash('Ajouté');
  };
}

const MED_TYPES={embauche:{label:"Visite d'embauche",color:'#DBEAFE',fg:'#1D4ED8',months:null},
  periodique:{label:'Visite périodique',color:'#F0FDF4',fg:'#166534',months:24},
  reprise:{label:'Visite de reprise',color:'#FEF3C7',fg:'#92400E',months:null}};
const APT_LABELS={apte:'Apte',apte_amenagement:'Apte avec aménagement',inapte:'Inapte'};

async function renderMedical(){

async function drawMedicalList(){
  const el=$('medList'); if(!el)return;
  try{
    const visits=await BE.listMedicalVisits(hotelId);
    const today=new Date().toISOString().slice(0,10);
    const soon=new Date(Date.now()+60*86400000).toISOString().slice(0,10);
    // KPIs conformité
    const actStaff=staff.filter(s=>s.active);
    const empWithVisit=new Set(visits.map(v=>v.employee_id));
    const withoutVisit=actStaff.filter(s=>!empWithVisit.has(s.id));
    const overdue=visits.filter(v=>v.next_visit_date&&v.next_visit_date<today);
    const upcomingSoon=visits.filter(v=>v.next_visit_date&&v.next_visit_date>=today&&v.next_visit_date<=soon);
    const conformPct=actStaff.length?Math.round((actStaff.length-withoutVisit.length-overdue.length)/Math.max(actStaff.length,1)*100):100;
    const kpiEl=$('medKpis');
    if(kpiEl) kpiEl.innerHTML=`<div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:14px">
      ${[{v:conformPct+'%',l:'Conformité',c:conformPct>=90?'var(--green)':conformPct>=70?'#d97706':'var(--red)',ic:'fa-shield-halved'},
         {v:withoutVisit.length,l:'Sans visite',c:withoutVisit.length?'var(--red)':'var(--green)',ic:'fa-user-slash'},
         {v:overdue.length,l:'En retard',c:overdue.length?'var(--red)':'var(--green)',ic:'fa-triangle-exclamation'},
         {v:upcomingSoon.length,l:'Échéances 60j',c:upcomingSoon.length?'#d97706':'var(--green)',ic:'fa-clock'},
         {v:visits.length,l:'Total visites',c:'',ic:'fa-stethoscope'}
      ].map(k=>`<div class="kpi"><div class="val" style="${k.c?'color:'+k.c:''}">${k.v}</div><div class="lab"><i class="fa-solid ${k.ic}"></i> ${k.l}</div></div>`).join('')}
    </div>`;
    // Alerts
    const alerts=visits.filter(v=>v.next_visit_date&&v.next_visit_date<=soon&&v.next_visit_date>=today);
    const alertsEl=$('medAlerts');
    if(alertsEl&&(alerts.length||withoutVisit.length||overdue.length)){
      const parts=[];
      if(overdue.length) parts.push(`<b>${overdue.length} visite(s) en retard</b>`);
      if(alerts.length) parts.push(`<b>${alerts.length} échéance(s)</b> dans 60j`);
      if(withoutVisit.length) parts.push(`<b>${withoutVisit.length} collaborateur(s)</b> sans visite enregistrée`);
      alertsEl.innerHTML=`<div style="background:#fef3c7;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:#92400e">
        <i class="fa-solid fa-triangle-exclamation"></i> ${parts.join(' · ')}
      </div>`;
    }
    if(!visits.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--muted)">Aucune visite enregistrée.</div>';return;}
    el.innerHTML=`<table class="tbl"><thead><tr><th>Collaborateur</th><th>Service</th><th>Type</th><th>Date visite</th><th>Prochaine visite</th><th>Aptitude</th><th>Médecin</th><th></th></tr></thead><tbody>
      ${visits.map(v=>{const mt=MED_TYPES[v.visit_type]||{label:v.visit_type,color:'#f4f4f4',fg:'#666'};
        const e=v.employees; const overdue=v.next_visit_date&&v.next_visit_date<today;
        return `<tr>
          <td><b>${e?e.first_name+' '+e.last_name:'—'}</b></td>
          <td style="font-size:12px">${e?.department||'—'}</td>
          <td><span style="background:${mt.color};color:${mt.fg};padding:2px 8px;border-radius:6px;font-size:11.5px;font-weight:600">${mt.label}</span></td>
          <td>${v.visit_date}</td>
          <td style="color:${overdue?'var(--red)':v.next_visit_date&&v.next_visit_date<=soon?'#d97706':'inherit'}">${v.next_visit_date||'—'}${overdue?' <i class="fa-solid fa-triangle-exclamation"></i>':''}</td>
          <td><span style="font-size:12px">${APT_LABELS[v.aptitude]||v.aptitude}</span></td>
          <td style="font-size:12px">${v.doctor||'—'}</td>
          <td><button data-edit="${v.id}" title="Modifier"><i class="fa-solid fa-pen"></i></button>
              <button data-del="${v.id}" title="Supprimer" style="color:var(--red)"><i class="fa-solid fa-trash"></i></button></td>
        </tr>`;}).join('')}
    </tbody></table>`;
    el.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openMedicalForm(visits.find(v=>v.id===b.dataset.edit)));
    el.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Supprimer cette visite ?'))return;
      try{await BE.deleteMedicalVisit(b.dataset.del);flash('Supprimé');await drawMedicalList();}catch(e){flash('Erreur : '+e.message);}
    });
  }catch(e){el.innerHTML=`<div style="padding:20px;color:var(--red)">Erreur : ${e.message}</div>`;}
}

function openMedicalForm(v){
  const empOpts=staff.filter(s=>s.active).sort((a,b)=>a.last_name.localeCompare(b.last_name))
    .map(e=>`<option value="${e.id}" ${v?.employee_id===e.id?'selected':''}>${e.first_name} ${e.last_name}</option>`).join('');
  $('modal').innerHTML=mhHTML('fa-solid fa-stethoscope',v?'Modifier la visite':'Nouvelle visite médicale')+`
  <div class="mb">
    <div class="row3">
      <div class="fld"><label>Collaborateur *</label><select id="mf_emp"><option value="">— choisir —</option>${empOpts}</select></div>
      <div class="fld"><label>Type de visite</label><select id="mf_ty">
        ${Object.entries(MED_TYPES).map(([k,mt])=>`<option value="${k}" ${v?.visit_type===k?'selected':''}>${mt.label}</option>`).join('')}
      </select></div>
      <div class="fld"><label>Date visite *</label><input type="date" id="mf_vd" value="${v?.visit_date||new Date().toISOString().slice(0,10)}"></div>
    </div>
    <div class="row3">
      <div class="fld"><label>Prochaine visite</label><input type="date" id="mf_nd" value="${v?.next_visit_date||''}"></div>
      <div class="fld"><label>Aptitude</label><select id="mf_ap">
        ${Object.entries(APT_LABELS).map(([k,l])=>`<option value="${k}" ${(v?.aptitude||'apte')===k?'selected':''}>${l}</option>`).join('')}
      </select></div>
      <div class="fld"><label>Médecin</label><input id="mf_dr" value="${v?.doctor||''}" placeholder="Dr …"></div>
    </div>
    <div class="fld"><label>Établissement</label><input id="mf_cl" value="${v?.clinic||''}" placeholder="Nom du cabinet / centre"></div>
    <div class="fld"><label>Notes</label><textarea id="mf_no" rows="2">${v?.notes||''}</textarea></div>
  </div>
  <div class="mact">
    <button class="btn g" onclick="closeModal()">Annuler</button>
    <button class="btn p" id="mf_save"><i class="fa-solid fa-check"></i> ${v?'Enregistrer':'Créer'}</button>
  </div>`;
  $('modalbg').classList.add('on');
  // Auto-compute next visit date based on type
  const autoNext=()=>{
    const ty=$('mf_ty').value, vd=$('mf_vd').value;
    const months=MED_TYPES[ty]?.months;
    if(months&&vd&&!$('mf_nd').value){
      const d=new Date(vd); d.setMonth(d.getMonth()+months);
      $('mf_nd').value=d.toISOString().slice(0,10);
    }
  };
  $('mf_ty').onchange=autoNext; $('mf_vd').onchange=autoNext;
  $('mf_save').onclick=async()=>{
    const eid=$('mf_emp').value; if(!eid){flash('Collaborateur requis');return;}
    const vd=$('mf_vd').value; if(!vd){flash('Date requise');return;}
    const p={employee_id:eid,visit_type:$('mf_ty').value,visit_date:vd,next_visit_date:$('mf_nd').value||null,
      aptitude:$('mf_ap').value,doctor:$('mf_dr').value||null,clinic:$('mf_cl').value||null,notes:$('mf_no').value||null};
    try{v?await BE.updateMedicalVisit(v.id,p):await BE.saveMedicalVisit(hotelId,p);
      flash(v?'Mis à jour':'Visite créée');closeModal();await drawMedicalList();}
    catch(e){flash('Erreur : '+e.message);}
  };
}

    const tblRow=i=>{const e=i.employees;return `<tr>

        ${!i.returned_date?`<button data-ret="${i.id}" title="Enregistrer la restitution" style="color:var(--green)"><i class="fa-solid fa-rotate-left"></i></button>`:''}
        <button data-edit="${i.id}" title="Modifier"><i class="fa-solid fa-pen"></i></button>
        <button data-del="${i.id}" title="Supprimer" style="color:var(--red)"><i class="fa-solid fa-trash"></i></button>
        <button data-pdf="${i.id}" title="Décharge PDF"><i class="fa-regular fa-file-pdf"></i></button>
      </td>
    </tr>`;};
    el.innerHTML=`
      <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:14px">
        <div class="kpi"><div class="val">${active.length}</div><div class="lab">En cours</div></div>
        <div class="kpi"><div class="val">${returned.length}</div><div class="lab">Restitués</div></div>

      </div>
      ${active.length?`<h4 style="margin:0 0 8px;font-size:13px;font-weight:700">Matériel actuellement remis (${active.length})</h4>
        <div class="box" style="padding:0;margin-bottom:16px"><table class="tbl">
          <thead><tr><th>Collaborateur</th><th>Type</th><th>Code</th><th>Description</th><th>Date remise</th><th>Restitution</th><th>État remise</th><th></th></tr></thead>
          <tbody>${active.map(tblRow).join('')}</tbody></table></div>`:''}
      ${returned.length?`<h4 style="margin:0 0 8px;font-size:13px;font-weight:700;color:var(--muted)">Historique restitutions (${returned.length})</h4>
        <div class="box" style="padding:0;opacity:.7"><table class="tbl">
          <thead><tr><th>Collaborateur</th><th>Type</th><th>Code</th><th>Description</th><th>Date remise</th><th>Restitution</th><th>État remise</th><th></th></tr></thead>
          <tbody>${returned.map(tblRow).join('')}</tbody></table></div>`:''}`;

      if(!confirm('Supprimer cet enregistrement ?'))return;
      try{await BE.deleteEquipment(b.dataset.del);flash('Supprimé');await drawEquipmentList();}catch(e){flash('Erreur : '+e.message);}
    });
    el.querySelectorAll('[data-ret]').forEach(b=>b.onclick=()=>{
      const item=items.find(i=>i.id===b.dataset.ret);
      openEquipmentReturnForm(item);
    });
    el.querySelectorAll('[data-pdf]').forEach(b=>b.onclick=()=>{
      const item=items.find(i=>i.id===b.dataset.pdf);
      generateDischargePDF(item);
    });
  }catch(e){el.innerHTML=`<div style="padding:20px;color:var(--red)">Erreur : ${e.message}</div>`;}
}

      <tr><td style="padding:6px"><b>État à la remise :</b></td><td>${EQ_COND[eq.condition_given]||eq.condition_given}</td></tr>
      <tr><td style="padding:6px"><b>Date de remise :</b></td><td>${eq.given_date}</td></tr>
      ${eq.returned_date?`<tr><td style="padding:6px"><b>Date de restitution :</b></td><td>${eq.returned_date}</td></tr><tr><td style="padding:6px"><b>État à la restitution :</b></td><td>${EQ_COND[eq.condition_returned]||eq.condition_returned||''}</td></tr>`:''}
    </table>
    ${eq.notes?`<p><b>Remarques :</b> ${eq.notes}</p>`:''}
    <div style="margin-top:60px;display:flex;justify-content:space-between">
      <div><p>Signature de l'employeur :</p><div style="border-bottom:1px solid #000;width:200px;margin-top:30px"></div></div>
      <div><p>Signature du collaborateur :</p><div style="border-bottom:1px solid #000;width:200px;margin-top:30px"></div></div>
    </div>
    <p style="margin-top:20px;color:#666;font-size:12px">Fait en double exemplaire le ${new Date().toLocaleDateString('fr-FR')}</p>
  </body></html>`;
  try{
    const blob=await renderHtmlToPdfBlob(html,`décharge_${EQ_TYPES[eq.item_type]||eq.item_type}_${emp?.last_name||''}`);
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`decharge_${eq.item_type}_${(emp?.last_name||'').toLowerCase()}_${eq.given_date}.pdf`;
    a.click();
  }catch(e){flash('Erreur PDF : '+e.message);}
}

/* =====================================================================
   MODULE ENTRETIENS ANNUELS & PROFESSIONNELS
   ===================================================================== */
let reviewsSubTab='campaigns'; // campaigns | reviews
let reviewCampaignId=null;

const REVIEW_TYPES={annual:{label:'Entretien annuel',color:'#EDE9FE',fg:'#6D28D9'},
  professional:{label:'Entretien professionnel',color:'#DBEAFE',fg:'#1D4ED8'},
  mid_year:{label:'Point mi-année',color:'#DCFCE7',fg:'#15803D'}};
const REVIEW_STATUS={pending:{label:'En attente',color:'#F3F4F6',fg:'#6B7280'},
  emp_done:{label:'Salarié OK',color:'#DBEAFE',fg:'#1D4ED8'},
  mgr_done:{label:'Manager OK',color:'#FEF3C7',fg:'#92400E'},
  signed:{label:'Signé',color:'#DCFCE7',fg:'#15803D'},
  closed:{label:'Clôturé',color:'#F3F4F6',fg:'#6B7280'}};
const REVIEW_EVAL={insuffisant:'Insuffisant',satisfaisant:'Satisfaisant',bien:'Bien',excellent:'Excellent'};
const REVIEW_EVAL_COLORS={insuffisant:'#FEE2E2',satisfaisant:'#FEF3C7',bien:'#DCFCE7',excellent:'#EDE9FE'};
const REVIEW_EVAL_FG={insuffisant:'#991B1B',satisfaisant:'#92400E',bien:'#15803D',excellent:'#6D28D9'};

async function renderReviews(){
  const hName=hotels.find(h=>h.id===hotelId)?.name||'';
  $('view').innerHTML=`<div class="page">
    <div class="phead">
      <div><h1>Entretiens</h1><div class="sub">${hName}</div></div>
      <div class="actions" id="reviewsActions"></div>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:18px;border-bottom:1px solid var(--line)">
      <button class="ctab ${reviewsSubTab==='campaigns'?'on':''}" data-sub="campaigns"><i class="fa-solid fa-layer-group"></i> Campagnes</button>
      <button class="ctab ${reviewsSubTab==='reviews'?'on':''}" data-sub="reviews"><i class="fa-solid fa-comments"></i> Entretiens</button>
    </div>
    <div id="reviewsSub">Chargement…</div>
  </div>`;
  $('view').querySelectorAll('.ctab').forEach(b=>b.onclick=()=>{reviewsSubTab=b.dataset.sub;renderReviews();});
  if(reviewsSubTab==='campaigns') await _drawReviewCampaigns();
  else await _drawReviewsList();
}

async function _drawReviewCampaigns(){
  const el=$('reviewsSub'),act=$('reviewsActions'); if(!el)return;
  if(act&&canDo('reviews','create')) act.innerHTML=`<button class="btn p" id="rvNewCampaign"><i class="fa-solid fa-plus"></i> Nouvelle campagne</button>`;
  try{
    const camps=await BE.listReviewCampaigns(hotelId);
    if(!camps.length){el.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted)"><i class="fa-regular fa-comments" style="font-size:32px;display:block;margin-bottom:12px"></i>Aucune campagne. Créez la première campagne d\'entretiens.</div>';
    }else{
      const reviews=await BE.listEmployeeReviews(hotelId,null);
      const revByCamp=new Map(); reviews.forEach(r=>{if(!revByCamp.has(r.campaign_id))revByCamp.set(r.campaign_id,[]);revByCamp.get(r.campaign_id).push(r);});
      el.innerHTML=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px">
        ${camps.map(c=>{
          const rs=revByCamp.get(c.id)||[];
          const done=rs.filter(r=>r.status==='signed'||r.status==='closed').length;
          const pct=rs.length?Math.round(done/rs.length*100):0;
          const rt=REVIEW_TYPES[c.review_type]||REVIEW_TYPES.annual;
          const st=c.status==='active'?{label:'Active',bg:'#DCFCE7',fg:'#15803D'}:c.status==='closed'?{label:'Clôturée',bg:'#F3F4F6',fg:'#6B7280'}:{label:'Brouillon',bg:'#FEF3C7',fg:'#92400E'};
          return `<div class="card" style="cursor:pointer" data-cid="${c.id}">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px">
              <div><div style="font-size:15px;font-weight:800;margin-bottom:3px">${c.name}</div>
                <span style="background:${rt.color};color:${rt.fg};padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600">${rt.label}</span>
              </div>
              <span style="background:${st.bg};color:${st.fg};padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700">${st.label}</span>
            </div>
            <div style="font-size:12px;color:var(--muted);margin-bottom:8px">${c.year}${c.start_date?' · '+c.start_date+' → '+(c.end_date||'…'):''}</div>
            ${rs.length?`<div style="margin-bottom:6px">
              <div style="display:flex;justify-content:space-between;font-size:11.5px;margin-bottom:4px"><span>${done} / ${rs.length} signés</span><span>${pct}%</span></div>
              <div style="height:6px;background:#e5e7eb;border-radius:3px"><div style="height:100%;width:${pct}%;background:var(--violet);border-radius:3px;transition:.3s"></div></div>
            </div>`:'<div style="font-size:11.5px;color:var(--muted)">Aucun entretien généré</div>'}
            <div style="display:flex;gap:6px;margin-top:10px">
              ${canDo('reviews','edit')?`<button class="btn g" data-edit-camp="${c.id}" style="font-size:11px;padding:4px 10px"><i class="fa-solid fa-pen"></i></button>`:''}
              <button class="btn p" data-open-camp="${c.id}" style="font-size:11px;flex:1">Voir les entretiens</button>
              ${canDo('reviews','create')&&rs.length===0?`<button class="btn p" data-gen-camp="${c.id}" style="font-size:11px;padding:4px 12px;background:var(--green);border-color:var(--green)" title="Générer les entretiens pour tous les actifs"><i class="fa-solid fa-wand-magic-sparkles"></i></button>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>`;
      el.querySelectorAll('[data-open-camp]').forEach(b=>{b.onclick=e=>{e.stopPropagation();reviewCampaignId=b.dataset.openCamp;reviewsSubTab='reviews';renderReviews();};});
      el.querySelectorAll('[data-edit-camp]').forEach(b=>{b.onclick=e=>{e.stopPropagation();openReviewCampaignForm(camps.find(c=>c.id===b.dataset.editCamp));};});
      el.querySelectorAll('[data-gen-camp]').forEach(b=>{b.onclick=e=>{e.stopPropagation();_generateCampaignReviews(b.dataset.genCamp);};});
      el.querySelectorAll('.card[data-cid]').forEach(card=>{card.onclick=()=>{reviewCampaignId=card.dataset.cid;reviewsSubTab='reviews';renderReviews();};});
    }
    if($('rvNewCampaign')) $('rvNewCampaign').onclick=()=>openReviewCampaignForm(null);
  }catch(e){el.innerHTML=`<div style="padding:20px;color:var(--red)">Erreur : ${e.message}</div>`;}
}

async function _generateCampaignReviews(campId){
  const camp=((await BE.listReviewCampaigns(hotelId))||[]).find(c=>c.id===campId); if(!camp)return;
  const actStaff=staff.filter(s=>s.active);
  if(!confirm(`Générer ${actStaff.length} entretien(s) pour tous les collaborateurs actifs de la campagne "${camp.name}" ?`))return;
  try{
    await Promise.all(actStaff.map(emp=>BE.saveEmployeeReview(hotelId,{campaign_id:campId,employee_id:emp.id,status:'pending'})));
    flash(`${actStaff.length} entretien(s) générés`); renderReviews();
  }catch(e){flash('Erreur : '+e.message,'ko');}
}

  $('modal').innerHTML=mhHTML('fa-solid fa-comments',c?'Modifier la campagne':'Nouvelle campagne d\'entretiens')+`
  <div class="mb">
    <div class="fld"><label>Nom *</label><input id="rca_name" value="${c?.name||''}" placeholder="ex : Entretiens Annuels 2026"></div>
    <div class="row3">
      <div class="fld"><label>Type</label><select id="rca_type">${tyOpts}</select></div>
      <div class="fld"><label>Année</label><input type="number" id="rca_year" value="${c?.year||new Date().getFullYear()}" min="2020" max="2030"></div>
      <div class="fld"><label>Statut</label><select id="rca_status">${stOpts}</select></div>
    </div>
    <div class="row2">
      <div class="fld"><label>Date de début</label><input type="date" id="rca_sd" value="${c?.start_date||''}"></div>
      <div class="fld"><label>Date de fin</label><input type="date" id="rca_ed" value="${c?.end_date||''}"></div>
    </div>
  </div>
  <div class="mact">
    <button class="btn g" onclick="closeModal()">Annuler</button>
    ${c?`<button class="btn d" id="rca_del"><i class="fa-solid fa-trash"></i> Supprimer</button>`:''}
    <button class="btn p" id="rca_save"><i class="fa-solid fa-check"></i> ${c?'Enregistrer':'Créer'}</button>
  </div>`;
  $('modalbg').classList.add('on');
  if(c) $('rca_del').onclick=async()=>{
    if(!confirm('Supprimer cette campagne et tous ses entretiens ?'))return;
    await BE.deleteReviewCampaign(c.id); closeModal(); await renderReviews();
  };
  $('rca_save').onclick=async()=>{
    const name=$('rca_name').value.trim(); if(!name){flash('Nom requis');return;}
    const p={name,review_type:$('rca_type').value,year:+$('rca_year').value,status:$('rca_status').value,start_date:$('rca_sd').value||null,end_date:$('rca_ed').value||null};
    try{c?await BE.updateReviewCampaign(c.id,p):await BE.saveReviewCampaign(hotelId,p);
      flash(c?'Campagne mise à jour':'Campagne créée');closeModal();renderReviews();}
    catch(e){flash('Erreur : '+e.message,'ko');}
  };
}

async function _drawReviewsList(){
  const el=$('reviewsSub'),act=$('reviewsActions'); if(!el)return;
  const addBtn=canDo('reviews','create')?`<button class="btn p" id="rvNewReview"><i class="fa-solid fa-plus"></i> Ajouter un entretien</button>`:'';
  if(act) act.innerHTML=addBtn;
  try{
    const [camps,reviews]=await Promise.all([BE.listReviewCampaigns(hotelId),BE.listEmployeeReviews(hotelId,reviewCampaignId||null)]);
    const camp=reviewCampaignId?camps.find(c=>c.id===reviewCampaignId):null;
    // Breadcrumb
    const bc=camp?`<div style="font-size:12.5px;color:var(--muted);margin-bottom:14px">
      <span style="cursor:pointer;color:var(--violet)" onclick="reviewCampaignId=null;reviewsSubTab='campaigns';renderReviews()">← Campagnes</span>
      <span style="margin:0 6px">/</span><span style="font-weight:600">${camp.name}</span></div>`:'';
    if(!reviews.length){
      el.innerHTML=bc+'<div style="padding:40px;text-align:center;color:var(--muted)">Aucun entretien'+(camp?' dans cette campagne.':' trouvé.')+
        (camp&&canDo('reviews','create')?`<br><button class="btn p" style="margin-top:12px" onclick="_generateCampaignReviews('${camp.id}')"><i class="fa-solid fa-wand-magic-sparkles"></i> Générer pour tous les actifs</button>`:'')+'</div>';
    }else{
      // KPIs
      const signed=reviews.filter(r=>r.status==='signed'||r.status==='closed').length;
      const pending=reviews.filter(r=>r.status==='pending').length;
      const pct=Math.round(signed/reviews.length*100);
      const kpis=`<div class="kpis" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
        ${[{v:reviews.length,l:'Total',ic:'fa-comments'},{v:signed,l:'Signés',ic:'fa-check-circle',c:signed?'var(--green)':''},
           {v:pending,l:'En attente',ic:'fa-clock',c:pending?'#d97706':''},{v:pct+'%',l:'Avancement',ic:'fa-chart-pie',c:pct===100?'var(--green)':'var(--violet)'}
        ].map(k=>`<div class="kpi"><div class="val" style="${k.c?'color:'+k.c:''}">${k.v}</div><div class="lab"><i class="fa-solid ${k.ic}"></i> ${k.l}</div></div>`).join('')}
      </div>`;
      el.innerHTML=bc+kpis+`<div class="box" style="padding:0"><table class="rtable">
        <thead><tr>
          <th>Collaborateur</th><th>Service</th><th>Poste</th>
          ${!camp?'<th>Campagne</th>':''}
          <th>Statut</th><th>Date prévue</th><th>Évaluation</th><th></th>
        </tr></thead>
        <tbody>${reviews.map(r=>{
          const emp=r.employees; const st=REVIEW_STATUS[r.status]||REVIEW_STATUS.pending;
          const ev=r.mgr_evaluation;
          return `<tr>
            <td style="cursor:pointer" onclick="openEmployeeReviewForm('${r.id}',${JSON.stringify(r).replace(/"/g,'&quot;')})">
              <b>${emp?emp.first_name+' '+emp.last_name:'—'}</b></td>
            <td style="font-size:12px">${emp?.department||'—'}</td>
            <td style="font-size:12px">${emp?.role||'—'}</td>
            ${!camp?`<td style="font-size:11px">${camps.find(c=>c.id===r.campaign_id)?.name||'—'}</td>`:''}
            <td><span style="background:${st.color};color:${st.fg};padding:2px 8px;border-radius:6px;font-size:11.5px;font-weight:600">${st.label}</span></td>
            <td style="font-size:12px">${r.scheduled_date||'—'}</td>
            <td>${ev?`<span style="background:${REVIEW_EVAL_COLORS[ev]||'#eee'};color:${REVIEW_EVAL_FG[ev]||'#333'};padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600">${REVIEW_EVAL[ev]||ev}</span>`:'—'}</td>
            <td><button onclick="openEmployeeReviewForm('${r.id}',null)" title="Ouvrir"><i class="fa-solid fa-arrow-right"></i></button></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`;
    }
    if($('rvNewReview')) $('rvNewReview').onclick=()=>openNewEmployeeReview(camps,reviewCampaignId);
  }catch(e){el.innerHTML=`<div style="padding:20px;color:var(--red)">Erreur : ${e.message}</div>`;}
}

function openNewEmployeeReview(camps,defaultCampId){
  const campOpts=camps.map(c=>`<option value="${c.id}" ${defaultCampId===c.id?'selected':''}>${c.name} (${c.year})</option>`).join('');
  const empOpts=staff.filter(s=>s.active).sort((a,b)=>a.last_name.localeCompare(b.last_name)).map(e=>`<option value="${e.id}">${e.first_name} ${e.last_name}</option>`).join('');
  const mgrOpts=staff.filter(s=>s.active).sort((a,b)=>a.last_name.localeCompare(b.last_name)).map(e=>`<option value="${e.id}">${e.first_name} ${e.last_name}</option>`).join('');
  $('modal').innerHTML=mhHTML('fa-solid fa-comment-dots','Nouvel entretien')+`
  <div class="mb">
    <div class="row2">
      <div class="fld"><label>Campagne *</label><select id="nr_camp"><option value="">— choisir —</option>${campOpts}</select></div>
      <div class="fld"><label>Date prévue</label><input type="date" id="nr_date" value="${new Date().toISOString().slice(0,10)}"></div>
    </div>
    <div class="row2">
      <div class="fld"><label>Collaborateur *</label><select id="nr_emp"><option value="">— choisir —</option>${empOpts}</select></div>
      <div class="fld"><label>Manager</label><select id="nr_mgr"><option value="">— aucun —</option>${mgrOpts}</select></div>
    </div>
  </div>
  <div class="mact">
    <button class="btn g" onclick="closeModal()">Annuler</button>
    <button class="btn p" id="nr_save"><i class="fa-solid fa-check"></i> Créer</button>
  </div>`;
  $('modalbg').classList.add('on');
  $('nr_save').onclick=async()=>{
    const campId=$('nr_camp').value,empId=$('nr_emp').value;
    if(!campId||!empId){flash('Campagne et collaborateur requis');return;}
    try{await BE.saveEmployeeReview(hotelId,{campaign_id:campId,employee_id:empId,manager_id:$('nr_mgr').value||null,scheduled_date:$('nr_date').value||null,status:'pending'});
      flash('Entretien créé');closeModal();await _drawReviewsList();}
    catch(e){flash('Erreur : '+e.message,'ko');}
  };
}

async function drawOrgTree(){
  const el=$('orgTree'); if(!el)return;
  const actStaff=staff.filter(s=>s.active);
  // Build tree from manager_id
  const roots=actStaff.filter(s=>!s.manager_id||!actStaff.find(e=>e.id===s.manager_id));
  const byMgr=new Map();
  actStaff.forEach(s=>{if(s.manager_id){if(!byMgr.has(s.manager_id))byMgr.set(s.manager_id,[]);byMgr.get(s.manager_id).push(s);}});
  // Group roots by dept if no manager hierarchy
  const deptGroups=new Map();
  roots.forEach(s=>{const d=s.department||'Sans service';if(!deptGroups.has(d))deptGroups.set(d,[]);deptGroups.get(d).push(s);});
  function nodeCard(s,depth){
    const reports=byMgr.get(s.id)||[];
    return `<div style="display:inline-flex;flex-direction:column;align-items:center;margin:0 8px">
      <div class="card" data-emp="${s.id}" style="cursor:pointer;width:140px;text-align:center;padding:10px 8px;border:2px solid ${depth===0?'var(--violet)':'var(--line)'};border-radius:12px;background:#fff">
        <div class="av" style="width:34px;height:34px;border-radius:50%;background:${avBg(s)};margin:0 auto 6px">${avInner(s)}</div>
        <div style="font-weight:700;font-size:12px;line-height:1.2">${s.first_name}<br>${s.last_name}</div>
        <div style="font-size:10.5px;color:var(--muted);margin-top:3px">${s.role||'—'}</div>
      </div>
      ${reports.length?`<div style="border-left:2px solid var(--line);height:20px"></div>
        <div style="display:flex;border-top:2px solid var(--line)">
          ${reports.map(r=>nodeCard(r,depth+1)).join('')}
        </div>`:''}
    </div>`;
  }
  if(!actStaff.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--muted)">Aucun collaborateur actif.</div>';return;}
  let html='<div id="orgInner" style="padding:20px">';
  deptGroups.forEach((emps,dept)=>{
    html+=`<div style="margin-bottom:30px"><div style="font-size:11px;font-weight:700;color:var(--violet-d);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;padding:4px 10px;background:var(--violet-bg);border-radius:8px;display:inline-block">${dept}</div>
      <div style="display:flex;flex-wrap:wrap;gap:16px">${emps.map(s=>nodeCard(s,0)).join('')}</div></div>`;
  });
  html+='</div>';
  el.innerHTML=html;
  el.querySelectorAll('[data-emp]').forEach(c=>c.onclick=()=>openFiche(c.dataset.emp));
}

async function renderClockKiosk(eid){
  // Full-screen clock-in/out interface for a tablet/phone scan
  const emp=staff.find(s=>s.id===eid);
  if(!emp){document.body.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif;color:#dc2626;font-size:18px">Collaborateur introuvable.</div>`;return;}
  document.body.innerHTML=`
    <div id="kiosk" style="min-height:100vh;background:linear-gradient(135deg,#6d28d9 0%,#4f46e5 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Inter',sans-serif;padding:24px;box-sizing:border-box">
      <div style="background:#fff;border-radius:24px;padding:40px 36px;max-width:420px;width:100%;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,.25)">
        <div id="kavatar" style="width:80px;height:80px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;margin-bottom:16px;overflow:hidden;background:${avBg(emp)}">${avInner(emp)}</div>
        <h2 style="margin:0 0 4px;font-size:22px;color:#1a1a2e">${emp.first_name} ${emp.last_name}</h2>
        <div style="font-size:14px;color:#6b7280;margin-bottom:8px">${emp.role||''} · ${emp.department||''}</div>
        <div id="kclock" style="font-size:42px;font-weight:800;color:#6d28d9;letter-spacing:-1px;margin:20px 0 4px">--:--</div>
        <div id="kdate" style="font-size:14px;color:#9ca3af;margin-bottom:28px"></div>
        <div id="kstatus" style="margin-bottom:24px;min-height:24px"></div>
        <div id="kbtns" style="display:flex;flex-direction:column;gap:12px">
          <button id="kclkin" style="width:100%;padding:18px;border:none;border-radius:16px;background:#6d28d9;color:#fff;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px">
            <i class="fa-solid fa-arrow-right-to-bracket" style="font-size:20px"></i> Arrivée
          </button>
          <button id="kclkout" style="width:100%;padding:18px;border:none;border-radius:16px;background:#f3f4f6;color:#374151;font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px" disabled>
            <i class="fa-solid fa-arrow-right-from-bracket" style="font-size:20px"></i> Départ
          </button>
        </div>
        <div id="kmsg" style="margin-top:20px;min-height:32px;font-size:14px"></div>
        <a href="${location.pathname}" style="display:block;margin-top:28px;font-size:12px;color:#d1d5db;text-decoration:none">← Retour à l'application</a>
      </div>
    </div>`;
  // add FA icons CDN if not loaded
  if(!document.querySelector('link[href*="fontawesome"]')){
    const l=document.createElement('link'); l.rel='stylesheet';
    l.href='https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css'; document.head.appendChild(l);
  }
  // live clock
  const tickClock=()=>{
    const n=new Date();
    const kc=$('kclock'); if(kc) kc.textContent=n.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    const kd=$('kdate'); if(kd) kd.textContent=n.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  };
  tickClock(); setInterval(tickClock,10000);
  // load today's clockings
  const today=isoToday();
  let cks=[];
  try{ cks=await BE.listClockings(hotelId,today); }catch(e){}
  const myCks=cks.filter(c=>c.employee_id===eid);
  const openCk=myCks.find(c=>!c.clock_out_ts);
  updateKioskUI(openCk);
  function updateKioskUI(openCk){
    const st=$('kstatus'); const ki=$('kclkin'); const ko=$('kclkout');
    if(!st||!ki||!ko) return;
    if(openCk){
      const since=timeOnly(openCk.clock_in_ts);
      st.innerHTML=`<span style="background:#d1fae5;color:#065f46;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600"><i class="fa-solid fa-circle" style="font-size:8px;vertical-align:middle;margin-right:6px;color:#10b981"></i>En service depuis ${since}</span>`;
      ki.disabled=true; ki.style.opacity='0.4';
      ko.disabled=false; ko.style.background='#dc2626'; ko.style.color='#fff';
    } else if(myCks.length>0){
      const lastOut=myCks[myCks.length-1];
      st.innerHTML=`<span style="background:#f3f4f6;color:#6b7280;padding:6px 14px;border-radius:20px;font-size:13px">Pointé jusqu'à ${timeOnly(lastOut.clock_out_ts)} · total ${fmtMin(myCks.reduce((s,c)=>s+(c.clock_out_ts?minutesBetween(c.clock_in_ts,c.clock_out_ts)-(c.break_minutes||0):0),0))}</span>`;
      ki.disabled=false; ki.style.opacity='1';
      ko.disabled=true; ko.style.background='#f3f4f6'; ko.style.color='#374151';
    } else {
      st.innerHTML='<span style="color:#9ca3af;font-size:13px">Pas encore pointé aujourd\'hui</span>';
      ki.disabled=false; ki.style.opacity='1';
      ko.disabled=true; ko.style.background='#f3f4f6'; ko.style.color='#374151';
    }
  }
  function showKMsg(txt,ok){
    const m=$('kmsg'); if(!m)return;
    m.innerHTML=`<span style="color:${ok?'#059669':'#dc2626'};font-weight:600">${txt}</span>`;
    setTimeout(()=>{if(m)m.innerHTML='';},4000);
  }
  $('kclkin').onclick=async()=>{
    $('kclkin').disabled=true;
    const ts=new Date().toISOString();
    try{
      const c=await BE.addClocking(hotelId,{employee_id:eid,day:today,clock_in_ts:ts,clock_out_ts:null,break_minutes:0,source:'qr'});
      myCks.push(c); updateKioskUI(c); showKMsg('Arrivée enregistrée ✓',true);
    }catch(e){showKMsg('Erreur : '+e.message,false);$('kclkin').disabled=false;}
  };

let trMonth=new Date().toISOString().slice(0,7); // YYYY-MM
async function renderTracking(){
  const hName=hotels.find(h=>h.id===hotelId)?.name||'';
  $('view').innerHTML=`<div class="page">
    <div class="phead">
      <div><h1>Suivi du temps</h1><div class="sub">${hName} · heures réelles vs planifiées</div></div>
      <div class="actions">
        <input type="month" id="trMonth" value="${trMonth}" style="font-family:inherit;padding:8px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;background:#fff">
        <button class="btn g" id="trExport"><i class="fa-solid fa-file-csv"></i> CSV</button>
      </div>
    </div>
    <div id="trKpis" class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))"></div>
    <div class="box" style="padding:0"><div id="trTable">Chargement…</div></div>
  </div>`;
  $('trMonth').onchange=e=>{trMonth=e.target.value;drawTracking();};
  $('trExport').onclick=()=>exportTrackingCSV();
  await drawTracking();
}
async function drawTracking(){
  const el=$('trTable'); if(!el)return;
  el.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted)">Chargement…</div>';
  const [y,m]=trMonth.split('-').map(Number);
  const from=iso(y,m,1), to=iso(y,m,dim(y,m));
  try{
    const [planRows, clockRows]=await Promise.all([
      BE.listMonthPlanning(hotelId,y,m),
      BE.listClockingsByRange(hotelId,from,to)
    ]);
    const active=staff.filter(s=>s.active!==false);
    // index planning by empId+day
    const planMap=new Map();
    planRows.forEach(r=>planMap.set(r.employee_id+'|'+r.day, r.status));
    // index clockings by empId
    const clockMap=new Map();
    clockRows.forEach(c=>{
      if(!clockMap.has(c.employee_id)) clockMap.set(c.employee_id,[]);
      clockMap.get(c.employee_id).push(c);
    });
    const nd=dim(y,m);
    const rows=active.map(emp=>{
      let planned=0,worked=0,cp=0,rtt=0,abs=0,extraMin=0;
      for(let d=1;d<=nd;d++){
        const k=emp.id+'|'+iso(y,m,d);
        const st=planMap.get(k)||'';
        if(st==='P'||st==='PE') planned++;
        if(st==='CP') cp++;
        if(st==='RTT') rtt++;
        if(st==='MAL'||st==='ABS'||st==='MAT'||st==='CSS') abs++;
      }
      const cks=clockMap.get(emp.id)||[];
      cks.forEach(c=>{
        if(c.clock_out_ts) extraMin+=minutesBetween(c.clock_in_ts,c.clock_out_ts)-(c.break_minutes||0);
      });
      worked=Math.round(extraMin/60*10)/10;
      const sc=schedules.find(s=>s.id===emp.schedule_id);
      const hpd=sc?.hours_per_day??7;
      const plannedH=Math.round(planned*hpd*10)/10;
      const diff=Math.round((worked-plannedH)*10)/10;
      return {emp,planned,cp,rtt,abs,worked,plannedH,diff,hpd,scheduleName:sc?.name};
    });
    // KPIs
    const totalPlannedH=rows.reduce((s,r)=>s+r.plannedH,0);
    const totalWorked=rows.reduce((s,r)=>s+r.worked,0);
    const totalDiff=Math.round((totalWorked-totalPlannedH)*10)/10;
    const withClock=rows.filter(r=>r.worked>0).length;
    const kpiEl=$('trKpis');
    if(kpiEl) kpiEl.innerHTML=[
      {icon:'fa-users',label:'Collaborateurs actifs',val:active.length,color:''},
      {icon:'fa-clock',label:'Heures planifiées',val:totalPlannedH+'h',color:''},
      {icon:'fa-stopwatch',label:'Heures pointées',val:totalWorked+'h',color:''},
      {icon:'fa-chart-line',label:'Écart global',val:(totalDiff>0?'+':'')+totalDiff+'h',color:totalDiff>=0?'#16a34a':'#dc2626'},
    ].map(k=>`<div class="kc"><div class="kv" style="${k.color?'color:'+k.color:''}">${k.val}</div><div class="kl"><i class="fa-solid ${k.icon}"></i> ${k.label}</div></div>`).join('');
    // Table
    window._trRows=rows;
    const diffColor=d=>d>0?'color:#16a34a;font-weight:600':d<0?'color:#dc2626;font-weight:600':'color:var(--muted)';
    el.innerHTML=`<table class="rtable">
      <thead><tr>
        <th>Collaborateur</th><th>Service</th><th>Horaire</th><th>Contrat</th>
        <th style="text-align:center">Jours P/PE</th>
        <th style="text-align:center">CP</th>
        <th style="text-align:center">RTT</th>
        <th style="text-align:center">Abs.</th>
        <th style="text-align:right">H/jour</th>
        <th style="text-align:right">Planifié (h)</th>
        <th style="text-align:right">Pointé (h)</th>
        <th style="text-align:right">Écart</th>
      </tr></thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td><b>${r.emp.last_name} ${r.emp.first_name}</b></td>
          <td>${r.emp.department||'—'}</td>
          <td style="font-size:11px">${r.scheduleName?`<span class="tag gray">${r.scheduleName}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
          <td style="font-size:11px;color:var(--muted)">${r.emp.contract_type||'—'}</td>
          <td style="text-align:center">${r.planned}</td>
          <td style="text-align:center">${r.cp||'—'}</td>
          <td style="text-align:center">${r.rtt||'—'}</td>
          <td style="text-align:center">${r.abs||'—'}</td>
          <td style="text-align:right;font-size:11px;color:var(--muted)">${r.hpd}h</td>
          <td style="text-align:right">${r.plannedH}h</td>
          <td style="text-align:right">${r.worked>0?r.worked+'h':'<span style="color:var(--muted)">—</span>'}</td>
          <td style="text-align:right;${diffColor(r.diff)}">${r.worked>0?(r.diff>0?'+':'')+r.diff+'h':'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }catch(e){el.innerHTML=`<div style="padding:24px;color:#dc2626">${e.message}</div>`;}
}
function exportTrackingCSV(){
  const rows=window._trRows||[];
  const hdr='Nom,Prénom,Service,Horaire,Contrat,Jours planifiés,CP,RTT,Abs,H/jour,Heures planifiées,Heures pointées,Écart\n';
  const body=rows.map(r=>[
    r.emp.last_name, r.emp.first_name, r.emp.department||'', r.scheduleName||'', r.emp.contract_type||'',
    r.planned, r.cp, r.rtt, r.abs, r.hpd, r.plannedH, r.worked, r.diff
  ].join(',')).join('\n');
  const blob=new Blob(['﻿'+hdr+body],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`suivi_temps_${trMonth}.csv`; a.click();
}
