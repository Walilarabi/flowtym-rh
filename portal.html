<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flowtym">
<title>Flowtym · Mon espace</title>
<!-- PWA Manifest inline -->
<script>
const manifest = {
  name: "Flowtym — Mon espace",
  short_name: "Flowtym",
  start_url: "/portal.html",
  display: "standalone",
  background_color: "#ffffff",
  theme_color: "#4f46e5",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234f46e5'/><text y='.9em' font-size='72' x='12'>🏨</text></svg>", sizes: "any", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
const link = document.createElement('link');
link.rel = 'manifest';
link.href = URL.createObjectURL(blob);
document.head.appendChild(link);
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
<style>
/* ── Variables ─────────────────────────────────────────────────────────── */
:root{
  --vi:#4f46e5;--vi-d:#3730a3;--vi-l:#eef2ff;--vi-m:#6366f1;
  --ink:#111827;--ink2:#6b7280;--line:#e5e7eb;
  --bg:#f9fafb;--white:#fff;
  --green:#16a34a;--green-bg:#f0fdf4;
  --red:#dc2626;--red-bg:#fef2f2;
  --amber:#d97706;--amber-bg:#fffbeb;
  --nav-h:64px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --radius:16px;--shadow:0 2px 12px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--ink);overscroll-behavior:none}

/* ── Layout ─────────────────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative;background:var(--white);box-shadow:0 0 0 1px var(--line)}
#topbar{background:var(--vi);color:#fff;padding:12px 16px;padding-top:calc(12px + env(safe-area-inset-top,0px));display:flex;align-items:center;gap:10px;flex-shrink:0;min-height:56px}
#topbar .logo{font-weight:800;font-size:17px;flex:1}
#topbar .logo small{font-weight:400;opacity:.7;font-size:13px;margin-left:4px}
#topbar .avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.25);display:grid;place-items:center;font-weight:700;font-size:14px;cursor:pointer;flex-shrink:0}
#view{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px)}
#nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:calc(var(--nav-h) + var(--safe-b));background:var(--white);border-top:1px solid var(--line);display:flex;align-items:flex-start;padding-top:6px;padding-bottom:var(--safe-b);z-index:100;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:6px 4px;border:0;background:transparent;color:var(--ink2);font-size:10px;font-family:inherit;transition:.15s;position:relative}
.nav-item.on{color:var(--vi)}
.nav-item i{font-size:20px;transition:.15s}
.nav-item.on i{transform:scale(1.1)}
.nav-badge{position:absolute;top:3px;right:calc(50% - 18px);background:var(--red);color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:grid;place-items:center;line-height:1}

/* ── Composants ──────────────────────────────────────────────────────────── */
.page{padding:16px 16px 0}
.page-title{font-size:20px;font-weight:800;color:var(--ink);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--ink2);margin-bottom:20px}
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:13px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.card-title i{color:var(--vi)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:10px;font-weight:600;font-size:14px;border:0;cursor:pointer;transition:.15s;font-family:inherit;white-space:nowrap}
.btn-p{background:var(--vi);color:#fff}.btn-p:hover{background:var(--vi-d)}
.btn-p:active{transform:scale(.97)}
.btn-g{background:var(--bg);color:var(--ink);border:1px solid var(--line)}.btn-g:active{transform:scale(.97)}
.btn-red{background:var(--red-bg);color:var(--red)}.btn-red:active{transform:scale(.97)}
.btn-full{width:100%;justify-content:center}
.tag{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
.tag-pending{background:#fef9c3;color:#854d0e}
.tag-approved{background:var(--green-bg);color:var(--green)}
.tag-rejected{background:var(--red-bg);color:var(--red)}
.tag-cancelled{background:#f3f4f6;color:#6b7280}
.divider{height:1px;background:var(--line);margin:14px 0}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field textarea,.field select{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;font-family:inherit;background:var(--white);color:var(--ink);outline:none;transition:.15s;-webkit-appearance:none}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--vi);box-shadow:0 0 0 3px var(--vi-l)}
.field textarea{resize:vertical;min-height:80px;max-height:200px}
.info-box{background:var(--vi-l);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--vi-d);margin-bottom:14px;display:flex;gap:8px}
.info-box i{flex-shrink:0;margin-top:1px}
.warn-box{background:var(--amber-bg);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--amber);margin-bottom:14px;display:flex;gap:8px}
.err-box{background:var(--red-bg);border-radius:10px;padding:12px 14px;font-size:13px;color:var(--red);margin-bottom:14px;display:flex;gap:8px}
.loading{display:flex;align-items:center;justify-content:center;padding:48px 16px;color:var(--ink2);gap:10px;flex-direction:column}
.spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--vi);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:48px 16px;color:var(--ink2)}
.empty i{font-size:36px;margin-bottom:12px;color:var(--line)}

/* ── Toast ───────────────────────────────────────────────────────────────── */
#toast{position:fixed;top:calc(env(safe-area-inset-top,0px) + 64px);left:50%;transform:translateX(-50%) translateY(-10px);background:#1a2035;color:#fff;padding:10px 18px;border-radius:10px;font-size:13.5px;font-weight:500;z-index:9999;opacity:0;transition:.25s;pointer-events:none;max-width:90vw;text-align:center}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Auth screens ─────────────────────────────────────────────────────────── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#4f46e5 0%,#7c3aed 100%);padding:24px}
.auth-card{background:var(--white);border-radius:24px;padding:28px 24px;width:100%;max-width:380px;box-shadow:0 24px 60px rgba(0,0,0,.2)}
.auth-logo{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.auth-logo .mk{width:44px;height:44px;background:var(--vi-l);border-radius:12px;display:grid;place-items:center;font-size:22px}
.auth-logo .name{font-weight:800;font-size:20px}
.auth-logo .name small{display:block;font-weight:400;font-size:12px;color:var(--ink2)}
.auth-title{font-size:18px;font-weight:700;margin-bottom:6px}
.auth-sub{font-size:13px;color:var(--ink2);margin-bottom:22px;line-height:1.5}
.otp-inputs{display:flex;gap:8px;justify-content:center;margin:16px 0}
.otp-inputs input{width:44px;height:52px;text-align:center;font-size:22px;font-weight:700;border:2px solid var(--line);border-radius:10px;outline:none;background:var(--bg)}
.otp-inputs input:focus{border-color:var(--vi);background:var(--vi-l)}
.gdpr-consent{background:var(--bg);border-radius:10px;padding:12px;font-size:12px;color:var(--ink2);line-height:1.6;margin-bottom:16px}
.gdpr-consent a{color:var(--vi);text-decoration:none}

/* ── Planning ────────────────────────────────────────────────────────────── */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-nav .lbl{font-weight:700;font-size:16px}
.month-nav button{background:var(--bg);border:1px solid var(--line);border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px;display:grid;place-items:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px}
.cal-head{font-size:10px;font-weight:700;text-align:center;color:var(--ink2);padding:4px 0;text-transform:uppercase}
.cal-day{aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;cursor:default;position:relative}
.cal-day .dn{font-size:12px;font-weight:700}
.cal-day .sb{font-size:8px;font-weight:800;border-radius:3px;padding:0 3px;margin-top:1px;line-height:14px}
.cal-day.today{box-shadow:inset 0 0 0 2px var(--vi)}
.cal-day.weekend{opacity:.6}
.cal-day.other-month{opacity:.25}
.cal-legend{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.cal-legend span{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--ink2)}
.cal-legend b{width:12px;height:12px;border-radius:3px;display:inline-block}

/* ── Pointage ────────────────────────────────────────────────────────────── */
.clock-card{text-align:center;padding:28px 16px}
.clock-time{font-size:52px;font-weight:800;letter-spacing:-1px;color:var(--vi);margin:8px 0;font-variant-numeric:tabular-nums}
.clock-date{font-size:14px;color:var(--ink2);margin-bottom:24px}
.clock-btn{width:120px;height:120px;border-radius:50%;border:0;cursor:pointer;font-size:15px;font-weight:700;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;margin:0 auto 24px;box-shadow:0 8px 24px rgba(79,70,229,.3);transition:.15s}
.clock-btn i{font-size:32px}
.clock-btn.in{background:var(--vi);color:#fff}
.clock-btn.out{background:var(--green);color:#fff;box-shadow:0 8px 24px rgba(22,163,74,.3)}
.clock-btn:active{transform:scale(.94)}
.clock-history .row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.clock-history .row:last-child{border-bottom:0}

/* ── QR Scanner ──────────────────────────────────────────────────────────── */
.qr-wrap{position:relative;border-radius:16px;overflow:hidden;background:#000;aspect-ratio:1;margin-bottom:16px}
.qr-wrap video{width:100%;height:100%;object-fit:cover;display:block}
.qr-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.qr-frame{width:220px;height:220px;border:3px solid rgba(255,255,255,.8);border-radius:16px;box-shadow:0 0 0 9999px rgba(0,0,0,.5)}

/* ── Documents ───────────────────────────────────────────────────────────── */
.doc-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.doc-row:last-child{border-bottom:0}
.doc-icon{width:40px;height:40px;border-radius:10px;display:grid;place-items:center;font-size:18px;flex-shrink:0}
.doc-icon.pdf{background:#fef2f2;color:#dc2626}
.doc-icon.img{background:#f0fdf4;color:#16a34a}
.doc-icon.other{background:var(--vi-l);color:var(--vi)}
.doc-info{flex:1;min-width:0}
.doc-name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.doc-meta{font-size:11.5px;color:var(--ink2);margin-top:1px}
.doc-actions{display:flex;gap:6px;flex-shrink:0}
.doc-btn{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:6px 8px;cursor:pointer;font-size:12px;color:var(--ink2)}

/* ── Demandes ────────────────────────────────────────────────────────────── */
.req-row{padding:14px 0;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:12px}
.req-row:last-child{border-bottom:0}
.req-icon{width:36px;height:36px;border-radius:10px;background:var(--vi-l);color:var(--vi);display:grid;place-items:center;flex-shrink:0;font-size:16px}
.req-body{flex:1;min-width:0}
.req-type{font-weight:700;font-size:13.5px}
.req-date{font-size:12px;color:var(--ink2);margin:2px 0}
.fab{position:fixed;right:20px;bottom:calc(var(--nav-h) + var(--safe-b) + 16px);width:56px;height:56px;border-radius:50%;background:var(--vi);color:#fff;border:0;font-size:22px;cursor:pointer;box-shadow:0 6px 20px rgba(79,70,229,.4);display:grid;place-items:center;z-index:99;transition:.15s}
.fab:active{transform:scale(.92)}

/* ── Messagerie ──────────────────────────────────────────────────────────── */
.msg-thread{display:flex;flex-direction:column;gap:10px;padding:0 0 8px}
.msg-bubble{max-width:82%;padding:10px 13px;border-radius:14px;font-size:13.5px;line-height:1.5}
.msg-bubble.me{align-self:flex-end;background:var(--vi);color:#fff;border-bottom-right-radius:4px}
.msg-bubble.them{align-self:flex-start;background:#f3f4f6;color:var(--ink);border-bottom-left-radius:4px}
.msg-meta{font-size:10.5px;opacity:.7;margin-top:3px;text-align:right}
.msg-bubble.them .msg-meta{text-align:left}
.msg-input-bar{position:sticky;bottom:0;background:var(--white);border-top:1px solid var(--line);padding:10px 12px calc(10px + var(--safe-b));display:flex;gap:8px;align-items:flex-end}
.msg-input-bar textarea{flex:1;resize:none;border:1.5px solid var(--line);border-radius:10px;padding:9px 12px;font-size:14px;font-family:inherit;outline:none;max-height:100px;line-height:1.4}
.msg-input-bar textarea:focus{border-color:var(--vi)}
.msg-input-bar button{background:var(--vi);color:#fff;border:0;border-radius:10px;width:40px;height:40px;font-size:16px;cursor:pointer;flex-shrink:0;display:grid;place-items:center}

/* ── Profil ──────────────────────────────────────────────────────────────── */
.profile-hero{background:linear-gradient(135deg,var(--vi),var(--vi-m));padding:28px 20px 40px;margin:-16px -16px 0;color:#fff;text-align:center}
.profile-av{width:72px;height:72px;border-radius:50%;border:3px solid rgba(255,255,255,.5);margin:0 auto 10px;display:grid;place-items:center;font-size:28px;font-weight:800;background:rgba(255,255,255,.2)}
.profile-name{font-size:20px;font-weight:800;margin-bottom:2px}
.profile-role{font-size:13px;opacity:.8}
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;margin-top:-24px}
.kpi{background:var(--white);border-radius:14px;padding:14px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--line)}
.kpi .val{font-size:24px;font-weight:800;color:var(--vi)}
.kpi .lbl{font-size:11px;color:var(--ink2);margin-top:2px}

/* ── Modal ───────────────────────────────────────────────────────────────── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:flex-end}
.modal-bg.on{display:flex}
.modal{background:var(--white);border-radius:24px 24px 0 0;padding:20px 16px calc(20px + var(--safe-b));width:100%;max-height:92vh;overflow-y:auto;animation:slideUp .25s ease}
.modal.modal-fullscreen{border-radius:0;padding:0;max-height:100vh;height:100vh}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--line);border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:17px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* ── Upload dropzone ─────────────────────────────────────────────────────── */
.dropzone{border:2px dashed var(--line);border-radius:12px;padding:24px 16px;text-align:center;color:var(--ink2);cursor:pointer;transition:.15s;font-size:13px}
.dropzone:hover,.dropzone.drag{border-color:var(--vi);background:var(--vi-l);color:var(--vi)}
.dropzone i{font-size:28px;margin-bottom:8px;display:block}

/* ── Scrollbar (desktop) ─────────────────────────────────────────────────── */
#view::-webkit-scrollbar{width:4px}
#view::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
</style>
</head>
<body>
<div id="toast"></div>
<div id="app">
  <header id="topbar" style="display:none">
    <div class="logo">Flowtym <small>Mon espace</small></div>
    <div id="bellWrap" style="position:relative;cursor:pointer" onclick="goTo('messages')">
      <i class="fa-regular fa-bell" style="font-size:20px;opacity:.9"></i>
      <span id="bellBadge" style="display:none;position:absolute;top:-4px;right:-4px;width:16px;height:16px;background:#dc2626;color:#fff;border-radius:50%;font-size:9px;font-weight:700;line-height:16px;text-align:center"></span>
    </div>
    <div class="avatar" id="topAvatar" onclick="goTo('profile')">?</div>
  </header>
  <!-- Écran auth statique — remplacé par JS dès que Supabase est chargé -->
  <div id="view">
    <div class="auth-wrap" id="staticAuth">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="mk">🏨</div>
          <div class="name">Flowtym<small>Mon espace salarié</small></div>
        </div>
        <h2 class="auth-title">Connexion</h2>
        <p class="auth-sub">Entrez l'adresse email associée à votre dossier RH. Vous recevrez un lien de connexion.</p>
        <div class="field"><label>Adresse e-mail</label>
          <input type="email" id="authEmail" placeholder="prenom.nom@hotel.fr" autocomplete="email" inputmode="email">
        </div>
        <div class="gdpr-consent">
          <label style="display:flex;gap:8px;align-items:flex-start;cursor:pointer">
            <input type="checkbox" id="gdprCheck" style="margin-top:2px;flex-shrink:0">
            <span>J'accepte que mes données soient traitées pour la gestion RH. <a href="#" onclick="event.preventDefault()">En savoir plus</a></span>
          </label>
        </div>
        <button class="btn btn-p btn-full" id="authSend" disabled>
          <div class="spinner" style="width:16px;height:16px;border-width:2px"></div> Connexion…
        </button>
        <p style="font-size:11.5px;color:var(--ink2);text-align:center;margin-top:14px">Votre compte est créé par votre responsable RH.</p>
      </div>
    </div>
  </div>
  <nav id="nav" style="display:none">
    <button class="nav-item" data-tab="planning" onclick="goTo('planning')">
      <i class="fa-regular fa-calendar"></i>Planning
    </button>
    <button class="nav-item" data-tab="clock" onclick="goTo('clock')">
      <i class="fa-regular fa-clock"></i>Pointage
    </button>
    <button class="nav-item" data-tab="docs" onclick="goTo('docs')">
      <i class="fa-solid fa-folder-open"></i>Coffre-fort
    </button>
    <button class="nav-item" data-tab="requests" onclick="goTo('requests')">
      <i class="fa-solid fa-paper-plane"></i>Demandes
      <span class="nav-badge" id="reqBadge" style="display:none"></span>
    </button>
    <button class="nav-item" data-tab="profile" onclick="goTo('profile')">
      <i class="fa-regular fa-user"></i>Profil
    </button>
  </nav>
</div>

<!-- Modals -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal"><div class="modal-handle"></div><div id="modalBody"></div></div>
</div>

<script type="module">
'use strict';

const SUPABASE_URL  = "https://hzrzkvdebaadditvbqis.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh6cnprdmRlYmFhZGRpdHZicWlzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMjEwMTQsImV4cCI6MjA5MjY5NzAxNH0.IDFFWHNNIeBReWRTeVj8RlRpyz5J4XaStFhGVEYEBU8";
const FUNCTIONS_URL = "https://hzrzkvdebaadditvbqis.supabase.co/functions/v1";

let sbModule;
try{
  sbModule = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
}catch(e){
  // CDN inaccessible (env offline, proxy…)
  document.getElementById('authSend').disabled = false;
  document.getElementById('authSend').innerHTML = '<i class="fa-solid fa-wifi-slash"></i> Réseau indisponible — réessayez';
  console.error('[portal] CDN Supabase inaccessible :', e.message);
  throw e; // Stoppe le module — l'écran statique reste visible
}
const {createClient} = sbModule;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON, {auth:{persistSession:true}});

// ── Helpers ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const iso = (y,m,d) => `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
const dim = (y,m) => new Date(y,m+1,0).getDate();
const fmtDate = s => s ? new Date(s).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}) : '—';
const fmtTime = ts => ts ? new Date(ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '—';

let toast_t;
function flash(msg, dur=2800){
  const t=$('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toast_t); toast_t=setTimeout(()=>t.classList.remove('on'), dur);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
async function boot(){
  $('view').innerHTML='<div class="loading"><div class="spinner"></div><div>Chargement…</div></div>';

  // PKCE auth code (invitation / recovery / magic link) — Supabase JS v2
  const search = window.location.search;
  if(search.includes('code=')){
    const code = new URLSearchParams(search).get('code');
    await sb.auth.exchangeCodeForSession(code);
    window.history.replaceState(null,'','/salarie');
  }

  const {data:{session:s}} = await sb.auth.getSession();
  session = s;

  if(!session){
    // Si l'URL contient un token QR (scan via appareil photo), mémoriser pour après connexion
    const qp=new URLSearchParams(window.location.search);
    if(qp.get('action')==='clock'&&qp.get('token')){
      sessionStorage.setItem('pending_clock_token', qp.get('token'));
      window.history.replaceState(null,'','/salarie');
    }
    renderAuth(); return;
  }
  await loadEmployee();
}

async function loadEmployee(){
  try{
    // Cherche d'abord par portal_auth_id (cas normal)
    let {data} = await sb
      .from('employees')
      .select('*')
      .eq('portal_auth_id', session.user.id)
      .eq('portal_enabled', true)
      .maybeSingle();

    // Fallback : cherche par email et auto-link (première connexion après invitation)
    if(!data && session.user.email){
      const {data: byEmail} = await sb
        .from('employees')
        .select('*')
        .eq('email', session.user.email)
        .eq('portal_enabled', true)
        .maybeSingle();
      if(byEmail){
        // Lier l'Auth ID à la fiche salarié (idempotent)
        await sb.from('employees')
          .update({portal_auth_id: session.user.id})
          .eq('id', byEmail.id);
        data = {...byEmail, portal_auth_id: session.user.id};
      }
    }

    if(!data){
      // Salarié connecté mais pas encore activé → écran activation
      renderActivation();
      return;
    }
    employee = data;

    // Forcer le changement de mot de passe à la première connexion
    if(employee.must_change_password){
      renderSetPassword();
      return;
    }

    // Charger l'hôtel
    const {data:h} = await sb.from('hotels').select('id,name,city').eq('id',employee.hotel_id).single();
    hotel = h;

    // Mettre à jour last_login_at + journal d'audit
    sb.from('employees').update({last_login_at: new Date().toISOString()}).eq('id',employee.id).then(null,()=>{});
    auditLog('login').catch(()=>{});

    renderShell();

    // Si un token QR était en attente (scan via appareil photo avant connexion)
    const pendingToken = sessionStorage.getItem('pending_clock_token');
    if(pendingToken){
      sessionStorage.removeItem('pending_clock_token');
      goTo('clock');
      // Déclencher le pointage automatiquement après chargement de la vue
      setTimeout(()=>submitQrCode(pendingToken), 600);
    } else {
      goTo('planning');
    }
  }catch(e){
    renderError(e.message);
  }
}

async function auditLog(action, extra={}){
  await sb.from('portal_audit_log').insert({
    hotel_id:    employee?.hotel_id,
    employee_id: employee?.id,
    actor_auth_id: session?.user?.id,
    actor_type:  'employee',
    action,
    metadata: extra,
  });
}

function wireAuthStep1(){
  $('authSend')?.addEventListener('click', async()=>{
    const email    = $('authEmail')?.value?.trim();
    const password = $('authPassword')?.value;
    const gdpr     = $('gdprCheck')?.checked;
    if(!email || !email.includes('@')){ flash('Email invalide'); return; }
    if(!password){ flash('Mot de passe requis'); return; }
    if(!gdpr){ flash('Veuillez accepter les conditions'); return; }
    $('authSend').disabled=true;
    $('authSend').innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px"></div> Connexion…';
    const {data, error} = await sb.auth.signInWithPassword({email, password});
    if(error){
      const msg = error.message.includes('Invalid login credentials')
        ? 'Email ou mot de passe incorrect'
        : 'Erreur : '+error.message;
      flash(msg);
      $('authSend').disabled=false;
      $('authSend').innerHTML='<i class="fa-solid fa-right-to-bracket"></i> Se connecter';
      return;
    }
    session = data.session;
    await loadEmployee();
  });
  $('authEmail')?.addEventListener('keydown', e=>{ if(e.key==='Enter') $('authPassword')?.focus(); });
  $('authPassword')?.addEventListener('keydown', e=>{ if(e.key==='Enter') $('authSend')?.click(); });
}

function renderForgotPassword(){

    <h2 class="auth-title">Mot de passe oublié</h2>
    <p class="auth-sub">Entrez votre email. Vous recevrez un lien pour définir un nouveau mot de passe.</p>
    <div class="field"><label>Adresse e-mail</label>
      <input type="email" id="authEmail" placeholder="prenom.nom@hotel.fr" autocomplete="email" inputmode="email">
    </div>
    <button class="btn btn-p btn-full" id="authSend"><i class="fa-solid fa-paper-plane"></i> Envoyer le lien</button>
    <button class="btn btn-g btn-full" style="margin-top:8px" id="authBack"><i class="fa-solid fa-arrow-left"></i> Retour</button>`;
  $('authSend').addEventListener('click', async()=>{
    const email = $('authEmail').value.trim();
    if(!email || !email.includes('@')){ flash('Email invalide'); return; }
    $('authSend').disabled=true;
    $('authSend').innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px"></div> Envoi…';
    const {error} = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin+'/salarie/auth/callback'
    });
    if(error){ flash('Erreur : '+error.message); $('authSend').disabled=false; $('authSend').innerHTML='<i class="fa-solid fa-paper-plane"></i> Envoyer le lien'; return; }
    $('authStep').innerHTML=`
      <h2 class="auth-title">Email envoyé ✓</h2>
      <p class="auth-sub">Un lien de réinitialisation a été envoyé à <b>${esc(email)}</b>.<br>Cliquez dessus pour définir votre nouveau mot de passe.</p>
      <button class="btn btn-g btn-full" id="authBack"><i class="fa-solid fa-arrow-left"></i> Retour à la connexion</button>`;
    $('authBack').addEventListener('click', ()=>{ $('authStep').innerHTML=renderAuthStep1(); wireAuthStep1(); });
  });
  $('authBack').addEventListener('click', ()=>{ $('authStep').innerHTML=renderAuthStep1(); wireAuthStep1(); });
}

function renderSetPassword(){
  $('topbar').style.display='none';
  $('nav').style.display='none';
  $('view').innerHTML=`
    <div class="auth-wrap">
      <div class="auth-card">
        <div class="auth-logo">
          <div class="mk">🏨</div>
          <div class="name">Flowtym<small>Créer votre mot de passe</small></div>
        </div>
        <h2 class="auth-title">Première connexion</h2>
        <p class="auth-sub">Pour sécuriser votre compte, définissez un mot de passe personnel (min. 8 caractères).</p>
        <div class="field"><label>Nouveau mot de passe</label>
          <input type="password" id="newPwd" placeholder="Minimum 8 caractères" autocomplete="new-password">
        </div>
        <div class="field"><label>Confirmer le mot de passe</label>
          <input type="password" id="confirmPwd" placeholder="Retapez le mot de passe" autocomplete="new-password">
        </div>
        <button class="btn btn-p btn-full" id="setPwdBtn"><i class="fa-solid fa-lock"></i> Enregistrer le mot de passe</button>
        <div id="setPwdErr" style="color:var(--red);font-size:12px;margin-top:8px;text-align:center"></div>
      </div>
    </div>`;

  const btn = $('setPwdBtn');
  const showErr = msg => { $('setPwdErr').textContent=msg; btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-lock"></i> Enregistrer le mot de passe'; };
  btn.addEventListener('click', async()=>{
    const pwd  = $('newPwd').value;
    const conf = $('confirmPwd').value;
    if(pwd.length < 8){ showErr('Le mot de passe doit comporter au moins 8 caractères.'); return; }
    if(pwd !== conf){ showErr('Les mots de passe ne correspondent pas.'); return; }
    btn.disabled=true;
    btn.innerHTML='<div class="spinner" style="width:18px;height:18px;border-width:2px"></div> Enregistrement…';
    const {error} = await sb.auth.updateUser({password: pwd});
    if(error){ showErr('Erreur : '+error.message); return; }
    if(employee?.id){
      await sb.from('employees').update({must_change_password:false, last_login_at: new Date().toISOString()}).eq('id', employee.id).then(null,()=>{});
    }
    employee = {...employee, must_change_password:false};
    const {data:h} = await sb.from('hotels').select('id,name,city').eq('id',employee.hotel_id).single();
    hotel = h;
    auditLog('password_set').catch(()=>{});
    renderShell();
    goTo('planning');
  });
  $('newPwd').addEventListener('keydown', e=>{ if(e.key==='Enter') $('confirmPwd')?.focus(); });
  $('confirmPwd').addEventListener('keydown', e=>{ if(e.key==='Enter') btn?.click(); });
}

function renderShell(){
  $('topbar').style.display='flex';
  $('nav').style.display='flex';
  const initials = (employee.first_name[0]||'?') + (employee.last_name[0]||'');
  $('topAvatar').textContent = initials.toUpperCase();

function goTo(tab){
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  const v = $('view');
  v.scrollTop = 0;
  const fn = {
    planning: renderPlanning,
    clock:    renderClock,
    docs:     renderDocs,
    requests: renderRequests,
    messages: renderMessages,
    profile:  renderProfile,
  }[tab] || renderPlanning;
  Promise.resolve(fn()).catch(e=>{
    v.innerHTML=`<div style="padding:32px 16px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px">
      <i class="fa-solid fa-triangle-exclamation" style="font-size:32px;color:var(--amber)"></i>
      <div style="font-weight:700;color:var(--ink)">Erreur de chargement</div>
      <div style="font-size:12.5px;color:var(--ink2);word-break:break-all">${esc(e.message||String(e))}</div>
      <button class="btn btn-g" onclick="goTo('${tab}')"><i class="fa-solid fa-rotate"></i> Réessayer</button>
    </div>`;
  });
  refreshBadges().catch(()=>{});
}

async function refreshBadges(){
  // Demandes en attente côté salarié (confirmations attendues)
  const {count} = await sb.from('portal_requests')
    .select('id',{count:'exact',head:true})
    .eq('employee_id', employee.id)
    .in('status',['approved','rejected'])
    .gte('updated_at', new Date(Date.now()-7*86400000).toISOString());
  $('reqBadge').style.display = count>0 ? 'grid' : 'none';
  if(count>0) $('reqBadge').textContent = count;

  // Messages non lus
  const {count:mc} = await sb.from('portal_messages')
    .select('id',{count:'exact',head:true})
    .eq('employee_id', employee.id)
    .eq('direction','manager_to_employee')
    .is('read_at',null);
  $('bellBadge').style.display = mc>0 ? 'grid' : 'none';
  if(mc>0) $('bellBadge').textContent = mc;
}

async function loadMonthCal(){
  const y=planMonth.getFullYear(), m=planMonth.getMonth();
  const lbl=$('monthLbl');
  if(lbl) lbl.textContent = planMonth.toLocaleDateString('fr-FR',{month:'long',year:'numeric'});

  const from=iso(y,m,1), to=iso(y,m,dim(y,m));
  const {data:rows} = await sb.from('staff_planning')
    .select('day,status,shift_label')
    .eq('employee_id', employee.id)
    .gte('day',from).lte('day',to);

  const dayMap = new Map((rows||[]).map(r=>[r.day,r]));
  const grid=$('calGrid'); if(!grid) return;
  const todayStr = new Date().toISOString().slice(0,10);

  const DAYS=['L','M','M','J','V','S','D'];
  let h = DAYS.map(d=>`<div class="cal-head">${d}</div>`).join('');

  // Padding début
  const firstWd = (new Date(y,m,1).getDay()+6)%7; // 0=lun
  for(let i=0;i<firstWd;i++) h+=`<div class="cal-day other-month"></div>`;

  const nd=dim(y,m);
  const usedCodes=new Set();
  for(let d=1;d<=nd;d++){
    const ds=iso(y,m,d);
    const row=dayMap.get(ds);
    const status=row?.status||'';
    const shift=row?.shift_label||'';
    const c=CMAP[status];
    const wd=(new Date(y,m,d).getDay()+6)%7;
    const we=wd>=5;
    const isToday=ds===todayStr;
    const st=c?`background:${c.bg};color:${c.fg}`:'background:#f9fafb;color:#9ca3af';
    if(c) usedCodes.add(status);
    const shiftBadge=shift?`<span class="sb" style="background:${SHIFT_BG[shift]||'#eee'};color:${SHIFT_FG[shift]||'#333'}">${shift}</span>`:'';
    h+=`<div class="cal-day ${we?'weekend':''} ${isToday?'today':''}" style="${st}">
      <span class="dn">${d}</span>
      ${status?`<span style="font-size:8px;font-weight:800">${esc(status)}</span>`:''}
      ${shiftBadge}
    </div>`;
  }
  grid.innerHTML=h;

  // Légende
  const leg=$('calLegend');
  if(leg) leg.innerHTML=[...usedCodes].map(code=>{const c=CMAP[code];return c?
    `<span><b style="background:${c.bg};border:1px solid rgba(0,0,0,.08)"></b>${c.lbl}</span>`:''
  }).join('');

  // Stats du mois
  const stats=$('monthStats'); if(!stats) return;
  const rowArr=rows||[];
  const trav=rowArr.filter(r=>['P','PE'].includes(r.status)).length;
  const cp=rowArr.filter(r=>r.status==='CP').length;
  const abs=rowArr.filter(r=>['MAL','ABS','CSS','AE','MAT'].includes(r.status)).length;
  const rep=nd-(rowArr.length);
  stats.innerHTML=`
    <div class="card-title"><i class="fa-solid fa-chart-pie"></i>Résumé du mois</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div style="background:#f0fdf4;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:#16a34a">${trav}</div>
        <div style="font-size:11px;color:#6b7280">Jours travaillés</div>
      </div>
      <div style="background:#eff6ff;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:#1d4ed8">${cp}</div>
        <div style="font-size:11px;color:#6b7280">Congés payés</div>
      </div>
      <div style="background:#fef2f2;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:#dc2626">${abs}</div>
        <div style="font-size:11px;color:#6b7280">Absences</div>
      </div>
      <div style="background:#f9fafb;border-radius:10px;padding:10px;text-align:center">
        <div style="font-size:22px;font-weight:800;color:#9ca3af">${rep}</div>
        <div style="font-size:11px;color:#6b7280">Repos</div>
      </div>
    </div>`;
}

        <i class="fa-solid fa-qrcode"></i> Scanner un QR Code

    </div>
    <div class="card">
      <div class="card-title"><i class="fa-regular fa-calendar"></i>Cette semaine</div>

function tickClock(){
  const now=new Date();
  const c=$('liveClock'); if(!c){clearInterval(clockTick);return;}
  c.textContent=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const d=$('clockDate'); if(d) d.textContent=now.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
}

async function loadClockings(){
  try{
  const today=new Date().toISOString().slice(0,10);
  const weekStart=new Date(); weekStart.setDate(weekStart.getDate()-weekStart.getDay()+1);
  const wFrom=weekStart.toISOString().slice(0,10);

  const {data} = await sb.from('staff_clockings')
    .select('*')
    .eq('employee_id',employee.id)
    .gte('day',wFrom)
    .order('clock_in_ts',{ascending:false});

  const rows=data||[];
  const todayRows=rows.filter(r=>r.day===today);
  const weekRows=rows.filter(r=>r.day!==today);

  // Déterminer état du bouton
  const lastOpen=todayRows.find(r=>!r.clock_out_ts);
  const btn=$('clockBtn'); const lbl=$('clockBtnLbl'); const st=$('clockStatus');
  if(btn){
    if(lastOpen){
      btn.className='clock-btn out';
      btn.querySelector('i').className='fa-solid fa-hand-point-down';
      if(lbl) lbl.textContent='Pointer sortie';
      if(st) st.textContent=`En service depuis ${fmtTime(lastOpen.clock_in_ts)}`;
      btn.dataset.openId=lastOpen.id;
    } else {
      btn.className='clock-btn in';
      btn.querySelector('i').className='fa-solid fa-hand-point-up';
      if(lbl) lbl.textContent='Pointer entrée';
      if(st) st.textContent='';
      delete btn.dataset.openId;
    }
  }

  const renderRow=r=>`<div class="row">
    <div>
      <div style="font-weight:600;font-size:13px">${fmtTime(r.clock_in_ts)} → ${r.clock_out_ts?fmtTime(r.clock_out_ts):'<span style="color:var(--green)">En cours</span>'}</div>
      <div style="font-size:11px;color:var(--ink2)">${r.clock_out_ts?durationStr(r.clock_in_ts,r.clock_out_ts,r.break_minutes):'—'} · ${r.source==='qr'?'QR Code':'Manuel'}</div>
    </div>
    ${r.clock_out_ts?'':'<span style="font-size:10.5px;background:#f0fdf4;color:#16a34a;padding:3px 8px;border-radius:6px;font-weight:600">Actif</span>'}
  </div>`;

  const tod=$('clockToday');
  if(tod) tod.innerHTML=todayRows.length?todayRows.map(renderRow).join(''):
    '<div style="text-align:center;padding:16px;color:var(--ink2);font-size:13px">Aucun pointage aujourd\'hui</div>';

  const wk=$('clockWeek');
  if(wk) wk.innerHTML=weekRows.length?weekRows.map(r=>`<div class="row">
    <div>
      <div style="font-weight:600;font-size:13px">${fmtDate(r.day)}</div>
      <div style="font-size:11px;color:var(--ink2)">${fmtTime(r.clock_in_ts)} → ${r.clock_out_ts?fmtTime(r.clock_out_ts):'—'}</div>
    </div>
    <div style="font-size:12px;font-weight:600">${r.clock_out_ts?durationStr(r.clock_in_ts,r.clock_out_ts,r.break_minutes):'—'}</div>
  </div>`).join(''):
    '<div style="text-align:center;padding:16px;color:var(--ink2);font-size:13px">Aucun pointage cette semaine</div>';
  }catch(e){
    const tod=$('clockToday'); if(tod) tod.innerHTML=`<div style="color:var(--red);padding:12px;font-size:13px">${esc(e.message)}</div>`;
  }
}

function durationStr(inTs,outTs,brk=0){
  const m=Math.round((new Date(outTs)-new Date(inTs))/60000)-(brk||0);
  return `${Math.floor(m/60)}h${String(m%60).padStart(2,'0')}`;
}

window.handleClockAction=async()=>{
  const btn=$('clockBtn'); if(!btn) return;
  btn.disabled=true;
  try{
    if(btn.dataset.openId){
      // Clock-out
      const {error}=await sb.from('staff_clockings').update({clock_out_ts:new Date().toISOString()}).eq('id',btn.dataset.openId);
      if(error) throw error;
      flash('Sortie pointée ✓');
      auditLog('clock_out',{clocking_id:btn.dataset.openId});
    } else {
      // Clock-in
      const now=new Date();
      const {error}=await sb.from('staff_clockings').insert({
        hotel_id:  employee.hotel_id,
        employee_id: employee.id,
        day:       now.toISOString().slice(0,10),
        clock_in_ts: now.toISOString(),
        source:    'self',
      });
      if(error) throw error;
      flash('Entrée pointée ✓');
      auditLog('clock_in');
    }
    await loadClockings();
  }catch(e){flash('Erreur : '+e.message);}
  finally{btn.disabled=false;}
};

// ── NFC Pointage (Web NFC API — Chrome Android 89+) ──────────────────────────
window.openNfcClock=async()=>{
  if(!('NDEFReader' in window)){
    flash('NFC non supporté sur cet appareil — utilisez le QR Code');
    return;
  }
  try{
    const ndef = new NDEFReader();
    await ndef.scan();
    flash('NFC actif — approchez le badge du terminal…', 5000);
    ndef.addEventListener('reading', async({message})=>{
      for(const record of message.records){
        if(record.recordType==='text'||record.recordType==='url'){
          const decoder=new TextDecoder(record.encoding||'utf-8');
          const raw=decoder.decode(record.data);
          await submitQrCode(raw); // même logique que QR
          return;
        }
      }
      flash('Badge non reconnu');
    });
    ndef.addEventListener('readingerror', ()=>flash('Erreur lecture NFC'));
  }catch(e){
    if(e.name==='NotAllowedError') flash('Permission NFC refusée — activez-la dans les paramètres');
    else if(e.name==='NotSupportedError') flash('NFC non disponible sur cet appareil');
    else flash('Erreur NFC : '+e.message);
  }
};

window.openQrScan=async()=>{
  if(!('BarcodeDetector' in window)){
    // Fallback : saisie manuelle du code
    openModal(`
      <div class="modal-title"><i class="fa-solid fa-qrcode" style="color:var(--vi)"></i>Saisir le code</div>
      <p style="font-size:13px;color:var(--ink2);margin-bottom:14px">Votre navigateur ne supporte pas le scanner. Saisissez le code affiché sur le terminal de pointage.</p>
      <div class="field"><label>Code pointage</label><input type="text" id="qrCodeInput" placeholder="Ex: FTY-xxxxx" autocomplete="off"></div>
      <button class="btn btn-p btn-full" onclick="submitQrCode($('qrCodeInput').value)"><i class="fa-solid fa-check"></i> Valider</button>`);
    return;
  }
  openModal(`
    <div class="modal-title"><i class="fa-solid fa-qrcode" style="color:var(--vi)"></i>Scanner le QR Code</div>
    <div class="qr-wrap" id="qrWrap">
      <video id="qrVideo" autoplay playsinline muted></video>
      <div class="qr-overlay"><div class="qr-frame"></div></div>
    </div>
    <p style="font-size:12px;color:var(--ink2);text-align:center">Placez le QR Code dans le cadre</p>`);
  startQrScanner();
};

let qrStream=null;
async function startQrScanner(){
  try{
    qrStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
    const vid=$('qrVideo'); if(!vid) return;
    vid.srcObject=qrStream;
    const detector=new BarcodeDetector({formats:['qr_code']});
    const tick=async()=>{
      if(!$('qrVideo')){if(qrStream)qrStream.getTracks().forEach(t=>t.stop());return;}
      try{
        const codes=await detector.detect(vid);
        if(codes.length){
          qrStream.getTracks().forEach(t=>t.stop());
          closeModal();
          await submitQrCode(codes[0].rawValue);
          return;
        }
      }catch{}
      requestAnimationFrame(tick);
    };
    vid.addEventListener('loadedmetadata',()=>requestAnimationFrame(tick));
  }catch(e){
    const w=$('qrWrap');
    if(w) w.innerHTML=`<div class="err-box" style="margin:16px"><i class="fa-solid fa-camera-slash"></i>Caméra inaccessible : ${esc(e.message)}</div>`;
  }
}

async function submitQrCode(raw){
  if(!raw){flash('QR Code vide');return;}

  // Extraire le token (URL: ?action=clock&token=xxx  ou  UUID brut)
  let qrToken = raw.trim();
  try{
    const u=new URL(raw);
    const t=u.searchParams.get('token');
    if(t) qrToken=t;
  }catch(_){}
  if(!qrToken){flash('Format QR Code invalide');return;}

  closeModal();
  flash('Obtention de la position GPS…');

  // Demander la géolocalisation
  const getGps=()=>new Promise((resolve,reject)=>{
    if(!navigator.geolocation){resolve({lat:null,lng:null,accuracy:null});return;}
    navigator.geolocation.getCurrentPosition(
      p=>resolve({lat:p.coords.latitude,lng:p.coords.longitude,accuracy:p.coords.accuracy}),
      e=>{
        if(e.code===1) reject(new Error('Géolocalisation refusée. Autorisez votre position dans les réglages du navigateur.'));
        else resolve({lat:null,lng:null,accuracy:null}); // timeout/indisponible → on tente quand même
      },
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  });

  let gps;
  try{ gps=await getGps(); }
  catch(e){ flash(e.message); return; }

  flash('Validation en cours…');
  try{
    const {data:{session}}=await sb.auth.getSession();
    if(!session) throw new Error('Session expirée, reconnectez-vous');

    const resp=await fetch(`${FUNCTIONS_URL}/clock-portal`,{
      method:'POST',
      headers:{
        'Authorization':`Bearer ${session.access_token}`,
        'Content-Type':'application/json',
        'apikey':SUPABASE_ANON,
      },
      body:JSON.stringify({
        qr_token:qrToken,
        gps_lat:gps.lat,
        gps_lng:gps.lng,
        gps_accuracy:gps.accuracy,
        device_info:navigator.userAgent,
      }),
    });
    const result=await resp.json();
    if(!resp.ok||!result.success) throw new Error(result.error||'Erreur inconnue');

    flash(result.message);
    if(result.anomalies?.length) flash(`⚠️ Anomalie détectée : ${result.anomalies.join(', ')}`);
    auditLog(result.action+'_qr',{token:qrToken,distance:result.distance_meters});
    await loadClockings();
  }catch(e){ flash('Erreur pointage : '+e.message); }
}

async function loadDocs(){
  const el=$('docsContent'); if(!el) return;
  try{
  // Charger les fichiers du bucket portal-documents/{hotel_id}/{employee_id}/
  const prefix=`${employee.hotel_id}/${employee.id}/`;
  const {data:files,error} = await sb.storage.from('portal-documents').list(prefix,{limit:200,sortBy:{column:'created_at',order:'desc'}});

  // Charger employee_documents + portal_signature_requests
  const {data:empDocs} = await sb.from('employee_documents')
    .select('*,psr:portal_signature_requests(id,status,yousign_sr_id,signed_document_path)')
    .eq('employee_id',employee.id).order('created_at',{ascending:false});

  // Charger les demandes de documents RH (portal_document_requests)
  const {data:docReqs} = await sb.from('portal_document_requests')
    .select('*')
    .eq('employee_id',employee.id)
    .order('created_at',{ascending:false});

  // Construire l'affichage par catégorie
  const byDir={employer:[],employee:[]};

  // Docs manager (via employee_documents)
  (empDocs||[]).forEach(d=>{
    const psr=Array.isArray(d.psr)?d.psr[0]:d.psr;
    byDir.employer.push({
      id:d.id, name:d.label||d.doc_type, storage_path:d.storage_path, file_url:d.file_url,
      type:'employer_doc', doc_type:d.doc_type, created_at:d.created_at,
      signature_status:d.signature_status||'none',
      psr_id:psr?.id, yousign_sr_id:psr?.yousign_sr_id,
      signed_document_path:psr?.signed_document_path,
    });
  });

  // Docs portail (uploadés par le salarié)
  (files||[]).filter(f=>f.name!=='.emptyFolderPlaceholder').forEach(f=>{
    const parts=f.name.split('/');
    const cat=parts[0]||'autre';
    byDir.employee.push({name:f.name, storage_name:f.name, type:'portal_doc', cat, created_at:f.created_at});
  });

  let h='';

  // Séparer docs à signer des autres
  const toSign=byDir.employer.filter(d=>d.signature_status==='pending');
  if(toSign.length){
    h+=`<div class="card" style="border-color:#7c3aed;background:#faf5ff">
      <div class="card-title" style="color:#7c3aed"><i class="fa-solid fa-pen-nib"></i>À signer (${toSign.length})</div>`;
    h+=toSign.map(d=>docRow(d)).join('');
    h+=`</div>`;
  }
  // Documents demandés par RH
  const pendingReqs=(docReqs||[]).filter(r=>r.status==='pending');
  if(pendingReqs.length){
    h+=`<div class="card" style="border-color:#f59e0b;background:#fffbeb">
      <div class="card-title" style="color:#d97706"><i class="fa-solid fa-bell"></i>Documents demandés par RH (${pendingReqs.length})</div>`;
    h+=pendingReqs.map(r=>{
      const DOC_LABELS={'cni':'Carte Nationale d\'Identité','passport':'Passeport','titre_sejour':'Titre de séjour','permis_travail':'Permis de travail','carte_vitale':'Carte Vitale','visite_med':'Visite médicale','rib':'RIB','domicile':'Justificatif de domicile','hebergement':'Attestation d\'hébergement','mutuelle':'Attestation mutuelle','contrat':'Contrat signé','diplome':'Diplôme','autre':'Autre'};
      return `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px dashed #f59e0b">
        <i class="fa-solid fa-file-circle-question" style="color:#d97706;font-size:18px;margin-top:2px"></i>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px">${DOC_LABELS[r.doc_type]||r.doc_type}</div>
          ${r.message?`<div style="font-size:11.5px;color:var(--ink2);margin-top:2px;white-space:pre-wrap">${esc(r.message.split('\n').slice(0,3).join('\n'))}</div>`:''}
          <div style="font-size:11px;color:#d97706;margin-top:4px">Demandé le ${new Date(r.created_at).toLocaleDateString('fr-FR')}</div>
        </div>
        <button class="btn btn-p" style="font-size:11px;padding:5px 10px;flex-shrink:0" onclick="openUploadDoc('${r.doc_type}')"><i class="fa-solid fa-upload"></i> Déposer</button>
      </div>`;
    }).join('');
    h+=`</div>`;
  }

  if(byDir.employer.length){
    h+=`<div class="card"><div class="card-title"><i class="fa-solid fa-building"></i>De votre employeur</div>`;
    h+=byDir.employer.filter(d=>d.signature_status!=='pending').map(d=>docRow(d)).join('');
    if(!byDir.employer.filter(d=>d.signature_status!=='pending').length)
      h+=`<div style="text-align:center;padding:16px;color:var(--ink2);font-size:13px">Aucun autre document</div>`;
    h+=`</div>`;
  } else {
    h+=`<div class="card"><div class="card-title"><i class="fa-solid fa-building"></i>De votre employeur</div>
      <div style="text-align:center;padding:16px;color:var(--ink2);font-size:13px">Aucun document transmis par votre employeur</div></div>`;
  }

  h+=`<div class="card">
    <div class="card-title"><i class="fa-solid fa-upload"></i>Vos documents
      <button class="btn btn-p" style="margin-left:auto;font-size:12px;padding:6px 10px" onclick="openUploadDoc()">
        <i class="fa-solid fa-plus"></i> Ajouter
      </button>
    </div>`;
  if(byDir.employee.length){
    h+=byDir.employee.map(d=>docRow(d)).join('');
  } else {
    h+=`<div style="text-align:center;padding:16px;color:var(--ink2);font-size:13px">
      <i class="fa-solid fa-file-circle-plus" style="font-size:28px;display:block;margin-bottom:8px;opacity:.3"></i>
      Aucun document. Ajoutez votre CNI, titre de séjour, arrêts maladie…
    </div>`;
  }
  h+=`</div>

  <div class="info-box"><i class="fa-solid fa-lock"></i>
    Vos documents sont chiffrés et accessibles uniquement par vous et votre responsable RH.
    <a href="#" onclick="showGdpr();return false" style="color:var(--vi);font-weight:600;margin-left:4px">En savoir plus</a>
  </div>`;

  el.innerHTML=h;
  }catch(e){el.innerHTML=`<div style="color:var(--red);padding:16px;font-size:13px"><i class="fa-solid fa-triangle-exclamation"></i> ${esc(e.message)}</div>`;}
}

function docRow(d){
  const ext=(d.storage_name||d.storage_path||d.name||'').split('.').pop().toLowerCase();
  const itype=ext==='pdf'?'pdf':['jpg','jpeg','png','heic','webp','gif'].includes(ext)?'img':'other';
  const icons={pdf:'fa-file-pdf',img:'fa-file-image',other:'fa-file'};
  const label=d.name||(d.doc_type?(DOC_TYPES[d.doc_type]?.label||d.doc_type):'Document');
  const sigBadge={
    pending:`<span style="font-size:11px;font-weight:600;color:#d97706;background:#fffbeb;padding:2px 8px;border-radius:12px">⏳ À signer</span>`,
    signed:`<span style="font-size:11px;font-weight:600;color:#16a34a;background:#f0fdf4;padding:2px 8px;border-radius:12px">✅ Signé</span>`,
    refused:`<span style="font-size:11px;font-weight:600;color:#dc2626;background:#fef2f2;padding:2px 8px;border-radius:12px">❌ Refusé</span>`,
    expired:`<span style="font-size:11px;font-weight:600;color:#9ca3af;background:#f3f4f6;padding:2px 8px;border-radius:12px">⌛ Expiré</span>`,
  }[d.signature_status]||'';
  const signBtn=d.signature_status==='pending'
    ?`<button class="btn btn-p btn-full" style="margin-top:10px;font-size:13px" onclick="openSignatureIframe('${esc(d.yousign_sr_id||'')}','${esc(d.id||'')}')">
        <i class="fa-solid fa-pen-nib"></i> Signer maintenant
      </button>`:'';
  const downloadSigned=d.signature_status==='signed'&&d.signed_document_path
    ?`<button class="doc-btn" onclick="downloadSignedDoc('${esc(d.signed_document_path)}')" title="Télécharger le document signé"><i class="fa-solid fa-certificate"></i></button>`:'';
  return `<div class="doc-row" style="flex-direction:column;align-items:stretch">
    <div style="display:flex;align-items:center;gap:10px">
      <div class="doc-icon ${itype}"><i class="fa-solid ${icons[itype]}"></i></div>
      <div class="doc-info" style="flex:1">
        <div class="doc-name">${esc(label)}</div>
        <div class="doc-meta" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span>${fmtDate(d.created_at)}</span>
          ${sigBadge}
        </div>
      </div>
      <div class="doc-actions">
        ${d.storage_path?`<button class="doc-btn" onclick="downloadEmpDoc('${esc(d.storage_path)}')" title="Télécharger"><i class="fa-solid fa-download"></i></button>`:''}
        ${d.url?`<button class="doc-btn" onclick="window.open('${esc(d.url)}','_blank')" title="Ouvrir"><i class="fa-solid fa-eye"></i></button>`:''}
        ${d.storage_name?`<button class="doc-btn" onclick="downloadPortalDoc('${esc(d.storage_name)}')" title="Télécharger"><i class="fa-solid fa-download"></i></button>`:''}
        ${downloadSigned}
      </div>

window.openSignatureIframe=async(yousignSrId, documentId)=>{
  if(!yousignSrId){flash('Identifiant de signature manquant');return;}
  // Récupérer le lien de signature depuis portal_signature_requests
  const {data:psr,error}=await sb.from('portal_signature_requests')
    .select('yousign_sr_id,yousign_signer_id,status')
    .eq('yousign_sr_id',yousignSrId).single();
  if(error||!psr){flash('Demande de signature introuvable');return;}
  if(psr.status!=='ongoing'){flash('Cette demande de signature n\'est plus active ('+psr.status+')');return;}

  // L'URL de signature YouSign (sandbox ou prod selon env)
  const YOUSIGN_BASE='https://sandbox.yousign.app';
  const signUrl=`${YOUSIGN_BASE}/sign/${psr.yousign_sr_id}?signer_id=${psr.yousign_signer_id}&disable_domain_validation=true`;

  openModal(`
    <div style="display:flex;flex-direction:column;height:85vh;max-height:700px">
      <div style="display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);flex-shrink:0">
        <i class="fa-solid fa-pen-nib" style="color:var(--vi);font-size:18px"></i>
        <span style="font-weight:700;font-size:15px">Signature électronique</span>
        <span style="font-size:12px;color:var(--ink2);margin-left:4px">— Valeur légale eIDAS</span>
        <button onclick="closeModal()" style="margin-left:auto;background:none;border:none;cursor:pointer;font-size:20px;color:var(--ink2)">×</button>
      </div>
      <iframe src="${signUrl}"
        style="flex:1;border:none;width:100%"
        allow="camera;microphone"
        id="signatureIframe">
      </iframe>
    </div>`);

  // Écouter le message de fin de signature (postMessage YouSign)
  const onMsg=(e)=>{
    if(!e.data) return;
    const evt=typeof e.data==='string'?JSON.parse(e.data||'{}'):e.data;
    if(evt.type==='yousign:signed'||evt.event==='signed'||evt.status==='SIGNED'){
      window.removeEventListener('message',onMsg);
      closeModal();
      flash('✅ Document signé avec succès ! Il sera disponible dans votre coffre-fort sous quelques instants.');
      auditLog('document_signed',{yousign_sr_id:yousignSrId});
      setTimeout(()=>loadDocs(),3000);
    }
  };
  window.addEventListener('message',onMsg);
};

window.handleDocUpload=async(file)=>{
  if(!file){return;}
  const maxSize=20*1024*1024;
  if(file.size>maxSize){flash('Fichier trop volumineux (max 20 Mo)');return;}
  const allowed=['application/pdf','image/jpeg','image/png','image/heic','image/webp','image/gif'];
  if(!allowed.includes(file.type)){flash('Format non supporté');return;}

  const docType=$('docTypeSelect')?.value||'autre';
  const ext=file.name.split('.').pop().toLowerCase();
  const safeName=`${docType}_${Date.now()}.${ext}`;
  const path=`${employee.hotel_id}/${employee.id}/${safeName}`;

  const prog=$('uploadProgress');
  if(prog) prog.innerHTML=`<div class="info-box"><i class="fa-solid fa-spinner fa-spin"></i>Envoi en cours…</div>`;

  const {error}=await sb.storage.from('portal-documents').upload(path,file,{upsert:false,contentType:file.type});
  if(error){
    if(prog) prog.innerHTML=`<div class="err-box"><i class="fa-solid fa-triangle-exclamation"></i>${esc(error.message)}</div>`;
    return;
  }

  // Enregistrer dans employee_documents avec statut "pending" (à vérifier par RH)
  try{
    const expiresAtInput=$('docExpiresAt');
    const issuedAtInput=$('docIssuedAt');
    const {data:existing}=await sb.from('employee_documents').select('id').eq('hotel_id',employee.hotel_id).eq('employee_id',employee.id).eq('doc_type',docType).maybeSingle();
    const payload={hotel_id:employee.hotel_id,employee_id:employee.id,doc_type:docType,status:'pending',file_path:path,file_size:file.size,file_mime:file.type,expires_at:expiresAtInput?.value||null,issued_at:issuedAtInput?.value||null,notes:`Déposé depuis le portail salarié`};
    if(existing?.id){
      await sb.from('employee_documents').update(payload).eq('id',existing.id);
    } else {
      await sb.from('employee_documents').insert(payload);
    }
    // Marquer portal_document_requests comme soumis si applicable
    await sb.from('portal_document_requests').update({status:'submitted',submitted_at:new Date().toISOString()}).eq('employee_id',employee.id).eq('doc_type',docType).eq('status','pending').then(null,()=>{});
    // Notifier RH via portal_messages
    await sb.from('portal_messages').insert({hotel_id:employee.hotel_id,employee_id:employee.id,direction:'employee_to_manager',body:`Nouveau document déposé : ${docType}. En attente de validation RH.`,read_at:null}).then(null,()=>{});
  }catch(eDb){ console.warn('employee_documents insert:', eDb); }

  if(prog) prog.innerHTML=`<div class="info-box" style="background:#f0fdf4;color:#16a34a"><i class="fa-solid fa-check"></i>Document envoyé — en attente de validation RH</div>`;
  auditLog('upload_doc',{filename:safeName,docType,size:file.size});
  setTimeout(()=>{closeModal();loadDocs();},1200);
};

async function loadRequests(){
  const el=$('reqList'); if(!el) return;
  try{
  const {data,error}=await sb.from('portal_requests')
    .select('*')
    .eq('employee_id',employee.id)
    .order('created_at',{ascending:false})
    .limit(50);

  if(!data?.length){
    el.innerHTML=`<div class="card empty"><i class="fa-solid fa-paper-plane"></i><br>Aucune demande.<br><small>Utilisez le bouton + pour créer une demande.</small></div>`;
    return;
  }

  const grouped={pending:[],approved:[],rejected:[],cancelled:[]};
  data.forEach(r=>(grouped[r.status]||grouped.pending).push(r));

  let h='';
  [['pending','En attente'],['approved','Acceptées'],['rejected','Refusées'],['cancelled','Annulées']].forEach(([s,lbl])=>{
    if(!grouped[s].length) return;
    h+=`<div class="card"><div class="card-title"><i class="fa-solid fa-circle-dot"></i>${lbl}</div>`;
    h+=grouped[s].map(r=>{
      const t=REQ_TYPES[r.type]||REQ_TYPES.autre;
      const period=r.date_end&&r.date_end!==r.date_start?`${fmtDate(r.date_start)} → ${fmtDate(r.date_end)}`:fmtDate(r.date_start);
      return `<div class="req-row" onclick="openRequestDetail('${r.id}')">
        <div class="req-icon"><i class="fa-solid ${t.icon}" style="color:${t.color}"></i></div>
        <div class="req-body">
          <div class="req-type">${t.label}</div>
          <div class="req-date">${period}</div>
          ${r.manager_comment?`<div style="font-size:11.5px;color:var(--ink2);margin-top:2px;font-style:italic">"${esc(r.manager_comment.slice(0,60))}"</div>`:''}
        </div>
        <span class="tag tag-${r.status}">${{pending:'En attente',approved:'Acceptée',rejected:'Refusée',cancelled:'Annulée'}[r.status]}</span>
      </div>`;
    }).join('');
    h+=`</div>`;
  });
  el.innerHTML=h;
  }catch(e){el.innerHTML=`<div style="color:var(--red);padding:16px;font-size:13px"><i class="fa-solid fa-triangle-exclamation"></i> ${esc(e.message)}</div>`;}
}

window.submitRequest=async()=>{
  const btn=$('reqSubmit'); if(!btn) return;
  if(!$('reqConsent')?.checked){flash('Veuillez cocher la case de consentement');return;}
  const type=$('reqType')?.value;
  const dateStart=$('reqDateStart')?.value;
  if(!dateStart){flash('Date de début requise');return;}

  btn.disabled=true;
  btn.innerHTML='<div class="spinner" style="width:16px;height:16px;border-width:2px"></div> Envoi…';

  try{
    // Upload pièce jointe si maladie
    let attachPath=null, attachName=null;
    const file=$('reqFile')?.files?.[0];
    if(file){
      const ext=file.name.split('.').pop();
      const fn=`arret_${Date.now()}.${ext}`;
      const path=`${employee.hotel_id}/${employee.id}/arrets/${fn}`;
      const {error:ue}=await sb.storage.from('portal-documents').upload(path,file,{contentType:file.type});
      if(ue) throw ue;
      attachPath=path; attachName=file.name;
      auditLog('upload_arret',{filename:fn,size:file.size});
    }

    const payload={
      hotel_id:    employee.hotel_id,
      employee_id: employee.id,
      type,
      date_start:  dateStart,
      date_end:    $('reqDateEnd')?.value||null,
      shift_label: $('reqShift')?.value||null,
      message:     $('reqMessage')?.value?.trim()||null,
      attachment_path: attachPath,
      attachment_name: attachName,
      submitted_consent: true,
    };
    const {error}=await sb.from('portal_requests').insert(payload);
    if(error) throw error;
    flash('Demande envoyée ✓');
    auditLog('submit_request',{type,date_start:dateStart});
    closeModal();
    await loadRequests();
  }catch(e){flash('Erreur : '+e.message);}
  finally{if(btn){btn.disabled=false;btn.innerHTML='<i class="fa-solid fa-paper-plane"></i> Envoyer la demande';}}
};

        <i class="fa-solid fa-file-export"></i> Mes données (droit d'accès RGPD)
      </button>
      <button class="btn btn-red btn-full" style="margin-bottom:8px" onclick="requestErasure()">
        <i class="fa-solid fa-eraser"></i> Supprimer mes données portail
      </button>
    </div>

    <div class="card">
      <button class="btn btn-g btn-full" onclick="signOut()">
        <i class="fa-solid fa-arrow-right-from-bracket"></i> Se déconnecter
      </button>
    </div>
    <div style="text-align:center;font-size:11px;color:var(--ink2);padding:8px 0 4px">
      Flowtym RH · v1.0 · Données hébergées dans l'UE
    </div>
  </div>`;
  _wirePwdForm();
}

// Câblage du formulaire de changement de mot de passe (injecté après render)
function _wirePwdForm(){
  $('showPwdFormBtn')?.addEventListener('click',()=>{
    $('pwdFormArea').innerHTML=`
      <div class="fld" style="margin-bottom:8px">
        <label style="font-size:12px;color:var(--ink2)">Nouveau mot de passe</label>
        <input type="password" id="newPwd1" placeholder="8 caractères minimum" autocomplete="new-password"
          style="width:100%;box-sizing:border-box;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-top:4px">
      </div>
      <div class="fld" style="margin-bottom:12px">
        <label style="font-size:12px;color:var(--ink2)">Confirmer</label>
        <input type="password" id="newPwd2" autocomplete="new-password"
          style="width:100%;box-sizing:border-box;padding:10px 12px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;margin-top:4px">
      </div>
      <div id="pwdErr" style="color:#dc2626;font-size:12.5px;margin-bottom:8px"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-p" id="savePwdBtn" style="flex:1"><i class="fa-solid fa-check"></i> Valider</button>
        <button class="btn btn-g" id="cancelPwdBtn"><i class="fa-solid fa-xmark"></i></button>
      </div>`;
    $('cancelPwdBtn').onclick=()=>_wirePwdForm_reset();
    $('savePwdBtn').onclick=async()=>{
      const p1=$('newPwd1').value, p2=$('newPwd2').value;
      if(p1.length<8){$('pwdErr').textContent='8 caractères minimum.';return;}
      if(p1!==p2){$('pwdErr').textContent='Les mots de passe ne correspondent pas.';return;}
      $('savePwdBtn').disabled=true; $('pwdErr').textContent='';
      const {error}=await sb.auth.updateUser({password:p1});
      $('savePwdBtn').disabled=false;
      if(error){$('pwdErr').textContent=error.message;}
      else{flash('Mot de passe modifié ✓');_wirePwdForm_reset();}
    };
  });
}
function _wirePwdForm_reset(){
  $('pwdFormArea').innerHTML=`<button class="btn btn-p btn-full" id="showPwdFormBtn"><i class="fa-solid fa-key"></i> Changer mon mot de passe</button>`;
  _wirePwdForm();
}

function infoLine(label, val){
  return `<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--line)">
    <span style="font-size:12px;color:var(--ink2)">${esc(label)}</span>
    <span style="font-size:13.5px;font-weight:500">${esc(val)}</span>
  </div>`;
}

window.requestDataExport=async()=>{
  const [plan,clockings,requests,messages]=await Promise.all([
    sb.from('staff_planning').select('day,status,shift_label').eq('employee_id',employee.id),
    sb.from('staff_clockings').select('day,clock_in_ts,clock_out_ts').eq('employee_id',employee.id),
    sb.from('portal_requests').select('type,date_start,date_end,status').eq('employee_id',employee.id),
    sb.from('portal_messages').select('direction,body,created_at').eq('employee_id',employee.id).eq('deleted_by_employee',false),
  ]);
  const data={
    employee:{id:employee.id,first_name:employee.first_name,last_name:employee.last_name,email:employee.email,department:employee.department,contract_type:employee.contract_type,hire_date:employee.hire_date},
    planning:plan.data||[],
    clockings:clockings.data||[],
    requests:requests.data||[],
    messages:messages.data||[],
    exported_at:new Date().toISOString(),
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`mes_donnees_flowtym_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  auditLog('gdpr_export');
  flash('Export téléchargé');
};

window.requestErasure=async()=>{
  const confirmed=confirm('Supprimer vos données portail (messages, demandes personnelles) ?\n\nVos données de paie et planning restent conservées pour des raisons légales (5 ans).\n\nVotre compte portail sera désactivé.');
  if(!confirmed) return;
  const {error}=await sb.rpc('pl_portal_gdpr_erase',{p_employee_id:employee.id});
  if(error){flash('Erreur : '+error.message);return;}
  flash('Données supprimées. Déconnexion…');
  setTimeout(()=>signOut(),1800);
};

window.signOut=async()=>{
  clearInterval(clockTick);
  await sb.auth.signOut();
  session=null; employee=null; hotel=null;
  renderAuth();
};

// ── Modal ─────────────────────────────────────────────────────────────────────
window.openModal=body=>{
  $('modalBody').innerHTML=body;
  $('modalBg').classList.add('on');
};
window.closeModal=e=>{
  if(e&&e.target!==$('modalBg')) return;
  $('modalBg').classList.remove('on');
  if(qrStream){qrStream.getTracks().forEach(t=>t.stop());qrStream=null;}
};
$('modal').addEventListener('click',e=>e.stopPropagation());

// ── Exposition globale (script type="module" scope) ──────────────────────────
window.goTo = goTo;
window.showGdpr = showGdpr;
window.renderForgotPassword = renderForgotPassword;
window.renderSetPassword = renderSetPassword;
window.submitQrCode = submitQrCode;
window.renderActivation = renderActivation;
window.renderError = renderError;

// ── Démarrage ─────────────────────────────────────────────────────────────────
// Service Worker PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js', { scope: '/' }).catch(()=>{});
}
boot();
</script>
