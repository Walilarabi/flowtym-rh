async function convertDocx(file){
  try{
    if(!window.mammoth) await loadScript('https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js');
    const ab=await file.arrayBuffer();
    const result=await window.mammoth.convertToHtml({arrayBuffer:ab});
    $('ti_body').value=result.value||'';
    if(result.messages&&result.messages.length){
      $('ti_warn').textContent='Conversion DOCX terminée avec des avertissements — vérifiez le rendu.';
      $('ti_warn').style.display='block';
    }
    $('ti_name').value=$('ti_name').value||file.name.replace(/\.docx$/i,'');
    $('ti_fields').style.display='block';
    $('ti_save').disabled=false;
  }catch(e){
    $('ti_warn').textContent='Erreur de conversion Word : '+(e.message||e);
    $('ti_warn').style.display='block';
  }
}

async function convertPdf(file){
  try{
    if(!window.pdfjsLib){
      await loadScript('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs');
      window.pdfjsLib=window['pdfjs-dist/build/pdf']||window.pdfjsLib;
    }
    // pdfjs-dist 4.x ESM — load via import() as fallback
    let pdfjsLib=window.pdfjsLib;
    if(!pdfjsLib){
      const mod=await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs');
      pdfjsLib=mod;
    }
    if(pdfjsLib.GlobalWorkerOptions) pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let html='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const tc=await page.getTextContent();
      const lines=tc.items.map(it=>it.str).join(' ').trim();
      if(lines) html+=`<p>${lines.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>\n`;
    }
    $('ti_body').value=html||'';
    $('ti_warn').innerHTML='<i class="fa-solid fa-triangle-exclamation"></i> Extraction PDF : la mise en page complexe peut nécessiter des corrections manuelles. Utilisez <b>.docx</b> pour un meilleur résultat.';
    $('ti_warn').style.display='block';
    $('ti_name').value=$('ti_name').value||file.name.replace(/\.pdf$/i,'');
    $('ti_fields').style.display='block';
    $('ti_save').disabled=false;
  }catch(e){
    $('ti_warn').textContent='Erreur de lecture PDF : '+(e.message||e)+'. Préférez le format .docx.';
    $('ti_warn').style.display='block';
  }
}

let genInlineState = {step:1, employee_id:'', template_id:'', fields:{contract_type:'CDI', start_date:'', end_date:'', trial_period:'', weekly_hours:'', salary_type:'brut_mensuel', salary_amount:'', manager_id:'', service_id:'', role_id:'', signature_method:'email'}, tplList:[]};

async function renderContractsGenerate(){
  const s = genInlineState;
  const steps = ['Informations','Aperçu','Envoi & Signature','Archivage'];
  const stepper = steps.map((name,i)=>`
    <div style="display:flex;align-items:center;gap:6px;${i>0?'margin-left:0':''}">
      ${i>0?'<div style="width:40px;height:2px;background:'+(s.step>i?'var(--violet)':'var(--line)')+'"></div>':''}
      <div style="display:flex;align-items:center;gap:7px">
        <div style="width:28px;height:28px;border-radius:50%;background:${s.step===i+1?'var(--violet)':s.step>i+1?'#6d4ac4':'var(--line)'};color:${s.step>=i+1?'#fff':'var(--muted)'};font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center">${i+1}</div>
        <span style="font-size:12.5px;font-weight:${s.step===i+1?'700':'400'};color:${s.step===i+1?'var(--ink)':'var(--muted)'}">${name}</span>
      </div>
    </div>`).join('');

  $('csub').innerHTML=`
    <div style="background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 24px;display:flex;align-items:center;gap:0;margin-bottom:20px;overflow-x:auto">
      ${stepper}
    </div>
    <div id="genInlineBody"></div>`;

  if(s.step===1) await _genStep1();
  else if(s.step===2) await _genStep2();
  else if(s.step===3) await _genStep3();
  else _genStep4();
}

/* ===== MOTEUR DE SUBSTITUTION DE VARIABLES ===== */
function buildContractContext(emp, hotel, fields){

    ? (fields.salary||fields.salary_amount||'')+ (fields.salary||fields.salary_amount?' € / heure':'')
    : (fields.salary||fields.salary_amount||'')+(fields.salary||fields.salary_amount?' € brut / mois':'');
  const hoursLabel = fields.weekly_hours
    ? (fields.weekly_hours+' h / semaine')
    : (fields.hours_per_week ? fields.hours_per_week+' h / semaine' : '');

  const ctx = {
    // ── Nouvelles variables dot-notation ───────────────────────────────

    'collaborateur.nom_complet' : `${emp.first_name||''} ${emp.last_name||''}`.trim(),

    'collaborateur.nationalite' : emp.nationality||'',
    'collaborateur.adresse'     : emp.address||'',
    'collaborateur.telephone'   : emp.phone||'',
    'collaborateur.email'       : emp.email||'',
    'collaborateur.numero_secu' : emp.social_security_number||'',
    'collaborateur.titre_sejour': emp.residency_permit_number||'',
    'contrat.type'              : fields.contract_type||emp.contract_type||'',
    'contrat.date_debut'        : fmt(fields.contract_start_date||fields.start_date),
    'contrat.date_fin'          : fmt(fields.contract_end_date||fields.end_date),
    'contrat.periode_essai'     : fields.trial_period||'',
    'contrat.duree_hebdomadaire': hoursLabel,
    'poste.service'             : fields.department||emp.department||'',
    'poste.intitule'            : fields.job_title||emp.role||'',
    'poste.responsable'         : fields.manager_name||'',
    'poste.lieu_travail'        : fields.work_location||hotel?.city||hotel?.name||'',
    'remuneration.montant'      : fields.salary||fields.salary_amount||'',
    'remuneration.type'         : fields.salary_type==='taux_horaire'?'taux horaire':'brut mensuel',
    'hotel.nom'                 : hotel?.name||'',
    'hotel.adresse'             : hotel?.address||hotel?.city||'',
    'hotel.siret'               : hotel?.siret||'',
    'hotel.representant'        : hotel?.legal_representative||fields.manager_name||'',
    'hotel.convention_collective': fields.collective_agreement||hotel?.collective_agreement||'HCR – Hôtels Cafés Restaurants',
    // ── Anciens noms (rétrocompatibilité totale) ────────────────────────
    employee_first_name         : emp.first_name||'',
    employee_last_name          : emp.last_name||'',
    employee_full_name          : `${emp.first_name||''} ${emp.last_name||''}`.trim(),
    birth_date                  : fmt(emp.birth_date),
    birth_place                 : emp.birth_place||'',
    nationality                 : emp.nationality||'',
    social_security_number      : emp.social_security_number||'',
    residency_permit_number     : emp.residency_permit_number||'',
    address                     : emp.address||'',
    phone                       : emp.phone||'',
    email                       : emp.email||'',
    job_title                   : fields.job_title||emp.role||'',
    department                  : fields.department||emp.department||'',
    contract_type               : fields.contract_type||emp.contract_type||'',
    contract_start_date         : fmt(fields.contract_start_date||fields.start_date),
    contract_end_date           : fmt(fields.contract_end_date||fields.end_date),
    trial_period                : fields.trial_period||'',
    weekly_hours                : hoursLabel,
    salary                      : fields.salary||fields.salary_amount||'',
    work_location               : fields.work_location||hotel?.city||'',
    manager_name                : fields.manager_name||'',
    collective_agreement        : fields.collective_agreement||hotel?.collective_agreement||'HCR – Hôtels Cafés Restaurants',
    hotel_name                  : hotel?.name||'',
    hotel_address               : hotel?.address||hotel?.city||'',
    today                       : new Date().toLocaleDateString('fr-FR'),
  };
  return ctx;

function substituteVariables(html, ctx, stripUnresolved=false){
  // Support both {{key}} and {{namespace.key}} syntax
  return html.replace(/\{\{([\w.]+)\}\}/g, (m,k)=>{
    if(ctx[k] !== undefined && ctx[k] !== '') return String(ctx[k]);
    if(stripUnresolved) return '';
    return `<span style="background:#fef3c7;color:#92400e;padding:0 4px;border-radius:3px;font-size:0.9em">${m}</span>`;
  });
}

function detectMissingVars(templateHtml, ctx){
  const missing=[];
  const re=/\{\{([\w.]+)\}\}/g; let m;
  while((m=re.exec(templateHtml))!==null){
    const k=m[1];
    if(ctx[k]===undefined||ctx[k]==='') missing.push(k);
  }
  return [...new Set(missing)];
}

/* ===== MIGRATION CONTENU NON STRUCTURÉ ===== */
// Tente de convertir un template "brut" (tout dans <p> ou texte) vers HTML structuré.
function _migrateUnstructuredContract(html){
  // Flatten to plain text lines, preserving <br> as newline
  const tmp = document.createElement('div');
  tmp.innerHTML = html.replace(/<br\s*\/?>/gi, '\n');
  const raw = tmp.textContent || tmp.innerText || '';
  const lines = raw.split('\n').map(l=>l.trim()).filter(Boolean);

  let out = '';
  let inBloc = ''; // 'emp' | 'sal' | ''
  let blocLines = [];

  const flushBloc = () => {
    if(!inBloc || !blocLines.length) return;
    const cls = inBloc==='emp' ? 'bloc-employeur' : 'bloc-salarie';
    out += `<div class="${cls}">${blocLines.map(l=>`<strong>${l}</strong>`).join('<br>\n')}</div>\n\n`;
    inBloc=''; blocLines=[];
  };

  let firstTitle = true;
  for(let li=0; li<lines.length; li++){
    const l = lines[li];
    // Title: all-caps or starts with "CONTRAT"
    if(firstTitle && /^(CONTRAT|CONTRACT)/i.test(l)){
      out += `<h1>${l}</h1>\n\n`;
      firstTitle=false; continue;
    }
    // Employer block trigger
    if(/entre l.employ/i.test(l)||/d.une part/i.test(l)){
      if(inBloc!=='emp'){ flushBloc(); inBloc='emp'; }
      blocLines.push(l); continue;
    }
    // Employee block trigger
    if(/et le salari/i.test(l)||/né\(?e\)? le /i.test(l)||/demeurant/i.test(l)||/numéro ss/i.test(l)){
      if(inBloc!=='sal'){ flushBloc(); inBloc='sal'; }
      blocLines.push(l); continue;
    }
    if(/d.autre part/i.test(l)){
      if(inBloc==='sal') blocLines.push(l);
      flushBloc(); continue;
    }
    // End of bloc when hitting "Il a été convenu"
    if(/il a été convenu/i.test(l)){ flushBloc(); out+=`<p class="intro">${l}</p>\n\n`; continue; }
    // Article headings
    if(/^article\s+\d+\s*:/i.test(l)){ flushBloc(); out+=`<h2>${l}</h2>\n`; continue; }
    // Signature
    if(/fait en deux/i.test(l)){ flushBloc(); out+=`<p class="fait">${l}</p>\n`; continue; }
    if(/^[Àà]?\s*[A-Z][a-z]+,?\s+le\s+/i.test(l)){ out+=`<p class="lieu">${l}</p>\n`; continue; }
    if(/signature employ/i.test(l)||/signature salar/i.test(l)) continue; // skip, will be in sig-block
    // Generic paragraph
    if(inBloc){ blocLines.push(l); }
    else { out += `<p>${l}</p>\n`; }
  }
  flushBloc();
  return out || html;
}

/* ===== MOTEUR DE RENDU STRUCTURÉ DU CONTRAT ===== */
// Parse le HTML du template en blocs sémantiques et émet du HTML 100% inline-styled.
// Aucune dépendance CSS externe — fonctionne dans l'aperçu ET dans jsPDF.
function transformContractHtml(html){
  // Detect unstructured HTML: no h1/h2/bloc class → migrate to structured format first
  if(!/(<h[12][\s>]|class=["'][^"']*bloc-)/i.test(html)){
    html = _migrateUnstructuredContract(html);
  }
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  let out = '';
  const els = Array.from(tmp.children);
  let i = 0;

  while(i < els.length){
    const el = els[i];
    const tag = (el.tagName||'').toUpperCase();
    const cls = el.className||'';

    // ── Titre du contrat (h1) ─────────────────────────────────────────────
    if(tag === 'H1'){
      out += `<div style="text-align:center;font-size:17pt;font-weight:700;text-decoration:underline;letter-spacing:.4px;margin:0 0 44pt;font-family:inherit">${el.textContent.trim()}</div>`;
    }

    // ── Bloc employeur ────────────────────────────────────────────────────
    else if(cls.includes('bloc-employeur')){
      const lines = el.innerHTML.split(/<br\s*\/?>\s*/i).map(s=>s.trim()).filter(Boolean);
      out += `<div style="margin-bottom:28pt">${
        lines.map(l=>`<div style="font-weight:700;line-height:2.05;font-size:11pt">${l}</div>`).join('')
      }</div>`;
    }

    // ── Bloc salarié ──────────────────────────────────────────────────────
    else if(cls.includes('bloc-salarie')){
      const lines = el.innerHTML.split(/<br\s*\/?>\s*/i).map(s=>s.trim()).filter(Boolean);
      out += `<div style="margin-bottom:36pt">${
        lines.map(l=>`<div style="line-height:2.05;font-size:11pt">${l}</div>`).join('')
      }</div>`;
    }

    // ── Introduction "Il a été convenu…" ──────────────────────────────────
    else if(tag === 'P' && cls.includes('intro')){
      out += `<div style="font-weight:700;font-size:11pt;margin:26pt 0 16pt">${el.innerHTML}</div>`;
    }

    // ── Article : h2 + paragraphes suivants ───────────────────────────────
    else if(tag === 'H2'){
      let bodies = '';
      let j = i + 1;
      while(j < els.length){
        const nx = els[j];
        const nt = (nx.tagName||'').toUpperCase();
        const nc = nx.className||'';
        if(nt==='H2' || nc.includes('sig-block') || nc.includes('fait') || nc.includes('lieu')) break;
        if(nt==='P'){
          bodies += `<div style="text-align:justify;font-size:11pt;line-height:1.78;margin:0 0 8pt">${nx.innerHTML}</div>`;
          j++;
        } else break;
      }
      i = j - 1;
      out += `<div style="margin-bottom:20pt;page-break-inside:avoid">`
           + `<div style="font-weight:700;font-size:11pt;margin:0 0 8pt">${el.innerHTML}</div>`
           + bodies
           + `</div>`;
    }

    // ── "Fait en deux exemplaires" ────────────────────────────────────────
    else if(tag === 'P' && cls.includes('fait')){
      out += `<div style="font-weight:700;font-size:11pt;margin:32pt 0 8pt">${el.innerHTML}</div>`;
    }

    // ── Lieu et date ──────────────────────────────────────────────────────
    else if(tag === 'P' && cls.includes('lieu')){
      const lines = el.innerHTML.split(/<br\s*\/?>\s*/i).map(s=>s.trim()).filter(Boolean);
      out += `<div style="margin-bottom:10pt">${
        lines.map(l=>`<div style="font-size:11pt;line-height:2">${l}</div>`).join('')
      }</div>`;
    }

    // ── Bloc signatures ───────────────────────────────────────────────────
    else if(cls.includes('sig-block')){
      const tds = Array.from(el.querySelectorAll('table td'));

      const renderSigTd = (td)=>{
        let r = '';
        Array.from(td.children).forEach(child=>{
          const ct = (child.tagName||'').toUpperCase();
          if(ct === 'P'){
            const strong = child.querySelector('strong');
            const em     = child.querySelector('em');
            if(strong && !em){
              r += `<div style="font-weight:700;font-size:11pt;margin:0 0 7pt">${child.innerHTML}</div>`;
            } else if(em){
              r += `<div style="font-size:10pt;font-style:italic;color:#444;margin:0 0 6pt">${child.innerHTML}</div>`;
            } else {
              r += `<div style="font-size:10pt;color:#555;margin:0 0 4pt">${child.textContent}</div>`;
            }
          } else if(ct === 'DIV'){
            r += `<div style="margin-top:52pt;border-top:1px solid #333;max-width:180pt;padding-top:5pt;font-size:9pt;color:#777">${child.textContent}</div>`;
          }
        });
        return r;
      };

      if(tds.length >= 2){
        out += `<div style="page-break-inside:avoid;margin-top:38pt">`
             + `<table style="width:100%;border-collapse:collapse"><tr>`
             + `<td style="vertical-align:top;width:50%;padding-right:24pt">${renderSigTd(tds[0])}</td>`
             + `<td style="vertical-align:top;width:50%;padding-left:24pt">${renderSigTd(tds[1])}</td>`
             + `</tr></table></div>`;
      } else {
        out += `<div style="page-break-inside:avoid;margin-top:38pt">${el.innerHTML}</div>`;
      }
    }

    // ── Saut de page explicite ─────────────────────────────────────────────
    else if(tag === 'DIV' && el.style && el.style.pageBreakBefore === 'always'){
      out += `<div style="page-break-before:always"></div>`;
    }

    // ── Contenu générique (templates custom) ──────────────────────────────
    else {
      if(tag === 'P'){
        out += `<div style="text-align:justify;font-size:11pt;line-height:1.75;margin:0 0 8pt">${el.innerHTML}</div>`;
      } else {
        out += el.outerHTML;
      }
    }

    i++;
  }

  return out || '<div style="color:#888;font-size:11pt;padding:20pt">Aucun contenu.</div>';
}

async function renderHtmlToPdfBlob(html, title){
  // Load dependencies
  if(!(window.jspdf && window.jspdf.jsPDF)){
    await loadScript('https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js');
  }
  if(!window.html2canvas){
    await loadScript('https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js');
  }
  const { jsPDF } = window.jspdf;

  // Render into a hidden A4-sized div (same dimensions as preview)
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:794px;background:#fff;padding:75px 76px 90px 95px;font-family:"Times New Roman",Times,serif;font-size:14.7px;line-height:1.6;color:#111;box-sizing:border-box';
  wrap.innerHTML = `<div style="text-align:right;font-size:11px;color:#888;margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid #ccc">${title} · Généré le ${new Date().toLocaleDateString('fr-FR')}</div>${html}`;
  document.body.appendChild(wrap);

  try {
    const canvas = await window.html2canvas(wrap, {
      backgroundColor: '#ffffff',
      scale: 2,
      useCORS: true,
      logging: false,
      width: wrap.scrollWidth,
      height: wrap.scrollHeight,
    });

    const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const A4_W = 210, A4_H = 297;
    const imgData = canvas.toDataURL('image/jpeg', 0.95);
    const canvasW = canvas.width;
    const canvasH = canvas.height;
    const ratio = A4_W / (canvasW / 2); // canvas is @2x
    const totalMmH = canvasH / 2 * ratio;
    const pageCount = Math.ceil(totalMmH / A4_H);

    for(let pg = 0; pg < pageCount; pg++){
      if(pg > 0) doc.addPage();
      doc.addImage(imgData, 'JPEG', 0, -pg * A4_H, A4_W, totalMmH);
    }
    return doc.output('blob');
  } finally {
    document.body.removeChild(wrap);
  }
}

// Columns shown in matrix (Identité is synthetic — handled separately)
const DX_COLS = [
  ['permis_travail','Permis de travail', true],
  ['carte_vitale',  'Carte Vitale',      false],
  ['visite_med',    'Visite médicale',   true],
  ['rib',           'RIB',               false],
  ['domicile',      'Justificatif\nde domicile', false],
  ['hebergement',   'Attestation\nd\'hébergement', false],
  ['mutuelle',      'Attestation\nmutuelle', false],
  ['contrat',       'Contrat signé',     false],
  ['diplome',       'Diplôme',           false],
  ['autre',         'Autre',             false],
];
// identity doc types that feed the synthetic Identité column
const DX_ID_TYPES = ['cni','passport','titre_sejour'];

let _dxData = {};       // employee_id → {doc_type → {status,expires_at,file_path}}
let _dxSelected = null; // selected employee id
let _dxFilters = {onlyMissing:false, onlyWarn:false, hideNA:false};

function _dxStatus(empId, docType){
  return (_dxData[empId]||{})[docType] || {status:'missing', expires_at:null, file_path:null};
}

// For Identité column: find which identity doc is provided (or status)
function _dxIdentityState(empId){
  for(const t of DX_ID_TYPES){
    const r = _dxData[empId]?.[t];
    if(r && r.status === 'provided') return {type:t, status:'provided'};
    if(r && r.status === 'not_applicable') continue;
  }
  // check if any marked not_applicable (all three)
  const allNA = DX_ID_TYPES.every(t => _dxData[empId]?.[t]?.status === 'not_applicable');
  if(allNA) return {type:null, status:'not_applicable'};
  return {type:null, status:'missing'};
}

function _dxCellClass(status, expires_at){
  if(status === 'not_applicable') return 'na';
  if(status === 'provided'){
    if(expires_at){
      const days = Math.round((new Date(expires_at) - new Date()) / 86400000);
      if(days < 0) return 'ko'; // expired
      if(days <= 30) return 'warn expiring'; // expiring soon
    }
    return 'ok';
  }
  if(status === 'pending') return 'warn';
  return 'ko';
}

function _dxCellIcon(status, expires_at){
  if(status === 'not_applicable') return '—';
  if(status === 'provided'){
    if(expires_at){
      const days = Math.round((new Date(expires_at) - new Date()) / 86400000);
      if(days < 0) return '<i class="fa-solid fa-triangle-exclamation"></i>';
      if(days <= 30) return '<i class="fa-regular fa-clock"></i>';
    }
    return '<i class="fa-solid fa-circle-check"></i>';
  }
  if(status === 'pending') return '<i class="fa-regular fa-circle"></i>';
  return '<i class="fa-solid fa-xmark"></i>';
}

// Cycle status on click (provided → pending → missing → not_applicable → provided)
function _dxNextStatus(current){
  const cycle = ['provided','pending','missing','not_applicable'];
  const i = cycle.indexOf(current);
  return cycle[(i+1) % cycle.length];
}

async function renderDocuments(){
  $('view').innerHTML=`<div class="page">
    <div class="phead">
      <div><h1>Documents RH</h1><div class="sub">Centre de pilotage documentaire · cliquez sur une case pour changer le statut</div></div>
      <div style="display:flex;gap:8px">
        <button class="btn g" onclick="renderDocuments()"><i class="fa-solid fa-rotate"></i> Actualiser</button>
        <button class="btn g" id="dxExport"><i class="fa-solid fa-download"></i> Exporter</button>
      </div>
    </div>
    <div id="dxbox" style="display:flex;flex-direction:column;gap:14px"><div style="text-align:center;padding:40px;color:var(--muted)"><i class="fa-solid fa-spinner fa-spin"></i> Chargement…</div></div>
  </div>`;

  try{
    const all = await BE.listAllDocuments(hotelId);
    _dxData = {};
    all.forEach(d => {
      if(!_dxData[d.employee_id]) _dxData[d.employee_id] = {};
      _dxData[d.employee_id][d.doc_type] = {status: d.status, expires_at: d.expires_at, file_path: d.file_path};
    });
    _dxRender();
  }catch(e){ $('dxbox').innerHTML=`<div style="color:#dc2626;padding:20px">${e.message}</div>`; }
}

function _dxRender(){
  const list = staff.filter(s=>s.active).sort((a,b)=>a.last_name.localeCompare(b.last_name));

  // Compute KPIs
  let totalRequired=0, totalProvided=0, totalMissing=0, totalWarn=0, totalNA=0;
  const today = new Date();
  list.forEach(s=>{
    // identity
    const idState = _dxIdentityState(s.id);
    if(idState.status==='not_applicable') totalNA++;
    else if(idState.status==='provided') totalProvided++;
    else totalMissing++;
    if(idState.status!=='not_applicable') totalRequired++;
    // other cols
    DX_COLS.forEach(([k])=>{
      const r = _dxStatus(s.id,k);
      if(r.status==='not_applicable'){totalNA++;return;}
      totalRequired++;
      if(r.status==='provided'){
        if(r.expires_at){
          const d=Math.round((new Date(r.expires_at)-today)/86400000);
          if(d<0){totalMissing++;}
          else if(d<=30){totalWarn++;totalProvided++;}
          else totalProvided++;
        } else totalProvided++;
      } else if(r.status==='pending') totalWarn++;
      else totalMissing++;
    });
  });
  const totalConformity = totalRequired>0?Math.round(totalProvided/totalRequired*100):100;

  const kpiHtml=`<div class="dx-kpi">
    <div class="dx-kpi-card"><div class="label">Total collaborateurs</div><div class="val" style="color:var(--violet)">${list.length}</div></div>
    <div class="dx-kpi-card"><div class="label">Documents requis</div><div class="val">${totalRequired}</div></div>
    <div class="dx-kpi-card"><div class="label">Conformes</div><div class="val" style="color:#16a34a">${totalProvided}</div><div class="sub">${totalConformity}% conformité</div></div>
    <div class="dx-kpi-card"><div class="label">Manquants</div><div class="val" style="color:#dc2626">${totalMissing}</div></div>
    <div class="dx-kpi-card"><div class="label">À vérifier</div><div class="val" style="color:#d97706">${totalWarn}</div></div>
    <div class="dx-kpi-card"><div class="label">Non concernés</div><div class="val" style="color:#9ca3af">${totalNA}</div></div>
    <div class="dx-kpi-card" style="flex:2;display:flex;align-items:center;gap:24px">
      <div style="display:flex;gap:10px;flex-wrap:wrap;font-size:11.5px;align-items:center">
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#16a34a;display:inline-block"></span>Fourni</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#dc2626;display:inline-block"></span>Manquant</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#d97706;display:inline-block"></span>À vérifier</span>
        <span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:50%;background:#9ca3af;display:inline-block"></span>Non concerné</span>
      </div>
    </div>
  </div>`;

  // Filters bar
  const filtersHtml=`<div style="display:flex;gap:10px;align-items:center;font-size:12px;flex-wrap:wrap">
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="dxfMissing" ${_dxFilters.onlyMissing?'checked':''} onchange="_dxFilters.onlyMissing=this.checked;_dxRender()"> Afficher uniquement les manquants</label>
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="dxfWarn" ${_dxFilters.onlyWarn?'checked':''} onchange="_dxFilters.onlyWarn=this.checked;_dxRender()"> Afficher uniquement les à vérifier</label>
    <label style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="dxfNA" ${_dxFilters.hideNA?'checked':''} onchange="_dxFilters.hideNA=this.checked;_dxRender()"> Masquer les non concernés</label>
  </div>`;

  // Table
  const IDX_LABELS = {cni:'CNI', passport:'Passeport', titre_sejour:'T.Séj'};

  // Column totals
  const colStats = DX_COLS.map(([k])=>{
    let prov=0,miss=0,total=0;
    list.forEach(s=>{
      const r=_dxStatus(s.id,k);
      if(r.status==='not_applicable') return;
      total++;
      if(r.status==='provided') prov++;
      else miss++;
    });
    return {prov,miss,total,pct:total>0?Math.round(prov/total*100):100};
  });
  // identity col totals
  let idProv=0,idMiss=0,idTotal=0;
  list.forEach(s=>{
    const st=_dxIdentityState(s.id);
    if(st.status==='not_applicable') return;
    idTotal++;
    if(st.status==='provided') idProv++; else idMiss++;
  });

  const colWidths = `<col style="width:160px;min-width:140px"><!-- name col --><col style="width:80px"><!-- identity -->${DX_COLS.map(()=>`<col style="width:68px">`).join('')}`;

  const rows = list.map(s=>{
    const hasMissing = DX_COLS.some(([k])=>_dxStatus(s.id,k).status==='missing') || _dxIdentityState(s.id).status==='missing';
    const hasWarn = DX_COLS.some(([k])=>{const r=_dxStatus(s.id,k);return r.status==='pending'||(r.status==='provided'&&r.expires_at&&Math.round((new Date(r.expires_at)-today)/86400000)<=30);});
    if(_dxFilters.onlyMissing && !hasMissing) return '';
    if(_dxFilters.onlyWarn && !hasWarn) return '';

    const isSel = s.id === _dxSelected;
    // identity cell
    const idState = _dxIdentityState(s.id);
    const idSelClass = idState.status==='provided'?'ok':idState.status==='not_applicable'?'na':'ko';
    const idSelVal = idState.type||'missing';
    const idCell = `<td class="cell" data-emp="${s.id}" data-idt="1" style="padding:0">
      <select class="dx-id-sel ${idSelClass}" data-emp="${s.id}" title="Document d'identité" onchange="_dxSetIdentity('${s.id}',this.value)">
        <option value="cni" ${idSelVal==='cni'?'selected':''}>CNI</option>
        <option value="passport" ${idSelVal==='passport'?'selected':''}>Passeport</option>
        <option value="titre_sejour" ${idSelVal==='titre_sejour'?'selected':''}>T.Séj</option>
        <option value="missing" ${idSelVal==='missing'?'selected':''}>✗</option>
        <option value="not_applicable" ${idState.status==='not_applicable'?'selected':''}>—</option>
      </select></td>`;

    const otherCells = DX_COLS.map(([k])=>{
      const r = _dxStatus(s.id,k);
      const cls = _dxCellClass(r.status, r.expires_at);
      const icon = _dxFilters.hideNA && r.status==='not_applicable' ? '—' : _dxCellIcon(r.status, r.expires_at);
      const expTip = r.expires_at ? ` title="Expire le ${new Date(r.expires_at).toLocaleDateString('fr-FR')}"` : '';
      return `<td class="cell ${cls}" data-emp="${s.id}" data-dt="${k}"${expTip}>${icon}</td>`;
    }).join('');

    // résumé perso
    const empDocs = Object.entries(_dxData[s.id]||{});
    const eProv = empDocs.filter(([,v])=>v.status==='provided').length;
    const eMiss = empDocs.filter(([,v])=>v.status==='missing').length;
    const eWarn = empDocs.filter(([,v])=>v.status==='pending'||(v.status==='provided'&&v.expires_at&&Math.round((new Date(v.expires_at)-today)/86400000)<=30)).length;
    const eNA = empDocs.filter(([,v])=>v.status==='not_applicable').length;
    const eTotal = DX_COLS.length + 1; // +1 for identity
    const eConf = Math.round(eProv / Math.max(eTotal - eNA, 1) * 100);

    return `<tr class="${isSel?'dx-selected':''}" data-emp="${s.id}" data-prov="${eProv}" data-miss="${eMiss}" data-warn="${eWarn}" data-na="${eNA}" data-conf="${eConf}" onclick="_dxSelectEmployee('${s.id}')">
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="av" style="width:30px;height:30px;font-size:11px;background:${avBg(s)};color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">${avInner(s)}</div>
          <div>
            <div style="font-weight:700;font-size:12px;color:var(--ink)">${s.first_name} ${s.last_name}</div>
            <div style="font-size:10px;color:var(--muted)">${s.role||'—'}</div>
          </div>
        </div>
      </td>
      ${idCell}${otherCells}
    </tr>`;
  }).join('');

  // Totals row
  const idTotalCell = `<td style="font-size:10px"><div style="font-weight:700;color:${idProv===idTotal?'#16a34a':'#dc2626'}">${idProv}/${idTotal}</div><div style="color:var(--muted)">${idTotal>0?Math.round(idProv/idTotal*100):100}%</div></td>`;
  const colTotalCells = colStats.map(st=>`<td style="font-size:10px"><div style="font-weight:700;color:${st.miss===0?'#16a34a':'#dc2626'}">${st.prov}/${st.total}</div><div style="color:var(--muted)">${st.pct}%</div></td>`).join('');

  const tableHtml=`<div style="overflow-x:auto;border:1px solid var(--line);border-radius:14px;background:#fff">
    <table class="docmx">
      <colgroup>${colWidths}</colgroup>
      <thead>
        <tr>
          <th style="text-align:left">Collaborateur</th>
          <th>Identité <i class="fa-solid fa-circle-info" style="color:var(--muted);font-size:9px" title="CNI, Passeport ou Titre de séjour"></i></th>
          ${DX_COLS.map(([,lab])=>`<th>${lab.replace('\n','<br>')}</th>`).join('')}
        </tr>
      </thead>
      <tbody>
        ${rows||`<tr><td colspan="${DX_COLS.length+2}" style="padding:32px;text-align:center;color:var(--muted)">Aucun collaborateur actif.</td></tr>`}
      </tbody>
      <tfoot>
        <tr class="dx-totals">
          <td style="text-align:left;font-size:11px;color:var(--muted)">Total (${list.length} collaborateurs)</td>
          ${idTotalCell}${colTotalCells}
        </tr>
      </tfoot>
    </table>
  </div>`;

  // Right detail panel
  const panelHtml = _dxSelected ? _dxPanelHtml(_dxSelected) : `<div class="dx-panel" style="align-items:center;justify-content:center;min-height:200px;color:var(--muted);font-size:12px;text-align:center"><i class="fa-regular fa-hand-pointer" style="font-size:24px;margin-bottom:8px;display:block"></i>Cliquez sur un<br>collaborateur</div>`;

  $('dxbox').innerHTML=`
    ${kpiHtml}
    ${filtersHtml}
    <div style="display:flex;gap:16px;align-items:flex-start">
      <div style="flex:1;min-width:0">
        ${tableHtml}
      </div>
      <div id="dx-detail">${panelHtml}</div>
    </div>
    <div style="background:#f8f7ff;border:1px solid #e5e0ff;border-radius:8px;padding:10px 14px;font-size:11.5px;color:var(--muted);display:flex;gap:8px;align-items:flex-start">
      <i class="fa-solid fa-lightbulb" style="color:var(--violet);margin-top:1px"></i>
      <span><b>Astuce</b> — Cliquez sur une case pour changer son statut : Fourni (✓) / À vérifier (◎) / Manquant (✗) / Non concerné (—). Les cellules "Non concerné" sont exclues des statistiques.</span>
    </div>`;

  // Wire up cell clicks (non-identity)
  // - Simple click  → cycle status (provided→pending→missing→not_applicable)
  // - Double click  → ouvrir la fiche salarié sur l'onglet Documents
  document.querySelectorAll('.docmx td.cell:not([data-idt])').forEach(td=>{
    let clickTimer=null;
    td.onclick = async(e)=>{
      e.stopPropagation();
      if(clickTimer){ clearTimeout(clickTimer); clickTimer=null; return; } // double-click handled below
      clickTimer=setTimeout(async()=>{
        clickTimer=null;
        const empId=td.closest('tr').dataset.emp, dt=td.dataset.dt;
        const cur=_dxStatus(empId,dt).status;
        const next=_dxNextStatus(cur);
        td.style.opacity='.5';
        await BE.setDocument(hotelId,empId,dt,next);
        if(!_dxData[empId]) _dxData[empId]={};
        _dxData[empId][dt]={status:next, expires_at:_dxData[empId]?.[dt]?.expires_at||null, file_path:_dxData[empId]?.[dt]?.file_path||null};
        _dxRender();
      },220);
    };
    td.ondblclick = (e)=>{
      e.stopPropagation();
      if(clickTimer){ clearTimeout(clickTimer); clickTimer=null; }
      const empId=td.closest('tr').dataset.emp, dt=td.dataset.dt;
      openEmployeePanel(empId, dt);
    };
    td.title = 'Clic : changer statut · Double-clic : ouvrir le dossier';
  });
}

  return `<div class="dx-panel">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">

      <div class="av" style="width:40px;height:40px;font-size:14px;background:${avBg(s)};color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0">${avInner(s)}</div>
      <div>
        <div style="font-weight:700;font-size:14px">${s.first_name} ${s.last_name}</div>
        <div style="font-size:11.5px;color:var(--muted)">${s.role||'—'}</div>
        ${s.email?`<div style="font-size:10.5px;color:var(--muted)">${s.email}</div>`:''}
      </div>

    <div>
      <div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Résumé personnel</div>
      <div style="display:flex;flex-direction:column;gap:4px;font-size:12px">
        <div style="display:flex;justify-content:space-between"><span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:#16a34a;display:inline-block"></span>Fournis</span><b style="color:#16a34a">${prov}</b></div>
        <div style="display:flex;justify-content:space-between"><span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:#dc2626;display:inline-block"></span>Manquants</span><b style="color:#dc2626">${miss}</b></div>
        <div style="display:flex;justify-content:space-between"><span style="display:flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:#d97706;display:inline-block"></span>À vérifier</span><b style="color:#d97706">${warn}</b></div>

      </div>
      <div style="margin-top:10px;background:#e5e7eb;border-radius:99px;height:7px;overflow:hidden">
        <div style="width:${barW}%;height:100%;background:${conf>=80?'#16a34a':conf>=50?'#d97706':'#dc2626'};border-radius:99px;transition:width .3s"></div>
      </div>
      <div style="text-align:right;font-size:10.5px;color:var(--muted);margin-top:3px">${conf}% complet</div>
    </div>
    ${expiringList?`<div><div style="font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">Alertes</div>${expiringList}</div>`:''}
    <div>

      <button class="dx-act-btn" onclick="navTo('personnel');setTimeout(()=>openEmployeePanel&&openEmployeePanel('${empId}'),300)"><i class="fa-solid fa-folder-open" style="color:var(--violet)"></i> Voir le dossier complet</button>

      <label style="display:flex;align-items:center;gap:7px;font-size:12px;cursor:pointer;margin-bottom:6px"><input type="checkbox" ${_dxFilters.onlyWarn?'checked':''} onchange="_dxFilters.onlyWarn=this.checked;_dxRender()"> Afficher uniquement les à vérifier</label>

    </div>
  </div>`;
}

function _dxSelectEmployee(empId){
  _dxSelected = (_dxSelected===empId) ? null : empId;
  document.querySelectorAll('.docmx tr[data-emp]').forEach(tr=>tr.classList.toggle('dx-selected', tr.dataset.emp===_dxSelected));
  const panel = document.getElementById('dx-detail');
  if(panel) panel.innerHTML = _dxSelected ? _dxPanelHtml(_dxSelected) : `<div class="dx-panel" style="align-items:center;justify-content:center;min-height:200px;color:var(--muted);font-size:12px;text-align:center"><i class="fa-regular fa-hand-pointer" style="font-size:24px;margin-bottom:8px;display:block"></i>Cliquez sur un<br>collaborateur</div>`;
}

async function _dxSetIdentity(empId, value){
  if(value === 'missing'){
    // Set all identity types to missing
    for(const t of DX_ID_TYPES){
      await BE.setDocument(hotelId,empId,t,'missing');
      if(!_dxData[empId]) _dxData[empId]={};
      _dxData[empId][t]={status:'missing',expires_at:null,file_path:null};
    }
  } else if(value === 'not_applicable'){
    for(const t of DX_ID_TYPES){
      await BE.setDocument(hotelId,empId,t,'not_applicable');
      if(!_dxData[empId]) _dxData[empId]={};
      _dxData[empId][t]={status:'not_applicable',expires_at:null,file_path:null};
    }
  } else {
    // Set selected type to provided, others to missing
    for(const t of DX_ID_TYPES){
      const st = t===value ? 'provided' : 'missing';
      await BE.setDocument(hotelId,empId,t,st);
      if(!_dxData[empId]) _dxData[empId]={};
      _dxData[empId][t]={status:st,expires_at:_dxData[empId]?.[t]?.expires_at||null,file_path:null};
    }
  }
  _dxRender();
}

async function _dxSendReminder(empId){
  const s=staff.find(x=>x.id===empId); if(!s) return;

  // Identifier les docs manquants ou expirés
  const docs=_dxData[empId]||{};
  const missing=[];
  const idSt=_dxIdentityState(empId);
  if(idSt.status==='missing') missing.push('Identité (CNI, Passeport ou Titre de séjour)');
  DX_COLS.forEach(([k,lab])=>{
    const r=docs[k]||{status:'missing'};
    if(r.status==='missing'||r.status==='pending'||(r.status==='provided'&&r.expires_at&&Math.round((new Date(r.expires_at)-new Date())/86400000)<0))
      missing.push(lab.replace('\n',' '));
  });
  if(!missing.length){ flash('Aucun document manquant ou expiré pour ce collaborateur.'); return; }

  try{
    // Créer une demande de document dans portal_document_requests
    const docTypes=Object.entries(docs).filter(([,v])=>v.status==='missing').map(([k])=>k);
    const msg=`Bonjour ${s.first_name},\n\nNous vous demandons de fournir les documents suivants manquants à votre dossier RH :\n• ${missing.join('\n• ')}\n\nMerci de les déposer depuis votre portail salarié.\n\nCordialement,\nLe service RH`;

    // Envoyer un message portail
    if(BE.sendPortalMessage){
      await BE.sendPortalMessage(hotelId, empId, msg).catch(()=>{});
    }
    // Créer les demandes de documents
    for(const dt of docTypes){
      await BE.createPortalDocRequest(hotelId, empId, dt, msg).catch(()=>{});
    }
    flash(`Rappel envoyé à ${s.first_name} ${s.last_name} (${missing.length} document${missing.length>1?'s':''} demandé${missing.length>1?'s':''})`);
    // Rafraîchir le panneau détail
    if(_dxSelected===empId){ const panel=$('dx-detail'); if(panel) panel.innerHTML=_dxPanelHtml(empId); }
  }catch(e){
    flash('Rappel envoyé (erreur backend : '+e.message+')');
  }
}

function _schedHpd(start,end,brk){
  if(!start||!end)return null;
  const [sh,sm]=start.split(':').map(Number),[eh,em]=end.split(':').map(Number);
  let mins=(eh*60+em)-(sh*60+sm); if(mins<=0)mins+=24*60; // nuit
  mins-=(brk||0); return mins>0?Math.round(mins/60*100)/100:null;
}

            <th style="padding:8px 8px">Pause (min)</th>
            <th style="padding:8px 8px">H/jour</th>
            <th style="padding:8px 8px">CP/mois</th>
            <th style="padding:8px 8px"></th>
          </tr>
        </thead>
        <tbody id="horairesBody">
          ${sorted.map(d=>renderDeptSection(d)).join('')}
        </tbody>
      </table>
      <div style="font-size:11px;color:var(--muted);margin-top:10px">
        <i class="fa-solid fa-circle-info"></i> <b>H/jour</b> est calculé automatiquement depuis les horaires si laissé vide. Pour les services de nuit (ex: 22:00→06:00), le passage minuit est géré automatiquement.
      </div>`}
    </div>`;

  const wireRows=()=>{
    // Boutons Ajouter
    document.querySelectorAll('.sc-add-btn').forEach(btn=>{
      btn.onclick=async()=>{
        const depId=btn.dataset.depid, depName=btn.dataset.depname;
        const name=prompt(`Nom de l'horaire pour "${depName}" (ex: Jour, Nuit, Matin…)`,'');
        if(!name)return;
        try{
          const sc=await BE.addSchedule(hotelId,{department_id:depId,name,sort_order:schedules.filter(s=>s.department_id===depId).length*10+10,break_minutes:0,cp_days_per_month:2.5});
          schedules.push(sc);
          await _cfgHoraires();
        }catch(e){flash('Erreur : '+e.message,'ko');}
      };
    });

    // Lignes d'horaire existantes
    document.querySelectorAll('#horairesBody tr[data-scid]').forEach(row=>{
      const scId=row.dataset.scid;
      const autoHpd=()=>{
        const s=row.querySelector('.sc-start').value, e=row.querySelector('.sc-end').value;
        const brk=parseInt(row.querySelector('.sc-brk').value)||0;
        const hpdInput=row.querySelector('.sc-hpd');
        if(s&&e&&!hpdInput.value){const v=_schedHpd(s,e,brk);if(v)hpdInput.placeholder=v;}
      };
      row.querySelector('.sc-start').addEventListener('change',autoHpd);
      row.querySelector('.sc-end').addEventListener('change',autoHpd);
      row.querySelector('.sc-brk').addEventListener('change',autoHpd);

      row.querySelector('.sc-save').onclick=async()=>{
        const name=row.querySelector('.sc-name').value.trim();
        if(!name){flash('Le nom est requis','ko');return;}
        const start=row.querySelector('.sc-start').value||null;
        const end=row.querySelector('.sc-end').value||null;
        const brk=parseInt(row.querySelector('.sc-brk').value)||0;
        let hpd=parseFloat(row.querySelector('.sc-hpd').value)||null;
        const cp=parseFloat(row.querySelector('.sc-cp').value)||2.5;
        if(!hpd&&start&&end) hpd=_schedHpd(start,end,brk);
        try{
          const updated=await BE.updateSchedule(scId,{name,default_start_time:start,default_end_time:end,break_minutes:brk,hours_per_day:hpd,cp_days_per_month:cp});
          const idx=schedules.findIndex(s=>s.id===scId); if(idx>=0) Object.assign(schedules[idx],updated);
          flash(`Horaire "${name}" sauvegardé`);
          if(hpd&&!row.querySelector('.sc-hpd').value) row.querySelector('.sc-hpd').value=hpd;
        }catch(e){flash('Erreur : '+e.message,'ko');}
      };

      row.querySelector('.sc-del').onclick=async()=>{
        const nm=row.querySelector('.sc-name').value||'cet horaire';
        if(!confirm(`Supprimer "${nm}" ? Les collaborateurs affectés à cet horaire seront désassociés.`))return;
        try{
          await BE.deleteSchedule(scId);
          schedules=schedules.filter(s=>s.id!==scId);
          await _cfgHoraires();
        }catch(e){flash('Erreur : '+e.message,'ko');}
      };
    });
  };

  wireRows();
}

function _cfgDrawDeps(){
  const sorted=[...deps].sort((a,b)=>(a.sort_order??999)-(b.sort_order??999));
  $('depList').innerHTML=sorted.map((d,i)=>`
    <div class="dep-row" data-depid="${d.id}" draggable="true"
      style="display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line);border-radius:9px;margin-bottom:6px;background:#fff;cursor:grab;transition:box-shadow .15s">
      <i class="fa-solid fa-grip-vertical" style="color:#c4c4d4;font-size:13px;flex-shrink:0"></i>
      <span style="flex:1;font-size:13px;font-weight:500">${d.name}</span>
      <span style="font-size:10px;color:var(--muted);background:#f4f4f7;padding:2px 6px;border-radius:5px;font-weight:600">#${i+1}</span>
      <button class="btn d" data-deldep="${d.id}" style="padding:4px 9px;font-size:11px"><i class="fa-solid fa-trash"></i></button>
    </div>`).join('')||'<div style="color:var(--muted);font-size:12px;padding:8px 0">Aucun service défini.</div>';
  if($('newRolDep')) $('newRolDep').innerHTML='<option value="">— Service —</option>'+sorted.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');

  const saveDeptOrder=async()=>{await Promise.all(deps.map((d,i)=>BE.updateDepartment(d.id,{sort_order:(i+1)*10}).catch(()=>{})));};
  let dragSrc=null;
  $('depList').querySelectorAll('.dep-row').forEach(row=>{
    row.addEventListener('dragstart',e=>{dragSrc=row;row.style.opacity='.4';e.dataTransfer.effectAllowed='move';});
    row.addEventListener('dragend',()=>{row.style.opacity='';});
    row.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='move';});
    row.addEventListener('dragenter',()=>{if(row!==dragSrc)row.style.background='#f0eeff';});
    row.addEventListener('dragleave',()=>{row.style.background='#fff';});
    row.addEventListener('drop',e=>{
      e.preventDefault(); if(!dragSrc||dragSrc===row)return;
      row.style.background='#fff';
      const list=$('depList');
      const rows=[...list.querySelectorAll('.dep-row')];
      const srcIdx=rows.indexOf(dragSrc),dstIdx=rows.indexOf(row);
      if(srcIdx<dstIdx) list.insertBefore(dragSrc,row.nextSibling); else list.insertBefore(dragSrc,row);
      const newOrder=[...list.querySelectorAll('.dep-row')].map(r=>r.dataset.depid);
      newOrder.forEach((id,i)=>{const d=deps.find(x=>x.id===id);if(d)d.sort_order=(i+1)*10;});
      list.querySelectorAll('.dep-row').forEach((r,i)=>{const b=r.querySelector('span[style*="background:#f4f4f7"]');if(b)b.textContent='#'+(i+1);});
      saveDeptOrder().then(()=>flash('Ordre sauvegardé')).catch(()=>{});
    });
  });
  $('depList').querySelectorAll('[data-deldep]').forEach(b=>b.onclick=async()=>{
    if(!confirm('Supprimer ce service ?'))return;
    try{await BE.deleteDepartment(b.dataset.deldep);deps=deps.filter(x=>x.id!==b.dataset.deldep);_cfgDrawDeps();}
    catch(e){flash('Erreur : '+e.message);}
  });
}

function _cfgDrawRols(){
  $('rolList').innerHTML=rols.map(r=>{const dp=deps.find(d=>d.id===r.department_id);

  $('docSettingsSave').onclick=async()=>{
    $('docSettingsSave').disabled=true;
    try{
      const rows=[...tbody.querySelectorAll('tr[data-code]')];
      await Promise.all(rows.map(row=>{
        const code=row.dataset.code;
        return BE.saveDocumentSetting(hotelId, code, {
          active: row.querySelector('.ds-active').checked,
          is_required: row.querySelector('.ds-required').checked,
          has_expiry: row.querySelector('.ds-expiry').checked,
          alert_days: parseInt(row.querySelector('.ds-days').value)||30,
        });
      }));
      flash('Règles de documents enregistrées');
    }catch(e){flash('Erreur : '+e.message,'ko');}
    finally{$('docSettingsSave').disabled=false;}
  };
  $('docSettingsReset').onclick=()=>{if(confirm('Réinitialiser toutes les règles aux valeurs par défaut ?')) _cfgTab='docs', renderConfig();};
  $('reminderSave').onclick=()=>{
    const cfg=JSON.parse(localStorage.getItem('fty_cfg_'+hotelId)||'{}');
    cfg.reminderTemplate=$('reminderTemplate').value;
    localStorage.setItem('fty_cfg_'+hotelId,JSON.stringify(cfg));
    flash('Modèle de relance enregistré');
  };
  // Charger le modèle sauvegardé
  const lsCfg=JSON.parse(localStorage.getItem('fty_cfg_'+hotelId)||'{}');
  if(lsCfg.reminderTemplate) $('reminderTemplate').value=lsCfg.reminderTemplate;
}

async function _cfgPointage(hotel, isAdmin){
  $('cfgBody').innerHTML=`
    <div class="box" style="margin-bottom:16px">
      <h3 style="margin:0 0 16px"><i class="fa-solid fa-toggle-on"></i> Activation</h3>
      <div style="display:flex;align-items:center;gap:14px">

        Quand activé, les salariés peuvent pointer depuis leur portail en scannant le QR Code de l'hôtel. La géolocalisation est obligatoire si les coordonnées GPS sont renseignées.
      </p>
    </div>

    <div class="box" style="margin-bottom:16px">
      <h3 style="margin:0 0 16px"><i class="fa-solid fa-location-dot"></i> Géofence — Localisation de l'hôtel</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;max-width:640px">
        <div class="fld"><label>Latitude</label>
          <input type="number" id="hotelLat" value="${hotel.latitude??''}" step="0.000001" placeholder="ex: 48.856600" ${isAdmin?'':'readonly'}>
        </div>
        <div class="fld"><label>Longitude</label>
          <input type="number" id="hotelLng" value="${hotel.longitude??''}" step="0.000001" placeholder="ex: 2.352200" ${isAdmin?'':'readonly'}>
        </div>
        <div class="fld"><label>Rayon autorisé (mètres)</label>
          <input type="number" id="hotelRadius" value="${hotel.geofence_radius_meters??150}" min="30" max="2000" step="10" ${isAdmin?'':'readonly'}>
        </div>
      </div>
      ${isAdmin?`<button class="btn g" id="geolocBtn" style="margin-top:8px;font-size:12px;padding:5px 10px"><i class="fa-solid fa-crosshairs"></i> Utiliser ma position actuelle</button>`:''}
      <p style="font-size:12px;color:var(--muted);margin:8px 0 0">Si latitude et longitude sont vides, la géolocalisation n'est pas vérifiée (déconseillé).</p>
    </div>

    <div class="box" style="margin-bottom:16px">
      <h3 style="margin:0 0 4px"><i class="fa-solid fa-sliders"></i> Tolérances</h3>
      <p style="font-size:12.5px;color:var(--muted);margin:0 0 14px">Pour la détection d'anomalies dans l'historique (n'empêche pas le pointage).</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;max-width:420px">
        <div class="fld"><label>Tolérance retard (min)</label>
          <input type="number" id="clockLate" value="${hotel.clock_late_tolerance_minutes??15}" min="0" max="120" ${isAdmin?'':'readonly'}>
        </div>
        <div class="fld"><label>Tolérance départ anticipé (min)</label>
          <input type="number" id="clockEarly" value="${hotel.clock_early_departure_tolerance_minutes??15}" min="0" max="120" ${isAdmin?'':'readonly'}>
        </div>
      </div>
    </div>

    ${isAdmin?`<div style="margin-bottom:16px">
      <button class="btn p" id="saveQrSettings" style="padding:9px 18px"><i class="fa-solid fa-floppy-disk"></i> Enregistrer les paramètres</button>
    </div>`:''}

    <div class="box" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <h3 style="margin:0"><i class="fa-solid fa-qrcode"></i> QR Code de l'hôtel</h3>
        ${isAdmin?`<div style="display:flex;gap:8px">
          <button class="btn g" id="regenQrBtn" style="font-size:12px;padding:5px 10px"><i class="fa-solid fa-rotate"></i> Régénérer</button>
          <button class="btn g" id="printQrBtn" style="font-size:12px;padding:5px 10px"><i class="fa-solid fa-print"></i> Imprimer</button>
        </div>`:''}
      </div>
      <div id="qrCodeBox" style="text-align:center;padding:16px">Chargement…</div>
    </div>

    <div class="box">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <h3 style="margin:0"><i class="fa-solid fa-triangle-exclamation" style="color:#f59e0b"></i> Anomalies récentes</h3>
        <span id="anomalyCount" style="font-size:12px;color:var(--muted)">Chargement…</span>
      </div>
      <div id="anomalyBox">Chargement…</div>
    </div>`;

  // ── Chargement dynamique de qrcodejs ────────────────────────────────────
  async function ensureQrLib(){
    if(window.QRCode) return;
    await new Promise((res,rej)=>{
      const s=document.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js';
      s.onload=res; s.onerror=rej; document.head.appendChild(s);
    });
  }

  // ── Afficher le QR Code ─────────────────────────────────────────────────
  async function renderQrCode(){
    const box=$('qrCodeBox');
    const {data:tokens}=await BE.sb.from('hotel_qr_tokens')
      .select('id,token,created_at,expires_at,is_active')
      .eq('hotel_id',hotelId).eq('is_active',true).order('created_at',{ascending:false}).limit(1);
    const tok=tokens?.[0];
    if(!tok){
      box.innerHTML=`<div style="color:var(--muted);font-size:13px;padding:20px">
        Aucun QR Code généré.${isAdmin?' Cliquez sur <b>Régénérer</b> pour en créer un.':''}</div>`;
      return;
    }
    const url=`https://rh.flowtym.com/salarie?action=clock&token=${tok.token}`;
    box.innerHTML=`<div id="qrCanvas" style="display:inline-block;padding:16px;background:#fff;border:1px solid var(--line);border-radius:12px;margin-bottom:12px"></div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:6px">Token actif depuis le ${new Date(tok.created_at).toLocaleDateString('fr-FR')}</div>
      ${tok.expires_at?`<div style="font-size:11px;color:#b45309">Expire le ${new Date(tok.expires_at).toLocaleDateString('fr-FR')}</div>`:''}
      <div style="font-size:10.5px;color:var(--muted);margin-top:6px;word-break:break-all;max-width:320px;margin-inline:auto">${esc(url)}</div>`;
    await ensureQrLib();
    new window.QRCode($('qrCanvas'),{text:url,width:200,height:200,colorDark:'#1a1a2e',colorLight:'#ffffff'});
  }

  // ── Générer/Régénérer le QR Code ────────────────────────────────────────
  async function generateQrToken(){
    // Désactiver les anciens tokens
    await BE.sb.from('hotel_qr_tokens').update({is_active:false}).eq('hotel_id',hotelId).then(null,()=>{});
    // Créer un nouveau token (expires_at = dans 90 jours)
    const expiresAt=new Date(Date.now()+90*24*60*60*1000).toISOString();
    const {error}=await BE.sb.from('hotel_qr_tokens').insert({
      hotel_id:hotelId, is_active:true, expires_at:expiresAt, created_by_email:userEmail,
    });
    if(error) throw error;
    flash('QR Code généré');
    await renderQrCode();
  }

  // ── Anomalies ───────────────────────────────────────────────────────────
  async function renderAnomalies(){
    const {data}=await BE.sb.from('time_clock_anomalies')
      .select('*,employees(first_name,last_name)')
      .eq('hotel_id',hotelId).order('created_at',{ascending:false}).limit(50);
    const rows=data||[];
    $('anomalyCount').textContent=`${rows.length} anomalie${rows.length!==1?'s':''} (30 derniers jours)`;
    const ANOM_LABELS={
      gps_too_far:'GPS trop loin', gps_refused:'GPS refusé', gps_imprecise:'GPS imprécis',
      wrong_hotel:'Mauvais hôtel', double_clocking:'Double pointage',
      invalid_token:'Token invalide', no_gps:'Sans GPS',
    };
    $('anomalyBox').innerHTML=rows.length?`<table class="tbl" style="font-size:12px">
      <thead><tr><th>Date</th><th>Salarié</th><th>Type</th><th>Détails</th></tr></thead>
      <tbody>${rows.map(a=>`<tr>
        <td style="white-space:nowrap;color:var(--muted)">${new Date(a.created_at).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
        <td>${esc((a.employees?.first_name||'')+' '+(a.employees?.last_name||''))}</td>
        <td><span style="font-size:11px;background:#fef3c7;color:#92400e;padding:2px 7px;border-radius:6px;font-weight:600">${ANOM_LABELS[a.anomaly_type]||a.anomaly_type}</span></td>
        <td style="font-size:11px;color:var(--muted)">${a.details?.distance_meters?`${a.details.distance_meters}m`:'—'}</td>
      </tr>`).join('')}</tbody>
    </table>`:'<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">Aucune anomalie détectée.</div>';
  }

  // ── Wiring ──────────────────────────────────────────────────────────────
  $('qrEnabled')?.addEventListener('change',async function(){
    if(!isAdmin) return;
    $('qrEnabledLbl').textContent=this.checked?'Pointage QR activé':'Pointage QR désactivé';
  });

  $('geolocBtn')?.addEventListener('click',()=>{
    if(!navigator.geolocation){flash('Géolocalisation non supportée');return;}
    navigator.geolocation.getCurrentPosition(pos=>{
      $('hotelLat').value=pos.coords.latitude.toFixed(6);
      $('hotelLng').value=pos.coords.longitude.toFixed(6);
      flash('Position récupérée');
    },()=>flash('Impossible de récupérer la position'));
  });

  $('saveQrSettings')?.addEventListener('click',async()=>{
    const patch={
      qr_clocking_enabled: $('qrEnabled').checked,
      latitude: parseFloat($('hotelLat').value)||null,
      longitude: parseFloat($('hotelLng').value)||null,
      geofence_radius_meters: parseInt($('hotelRadius').value)||150,
      clock_late_tolerance_minutes: parseInt($('clockLate').value)||15,
      clock_early_departure_tolerance_minutes: parseInt($('clockEarly').value)||15,
    };
    const {error}=await BE.sb.from('hotels').update(patch).eq('id',hotelId);
    if(error) flash('Erreur : '+error.message);
    else{ flash('Paramètres enregistrés'); renderConfig(); }
  });

  $('regenQrBtn')?.addEventListener('click',async()=>{
    if(!confirm('Régénérer le QR Code ? L\'ancien sera désactivé immédiatement.')) return;
    try{ await generateQrToken(); }catch(e){ flash('Erreur : '+(e.message||e)); }
  });

  $('printQrBtn')?.addEventListener('click',()=>{
    const canvas=$('qrCanvas')?.querySelector('canvas');
    const img=$('qrCanvas')?.querySelector('img');
    const src=canvas?canvas.toDataURL():(img?.src||'');
    if(!src){flash('QR Code non encore généré');return;}
    const w=window.open('');
    const hotelName=hotels.find(h=>h.id===hotelId)?.name||'Hôtel';
    w.document.write(`<!DOCTYPE html><html><head><title>QR Code Pointage — ${hotelName}</title>
      <style>body{font-family:sans-serif;text-align:center;padding:40px}h2{margin-bottom:8px}p{color:#666;font-size:14px}img{margin:20px 0}</style></head>
      <body><h2>${hotelName}</h2><p>Scannez ce QR Code depuis votre Portail Salarié pour pointer</p>
      <br><img src="${src}" style="width:240px;height:240px"><br>
      <p style="font-size:12px">Flowtym RH — Pointage QR</p></body></html>`);
    w.document.close(); w.print();
  });

  // Charger QR + anomalies en parallèle
  await Promise.all([renderQrCode(), renderAnomalies()]);
}

          <th style="padding:9px 14px;text-align:left;font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--line);background:var(--bg2);white-space:nowrap">Module</th>
          ${PERM_ACTIONS.map(([,lab])=>`<th style="${thStyle}">${lab}</th>`).join('')}
        </tr></thead>
        <tbody>
          ${ALL_MODULES.map((mod,i)=>{
            const mp=effectivePerms(role,mod);
            return `<tr style="${i%2===0?'background:#fff':'background:var(--bg2)'}">
              <td style="padding:8px 14px;font-weight:500;color:var(--ink1);white-space:nowrap;border-bottom:1px solid var(--line)">${MODULE_LABELS[mod]}</td>
              ${PERM_ACTIONS.map(([act])=>{
                const val=mp[act];
                if(isSuper) return `<td style="${tdCenStyle}"><i class="fa-solid fa-lock" style="color:#8b5cf6;font-size:11px" title="Accès complet"></i></td>`;
                if(!editable) return `<td style="${tdCenStyle}">${val?'<i class="fa-solid fa-check" style="color:#16a34a;font-size:12px"></i>':'<i class="fa-solid fa-minus" style="color:#d1d5db;font-size:12px"></i>'}</td>`;
                return `<td style="${tdCenStyle}"><label style="cursor:pointer;display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px">
                  <input type="checkbox" class="perm-cb" data-mod="${mod}" data-act="${act}" ${val?'checked':''}
                    style="width:14px;height:14px;cursor:pointer;accent-color:#7c3aed">

              }).join('')}
            </tr>`;
          }).join('')}

  }

    const [list,portalEmp,auditLog]=await Promise.all([
      BE.listAccess(hotelId),
      BE.listPortalEmployees(hotelId),
      isAdmin?BE.loadPermAudit(hotelId):Promise.resolve([]),

      <table class="tbl">
        <thead><tr><th>Utilisateur</th><th>E-mail</th><th>Rôle</th><th>Depuis</th>${isAdmin?'<th></th>':''}</tr></thead>
        <tbody>${list.map(u=>`<tr data-uid="${u.user_id}">
          <td><b>${esc(u.full_name||'—')}</b></td>
          <td style="font-size:12px">${esc(u.email)}</td>
          <td><select class="roleSel" data-uid="${u.user_id}" style="font-size:12.5px;padding:5px 8px" ${isAdmin?'':'disabled'}>
            ${ROLES_OPTS.map(r=>`<option value="${r}" ${r===u.role?'selected':''}>${ROLE_LABELS[r]}</option>`).join('')}
          </select></td>
          <td style="font-size:11.5px;color:var(--muted)">${u.granted_at?u.granted_at.slice(0,10):'—'}</td>
          ${isAdmin?`<td><button class="btn d revoke-btn" data-uid="${u.user_id}" data-name="${esc(u.full_name||u.email)}" style="padding:4px 8px;font-size:11px"><i class="fa-solid fa-user-xmark"></i></button></td>`:''}
        </tr>`).join('')||`<tr><td colspan="${isAdmin?5:4}" style="padding:20px;text-align:center;color:var(--muted)">Aucun manager affecté.</td></tr>`}
        </tbody>
      </table>`;
    $('accBox').querySelectorAll('.roleSel').forEach(sel=>{
      const init=sel.value;
      sel.onchange=async()=>{
        const newRole=sel.value, uid=sel.dataset.uid;
        if(!confirm(`Confirmer le changement de rôle vers « ${ROLE_LABELS[newRole]} » ?`)){sel.value=init;return;}
        try{await BE.updateAccess(hotelId,uid,newRole);flash('Rôle mis à jour');}
        catch(e){flash('Erreur : '+(e.message||e));sel.value=init;}
      };
    });
    $('accBox').querySelectorAll('.revoke-btn').forEach(b=>b.onclick=async()=>{
      if(!confirm(`Révoquer l'accès de « ${b.dataset.name} » ?`))return;
      try{await BE.revokeAccess(hotelId,b.dataset.uid);flash('Accès révoqué');_cfgAccess(isAdmin);}
      catch(e){flash('Erreur : '+(e.message||e));}
    });
    if(isAdmin) $('inviteBtn')?.addEventListener('click',()=>openInviteForm(()=>_cfgAccess(isAdmin)));

    // ── Portail salariés ───────────────────────────────────────────────────
    const portalStatusBadge=emp=>{
      if(!emp.portal_auth_id) return `<span style="font-size:10.5px;background:#fef9c3;color:#854d0e;padding:2px 8px;border-radius:6px;font-weight:600"><i class="fa-solid fa-clock"></i> Invitation envoyée</span>`;
      if(emp.must_change_password) return `<span style="font-size:10.5px;background:#ede9fe;color:#6d28d9;padding:2px 8px;border-radius:6px;font-weight:600"><i class="fa-solid fa-key"></i> Mot de passe à définir</span>`;
      return `<span style="font-size:10.5px;background:#dcfce7;color:#166534;padding:2px 8px;border-radius:6px;font-weight:600"><i class="fa-solid fa-circle-check"></i> Actif</span>`;
    };
    $('portalBox').innerHTML=`
      <table class="tbl">
        <thead><tr><th>Salarié</th><th>E-mail</th><th>Statut</th><th>Dernière connexion</th>${isAdmin?'<th></th>':''}</tr></thead>
        <tbody>${portalEmp.map(e=>`<tr>
          <td><b>${esc((e.first_name||'')+' '+(e.last_name||''))}</b></td>
          <td style="font-size:12px">${esc(e.email||'—')}</td>
          <td>${portalStatusBadge(e)}</td>
          <td style="font-size:11.5px;color:var(--muted)">${e.last_login_at?e.last_login_at.slice(0,10):'Jamais'}</td>
          ${isAdmin?`<td style="display:flex;gap:6px">

            <button class="btn d revoke-portal-btn" data-eid="${e.id}" data-name="${esc((e.first_name||'')+' '+(e.last_name||''))}" style="padding:4px 8px;font-size:11px" title="Révoquer accès portail"><i class="fa-solid fa-ban"></i></button>
          </td>`:''}

      </table>`;
    if(isAdmin){
      $('portalBox').querySelectorAll('.reinvite-portal-btn').forEach(b=>b.onclick=async()=>{
        const s=staff.find(x=>x.id===b.dataset.eid);
        if(s) await reinvitePortal(s.id,b.dataset.email);
        else flash('Salarié introuvable dans le planning actuel');
      });
      $('portalBox').querySelectorAll('.revoke-portal-btn').forEach(b=>b.onclick=async()=>{
        if(!confirm(`Révoquer l'accès portail de « ${b.dataset.name} » ?`))return;
        try{await BE.revokePortalAccess(b.dataset.eid);flash('Accès portail révoqué');_cfgAccess(isAdmin);}
        catch(e){flash('Erreur : '+(e.message||e));}
      });
    }

    // ── Matrice des permissions ────────────────────────────────────────────
    if(!_cfgPermRole) _cfgPermRole=Object.keys(allRoleLabels())[0];
    _renderPermRoleList();
    _renderPermMatrix();

    if(isAdmin){
      // Enregistrer
      $('permSaveBtn')?.addEventListener('click',async()=>{
        const role=_cfgPermRole;
        if(!role||role==='direction'||role==='admin_hotel') return flash('Ce rôle ne peut pas être modifié');
        const newPerms={};
        ALL_MODULES.forEach(mod=>{
          const mp={};
          PERM_ACTIONS.forEach(([act])=>{
            const cb=$('permMatrixWrap').querySelector(`input[data-mod="${mod}"][data-act="${act}"]`);
            mp[act]=cb?cb.checked:effectivePerms(role,mod)[act];
          });
          newPerms[mod]=mp;
        });
        const oldPerms=hotelPerms?.[role]||null;
        try{
          await BE.saveRolePermissions(hotelId,role,newPerms,userEmail);
          await BE.logPermAudit(hotelId,userEmail,role,oldPerms,newPerms);
          if(!hotelPerms) hotelPerms={};
          hotelPerms[role]=newPerms;
          flash(`Permissions « ${allRoleLabels()[role]||role} » enregistrées`);
          _renderPermRoleList();
        }catch(e){flash('Erreur : '+(e.message||e));}
      });

      // Restaurer par défaut
      $('permResetBtn')?.addEventListener('click',async()=>{
        const role=_cfgPermRole;
        if(!role) return;
        if(!DEFAULT_PERMISSIONS[role]&&!customRoles[role]) return flash('Rôle introuvable dans les défauts');
        if(!confirm(`Restaurer les permissions par défaut pour « ${allRoleLabels()[role]||role} » ?`)) return;
        try{
          const oldPerms=hotelPerms?.[role]||null;
          await BE.deleteRolePermissions(hotelId,role);
          await BE.logPermAudit(hotelId,userEmail,role,oldPerms,null);
          if(hotelPerms) delete hotelPerms[role];
          flash(`Permissions de « ${allRoleLabels()[role]||role} » réinitialisées`);
          _renderPermRoleList();
          _renderPermMatrix();
        }catch(e){flash('Erreur : '+(e.message||e));}
      });

      // Créer un rôle personnalisé
      $('permCreateRoleBtn')?.addEventListener('click',()=>{
        const label=prompt('Nom du nouveau rôle (ex: Chef Réception, Responsable Étage) :');
        if(!label||!label.trim()) return;
        const key='custom_'+label.trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,30);
        if(customRoles[key]||ROLE_LABELS[key]) return flash('Un rôle avec cette clé existe déjà');
        const base=prompt(`Copier les permissions d'un rôle existant ? (laisser vide pour partir de zéro)\nRôles disponibles : ${Object.keys(ROLE_LABELS).join(', ')}`)||null;
        BE.createCustomRole(hotelId,key,label.trim(),base||null).then(async()=>{
          customRoles[key]=label.trim();
          if(base&&DEFAULT_PERMISSIONS[base]){
            const basePerms=hotelPerms?.[base]||DEFAULT_PERMISSIONS[base];
            await BE.saveRolePermissions(hotelId,key,basePerms,userEmail);
            if(!hotelPerms) hotelPerms={};
            hotelPerms[key]={...basePerms};
          }
          _cfgPermRole=key;
          _renderPermRoleList();
          _renderPermMatrix();
          flash(`Rôle « ${label.trim()} » créé`);
        }).catch(e=>flash('Erreur : '+(e.message||e)));
      });

      // Dupliquer le rôle sélectionné
      $('permDupeBtn')?.addEventListener('click',()=>{
        const role=_cfgPermRole;
        if(!role) return flash('Sélectionnez un rôle à dupliquer');
        const label=prompt(`Nom du rôle dupliqué depuis « ${allRoleLabels()[role]||role} » :`);
        if(!label||!label.trim()) return;
        const key='custom_'+label.trim().toLowerCase().replace(/[^a-z0-9]+/g,'_').slice(0,30);
        if(customRoles[key]||ROLE_LABELS[key]) return flash('Un rôle avec cette clé existe déjà');
        const srcPerms=hotelPerms?.[role]||DEFAULT_PERMISSIONS[role]||{};
        const dupPerms={};
        ALL_MODULES.forEach(mod=>{dupPerms[mod]={...(srcPerms[mod]||{..._0})};});
        BE.createCustomRole(hotelId,key,label.trim(),role).then(async()=>{
          await BE.saveRolePermissions(hotelId,key,dupPerms,userEmail);
          customRoles[key]=label.trim();
          if(!hotelPerms) hotelPerms={};
          hotelPerms[key]=dupPerms;
          _cfgPermRole=key;
          _renderPermRoleList();
          _renderPermMatrix();
          flash(`Rôle « ${label.trim()} » créé par duplication`);
        }).catch(e=>flash('Erreur : '+(e.message||e)));
      });
    }

    // ── Historique des modifications ───────────────────────────────────────
    if(isAdmin){
      const auditEl=$('permAuditContent');
      if(auditLog.length){
        auditEl.innerHTML=`<table class="tbl" style="font-size:12px">
          <thead><tr><th>Date</th><th>Auteur</th><th>Rôle modifié</th><th>Détails</th></tr></thead>
          <tbody>${auditLog.map(a=>{
            const rl=allRoleLabels();
            const mods=Object.keys(a.new_permissions||{}).filter(m=>{
              const o=a.old_permissions?.[m]||{};const n=(a.new_permissions||{})[m]||{};
              return PERM_ACTIONS.some(([ac])=>o[ac]!==n[ac]);
            });
            const diff=mods.length?mods.map(m=>MODULE_LABELS[m]||m).join(', '):'Réinitialisation';
            return `<tr>
              <td style="color:var(--muted);white-space:nowrap">${a.changed_at?new Date(a.changed_at).toLocaleString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}):'—'}</td>
              <td>${esc(a.actor_email||'—')}</td>
              <td><b>${esc(rl[a.role]||a.role)}</b></td>
              <td style="font-size:11.5px;color:var(--muted)">${esc(diff)}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>`;
      } else {
        auditEl.innerHTML='<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">Aucune modification enregistrée.</div>';
      }
    }

  }catch(e){
    $('accBox').innerHTML=`<div style="color:var(--red);padding:14px">${e.message}</div>`;
    $('portalBox').innerHTML='';
    console.error('_cfgAccess error:',e);
  }
}

/* ===================== VUE POINTAGE ===================== */
let pDay = new Date().toISOString().slice(0,10);   // jour sélectionné dans Pointage
let pSearchQ = '';

function isoToday(){ return new Date().toISOString().slice(0,10); }
function timeOnly(ts){ if(!ts)return ''; const d=new Date(ts); return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function minutesBetween(a,b){ return Math.max(0, Math.round((new Date(b)-new Date(a))/60000)); }
function hoursLabel(min){ if(min<=0) return '—'; const h=Math.floor(min/60), m=min%60; return m?`${h}h${String(m).padStart(2,'0')}`:`${h}h`; }
function buildTs(day,timeStr){
  // day = 'YYYY-MM-DD', timeStr = 'HH:MM' -> 'YYYY-MM-DDTHH:MM:00' interprété en heure locale
  return new Date(`${day}T${timeStr}:00`).toISOString();
}

  const hName = hotels.find(h=>h.id===hotelId)?.name || '';
  $('view').innerHTML = `<div class="page">
    <div class="phead">
      <div><h1>Pointage</h1><div class="sub">${hName} · saisie des heures réelles travaillées</div></div>
      <div class="actions">
        <input type="date" id="ptDay" value="${pDay}" max="${isoToday()}" style="font-family:inherit;padding:8px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;background:#fff">
        <button class="btn g" id="ptToday"><i class="fa-solid fa-calendar-day"></i> Aujourd'hui</button>
        <div class="search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="ptSearch" placeholder="Rechercher…" value="${pSearchQ}"></div>
        <button class="btn p" id="ptAdd"><i class="fa-solid fa-plus"></i> Pointage</button>
      </div>
    </div>
    <div id="ptStats" class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))"></div>
    <div class="box" style="padding:0"><div id="ptList">Chargement…</div></div>
  </div>`;
  $('ptDay').onchange = e => { pDay = e.target.value; redrawPointage(); };

  redrawPointage();

async function redrawPointage(){
  $('ptList').innerHTML = 'Chargement…';
  try{
    const [clockings] = await Promise.all([ BE.listClockings(hotelId, pDay) ]);
    // récupérer le planning prévu pour ce jour (depuis committed s'il s'agit du mois courant, sinon refetch)
    let planMap = new Map(); // employee_id → {status, duration}
    const [py,pm,pd] = pDay.split('-').map(Number);
    if(py===cur.getFullYear() && pm-1===cur.getMonth()){
      committed.forEach((v,k)=>{ const [eid,day]=k.split('|'); if(day===pDay) planMap.set(eid,v); });
    }else{
      try{
        const rows = await BE.listMonthPlanning(hotelId, py, pm-1);
        rows.filter(r=>r.day===pDay).forEach(r=>planMap.set(r.employee_id, {status:r.status, duration:Number(r.duration)}));
      }catch(e){ /* tolérant */ }
    }

    // construire la liste : tous les actifs (ou search match) + ceux qui ont pointé
    const q = pSearchQ;
    const employees = staff.filter(s => s.active && (!q || `${s.first_name} ${s.last_name} ${s.role||''}`.toLowerCase().includes(q)))
      .sort((a,b)=>a.last_name.localeCompare(b.last_name));

    // grouper les pointages par employé
    const byEmp = new Map();
    clockings.forEach(c=>{ if(!byEmp.has(c.employee_id)) byEmp.set(c.employee_id, []); byEmp.get(c.employee_id).push(c); });

    // KPI du jour
    let nPresent=0, nAbsent=0, nNoClock=0, totalMin=0, openSessions=0;
    employees.forEach(s=>{
      const plan = planMap.get(s.id);
      const cks  = byEmp.get(s.id) || [];
      if(cks.length){
        nPresent++;
        cks.forEach(c=>{
          if(c.clock_out_ts){ totalMin += minutesBetween(c.clock_in_ts, c.clock_out_ts) - (c.break_minutes||0); }
          else openSessions++;
        });
      } else if(plan && CMAP[plan.status]?.cat==='paid'){ nAbsent++; }
        else if(plan && CMAP[plan.status]?.cat==='abs'){ nAbsent++; }
        else if(plan && plan.status==='P'){ nNoClock++; }
    });

    $('ptStats').innerHTML = `
      <div class="kpi v"><div class="ic"><i class="fa-solid fa-user-check"></i></div><div class="n">${nPresent}</div><div class="l">Pointés ce jour</div></div>
      <div class="kpi a"><div class="ic"><i class="fa-solid fa-user-clock"></i></div><div class="n">${nNoClock}</div><div class="l">Prévus mais non pointés</div></div>
      <div class="kpi b"><div class="ic"><i class="fa-solid fa-stopwatch"></i></div><div class="n">${openSessions}</div><div class="l">Sessions en cours</div></div>
      <div class="kpi g"><div class="ic"><i class="fa-regular fa-clock"></i></div><div class="n">${hoursLabel(totalMin)}</div><div class="l">Heures totales du jour</div></div>`;

    if(!employees.length){ $('ptList').innerHTML='<div style="padding:24px;text-align:center;color:var(--muted)">Aucun collaborateur actif.</div>'; return; }

    $('ptList').innerHTML = `<table class="tbl" style="border:0;border-radius:14px">
      <thead><tr><th>Collaborateur</th><th>Planifié</th><th>Pointages</th><th style="text-align:right">Heures réelles</th><th></th></tr></thead>
      <tbody>
      ${employees.map(s=>{
        const plan = planMap.get(s.id);
        const cks  = byEmp.get(s.id) || [];
        let realMin = 0;
        cks.forEach(c=>{ if(c.clock_out_ts) realMin += minutesBetween(c.clock_in_ts, c.clock_out_ts) - (c.break_minutes||0); });
        const planStatus = plan ? (CMAP[plan.status]?.lab || plan.status) : 'Repos';
        const planBg = plan ? CMAP[plan.status]?.bg : '#f4f4f7';
        const planFg = plan ? CMAP[plan.status]?.fg : '#999';
        const planExpected = plan && plan.status==='P' ? (plan.duration===0.5 ? '½ jour' : 'Journée') : '';
        const sessionsHtml = cks.length
          ? cks.map(c=>{
              const dur = c.clock_out_ts ? minutesBetween(c.clock_in_ts,c.clock_out_ts)-(c.break_minutes||0) : 0;
              const open = !c.clock_out_ts;
              return `<span class="ck" data-cid="${c.id}" style="display:inline-flex;align-items:center;gap:6px;background:${open?'#fef3c7':'#f4f2fd'};color:${open?'#92400e':'var(--violet-d)'};padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;margin:2px;cursor:pointer">
                ${timeOnly(c.clock_in_ts)} → ${c.clock_out_ts ? timeOnly(c.clock_out_ts) : '<i>en cours</i>'}
                ${c.break_minutes ? `<span style="font-weight:500;opacity:.75">pause ${c.break_minutes}min</span>`:''}
                ${dur ? `<span style="font-weight:700;opacity:.7">· ${hoursLabel(dur)}</span>`:''}
              </span>`;
            }).join('')
          : '<span style="color:var(--muted);font-size:12px;font-style:italic">— Aucun pointage —</span>';
