<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Flowtym RH</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{
  --violet:#8B5CF6;--violet-d:#7C3AED;--violet-bg:#ede9fe;
  --ink:#1e2330;--ink2:#5b6172;--muted:#9aa0ad;--line:#eceef3;--bg:#f6f7f9;--card:#fff;
  --green:#16a34a;--green-bg:#dcfce7;--red:#ef4444;--red-bg:#fee2e2;
  --shadow:0 2px 8px rgba(0,0,0,.04);--shadow-h:0 12px 32px rgba(124,58,237,.14);--r:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);font-size:14px;-webkit-font-smoothing:antialiased;overflow:hidden}
button,select,input,textarea{font-family:inherit}
#root{height:100vh;display:flex;flex-direction:column}

/* ---- nouvelle structure : topbar + sidebar + contenu ---- */
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:232px;background:#fff;border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s ease}
.sidebar.collapsed{width:64px}
.sbhead{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:flex-end;flex-shrink:0}
.sidebar.collapsed .sbhead{justify-content:center;padding:10px 0}
.sbtog{width:28px;height:28px;border-radius:8px;border:0;background:#f4f2fd;color:var(--violet-d);cursor:pointer;display:grid;place-items:center;font-size:11px;transition:.2s}
.sbtog:hover{background:var(--violet-bg)}
.sidebar.collapsed .sbtog i{transform:rotate(180deg)}
.sidebar .menu{flex:1;padding:14px 10px;overflow-y:auto;overflow-x:hidden}
.sidebar.collapsed .menu{padding:14px 6px}
.sidebar .menu .grp{font-size:10.5px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:14px 12px 6px;white-space:nowrap;overflow:hidden}
.sidebar .menu .grp:first-child{padding-top:4px}
.sidebar.collapsed .menu .grp{height:1px;padding:8px 0 0;visibility:hidden;border-top:1px solid var(--line);margin:8px 8px 0;overflow:hidden}
.sidebar .menu .it{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--ink2);font-weight:500;cursor:pointer;font-size:13.5px;margin-bottom:2px;border:0;background:transparent;width:100%;text-align:left;font-family:inherit;white-space:nowrap;overflow:hidden}
.sidebar.collapsed .menu .it{justify-content:center;padding:11px 0;gap:0}
.sidebar.collapsed .menu .it .lbl,.sidebar.collapsed .menu .it .soon{display:none}
.sidebar .menu .it:hover{background:#f4f2fd;color:var(--violet-d)}
.sidebar .menu .it.on{background:var(--violet);color:#fff;font-weight:600}
.sidebar .menu .it .ic{width:20px;text-align:center;font-size:13px;flex-shrink:0}
.sidebar .menu .it .soon{margin-left:auto;font-size:9.5px;background:#fef3c7;color:#92400e;padding:2px 6px;border-radius:5px;font-weight:700}
.sidebar .menu .it.on .soon{background:rgba(255,255,255,.18);color:#fff}
.sidebar .me{padding:12px 14px;border-top:1px solid var(--line);display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink2)}
.sidebar.collapsed .me{justify-content:center;padding:12px 0}
.sidebar.collapsed .me .mail{display:none}
.sidebar .me .av{width:30px;height:30px;border-radius:8px;flex-shrink:0}
.sidebar .me .mail{flex:1;overflow:hidden;text-overflow:ellipsis;font-weight:600;color:var(--ink);white-space:nowrap}
.content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0}
#view{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0}

/* ---- pages standard (hors planning) ---- */
.page{flex:1;overflow-y:auto;padding:22px 26px 60px;background:var(--bg)}
.phead{display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.phead h1{font-size:22px;font-weight:800;letter-spacing:-.01em}
.phead .sub{color:var(--ink2);font-size:13px}
.phead .actions{margin-left:auto;display:flex;gap:8px}

/* ---- KPI cards ---- */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px 20px;box-shadow:var(--shadow);transition:.15s}
.kpi:hover{box-shadow:var(--shadow-h);transform:translateY(-2px)}
.kpi .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:17px;margin-bottom:14px}
.kpi.v .ic{background:var(--violet-bg);color:var(--violet)}
.kpi.g .ic{background:var(--green-bg);color:var(--green)}
.kpi.b .ic{background:#dbeafe;color:#2563eb}
.kpi.a .ic{background:#fef3c7;color:#d97706}
.kpi .n{font-size:28px;font-weight:800;letter-spacing:-.02em}
.kpi .l{color:var(--ink2);font-size:13px;font-weight:600;margin-top:2px}

/* ---- cartes / blocs / tableaux ---- */
.cols2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:1100px){.cols2{grid-template-columns:1fr}}
.box{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:var(--shadow)}
.box h3{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.box h3 i{color:var(--violet)}
.tlist{font-size:13px}
.tlist .it{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line)}
.tlist .it:last-child{border:0}
.tlist .it .av{width:32px;height:32px;border-radius:9px;font-size:11px}
.tlist .it .nm{font-weight:600}.tlist .it .sub{font-size:11.5px;color:var(--muted)}
.tlist .it .right{margin-left:auto;text-align:right;font-size:12px;color:var(--ink2)}

/* grille de cartes personnel */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;transition:.15s}
.card:hover{box-shadow:var(--shadow-h);transform:translateY(-2px)}
.card .head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.card .head .av{width:40px;height:40px;font-size:13px}
.card .head .nm{font-weight:700;font-size:14px}
.card .head .role{font-size:11.5px;color:var(--muted)}
.card .meta{display:flex;flex-wrap:wrap;gap:6px;font-size:11px}
.tag{background:#f4f2fd;color:var(--violet-d);padding:3px 8px;border-radius:999px;font-weight:600}
.tag.red{background:var(--red-bg);color:var(--red)}
.tag.green{background:var(--green-bg);color:var(--green)}
.tag.gray{background:#f1f1f5;color:var(--ink2)}

/* tables */
.tbl{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.tbl th,.tbl td{padding:11px 14px;text-align:left;border-bottom:1px solid var(--line);font-size:13px}
.tbl th{background:#fafafe;font-weight:700;color:var(--ink2);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.tbl tr:last-child td{border-bottom:0}
.tbl tr:hover{background:#fafaff}
.tbl .ok{color:var(--green)}.tbl .ko{color:var(--red)}
.tbl button{border:0;background:transparent;cursor:pointer;color:var(--violet);padding:3px 6px;border-radius:6px}
.tbl button:hover{background:var(--violet-bg)}
/* Tableau suivi temps & paie */
.rtable{width:100%;border-collapse:collapse;background:#fff}
.rtable thead tr{border-bottom:2px solid var(--line)}
.rtable th{padding:12px 16px;font-size:11.5px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;background:#fafafe;white-space:nowrap}
.rtable td{padding:13px 16px;font-size:13px;border-bottom:1px solid #f1f0f8;vertical-align:middle}
.rtable tbody tr:last-child td{border-bottom:0}
.rtable tbody tr:hover td{background:#fafaff}
.rtable tbody tr:nth-child(even) td{background:#fdfcff}
.rtable tbody tr:nth-child(even):hover td{background:#f6f4fd}

/* matrice documents */
.docmx{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;font-size:12px}
.docmx th,.docmx td{padding:9px 10px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);text-align:center}
.docmx th{background:#fafafe;font-weight:700;color:var(--ink2);font-size:10.5px}
.docmx th:first-child,.docmx td:first-child{text-align:left;font-weight:600}
.docmx td.cell{cursor:pointer;font-weight:700}
.docmx td.cell.ok{background:var(--green-bg);color:var(--green)}
.docmx td.cell.ko{background:var(--red-bg);color:var(--red)}
.docmx td.cell.pending{background:#fef3c7;color:#d97706}

/* reporting bars */
.barchart .b{display:flex;align-items:center;gap:10px;margin:8px 0}
.barchart .b-lab{width:160px;font-size:12px;color:var(--ink2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0}
.barchart .b-track{flex:1;background:#f1f1f5;border-radius:7px;height:22px;overflow:hidden}
.barchart .b-fill{height:100%;border-radius:7px;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;color:#fff;font-size:11px;font-weight:700;min-width:30px}

/* stub modules */
.stub{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 30px;text-align:center;color:var(--ink2)}
.stub .badge-soon{background:#fef3c7;color:#92400e;padding:6px 14px;border-radius:999px;font-size:11.5px;font-weight:700;margin-bottom:20px}
.stub i.big{font-size:54px;color:var(--violet);margin-bottom:18px}
.stub h2{font-size:22px;font-weight:800;color:var(--ink);margin-bottom:10px}
.stub p{font-size:13.5px;max-width:480px;line-height:1.6}
.stub ul{margin-top:14px;text-align:left;font-size:13px;color:var(--ink2);list-style:none}
.stub ul li{padding:5px 0;display:flex;gap:8px;align-items:center}
.stub ul li i{color:var(--violet);font-size:11px}

/* sous-onglets Contrats */
.ctab{border:0;background:transparent;padding:11px 18px;font-family:inherit;font-size:13.5px;color:var(--ink2);font-weight:600;cursor:pointer;border-bottom:2px solid transparent;display:inline-flex;align-items:center;gap:7px;margin-bottom:-1px}
.ctab:hover{color:var(--violet-d)}
.ctab.on{color:var(--violet);border-bottom-color:var(--violet)}

/* lignes documents dans la fiche enrichie */
.docitem{display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--line);border-radius:10px;margin-bottom:6px;background:#fff}
.docitem .ic{width:30px;height:30px;border-radius:7px;display:grid;place-items:center;color:#fff;font-size:11px;flex-shrink:0}
.docitem .ic.identity{background:#8B5CF6}.docitem .ic.health{background:#16a34a}.docitem .ic.banking{background:#2563eb}.docitem .ic.admin{background:#f59e0b}.docitem .ic.rh{background:#ec4899}.docitem .ic.other{background:#6b7280}
.docitem .nm{font-weight:600;font-size:13px;flex:1;min-width:0}
.docitem .meta{font-size:11px;color:var(--muted);margin-top:2px}
.docitem .badge-st{font-size:10.5px;padding:3px 7px;border-radius:5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.badge-st.valid{background:var(--green-bg);color:var(--green)}
.badge-st.expired{background:var(--red-bg);color:var(--red)}
.badge-st.expiring_soon{background:#fef3c7;color:#92400e}
.badge-st.missing{background:#f1f1f5;color:var(--muted)}
.docitem .acts{display:flex;gap:4px}
.docitem .acts button{border:0;background:transparent;color:var(--ink2);cursor:pointer;padding:5px 8px;border-radius:6px;font-size:12px}
.docitem .acts button:hover{background:#f4f2fd;color:var(--violet)}
.docitem .acts button.del:hover{background:var(--red-bg);color:var(--red)}

/* alertes dashboard */
.alertrow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed var(--line);font-size:13px}
.alertrow:last-child{border:0}
.alertrow .av{width:28px;height:28px;border-radius:7px;font-size:10px}
.alertrow .nm{flex:1;font-weight:600}
.alertrow .sub{font-size:11.5px;color:var(--muted)}
.alertrow .badge-st{flex-shrink:0}

/* toolbar planning (à l'intérieur de la vue) */
.ptbar{padding:11px 18px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0}

/* login */
.login{height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#f6f7f9,#ede9fe)}
.lcard{background:#fff;border-radius:20px;padding:32px;width:380px;box-shadow:0 24px 60px rgba(20,20,40,.08)}
.lcard .mk{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--violet),var(--violet-d));display:grid;place-items:center;color:#fff;font-size:18px;margin-bottom:18px}
.lcard h1{font-size:20px;font-weight:800;margin-bottom:4px}
.lcard .sub{color:var(--ink2);font-size:13px;margin-bottom:22px}
.fld{margin-bottom:13px}.fld label{display:block;font-size:11.5px;font-weight:600;color:var(--ink2);margin-bottom:5px}
.fld input{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-size:14px}
.fld input:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-bg)}
.err{color:var(--red);font-size:12.5px;margin-top:10px;min-height:18px}

/* topbar */
.top{background:#fff;border-bottom:1px solid var(--line);flex-shrink:0}
.top-in{display:flex;align-items:center;gap:12px;padding:10px 18px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:15px}
.logo .mk{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--violet),var(--violet-d));display:grid;place-items:center;color:#fff;font-size:13px}
.logo small{color:var(--muted);font-weight:500}
.spacer{flex:1}
select,input[type=text],input[type=email],input[type=tel],input[type=date]{padding:8px 11px;border:1px solid var(--line);border-radius:10px;background:#fff;font-size:13px;color:var(--ink)}
select:focus,input:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-bg)}
.hotelSel{font-weight:600;min-width:200px}
.btn{border:0;border-radius:10px;padding:8px 13px;font-weight:600;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:.15s;white-space:nowrap}
.btn.p{background:var(--violet);color:#fff}.btn.p:hover{background:var(--violet-d)}
.btn.g{background:#f4f2fd;color:var(--violet-d)}.btn.g:hover{background:var(--violet-bg)}
.btn.d{background:var(--red-bg);color:var(--red)}.btn.d:hover{background:#fbcaca}
.btn.on{background:var(--violet);color:#fff;box-shadow:0 0 0 3px var(--violet-bg)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.monthnav{display:flex;align-items:center;gap:4px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:3px}
.monthnav button{border:0;background:transparent;width:30px;height:30px;border-radius:8px;cursor:pointer;color:var(--ink2)}
.monthnav button:hover{background:var(--violet-bg);color:var(--violet-d)}
.monthnav .m{font-weight:700;min-width:150px;text-align:center;text-transform:capitalize;font-size:13.5px}
.search{position:relative}.search i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px}
.search input{padding-left:32px;min-width:180px}

/* legend + hint */
.legend{display:flex;flex-wrap:wrap;gap:7px;padding:9px 18px;background:#fff;border-bottom:1px solid var(--line);flex-shrink:0}
.lc{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink2);border:1px solid var(--line);padding:3px 9px;border-radius:999px}
.lc b{width:13px;height:13px;border-radius:4px;border:1px solid rgba(0,0,0,.06)}
.hint{padding:7px 18px;font-size:11.5px;color:var(--muted);background:#fff;border-bottom:1px solid var(--line);flex-shrink:0}
.empty{padding:60px 22px;text-align:center;color:var(--muted)}
.empty i{font-size:34px;margin-bottom:14px;display:block;color:var(--violet)}

/* grid */
.gridwrap{flex:1;overflow:auto;position:relative}
table{border-collapse:separate;border-spacing:0;width:100%;white-space:nowrap;font-size:12px}
th,td{border-bottom:1px solid var(--line);border-right:1px solid var(--line)}
thead th{position:sticky;top:0;background:#fafafe;z-index:6;font-weight:600;color:var(--ink2);padding:6px 4px;text-align:center;font-size:11px}
thead th.wd{top:27px;font-size:9px;color:var(--muted);font-weight:500;z-index:6}
thead th.we{background:#eef2fb}
.stickL{position:sticky;background:#fff;z-index:4}
thead .stickL{z-index:8;background:#fafafe}
.cEmp{left:0;text-align:left;padding:6px 14px 6px 10px;white-space:nowrap}
.cRole{text-align:left;padding:6px 14px 6px 8px;color:var(--ink2);white-space:nowrap}
.emp{display:flex;align-items:center;gap:9px;cursor:pointer}
.emp:hover .nm{color:var(--violet-d)}
.av{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;flex-shrink:0;overflow:hidden;position:relative}
.av img{width:100%;height:100%;object-fit:cover;border-radius:inherit}
.photo-overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:grid;place-items:center;opacity:0;transition:.15s;font-size:12px;color:#fff}
.photo-drop:hover .photo-overlay{opacity:1}
.photo-drop.drag-over{outline:2px dashed var(--violet);outline-offset:2px}
.photo-drop.drag-over .photo-overlay{opacity:1}
.emp .nm{font-weight:600;font-size:12.5px;line-height:1.15}
.emp .sub{font-size:10.5px;color:var(--muted)}
td.day{width:44px;min-width:44px;text-align:center;font-weight:700;font-size:11px;user-select:none;cursor:pointer;position:relative}
.dcol{width:44px;min-width:44px}
td.day.we{background:#f7f9fd}
td.day.sel{box-shadow:inset 0 0 0 2px var(--violet);background:var(--violet-bg)!important}
td.day.pend::after{content:"";position:absolute;top:2px;right:2px;width:6px;height:6px;border-radius:50%;background:var(--violet);box-shadow:0 0 0 1.5px #fff}
td.sum{text-align:center;background:#fcfcff;font-weight:600;font-variant-numeric:tabular-nums;min-width:38px}
th.sumh{background:#f3f1fb;color:var(--violet-d)}
tr.totals td{background:#f6f4fd;font-weight:700;border-top:2px solid var(--violet-bg);position:sticky;bottom:0;z-index:3}
tr.totals .stickL{background:#f6f4fd}
tr.totals td.lab{text-align:right;padding-right:10px;color:var(--violet-d)}

/* action bar + save bar */
.actionbar{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(40px);background:#15233b;color:#fff;border-radius:14px;padding:9px 12px;display:none;flex-direction:column;gap:6px;box-shadow:0 16px 40px rgba(0,0,0,.3);z-index:50;opacity:0;transition:.2s;max-width:90vw}
.actionbar.on{display:flex;opacity:1;transform:translateX(-50%) translateY(0)}
.actionbar .top-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.actionbar .cnt{font-size:12px;font-weight:700;background:rgba(255,255,255,.14);padding:5px 10px;border-radius:8px}
.actionbar .codes{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.actionbar .shifts-row{border-top:1px solid rgba(255,255,255,.12);padding-top:5px;margin-top:2px}
.actionbar .shift-lbl{font-size:11px;color:#94a3b8;font-weight:600;white-space:nowrap}
.actionbar .cbtn{border:0;border-radius:8px;padding:6px 9px;font-weight:700;font-size:11.5px;cursor:pointer}
.actionbar .sbtn{font-size:10.5px;padding:4px 7px;border:1px solid rgba(255,255,255,.2)}
.actionbar .clr{background:rgba(255,255,255,.14);color:#fff}
.actionbar .x{background:transparent;border:0;color:#cbd5e1;cursor:pointer;font-size:14px;padding:4px 6px}
.sbadge{display:inline-block;margin-left:2px;font-size:8.5px;font-weight:700;background:rgba(0,0,0,.18);border-radius:4px;padding:0 3px;vertical-align:middle;line-height:14px}
.savebar{position:fixed;right:22px;bottom:22px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px 14px;display:none;align-items:center;gap:12px;box-shadow:var(--shadow-h);z-index:49}
.savebar.on{display:flex}
.savebar .info{font-size:13px;font-weight:600}.savebar .info b{color:var(--violet-d)}

/* drawer + modal */
.dbg{position:fixed;inset:0;background:rgba(20,20,40,.4);opacity:0;pointer-events:none;transition:.25s;z-index:60}
.dbg.on{opacity:1;pointer-events:auto}

/* resize image file → base64 JPEG (max 240px, qualité 0.82) */
function resizePhotoToDataUrl(file,maxPx=240){
  return new Promise((resolve,reject)=>{
    const img=new Image(), url=URL.createObjectURL(file);
    img.onload=()=>{
      URL.revokeObjectURL(url);
      const scale=Math.min(maxPx/img.width, maxPx/img.height, 1);
      const w=Math.round(img.width*scale), h=Math.round(img.height*scale);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',0.82));
    };
    img.onerror=reject; img.src=url;
  });
}

/* ===================== BACKEND ===================== */
async function makeRealBE(){
  const {createClient}=await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm');
  const sb=createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{persistSession:true}});
  const must=(error,msg)=>{ if(error){ console.error(msg,error); throw new Error(msg+' : '+error.message); } };
  return {
    sb, db:sb, isTest:false,
    async listHotels(){
      const {data:{user}}=await sb.auth.getUser(); if(!user)return [];
      const {data:u,error:e1}=await sb.from('users').select('id').eq('auth_id',user.id).maybeSingle();
      must(e1,"Lecture du profil utilisateur");
      if(!u){return [];}
      const {data,error}=await sb.from('user_hotels')
        .select('hotel_id, hotels(id,name,city)').eq('user_id',u.id);
      must(error,"Lecture des hôtels accessibles");
      return (data||[]).map(x=>x.hotels).filter(Boolean);
    },
    async setActiveHotel(hotelId){
      const {data:{user}}=await sb.auth.getUser(); if(!user)return;
      const {data:u}=await sb.from('users').select('id').eq('auth_id',user.id).maybeSingle();
      if(!u)return;
      await sb.from('user_active_hotel').upsert({user_id:u.id,hotel_id:hotelId},{onConflict:'user_id'});
    },
    async listDepartments(h){const {data,error}=await sb.from('staff_departments').select('id,name,sort_order').eq('hotel_id',h).order('sort_order');must(error,"Départements");return data||[];},
    async listRoles(h){const {data,error}=await sb.from('staff_roles').select('id,name,department_id').eq('hotel_id',h).order('name');must(error,"Rôles");return data||[];},
    async listEmployees(h){const {data,error}=await sb.from('employees').select('*').eq('hotel_id',h).order('active',{ascending:false}).order('last_name');must(error,"Collaborateurs");return data||[];},
    async addEmployee(h,p){const {data,error}=await sb.from('employees').insert({hotel_id:h,...p}).select('*').single();must(error,"Création collaborateur");return data;},
    async addEmployeesBulk(h,list){
      if(!list.length)return [];
      const rows=list.map(p=>({hotel_id:h,...p}));
      const {data,error}=await sb.from('employees').insert(rows).select('*');
      must(error,"Création collaborateurs en lot"); return data||[];
    },
    async updateEmployee(id,p){const {error}=await sb.from('employees').update(p).eq('id',id);must(error,"Mise à jour collaborateur");},
    async deleteEmployee(id){const {error}=await sb.from('employees').update({active:false}).eq('id',id);must(error,"Suppression collaborateur");},
    async listMonthPlanning(h,y,m){
      const s=iso(y,m,1), e=iso(y,m,dim(y,m));
      const {data,error}=await sb.from('staff_planning').select('employee_id,day,status,duration,shift_label,shift_start,shift_end,break_minutes').eq('hotel_id',h).gte('day',s).lte('day',e);
      must(error,"Lecture du planning"); return data||[];
    },
    async savePlanning(h,upserts,deletes){
      if(upserts.length){
        // Strip shift columns from payload — silently omitted if migration 24 not yet applied
        const SHIFT_COLS=['shift_label','shift_start','shift_end','break_minutes'];

/* ===================== LOGIN ===================== */
function renderLogin(err){
  $('root').dataset.ok='1';
  $('root').innerHTML=`<div class="login"><div class="lcard">
    <div class="mk"><i class="fa-solid fa-hotel"></i></div>
    <h1>Flowtym RH</h1><div class="sub">Connectez-vous pour accéder au planning du personnel.</div>
    <div class="fld"><label>E-mail</label><input type="email" id="le" autocomplete="email"></div>
    <div class="fld"><label>Mot de passe</label><input type="password" id="lp" autocomplete="current-password"></div>
    <button class="btn p" id="lb" style="width:100%;justify-content:center;padding:11px">Se connecter</button>
    <div class="err" id="lerr">${err||''}</div></div></div>`;
  $('lb').onclick=async()=>{
    const e=$('le').value.trim(),p=$('lp').value;
    if(!e||!p){$('lerr').textContent='E-mail et mot de passe requis.';return;}
    $('lb').disabled=true; $('lerr').textContent='';
    const {error}=await BE.sb.auth.signInWithPassword({email:e,password:p});
    $('lb').disabled=false;
    if(error)$('lerr').textContent=error.message; else start();
  };
}

    $('saveBtn').onclick=saveChanges;

    // Mode kiosque QR : ?mode=clock&eid=<employee_id>
    const _qp=new URLSearchParams(location.search);
    if(_qp.get('mode')==='clock'){await renderClockKiosk(_qp.get('eid')); return;}
    renderShell();
  }catch(e){showFatal(e);}
}

/* ===================== VUES PLANNING ALTERNATIVES ===================== */

function renderCurrentPlanView(){
  if(planView==='month'){
    // Restaure #grid si une vue alternative l'a remplacé
    const gw=document.querySelector('.gridwrap');
    if(gw&&!$('grid')) gw.innerHTML='<table id="grid"></table>';
    render();
  } else {
    // Recalcule visibleRows avec les mêmes filtres que render()
    visibleRows=staff.filter(s=>{
      if(fStatus==='actif'&&!s.active)return false;
      if(fStatus==='parti'&&s.active)return false;
      if(!s.active&&s.departure_date){const dd=new Date(s.departure_date);if(cur>=new Date(dd.getFullYear(),dd.getMonth()+1,1))return false;}
      if(fRole&&s.role!==fRole)return false;
      if(fDept&&s.department!==fDept)return false;
      if(fSearch&&!(`${s.first_name} ${s.last_name} ${s.role||''} ${s.department||''}`.toLowerCase().includes(fSearch)))return false;
      return true;
    });
    visibleRows.sort((a,b)=>{
      const da=deps.find(d=>d.name===a.department)?.sort_order??999,db=deps.find(d=>d.name===b.department)?.sort_order??999;
      if(da!==db)return da-db;
      const sa=a.planning_sort_order??999,sb=b.planning_sort_order??999;
      if(sa!==sb)return sa-sb;
      return a.last_name.localeCompare(b.last_name);
    });
    if(planView==='week')renderWeekGrid();
    else if(planView==='day')renderDayGrid();
    else if(planView==='service')renderServiceGrid();
  }
}

function updateNavLabel(){
  const ml=$('mlabel'); if(!ml)return;
  const DN=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  if(planView==='week'&&curWeekStart){
    const e=new Date(curWeekStart); e.setDate(e.getDate()+6);
    ml.textContent=`${curWeekStart.getDate()} – ${e.getDate()} ${MONTHS[e.getMonth()]} ${e.getFullYear()}`;
  } else if(planView==='day'&&curDayDate){
    ml.textContent=`${DN[curDayDate.getDay()]} ${curDayDate.getDate()} ${MONTHS[curDayDate.getMonth()]} ${curDayDate.getFullYear()}`;
  } else {
    ml.textContent=`${MONTHS[cur.getMonth()]} ${cur.getFullYear()}`;
  }
}

async function switchPlanView(v){
  planView=v;
  if(v==='week'&&!curWeekStart){
    const n=new Date(),dow=n.getDay();
    const mon=new Date(n); mon.setDate(n.getDate()-(dow===0?6:dow-1)); mon.setHours(0,0,0,0);
    curWeekStart=mon;
  }
  if(v==='day'&&!curDayDate){curDayDate=new Date(); curDayDate.setHours(0,0,0,0);}
  document.querySelectorAll('.pvswitch button').forEach(b=>b.classList.toggle('on',b.dataset.pv===v));
  if(v!=='month'&&!coverageCache.length){
    try{coverageCache=await BE.listCoverageRules(hotelId);}catch(e){coverageCache=[];}
  }
  // Si la semaine/journée cible est hors du mois chargé, recharger d'abord
  if(v==='week'&&curWeekStart){
    const wy=curWeekStart.getFullYear(),wm=curWeekStart.getMonth();
    if(wy!==cur.getFullYear()||wm!==cur.getMonth()){cur=new Date(wy,wm,1);await loadMonth();return;}
  }
  if(v==='day'&&curDayDate){
    const dy=curDayDate.getFullYear(),dm=curDayDate.getMonth();
    if(dy!==cur.getFullYear()||dm!==cur.getMonth()){cur=new Date(dy,dm,1);await loadMonth();return;}
  }
  renderCurrentPlanView(); updateNavLabel();
}

async function advanceWeek(delta){
  if(!curWeekStart)return;
  curWeekStart=new Date(curWeekStart); curWeekStart.setDate(curWeekStart.getDate()+delta*7);
  const wy=curWeekStart.getFullYear(),wm=curWeekStart.getMonth();
  if(wy!==cur.getFullYear()||wm!==cur.getMonth()){cur=new Date(wy,wm,1);await loadMonth();return;}
  renderWeekGrid(); updateNavLabel();
}

async function advanceDay(delta){
  if(!curDayDate)return;
  curDayDate=new Date(curDayDate); curDayDate.setDate(curDayDate.getDate()+delta);
  const dy=curDayDate.getFullYear(),dm=curDayDate.getMonth();
  if(dy!==cur.getFullYear()||dm!==cur.getMonth()){cur=new Date(dy,dm,1);await loadMonth();return;}
  renderDayGrid(); updateNavLabel();
}

function renderWeekGrid(){
  const gw=document.querySelector('.gridwrap'); if(!gw)return;
  updateNavLabel();
  if(!curWeekStart)return;
  const DAYS_FR=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(curWeekStart);d.setDate(d.getDate()+i);days.push(d);}
  const dayStrs=days.map(d=>d.toISOString().slice(0,10));
  const todayStr=new Date().toISOString().slice(0,10);
  const rowLk=new Map(planningRows.map(r=>[r.employee_id+'|'+r.day,r]));
  const S_BG={'M':'#E3F2FD','S':'#FFF3E0','N':'#EDE7F6','J':'#F1F8E9','PD':'#FFF8E1','C':'#FCE4EC','custom':'#F5F5F5'};
  const S_FG={'M':'#1565C0','S':'#BF360C','N':'#4527A0','J':'#558B2F','PD':'#F57F17','C':'#880E4F','custom':'#616161'};
  let h=`<div class="plan-alt-wrap"><table class="plan-alt-table" style="width:100%"><thead><tr>`;
  h+=`<th class="emp-col">Collaborateur</th>`;
  days.forEach((d,i)=>{
    const wend=i>=5,isToday=dayStrs[i]===todayStr;
    h+=`<th class="${wend?'wknd':''}" style="${isToday?'background:var(--violet-bg)!important;color:var(--violet-d);':''}">${DAYS_FR[i]}<br><span style="font-weight:400">${d.getDate()}/${String(d.getMonth()+1).padStart(2,'0')}</span></th>`;
  });
  h+=`</tr></thead><tbody>`;
  if(!visibleRows.length){
    h+=`<tr><td colspan="8" style="padding:40px;text-align:center;color:var(--muted)">Aucun collaborateur</td></tr>`;
  } else {
    let lastDept=null;
    visibleRows.forEach(s=>{
      const dept=s.department||'';
      if(dept!==lastDept){lastDept=dept;h+=`<tr class="plan-dept-row"><td colspan="8">${dept||'Sans service'}</td></tr>`;}
      h+=`<tr><td class="emp-col"><div class="nm-line">${s.first_name} ${s.last_name}</div><div class="sub-line">${s.role||''}</div></td>`;
      dayStrs.forEach((ds,i)=>{
        const wend=i>=5;
        const row=rowLk.get(s.id+'|'+ds);
        const status=row?.status||'', shift=row?.shift_label||'';
        const c=CMAP[status];
        let cell='';
        if(status==='P'&&shift) cell=`<span class="plan-shift-bd" style="background:${S_BG[shift]||'#eee'};color:${S_FG[shift]||'#333'}">${shift}</span>`;
        else if(c) cell=`<span class="plan-shift-bd" style="background:${c.bg};color:${c.fg}">${status}</span>`;
        h+=`<td class="${wend?'wknd':''}">${cell}</td>`;
      });
      h+=`</tr>`;
    });
  }
  h+=`<tr class="plan-cov-row"><td class="emp-col" style="text-align:right">Présents</td>`;
  dayStrs.forEach(ds=>{const n=planningRows.filter(r=>r.day===ds&&r.status==='P').length;h+=`<td>${n||'—'}</td>`;});
  h+=`</tr></tbody></table>`;
  const curMStr=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`;
  if(dayStrs.some(ds=>ds.slice(0,7)!==curMStr)){
    h+=`<div style="padding:6px 16px 12px;font-size:11px;color:var(--muted)"><i class="fa-solid fa-circle-info"></i> Données hors du mois courant non chargées — naviguez via les flèches.</div>`;
  }
  h+=`</div>`;
  gw.innerHTML=h;
}

function renderDayGrid(){
  const gw=document.querySelector('.gridwrap'); if(!gw)return;
  updateNavLabel();
  if(!curDayDate)return;
  const ds=curDayDate.toISOString().slice(0,10);
  const rowLk=new Map(planningRows.filter(r=>r.day===ds).map(r=>[r.employee_id,r]));
  const S_FULL={'M':'Matin','S':'Soir','N':'Nuit','J':'Journée','PD':'Petit-déj.','C':'Coupure','custom':'Libre'};
  const S_BG={'M':'#E3F2FD','S':'#FFF3E0','N':'#EDE7F6','J':'#F1F8E9','PD':'#FFF8E1','C':'#FCE4EC','custom':'#F5F5F5'};
  const S_FG={'M':'#1565C0','S':'#BF360C','N':'#4527A0','J':'#558B2F','PD':'#F57F17','C':'#880E4F','custom':'#616161'};
  let h=`<div class="plan-alt-wrap"><table class="plan-alt-table" style="width:100%"><thead><tr>
    <th class="emp-col">Collaborateur</th><th>Statut</th><th>Shift</th><th>Horaires</th><th>Pause</th>
  </tr></thead><tbody>`;
  if(!visibleRows.length){
    h+=`<tr><td colspan="5" style="padding:40px;text-align:center;color:var(--muted)">Aucun collaborateur</td></tr>`;
  } else {
    let lastDept=null;
    visibleRows.forEach(s=>{
      const dept=s.department||'';
      if(dept!==lastDept){lastDept=dept;h+=`<tr class="plan-dept-row"><td colspan="5">${dept||'Sans service'}</td></tr>`;}
      const row=rowLk.get(s.id);
      const status=row?.status||'', shift=row?.shift_label||'';
      const c=CMAP[status];
      const stBadge=c?`<span class="plan-shift-bd" style="background:${c.bg};color:${c.fg}">${status}</span>`:`<span style="color:var(--muted)">—</span>`;
      const sTxt=shift?(S_FULL[shift]||shift):'—';
      const sBadge=shift?` <span class="plan-shift-bd" style="background:${S_BG[shift]||'#eee'};color:${S_FG[shift]||'#333'};font-size:9px">${shift}</span>`:'';
      const times=(row?.shift_start&&row?.shift_end)?`${String(row.shift_start).slice(0,5)}–${String(row.shift_end).slice(0,5)}`:'—';
      const brk=row?.break_minutes?`${row.break_minutes} min`:'—';
      h+=`<tr>
        <td class="emp-col"><div class="nm-line">${s.first_name} ${s.last_name}</div><div class="sub-line">${s.role||''}</div></td>
        <td>${stBadge}</td>
        <td style="font-size:11px">${sTxt}${sBadge}</td>
        <td style="font-size:11px;font-variant-numeric:tabular-nums">${times}</td>
        <td style="font-size:11px">${brk}</td>
      </tr>`;
    });
  }
  const totalP=planningRows.filter(r=>r.day===ds&&r.status==='P').length;
  const sc=['M','S','N','J','PD','C'].reduce((a,sl)=>{a[sl]=planningRows.filter(r=>r.day===ds&&r.status==='P'&&r.shift_label===sl).length;return a;},{});
  const shiftSum=Object.entries(sc).filter(([,n])=>n>0).map(([sl,n])=>`<b>${sl}</b>&nbsp;${n}`).join(' &nbsp;·&nbsp; ');
  h+=`<tr class="plan-cov-row">
    <td class="emp-col" style="text-align:right">Présents : <b>${totalP}</b></td>
    <td colspan="4" style="text-align:left;font-weight:400;font-size:11px">${shiftSum||'<span style="color:var(--muted)">Aucun shift défini</span>'}</td>
  </tr>`;
  h+=`</tbody></table></div>`;
  gw.innerHTML=h;
}

function renderServiceGrid(){
  const gw=document.querySelector('.gridwrap'); if(!gw)return;
  updateNavLabel();
  const y=cur.getFullYear(),m=cur.getMonth(),nd=dim(y,m);
  const todayStr=new Date().toISOString().slice(0,10);
  const SHIFT_LABELS=['M','S','N','J','PD','C'];
  // Construit : dept -> shift -> day -> count
  const deptMap=new Map();
  planningRows.forEach(r=>{
    if(r.status!=='P'||!r.shift_label)return;
    const emp=staff.find(s=>s.id===r.employee_id);
    const dept=emp?.department||'Sans service';
    if(!deptMap.has(dept)) deptMap.set(dept,{});
    const dm=deptMap.get(dept);
    if(!dm[r.shift_label]) dm[r.shift_label]={};
    dm[r.shift_label][r.day]=(dm[r.shift_label][r.day]||0)+1;
  });
  if(!deptMap.size){
    gw.innerHTML=`<div class="plan-alt-wrap" style="padding:60px 40px;text-align:center;color:var(--ink2)">
      <i class="fa-regular fa-calendar-xmark" style="font-size:40px;margin-bottom:16px;color:var(--muted);display:block"></i>
      <div style="font-weight:700;margin-bottom:6px">Aucun shift renseigné pour ${MONTHS[m]} ${y}</div>
      <div style="font-size:12px">Passez en vue Mensuelle et affectez des shifts aux journées présentes.</div>
    </div>`;
    return;
  }
  let h=`<div class="plan-alt-wrap"><table class="plan-alt-table" style="min-width:${700+nd*36}px;table-layout:auto"><thead><tr>`;
  h+=`<th class="emp-col" style="width:200px;min-width:200px;max-width:200px">Département / Shift</th>`;
  for(let d=1;d<=nd;d++){
    const wd=new Date(y,m,d).getDay(),wend=wd===0||wd===6,ds=iso(y,m,d),isToday=ds===todayStr;
    h+=`<th class="${wend?'wknd':''}" style="${isToday?'background:var(--violet-bg)!important;color:var(--violet-d);':''}font-size:11px">${d}</th>`;
  }
  h+=`</tr></thead><tbody>`;
  [...deptMap.entries()].sort((a,b)=>{
    const oa=deps.find(d=>d.name===a[0])?.sort_order??999,ob=deps.find(d=>d.name===b[0])?.sort_order??999;
    return oa-ob||a[0].localeCompare(b[0]);
  }).forEach(([dept,shifts])=>{
    const shiftKeys=SHIFT_LABELS.filter(sl=>shifts[sl]);
    if(!shiftKeys.length)return;
    h+=`<tr class="plan-dept-row"><td colspan="${nd+1}">${dept}</td></tr>`;
    shiftKeys.forEach(sl=>{
      const rule=coverageCache.find(r=>r.department===dept&&r.shift_label===sl&&r.day_of_week==null);
      const minReq=rule?.min_staff_base??null;
      h+=`<tr><td class="emp-col" style="padding-left:20px;font-size:12px">Shift ${sl}</td>`;
      for(let d=1;d<=nd;d++){
        const wd=new Date(y,m,d).getDay(),wend=wd===0||wd===6,ds=iso(y,m,d);
        const n=shifts[sl]?.[ds]||0;
        const cls=minReq!==null&&n>0&&n<minReq?'plan-cov-warn':(n>0?'plan-cov-ok':'');
        h+=`<td class="${wend?'wknd':''}"><span class="${cls}">${n||'—'}</span>${minReq!==null&&n>0?`<div style="font-size:9px;color:var(--muted)">/${minReq}</div>`:''}</td>`;
      }
      h+=`</tr>`;
    });
  });
  h+=`</tbody></table></div>`;
  gw.innerHTML=h;
}

function updateHint(){

/* Row drag-and-drop reorder for planning */
let _rowDragId=null, _rowDragOver=null;
function wirePlanningRowDrag(){
  const g=$('grid'); if(!g)return;

  // Activate draggable only on mousedown from the handle — prevents conflicts with cell selection
  g.querySelectorAll('.dh').forEach(dh=>{
    const tr=dh.closest('tr[data-emprow]'); if(!tr)return;
    dh.addEventListener('mousedown',()=>{ tr.draggable=true; });
  });

  g.querySelectorAll('tr[data-emprow]').forEach(tr=>{
    tr.addEventListener('dragstart',e=>{
      if(!tr.draggable){e.preventDefault();return;}
      _rowDragId=tr.dataset.emprow;
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',_rowDragId);
      setTimeout(()=>tr.classList.add('row-dragging'),0);
    });
    tr.addEventListener('dragend',()=>{
      tr.draggable=false;
      tr.classList.remove('row-dragging');
      g.querySelectorAll('.row-drag-over').forEach(x=>x.classList.remove('row-drag-over'));
      _rowDragId=null; _rowDragOver=null;
    });
  });

  // dragover/drop on the whole grid to catch events on child cells
  g.addEventListener('dragover',e=>{
    if(!_rowDragId)return;
    const tgt=e.target.closest('tr[data-emprow]');
    if(!tgt||tgt.dataset.emprow===_rowDragId)return;
    e.preventDefault(); e.dataTransfer.dropEffect='move';
    if(_rowDragOver!==tgt.dataset.emprow){
      g.querySelectorAll('.row-drag-over').forEach(x=>x.classList.remove('row-drag-over'));
      tgt.classList.add('row-drag-over');
      _rowDragOver=tgt.dataset.emprow;
    }
  });

  g.addEventListener('drop',e=>{
    e.preventDefault();
    g.querySelectorAll('.row-drag-over').forEach(x=>x.classList.remove('row-drag-over'));
    if(!_rowDragId||!_rowDragOver||_rowDragId===_rowDragOver)return;
    const fromIdx=visibleRows.findIndex(s=>s.id===_rowDragId);
    const toIdx=visibleRows.findIndex(s=>s.id===_rowDragOver);
    if(fromIdx<0||toIdx<0)return;
    visibleRows.splice(toIdx,0,visibleRows.splice(fromIdx,1)[0]);
    const byDept=new Map();
    visibleRows.forEach(s=>{ const d=s.department||''; if(!byDept.has(d))byDept.set(d,[]); byDept.get(d).push(s); });
    const updates=[];
    byDept.forEach(rows=>rows.forEach((s,pos)=>{ if(s.planning_sort_order!==pos){s.planning_sort_order=pos;updates.push(s);} }));
    _rowDragId=null; _rowDragOver=null;
    render();
    savePlanningOrder(updates);
  });
}
async function savePlanningOrder(updates){
  for(const s of updates){
    try{ await BE.updateEmployee(s.id,{planning_sort_order:s.planning_sort_order}); }
    catch(e){ console.warn('savePlanningOrder',e); }
    // Update staff array too
    const idx=staff.findIndex(x=>x.id===s.id);
    if(idx>=0) staff[idx].planning_sort_order=s.planning_sort_order;
  }
}

function rc(td){return {r:+td.dataset.r,d:+td.dataset.d};}
function keyOf(r,d){const s=visibleRows[r];return s?s.id+'|'+iso(cur.getFullYear(),cur.getMonth(),d):null;}
function rect(a,b){const ks=[];const r0=Math.min(a.r,b.r),r1=Math.max(a.r,b.r),d0=Math.min(a.d,b.d),d1=Math.max(a.d,b.d);
  for(let r=r0;r<=r1;r++)for(let d=d0;d<=d1;d++){const k=keyOf(r,d);if(k)ks.push(k);}return ks;}
function applySelVis(){
  for(const k in cellMap){const has=selection.has(k);const td=cellMap[k];
    if(has&&!td.classList.contains('sel'))td.classList.add('sel');
    else if(!has&&td.classList.contains('sel'))td.classList.remove('sel');}
  showActionBar();
}
function clearSelection(){selection.clear();applySelVis();}
function gridMouseDown(e){
  const td=e.target.closest('td.day'); if(!td)return;
  if(!editMode){openPop(td);return;}
  e.preventDefault();
  const k=td.dataset.k, a=rc(td);
  if(e.metaKey||e.ctrlKey){ if(selection.has(k))selection.delete(k); else selection.add(k);
    baseSel=new Set(selection); anchor=a; dragging=true; }
  else if(e.shiftKey&&lastAnchor){ baseSel=new Set(selection); anchor=lastAnchor; dragging=true;
    rect(lastAnchor,a).forEach(x=>selection.add(x)); }
  else { selection.clear(); baseSel=new Set(); anchor=a; dragging=true; selection.add(k); }
  lastAnchor=a; applySelVis();
}
function gridMouseOver(e){
  if(!dragging)return; const td=e.target.closest('td.day'); if(!td)return;
  const cur2=rc(td); selection.clear(); baseSel.forEach(x=>selection.add(x));
  rect(anchor,cur2).forEach(x=>selection.add(x)); applySelVis();
}

function applyToSelection(code){
  selection.forEach(k=>{ setPending(k,code); if(code===''||CMAP[code]?.cat!=='worked') pendingShifts.delete(k); });
  renderCurrentPlanView(); flash(`${selection.size} cellule(s) → ${code||'Repos'}`);
}
function applyShiftToSelection(shift){
  const eligible=[...selection].filter(k=>{ const c=pending.has(k)?pending.get(k):(committed.get(k)?.status||''); return c==='P'||c==='PE'; });
  if(!eligible.length){ flash('Shift applicable uniquement aux cellules Présent (P/PE)'); return; }
  eligible.forEach(k=>{ if(shift==='') pendingShifts.delete(k); else pendingShifts.set(k,shift); });
  renderCurrentPlanView(); flash(`${eligible.length} cellule(s) → shift ${shift||'effacé'}`);
}
function setPending(k,code){ if(code===committedCode(k)) pending.delete(k); else pending.set(k,code); }

function updateSaveBar(){
  const n=[...pending.keys()].filter(k=>pending.get(k)!==committedCode(k)).length+pendingShifts.size;
  $('pendCount').textContent=n; $('savebar').classList.toggle('on',n>0);
  $('pendCount').dataset.count=n;
}
async function saveChanges(){
  $('saveBtn').disabled=true;
  try{
    const ups=[],dels=[];
    for(const [k,v] of pending){
      const [eid,day]=k.split('|');
      if(v===''){ if(committed.has(k)) dels.push({hotel_id:hotelId,employee_id:eid,day}); }
      else {
        const row={hotel_id:hotelId,employee_id:eid,day,status:v,duration:1.0};
        // porter le shift en attente si présent sur cette cellule
        if(pendingShifts.has(k)) row.shift_label=pendingShifts.get(k)||null;
        ups.push(row);
      }
    }
    // shifts sur cellules déjà committées (status non modifié)
    for(const [k,sh] of pendingShifts){
      if(pending.has(k)) continue; // déjà traité ci-dessus
      const [eid,day]=k.split('|');
      const cur=committed.get(k);
      if(!cur) continue;
      ups.push({hotel_id:hotelId,employee_id:eid,day,status:cur.status,duration:cur.duration||1.0,shift_label:sh||null});
    }
    await BE.savePlanning(hotelId,ups,dels);
    pending.forEach((v,k)=>{ if(v==='')committed.delete(k); else committed.set(k,{status:v,duration:1}); });
    pendingShifts.forEach((sh,k)=>{ const c=committed.get(k); if(c) c.shift_label=sh||null; });
    pending.clear(); pendingShifts.clear(); renderCurrentPlanView(); flash('Modifications enregistrées');
  }catch(e){flash('Erreur : '+e.message); console.error(e);}
  finally{$('saveBtn').disabled=false;}
}
function cancelChanges(){pending.clear(); pendingShifts.clear(); renderCurrentPlanView(); flash('Modifications annulées');}

async function drawDashboardAlerts(){
  try{
    const [alerts, candidates] = await Promise.all([
      BE.listDocumentAlerts(hotelId).catch(()=>[]),
      BE.listCandidates(hotelId).catch(()=>[]),
    ]);

    // Docs manquants
    const docEl=$('dashDocCount');
    if(docEl) docEl.textContent=alerts.filter(a=>a.alert_kind==='missing').length;

    // Candidatures en attente
    const newCands=candidates.filter(c=>c.status==='nouveau'||c.status==='new'||!c.status);
    const candEl=$('dashCandCount');
    if(candEl) candEl.textContent=newCands.length;
    const badgeEl=$('dashCandBadge');
    if(badgeEl&&newCands.length>0){badgeEl.textContent='+'+newCands.length;badgeEl.style.display='inline';}

    // Alert banner
    if(alerts.length>0){
      const banner=$('dashAlertBanner');
      if(banner){
        banner.style.display='flex';
        const titleEl=$('dashAlertTitle');
        if(titleEl) titleEl.textContent=`${alerts.length} alerte${alerts.length>1?'s':''} RH à traiter`;
        const detEl=$('dashAlertDetails');
        if(detEl){
          const top=alerts.slice(0,3).map(a=>{
            const s=staff.find(x=>x.id===a.employee_id);
            const name=s?`${s.first_name} ${s.last_name}`:`${a.first_name||''} ${a.last_name||''}`.trim();
            return `${name} - ${a.doc_label||a.doc_type_code} ${a.alert_kind==='missing'?'manquante':a.alert_kind==='expired'?'expirée':'bientôt expirée'}`;
          });
          detEl.textContent='• '+top.join(' • ');
        }
      }
    }

    // Activité récente enrichie avec audit logs
    const auditLogs = await BE.listAuditLogs(hotelId, 10).catch(()=>[]);
    if(auditLogs.length>0){
      const actEl=$('dashActivity');
      if(actEl){
        const actionLabels={
          'invite_user':'Accès accordé',
          'contract_generate':'Contrat généré',
          'document_upload':'Document ajouté',
          'template_upload':'Modèle importé',
          'template_update':'Modèle mis à jour',
          'employee_create':'Collaborateur ajouté',
        };
        actEl.innerHTML=auditLogs.slice(0,6).map(log=>{
          const label=actionLabels[log.action]||log.action||'Action';
          const dotColor=log.action?.includes('contract')?'#16a34a':log.action?.includes('doc')?'#ca8a04':'#8B5CF6';
          const d=new Date(log.created_at);
          const diffH=Math.floor((Date.now()-d)/3600000);
          const when=diffH<1?'Il y a moins d\'1h':diffH<24?`Il y a ${diffH}h`:diffH<48?'Hier':`${Math.floor(diffH/24)}j`;
          return `<div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:14px">
            <div style="width:8px;height:8px;border-radius:50%;background:${dotColor};flex-shrink:0;margin-top:5px"></div>
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--ink)">${label}</div>
              <div style="font-size:11.5px;color:var(--muted)">${when}</div>
            </div>
          </div>`;
        }).join('');
      }
    }
  }catch(e){
    console.warn('Dashboard async error:', e);
  }
}
  }catch(e){
    $('alertList').innerHTML=`<div style="padding:12px;color:var(--red);font-size:12px">Erreur chargement alertes : ${e.message||e}</div>`;
  }
}

/* ===================== VUE REPORTING ===================== */
function barRows(rows,color){if(!rows.length)return '<div style="padding:14px;color:var(--muted);font-size:13px">Aucune donnée.</div>';
  const max=Math.max(...rows.map(r=>r[1]),1);
  return rows.map(([lab,v])=>`<div class="b"><div class="b-lab" title="${lab}">${lab}</div>
    <div class="b-track"><div class="b-fill" style="width:${Math.max(v/max*100,5)}%;background:${color}">${v}</div></div></div>`).join('');}

function wireNotifBell(){
  const bell=$('notifBell'); const panel=$('notifPanel'); if(!bell||!panel)return;
  let open=false;
  const closePanel=()=>{panel.style.display='none';open=false;};
  bell.onclick=async e=>{
    e.stopPropagation();
    if(open){closePanel();return;}
    open=true; panel.style.display='block';
    panel.innerHTML='<div style="padding:18px;text-align:center;color:var(--muted)"><i class="fa-solid fa-spinner fa-spin"></i> Chargement…</div>';
    try{
      const [docAlerts, medVisits, absReqs, portalReqs]=await Promise.all([
        BE.listDocumentAlerts(hotelId).catch(()=>[]),
        BE.listMedicalVisits(hotelId).catch(()=>[]),
        BE.listAbsences(hotelId).catch(()=>[]),
        BE.db.from('portal_requests').select('id,type,employee:employees(first_name,last_name)').eq('hotel_id',hotelId).eq('status','pending').limit(10).then(r=>r.data||[]).catch(()=>[])
      ]);
      const today=isoToday();
      const soon30=new Date(); soon30.setDate(soon30.getDate()+30);
      const soon30str=soon30.toISOString().slice(0,10);
      const medAlerts=medVisits.filter(v=>!v.next_visit_date||v.next_visit_date<=today||(v.next_visit_date<=soon30str));
      const pendingAbs=absReqs.filter(a=>a.status==='submitted'||a.status==='pending');
      const all=[
        ...docAlerts.slice(0,5).map(a=>({icon:'fa-file-circle-exclamation',color:'#dc2626',text:`<b>${a.first_name} ${a.last_name}</b> — ${a.doc_label||a.doc_type} ${a.alert_kind==='expired'?'expiré':'bientôt expiré'}`,sub:a.expires_at?`Expire le ${a.expires_at}`:''})),
        ...medAlerts.slice(0,3).map(v=>{const emp=staff.find(s=>s.id===v.employee_id);return {icon:'fa-stethoscope',color:'#d97706',text:`<b>${emp?emp.last_name+' '+emp.first_name:'?'}</b> — Visite médicale ${!v.next_visit_date||v.next_visit_date<today?'en retard':'à venir'}`,sub:v.next_visit_date||'Non planifiée'};}),
        ...pendingAbs.slice(0,3).map(a=>{const emp=staff.find(s=>s.id===a.employee_id);return {icon:'fa-calendar-check',color:'#7c3aed',text:`<b>${emp?emp.last_name+' '+emp.first_name:'?'}</b> — Absence à valider`,sub:`${a.type_code||a.type||'Absence'} · du ${a.start_date} au ${a.end_date||a.start_date}`,onClick:()=>goView('portal_inbox')};}),
        ...portalReqs.slice(0,5).map(pr=>{const e=pr.employee||{};return {icon:'fa-mobile-screen',color:'#2563eb',text:`<b>${e.first_name||''} ${e.last_name||''}`.trim()+'</b> — '+(REQ_TYPE_LABELS[pr.type]||pr.type),sub:'Demande portail en attente',onClick:()=>goView('portal_inbox')};})

      ];
      const badge=$('notifBadge');
      if(badge){badge.textContent=all.length||'';badge.style.display=all.length?'block':'none';}
      if(!all.length){panel.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px"><i class="fa-solid fa-check-circle" style="color:#16a34a;font-size:24px;display:block;margin-bottom:8px"></i>Aucune alerte en cours</div>';return;}
      panel.innerHTML=`<div style="padding:12px 16px 8px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--line)">${all.length} alerte${all.length>1?'s':''}</div>`
        +all.map((a,i)=>`<div data-ni="${i}" style="display:flex;gap:12px;align-items:flex-start;padding:12px 16px;border-bottom:1px solid var(--line);font-size:13px;cursor:${a.onClick?'pointer':'default'}${a.onClick?';transition:background .1s':''}">
          <i class="fa-solid ${a.icon}" style="color:${a.color};margin-top:2px;flex-shrink:0"></i>
          <div><div>${a.text}</div>${a.sub?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${a.sub}</div>`:''}</div>
        </div>`).join('');
      all.forEach((a,i)=>{if(a.onClick){const el=panel.querySelector(`[data-ni="${i}"]`);if(el){el.onmouseenter=()=>el.style.background='var(--bg2)';el.onmouseleave=()=>el.style.background='';el.onclick=()=>{closePanel();a.onClick();};}}});
    }catch(e){panel.innerHTML=`<div style="padding:16px;color:#dc2626;font-size:12px">${e.message}</div>`;}
  };
  document.addEventListener('click',e=>{if(!bell.contains(e.target)&&!panel.contains(e.target))closePanel();},{passive:true});
  // badge count on load
  Promise.all([
    BE.listDocumentAlerts(hotelId).catch(()=>[]),
    BE.db.from('portal_requests').select('id',{count:'exact',head:true}).eq('hotel_id',hotelId).eq('status','pending').then(r=>Array(r.count||0).fill(null)).catch(()=>[])
  ]).then(([docAlerts,portalPending])=>{
    const b=$('notifBadge');if(!b)return;
    const n=docAlerts.length+portalPending.length;
    if(n){b.textContent=n>9?'9+':n;b.style.display='block';}
  }).catch(()=>{});
}

function renderReporting(){

  const perContract={};activeStaff.forEach(s=>{const k=s.contract_type||'CDI';perContract[k]=(perContract[k]||0)+1;});
  // top jours travaillés + CP
  const workEmp={};committed.forEach((v,k)=>{if(v.status!=='P'&&v.status!=='PE')return;const eid=k.split('|')[0];workEmp[eid]=(workEmp[eid]||0)+Number(v.duration||1);});

      </div>
    </div>
    <div class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr));margin-bottom:18px">
      <div class="kc"><div class="kv">${activeStaff.length}</div><div class="kl"><i class="fa-solid fa-users"></i> Effectif actif</div></div>
      <div class="kc"><div class="kv">${workedCount}</div><div class="kl"><i class="fa-regular fa-clock"></i> Jours P/PE mois</div></div>
      <div class="kc"><div class="kv">${counts.CP||0}</div><div class="kl"><i class="fa-solid fa-umbrella-beach"></i> CP mois</div></div>
      <div class="kc"><div class="kv" style="color:${absRate>5?'#dc2626':'inherit'}">${absRate}%</div><div class="kl"><i class="fa-solid fa-person-sick"></i> Taux absentéisme</div></div>
    </div>
    <div class="cols2">
      <div class="box barchart"><h3><i class="fa-solid fa-building"></i>Effectif par service</h3>${barRows(Object.entries(svc).sort((a,b)=>b[1]-a[1]),'#8B5CF6')}</div>
      <div class="box barchart"><h3><i class="fa-solid fa-id-badge"></i>Effectif par rôle</h3>${barRows(Object.entries(perRole).sort((a,b)=>b[1]-a[1]).slice(0,8),'#3b82f6')}</div>
    </div>
    <div class="cols2" style="margin-top:14px">
      <div class="box barchart"><h3><i class="fa-regular fa-clock"></i>Top présences (P+PE) ce mois</h3>${barRows(top,'#16a34a')}</div>
      <div class="box barchart"><h3><i class="fa-solid fa-umbrella-beach"></i>Top CP pris ce mois</h3>${barRows(topCp,'#d97706')}</div>

        <select id="pst">
          <option value="actif" ${pStatus==='actif'?'selected':''}>Actifs</option>
          <option value="parti" ${pStatus==='parti'?'selected':''}>Partis</option>

      return true;}).sort((a,b)=>(b.active?1:0)-(a.active?1:0));
    $('pcards').innerHTML=list.map(s=>`<div class="card" data-emp="${s.id}" ${!s.active?'style="opacity:.6"':''}>
      <div class="head"><div class="av" style="background:${avBg(s)}">${avInner(s)}</div>

      <div class="meta">
        <span class="tag ${s.contract_type==='CDI'?'green':'gray'}">${s.contract_type||'CDI'}</span>
        ${s.hire_date?`<span class="tag gray">depuis ${s.hire_date}</span>`:''}
        ${!s.active&&s.departure_date?`<span class="tag red">parti ${s.departure_date}</span>`:''}

      </div></div>`).join('')||'<div style="padding:30px;text-align:center;color:var(--muted);grid-column:1/-1">Aucun collaborateur ne correspond.</div>';
    $('pcards').querySelectorAll('.card').forEach(c=>c.onclick=()=>openFiche(c.dataset.emp));
    $('pcards').querySelectorAll('.qr-btn').forEach(b=>b.onclick=e=>{e.stopPropagation();showQRCode(staff.find(s=>s.id===b.dataset.qreid));});};
  $('pq').oninput=e=>{pSearch=e.target.value;draw();};
  $('pst').onchange=e=>{pStatus=e.target.value;draw();};
  $('pdept').onchange=e=>{pDept=e.target.value;draw();};

}

function openPersonnelImport(){
  $('modal').innerHTML=`
    <div class="mh">
      <div class="mh-ic"><i class="fa-solid fa-file-import"></i></div>
      <div class="mh-ti"><h2>Import collaborateurs CSV</h2>
        <div class="sub">Colonnes attendues : Prénom, Nom, Service, Rôle, Contrat, Date entrée, Téléphone, Email</div></div>
      <button class="mh-x" onclick="closeModal()" title="Fermer"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="mb">
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;font-size:12.5px;color:#166534;margin-bottom:18px">
        <b>Format CSV attendu (avec en-tête) :</b><br>
        <code style="font-size:11px">Prénom,Nom,Service,Rôle,Contrat,Date entrée,Téléphone,Email</code><br>
        Les colonnes Service, Rôle, Téléphone et Email sont optionnelles. Contrat : CDI, CDD, interim, saisonnier. Date au format AAAA-MM-JJ.
      </div>
      <a id="csvTpl" href="#" style="font-size:12px;color:var(--violet);display:inline-block;margin-bottom:16px"><i class="fa-solid fa-download"></i> Télécharger un modèle CSV</a>
      ${dropzoneHTML('pcsv','Glissez-déposez votre fichier CSV ou cliquez pour parcourir','.csv')}
      <div id="pimportPreview" style="margin-top:16px"></div>
    </div>
    <div class="mact">
      <button class="btn g" onclick="closeModal()">Annuler</button>
      <button class="btn p" id="pimportSave" style="display:none"><i class="fa-solid fa-check"></i> Importer</button>
    </div>`;
  $('modalbg').classList.add('on');
  // modèle CSV
  $('csvTpl').onclick=e=>{
    e.preventDefault();
    const tpl='Prénom,Nom,Service,Rôle,Contrat,Date entrée,Téléphone,Email\nJean,Dupont,Réception,Réceptionniste,CDI,2024-01-15,0612345678,j.dupont@hotel.fr\nMarie,Martin,Restauration,Serveuse,CDD,2024-03-01,,';
    const b=new Blob([tpl],{type:'text/csv;charset=utf-8'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='modele_import_collaborateurs.csv';a.click();
  };
  let parsed=[];
  wireDropzone('pcsv',async file=>{
    const text=await file.text();
    const lines=text.split(/\r?\n/).filter(l=>l.trim());
    if(lines.length<2){$('pimportPreview').innerHTML='<div style="color:#dc2626">Fichier vide ou invalide.</div>';return;}
    parsed=[];
    const CTYPES=['CDI','CDD','interim','saisonnier'];
    lines.slice(1).forEach((line,i)=>{
      const parts=line.split(',').map(s=>s.trim().replace(/^"|"$/g,''));
      const [fn,ln,dept,role,ct,hd,ph,em]=parts;
      if(!fn||!ln) return; // skip vide
      parsed.push({first_name:fn,last_name:ln,department:dept||null,role:role||null,
        contract_type:CTYPES.includes(ct)?ct:'CDI',hire_date:hd||null,
        phone:ph||null,email:em||null,active:true});
    });
    if(!parsed.length){$('pimportPreview').innerHTML='<div style="color:#dc2626">Aucune ligne valide trouvée (Prénom et Nom requis).</div>';return;}
    $('pimportPreview').innerHTML=`<div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--ink2)">${parsed.length} collaborateur(s) à importer :</div>
      <table class="tbl" style="font-size:12px"><thead><tr><th>Prénom</th><th>Nom</th><th>Service</th><th>Rôle</th><th>Contrat</th><th>Entrée</th></tr></thead><tbody>
      ${parsed.map(p=>`<tr><td>${p.first_name}</td><td>${p.last_name}</td><td>${p.department||'—'}</td><td>${p.role||'—'}</td><td>${p.contract_type}</td><td>${p.hire_date||'—'}</td></tr>`).join('')}
      </tbody></table>`;
    $('pimportSave').style.display='';
    $('pimportSave').textContent=`Importer ${parsed.length} collaborateur(s)`;
  });
  $('pimportSave').onclick=async()=>{
    if(!parsed.length) return;
    $('pimportSave').disabled=true;
    let ok=0, err=0;
    for(const p of parsed){
      try{const c=await BE.addEmployee(hotelId,p);staff.push(c);ok++;}
      catch(e){console.error('import err',e);err++;}
    }
    closeModal();
    flash(`${ok} collaborateur(s) importé(s)${err?` · ${err} erreur(s)`:''}`);
    renderPersonnel();
  };
}

function openTemplateForm(t, isNewVersion){
  const isEdit  = !!t && !isNewVersion;
  const isVer   = !!t && isNewVersion;
  const title   = isVer ? `Nouvelle version de « ${t.name} »` : isEdit ? 'Modifier le modèle' : 'Nouveau modèle de contrat';
  const depOpts = deps.map(d=>`<option value="${d.id}" ${(t&&t.department_id===d.id)?'selected':''}>${d.name}</option>`).join('');
  const rolOpts = rols.map(r=>`<option value="${r.id}" ${(t&&t.role_id===r.id)?'selected':''}>${r.name}</option>`).join('');
  const typeOpts= CONTRACT_TYPES.map(c=>`<option ${(t&&t.contract_type===c)?'selected':''}>${c}</option>`).join('');

  $('modal').innerHTML = mhHTML('fa-regular fa-file-lines', title) + `
  <div class="mb">
    <div class="fld"><label>Nom du modèle *</label>
      <input type="text" id="tn" value="${t?.name||''}" placeholder="ex : CDI Réceptionniste"></div>
    <div class="row3">
      <div class="fld"><label>Type de contrat</label><select id="tc">${typeOpts}</select></div>
      <div class="fld"><label>Service <span style="font-weight:400;color:var(--muted)">(facultatif)</span></label><select id="td"><option value="">— Tous —</option>${depOpts}</select></div>
      <div class="fld"><label>Rôle <span style="font-weight:400;color:var(--muted)">(facultatif)</span></label><select id="tr"><option value="">— Tous —</option>${rolOpts}</select></div>
    </div>
    <div class="fld">
      <label>Corps HTML du modèle — utilisez <code style="background:#f4f2fd;color:var(--violet-d);padding:1px 5px;border-radius:4px;font-size:11.5px">{{variable}}</code></label>
      <textarea id="tb" rows="16" style="font-family:'SFMono-Regular',Consolas,monospace;font-size:12px;line-height:1.5;min-height:280px">${t?.body_html||DEFAULT_TEMPLATE_BODY}</textarea>
    </div>
  </div>
  <div class="mact">
    <button class="btn g" id="tplCancel">Annuler</button>
    <button class="btn p" id="tplSave"><i class="fa-solid fa-check"></i> ${isVer?'Créer la version':isEdit?'Enregistrer':'Créer'}</button>
  </div>`;
  $('modalbg').classList.add('on');
  $('tplCancel').onclick=closeModal;
  $('tplSave').onclick=async()=>{
    const payload={name:$('tn').value.trim(),contract_type:$('tc').value,
      department_id:$('td').value||null,role_id:$('tr').value||null,
      body_html:$('tb').value};
    if(!payload.name||!payload.body_html){flash('Nom et contenu sont obligatoires');return;}
    try{
      if(isVer){
        const newT=await BE.newVersionOfTemplate(hotelId,t.id,payload.body_html,payload.name);
        await BE.logAudit('template_update','contract_template',newT.id,null,{from:t.id,version:newT.version});
        flash('Nouvelle version créée');
      }else if(isEdit){
        await BE.updateTemplate(t.id,payload);
        await BE.logAudit('template_update','contract_template',t.id);
        flash('Modèle mis à jour');
      }else{
        const newT=await BE.saveTemplate(hotelId,payload);
        await BE.logAudit('template_upload','contract_template',newT.id,null,{contract_type:payload.contract_type});
        flash('Modèle créé');
      }
      closeModal(); renderContractsTemplates();
    }catch(e){flash('Erreur : '+(e.message||e));}

}

      ta.value=ta.value.slice(0,s)+v+ta.value.slice(e);
      ta.selectionStart=ta.selectionEnd=s+v.length;
      ta.focus();
    };
  });

  wireDropzone('ti_file', async f=>{
    const ext=f.name.split('.').pop().toLowerCase();
    $('ti_warn').style.display='none';
    $('ti_fields').style.display='none';
    $('ti_save').disabled=true;
    if(ext==='docx'){
      await convertDocx(f);
    } else if(ext==='pdf'){
      await convertPdf(f);
    } else {
      $('ti_warn').textContent='Format non supporté. Utilisez un fichier .docx ou .pdf.';
      $('ti_warn').style.display='block';
    }
  });

  $('ti_save').onclick=async()=>{
    const payload={name:$('ti_name').value.trim(),contract_type:$('ti_tc').value,
      department_id:$('ti_td').value||null,role_id:$('ti_tr').value||null,
      body_html:$('ti_body').value};
    if(!payload.name||!payload.body_html){flash('Nom et contenu sont obligatoires');return;}
    try{
      const newT=await BE.saveTemplate(hotelId,payload);
      await BE.logAudit('template_upload','contract_template',newT.id,null,{contract_type:payload.contract_type,source:'import'});
      flash('Modèle importé');
      closeModal(); renderContractsTemplates();
    }catch(e){flash('Erreur : '+(e.message||e));}
  };
}

async function convertDocx(file){
  try{
    if(!window.mammoth) await loadScript('https://cdn.jsdelivr.net/npm/mammoth@1.8.0/mammoth.browser.min.js');
    const ab=await file.arrayBuffer();
    const result=await window.mammoth.convertToHtml({arrayBuffer:ab});
    $('ti_body').value=result.value||'';
    if(result.messages&&result.messages.length){
      $('ti_warn').textContent='Conversion DOCX terminée avec des avertissements — vérifiez le rendu.';
      $('ti_warn').style.display='block';
    }
    $('ti_name').value=$('ti_name').value||file.name.replace(/\.docx$/i,'');
    $('ti_fields').style.display='block';
    $('ti_save').disabled=false;
  }catch(e){
    $('ti_warn').textContent='Erreur de conversion Word : '+(e.message||e);
    $('ti_warn').style.display='block';
  }
}

async function convertPdf(file){
  try{
    if(!window.pdfjsLib){
      await loadScript('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs');
      window.pdfjsLib=window['pdfjs-dist/build/pdf']||window.pdfjsLib;
    }
    // pdfjs-dist 4.x ESM — load via import() as fallback
    let pdfjsLib=window.pdfjsLib;
    if(!pdfjsLib){
      const mod=await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs');
      pdfjsLib=mod;
    }
    if(pdfjsLib.GlobalWorkerOptions) pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';
    const ab=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:ab}).promise;
    let html='';
    for(let i=1;i<=pdf.numPages;i++){
      const page=await pdf.getPage(i);
      const tc=await page.getTextContent();
      const lines=tc.items.map(it=>it.str).join(' ').trim();
      if(lines) html+=`<p>${lines.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</p>\n`;
    }
    $('ti_body').value=html||'';
    $('ti_warn').innerHTML='<i class="fa-solid fa-triangle-exclamation"></i> Extraction PDF : la mise en page complexe peut nécessiter des corrections manuelles. Utilisez <b>.docx</b> pour un meilleur résultat.';
    $('ti_warn').style.display='block';
    $('ti_name').value=$('ti_name').value||file.name.replace(/\.pdf$/i,'');
    $('ti_fields').style.display='block';
    $('ti_save').disabled=false;
  }catch(e){
    $('ti_warn').textContent='Erreur de lecture PDF : '+(e.message||e)+'. Préférez le format .docx.';
    $('ti_warn').style.display='block';
  }
}

function buildContractContext(emp, hotel, fields){
  const fmt = v => v ? new Date(v).toLocaleDateString('fr-FR') : '';
  return {
    employee_first_name: emp.first_name||'',
    employee_last_name : emp.last_name||'',
    employee_full_name : `${emp.first_name||''} ${emp.last_name||''}`.trim(),
    birth_date         : fmt(emp.birth_date),
    birth_place        : emp.birth_place||'',
    nationality        : emp.nationality||'',
    social_security_number  : emp.social_security_number||'',
    residency_permit_number : emp.residency_permit_number||'',
    address            : emp.address||'',
    phone              : emp.phone||'',
    email              : emp.email||'',
    job_title          : emp.role||'',
    department         : emp.department||'',
    contract_type      : fields.contract_type||emp.contract_type||'',
    contract_start_date: fmt(fields.contract_start_date),
    contract_end_date  : fmt(fields.contract_end_date),
    trial_period       : fields.trial_period||'',
    weekly_hours       : fields.weekly_hours||'',
    salary             : fields.salary||'',
    work_location      : fields.work_location||'',
    manager_name       : fields.manager_name||'',
    collective_agreement : fields.collective_agreement||'',
    hotel_name         : hotel?.name||'',
    hotel_address      : hotel?.city||'',
    today              : new Date().toLocaleDateString('fr-FR'),
  };
}
function substituteVariables(html, ctx){
  return html.replace(/\{\{(\w+)\}\}/g, (m,k)=> ctx[k] !== undefined ? String(ctx[k]) : `<span style="background:#fef3c7;color:#92400e;padding:0 4px;border-radius:3px">${m}</span>`);
}

async function drawGenStep4(){
  const emp = staff.find(s=>s.id===genState.employee_id);
  const hotel = hotels.find(h=>h.id===hotelId);
  const all = await BE.listTemplates(hotelId);
  const tpl = all.find(t=>t.id===genState.template_id);
  if(!emp||!tpl){flash('Données manquantes');closeModal();return;}
  const ctx = buildContractContext(emp, hotel, {...genState.fields, contract_type: tpl.contract_type});
  const rendered = substituteVariables(tpl.body_html, ctx);
  $('genBody').innerHTML=`
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Aperçu — vérifiez les variables avant de générer le PDF.</div>
    <div id="genPreview" style="border:1px solid var(--line);border-radius:10px;padding:24px;max-height:55vh;overflow-y:auto;background:#fff;font-family:'Times New Roman',serif;font-size:13px;line-height:1.5;color:#222">${rendered}</div>

      <button class="btn g" id="gBack"><i class="fa-solid fa-arrow-left"></i> Retour</button>

        <button class="btn p" id="gGen"><i class="fa-solid fa-file-pdf"></i> Générer le PDF</button>
      </div>
    </div>`;

  $('gGen').onclick=async()=>{
    const btn=$('gGen'); btn.disabled=true; btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Génération…';
    try{
      const pdfBlob = await renderHtmlToPdfBlob(rendered, `Contrat - ${emp.first_name} ${emp.last_name}`);
      const filename = `contrat_${(emp.last_name||'').toLowerCase()}_${(emp.first_name||'').toLowerCase()}_${new Date().toISOString().slice(0,10)}.pdf`;
      const file = new File([pdfBlob], filename, {type:'application/pdf'});
      // 1. Sauvegarder dans Storage + employee_documents (type 'contrat')
      const opts = {issued_at:new Date().toISOString().slice(0,10), notes:`Généré depuis modèle ${tpl.name} v${tpl.version}`};
      await BE.uploadEmployeeDocument(hotelId, emp.id, 'contrat', file, opts);
      await BE.logAudit('contract_generate','employee_contract', tpl.id, emp.id, {template:tpl.name, version:tpl.version, contract_type:tpl.contract_type});
      // 2. Télécharger pour l'utilisateur
      const url = URL.createObjectURL(pdfBlob); const a=document.createElement('a'); a.href=url; a.download=filename; a.click(); URL.revokeObjectURL(url);
      closeModal(); flash('Contrat généré et stocké dans la fiche');
    }catch(e){flash('Erreur génération : '+(e.message||e)); btn.disabled=false; btn.innerHTML='<i class="fa-solid fa-file-pdf"></i> Générer le PDF';}
  };
}

async function renderHtmlToPdfBlob(html, title){
  if(!(window.jspdf && window.jspdf.jsPDF)){
    await loadScript('https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js');
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({orientation:'portrait', unit:'mm', format:'a4'});
  // Conteneur invisible pour mesurer + rendu
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:-9999px;top:0;width:170mm;padding:20px;font-family:"Times New Roman",serif;font-size:11pt;line-height:1.45;color:#000;background:#fff';
  wrap.innerHTML = `<div style="margin-bottom:10mm;font-size:9pt;color:#999;text-align:right">${title}</div>${html}`;
  document.body.appendChild(wrap);
  try{
    await doc.html(wrap, {x:15, y:15, width:180, windowWidth:wrap.scrollWidth, autoPaging:'text'});
  }finally{ document.body.removeChild(wrap); }
  return doc.output('blob');
}

    $('depList').querySelectorAll('[data-deldep]').forEach(b=>b.onclick=async()=>{if(!confirm('Supprimer ce service ?'))return;
      try{await BE.deleteDepartment(b.dataset.deldep);deps=deps.filter(x=>x.id!==b.dataset.deldep);drawDeps();}catch(e){flash('Erreur : '+e.message);}});};
