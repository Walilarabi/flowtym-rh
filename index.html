async function drawPayroll(){
  const el=$('pyTable'); if(!el)return;
  el.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted)">Chargement…</div>';
  const [y,m]=pyMonth.split('-').map(Number);
  const from=iso(y,m,1), to=iso(y,m,dim(y,m));
  try{
    const [planRows, clockRows]=await Promise.all([
      BE.listMonthPlanning(hotelId,y,m),
      BE.listClockingsByRange(hotelId,from,to)
    ]);
    const active=staff.filter(s=>s.active!==false);
    const planMap=new Map(); planRows.forEach(r=>planMap.set(r.employee_id+'|'+r.day, r.status));
    const clockMap=new Map(); clockRows.forEach(c=>{if(!clockMap.has(c.employee_id))clockMap.set(c.employee_id,[]);clockMap.get(c.employee_id).push(c);});
    const nd=dim(y,m);
    const rows=active.map(emp=>{
      let P=0,PE=0,CP=0,RTT=0,MAL=0,MAT=0,CSS=0,AE=0,F=0,PAT=0,ABS=0,REC=0,FORM=0,repos=0;
      for(let d=1;d<=nd;d++){
        const st=planMap.get(emp.id+'|'+iso(y,m,d))||'';
        if(!st){repos++;continue;}
        if(st==='P') P++;
        else if(st==='PE') PE++;
        else if(st==='CP') CP++;
        else if(st==='RTT') RTT++;
        else if(st==='MAL') MAL++;
        else if(st==='MAT') MAT++;
        else if(st==='CSS') CSS++;
        else if(st==='AE') AE++;
        else if(st==='F') F++;
        else if(st==='PAT') PAT++;
        else if(st==='ABS') ABS++;
        else if(st==='REC') REC++;
        else if(st==='FORM') FORM++;
      }
      const cks=clockMap.get(emp.id)||[];
      let totalMin=0;
      cks.forEach(c=>{if(c.clock_out_ts) totalMin+=minutesBetween(c.clock_in_ts,c.clock_out_ts)-(c.break_minutes||0);});
      const totalH=Math.round(totalMin/60*100)/100;
      const sc2=schedules.find(s=>s.id===emp.schedule_id);
      const hpd2=sc2?.hours_per_day??7;
      const plannedH=Math.round((P+PE)*hpd2*100)/100;
      const heuresSup=Math.max(0,Math.round((totalH-plannedH)*100)/100);
      return {emp,P,PE,CP,RTT,MAL,MAT,CSS,AE,F,PAT,ABS,REC,FORM,repos,totalH,plannedH,heuresSup,hpd:hpd2,scheduleName:sc2?.name};
    });
    window._pyRows=rows;
    // KPIs
    const kpiEl=$('pyKpis');
    if(kpiEl){
      const totP=rows.reduce((s,r)=>s+r.P+r.PE,0);
      const totCP=rows.reduce((s,r)=>s+r.CP,0);
      const totRTT=rows.reduce((s,r)=>s+r.RTT,0);
      const totSup=rows.reduce((s,r)=>s+r.heuresSup,0);
      kpiEl.innerHTML=[
        {icon:'fa-calendar-check',label:'Jours travaillés (P+PE)',val:totP},
        {icon:'fa-umbrella-beach',label:'Congés payés (CP)',val:totCP},
        {icon:'fa-couch',label:'RTT',val:totRTT},
        {icon:'fa-plus-circle',label:'Heures supplémentaires',val:Math.round(totSup*100)/100+'h'},
      ].map(k=>`<div class="kc"><div class="kv">${k.val}</div><div class="kl"><i class="fa-solid ${k.icon}"></i> ${k.label}</div></div>`).join('');
    }
    el.innerHTML=`<table class="rtable">
      <thead><tr>
        <th>Collaborateur</th><th>Service</th><th>Contrat</th>
        <th title="Présent" style="text-align:center">P</th>
        <th title="Présence Extra" style="text-align:center">PE</th>
        <th title="Congé payé" style="text-align:center">CP</th>
        <th title="RTT" style="text-align:center">RTT</th>
        <th title="Maladie" style="text-align:center">MAL</th>
        <th title="Maternité" style="text-align:center">MAT</th>
        <th title="Autres abs." style="text-align:center">Abs.</th>
        <th title="Fériés" style="text-align:center">F</th>
        <th style="text-align:right">Planifié (h)</th>
        <th style="text-align:right">Pointé (h)</th>
        <th style="text-align:right;color:#f59e0b">H. Sup.</th>
      </tr></thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td><b>${r.emp.last_name} ${r.emp.first_name}</b></td>
          <td>${r.emp.department||'—'}</td>
          <td style="color:var(--muted)">${r.emp.contract_type||'—'}</td>
          <td style="text-align:center;font-weight:600">${r.P||'—'}</td>
          <td style="text-align:center;color:#E65100">${r.PE||'—'}</td>
          <td style="text-align:center;color:#0F5132">${r.CP||'—'}</td>
          <td style="text-align:center;color:#1e40af">${r.RTT||'—'}</td>
          <td style="text-align:center;color:#9d174d">${r.MAL||'—'}</td>
          <td style="text-align:center;color:#7c3aed">${r.MAT||'—'}</td>
          <td style="text-align:center;color:#dc2626">${(r.CSS+r.AE+r.PAT+r.ABS+r.REC+r.FORM)||'—'}</td>
          <td style="text-align:center;color:var(--muted)">${r.F||'—'}</td>
          <td style="text-align:right">${r.plannedH}h</td>
          <td style="text-align:right">${r.totalH>0?r.totalH+'h':'—'}</td>

        </tr>`).join('')}
      </tbody>
    </table>`;
  }catch(e){el.innerHTML=`<div style="padding:24px;color:#dc2626">${e.message}</div>`;}
}

async function loadPortalInbox(statusFilter,typeFilter){
  const list=$('piList'); if(!list) return;

  let q=BE.db.from('portal_requests')
    .select('id,type,date_start,date_end,message,status,manager_comment,created_at,employee:employees(first_name,last_name,role,department)')
    .eq('hotel_id',hotelId).order('created_at',{ascending:false}).limit(200);
  if(statusFilter) q=q.eq('status',statusFilter);
  if(typeFilter)   q=q.eq('type',typeFilter);
  const {data,error}=await q;
  if(error){list.innerHTML=`<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>${error.message}</p></div>`;return;}
  const rows=data||[];
  const cEl=$('piCount'); if(cEl) cEl.textContent=`${rows.length} demande${rows.length!==1?'s':''}`;
  if(!rows.length){list.innerHTML='<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>Aucune demande</p></div>';return;}

    const emp=r.employee||{};

    const col=REQ_STATUS_COLORS[r.status]||'#9ca3af';

    return `<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="openPortalRequest('${r.id}')">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">

          <div style="font-weight:600;font-size:15px">${esc(name)}</div>
          <div style="font-size:12px;color:var(--ink2)">${esc(emp.role||'')}${emp.department?' · '+esc(emp.department):''}</div>

        <div style="text-align:right">
          <span style="background:${col}22;color:${col};font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px">${REQ_STATUS_LABELS[r.status]||r.status}</span>
        </div>

    </div>`;
  }).join('');
}

function fmtDate(d){if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}

async function openPortalRequest(id){
  const {data:r,error}=await BE.db.from('portal_requests')
    .select('*,employee:employees(id,first_name,last_name,role,department)')
    .eq('id',id).single();
  if(error||!r){flash('Impossible de charger la demande');return;}
  const emp=r.employee||{};
  const name=`${emp.first_name||''} ${emp.last_name||''}`.trim()||'—';
  const col=REQ_STATUS_COLORS[r.status]||'#9ca3af';
  const dates=r.date_end&&r.date_end!==r.date_start?`${fmtDate(r.date_start)} → ${fmtDate(r.date_end)}`:fmtDate(r.date_start);
  const canAct=r.status==='pending';
  showModal(`
    <div style="padding:24px;min-width:320px;max-width:560px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <div style="flex:1">
          <div style="font-size:18px;font-weight:700">${esc(name)}</div>
          <div style="font-size:13px;color:var(--ink2)">${esc(emp.role||'')}${emp.department?' · '+esc(emp.department):''}</div>
        </div>
        <span style="background:${col}22;color:${col};font-size:13px;font-weight:600;padding:4px 12px;border-radius:20px">${REQ_STATUS_LABELS[r.status]||r.status}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div><div style="font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px">Type</div><div style="font-weight:600">${REQ_TYPE_LABELS[r.type]||r.type}</div></div>
        <div><div style="font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px">Dates</div><div style="font-weight:600">${dates}</div></div>
        <div><div style="font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px">Soumis le</div><div>${new Date(r.created_at).toLocaleDateString('fr-FR')}</div></div>
        ${r.attachment_url?`<div><div style="font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px">Justificatif</div><div><a href="${esc(r.attachment_url)}" target="_blank" style="color:var(--violet)">Voir le fichier</a></div></div>`:''}
      </div>
      ${r.message?`<div style="margin-bottom:16px"><div style="font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Message du salarié</div><div style="background:var(--bg2);padding:12px;border-radius:8px;font-size:13px;white-space:pre-wrap">${esc(r.message)}</div></div>`:''}
      ${canAct?`
      <div style="margin-bottom:16px">
        <label style="font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px">Commentaire (optionnel)</label>
        <textarea id="piComment" class="input" style="width:100%;height:80px;resize:vertical" placeholder="Motif de décision, informations complémentaires…"></textarea>
      </div>
      <div style="display:flex;gap:12px">
        <button class="btn p" style="flex:1" onclick="decidePortalRequest('${id}','approved')"><i class="fa-solid fa-check"></i> Approuver</button>
        <button class="btn" style="flex:1;background:#fee2e2;color:#dc2626;border-color:#fca5a5" onclick="decidePortalRequest('${id}','rejected')"><i class="fa-solid fa-xmark"></i> Refuser</button>
        <button class="btn g" onclick="closeModal()">Annuler</button>
      </div>
      `:`<div style="text-align:center;padding:12px 0"><button class="btn g" onclick="closeModal()">Fermer</button></div>`}
    </div>`);
}

async function decidePortalRequest(id,decision){
  const comment=$('piComment')?.value.trim()||null;
  const {error}=await BE.db.from('portal_requests').update({
    status:decision,
    manager_comment:comment,
    decided_at:new Date().toISOString()
  }).eq('id',id).eq('hotel_id',hotelId);
  if(error){flash('Erreur: '+error.message);return;}
  closeModal();
  flash(decision==='approved'?'Demande approuvée ✓':'Demande refusée');
  await loadPortalInbox($('piFilterStatus')?.value||'',$('piFilterType')?.value||'');
}

  const enabled=s.portal_enabled||false;
  if(badge) badge.innerHTML=enabled
    ?`<span style="font-size:10.5px;background:#f0fdf4;color:#16a34a;padding:2px 8px;border-radius:6px;font-weight:600"><i class="fa-solid fa-check"></i> Activé</span>`
    :`<span style="font-size:10.5px;background:#fef9c3;color:#854d0e;padding:2px 8px;border-radius:6px;font-weight:600">Non activé</span>`;

  if(enabled){
    el.innerHTML=`<div style="font-size:12.5px;color:var(--ink2);margin-bottom:10px">Le salarié a accès à son espace en ligne.</div>
      <button class="btn g" style="width:100%;margin-bottom:8px;justify-content:center;font-size:12px" onclick="reinvitePortal('${s.id}','${(s.email||'').replace(/'/g,"\\'")}')">
        <i class="fa-solid fa-envelope-circle-check"></i> Renvoyer l'invitation

      </button>`;
  } else {

      ${s.email?'Invitez ce salarié à accéder à son espace : planning, pointage, coffre-fort, demandes.':'<span style="color:var(--red)"><i class="fa-solid fa-triangle-exclamation"></i> Email requis pour activer le portail.</span>'}
    </div>
    ${s.email?`<button class="btn p" style="width:100%;justify-content:center;font-size:12px" onclick="invitePortal('${s.id}','${(s.email||'').replace(/'/g,"\\'")}')">

function staffObj(id){ return staff.find(x=>x.id===id); }

async function invitePortal(eid, email){
  if(!email){flash('Email manquant sur la fiche — ajoutez-le d\'abord.');return;}
  if(!confirm(`Envoyer une invitation portail salarié à ${email} ?`)) return;
  const s=staff.find(x=>x.id===eid);
  if(!s){flash('Salarié introuvable');return;}
  const full_name=((s.first_name||'')+' '+(s.last_name||'')).trim();
  try{
    // Appel de l'edge function invite-user (service_role côté serveur)
    // access_type='salarie' → invitation email, lien portal_auth_id, SANS user_hotels
    // Normaliser le rôle : la DB peut stocker le libellé ("Femme de chambre") ou la clé ("femme_de_chambre")
    const VALID_ROLE_KEYS = Object.keys(ROLE_LABELS);
    const roleLabel2Key = Object.fromEntries(Object.entries(ROLE_LABELS).map(([k,v])=>[v.toLowerCase(),k]));
    const rawRole = (s.role||'').trim();
    const normalizedRole = VALID_ROLE_KEYS.includes(rawRole)
      ? rawRole
      : (roleLabel2Key[rawRole.toLowerCase()] || 'reception');
    const result = await BE.inviteUser(hotelId, email, full_name, normalizedRole, 'salarie', eid);
    if(s){s.portal_enabled=true;loadPortalSection(s);}
    // Afficher le lien direct si disponible (fallback email non reçu)
    if(result?.direct_link){
      openModal(`<div class="modal-title"><i class="fa-solid fa-link"></i> Invitation envoyée</div>
        <p style="font-size:13px;color:var(--ink2);margin-bottom:12px">
          Email envoyé à <b>${esc(email)}</b>. Si le salarié ne reçoit pas l'email (vérifier les spams), partagez ce lien directement :</p>
        <div style="background:#f4f4f7;border:1px solid var(--line);border-radius:8px;padding:10px 12px;word-break:break-all;font-size:11.5px;font-family:monospace;margin-bottom:12px">${esc(result.direct_link)}</div>
        <button class="btn p" style="width:100%;justify-content:center" onclick="navigator.clipboard.writeText(${JSON.stringify(result.direct_link)}).then(()=>flash('Lien copié ✓'));closeModal(null)">
          <i class="fa-solid fa-copy"></i> Copier le lien
        </button>`);
    } else {
      flash('Invitation portail envoyée à '+email+' ✓');
    }
  }catch(e){
    flash('Erreur invitation portail : '+(e.message||e));
  }
}

async function reinvitePortal(eid, email){
  if(!email){flash('Email manquant');return;}
  await invitePortal(eid, email);
}

async function disablePortal(eid){
  if(!confirm('Désactiver l\'accès portail de ce salarié ?')) return;
  try{
    const {error}=await BE.sb.from('employees').update({portal_enabled:false,portal_auth_id:null}).eq('id',eid);
    if(error) throw error;
    flash('Accès portail désactivé');
    const s=staff.find(x=>x.id===eid); if(s){s.portal_enabled=false;loadPortalSection(s);}
  }catch(e){flash('Erreur : '+e.message);}
}

    </div>
    ${full?`<div class="sec"><h4>État civil <span style="font-size:10.5px;color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0;margin-left:6px">— RGPD sensible</span></h4>
      <div class="fr"><span class="k">Date de naissance</span><span class="v">${s.birth_date||'—'}</span></div>
      <div class="fr"><span class="k">Lieu de naissance</span><span class="v">${s.birth_place||'—'}</span></div>
      <div class="fr"><span class="k">Nationalité</span><span class="v">${s.nationality||'—'}</span></div>
      <div class="fr"><span class="k">N° sécu sociale</span><span class="v" style="font-family:'SFMono-Regular',monospace;font-size:12px">${s.social_security_number||'—'}</span></div>
      ${s.residency_permit_number?`<div class="fr"><span class="k">Titre de séjour</span><span class="v">${s.residency_permit_number}${s.residency_permit_expires?` (exp. ${s.residency_permit_expires})`:''}</span></div>`:''}

    ${full?'<div class="sec"><h4>Documents RH <button class="btn p" data-upload style="float:right;padding:5px 10px;font-size:11.5px"><i class="fa-solid fa-upload"></i> Ajouter</button></h4><div id="docs">Chargement…</div></div>':''}

    ficheAv.ondragover=e=>{e.preventDefault();ficheAv.classList.add('drag-over');};
    ficheAv.ondragleave=()=>ficheAv.classList.remove('drag-over');
    ficheAv.ondrop=e=>{e.preventDefault();ficheAv.classList.remove('drag-over');applyPhoto(e.dataTransfer.files[0]);};

    await BE.updateEmployee(s.id, {active:false, departure_date:date});
    s.active=false; s.departure_date=date;

  const rc=$('drawer').querySelector('[data-react]');

    await BE.updateEmployee(s.id, {active:true, departure_date:null});

    closeFiche(); render(); flash('Collaborateur réactivé');};
  if(!full) return;
  $('drawer').querySelector('[data-upload]').onclick=()=>openDocUploadForm(s);

}

async function drawEmployeeDocs(s){
  const list = await BE.listDocumentsForEmployee(hotelId, s.id);
  if(!list.length){$('docs').innerHTML='<div style="padding:14px;color:var(--muted);font-size:12.5px;font-style:italic">Aucun document. Cliquez sur Ajouter pour téléverser un fichier (CNI, RIB, contrat signé, etc.).</div>';return;}
  const today = new Date();
  const items = list.sort((a,b)=>{const dt=DOC_TYPES.findIndex(x=>x[0]===a.doc_type)-DOC_TYPES.findIndex(x=>x[0]===b.doc_type);return dt;}).map(d=>{
    const dt = DOC_TYPES.find(x=>x[0]===d.doc_type) || ['autre','Autre','other',false];
    const [code,label,category]=dt;
    let status='valid', statusLabel='Valide';
    if(d.status==='missing'){status='missing';statusLabel='Manquant';}
    else if(d.expires_at){
      const exp=new Date(d.expires_at);
      const diff=Math.round((exp-today)/86400000);
      if(diff<0){status='expired';statusLabel=`Expiré ${-diff} j`;}
      else if(diff<30){status='expiring_soon';statusLabel=`Expire dans ${diff} j`;}
    }
    if(d.status==='pending'){status='pending';statusLabel='À vérifier';}
    return `<div class="docitem" data-did="${d.id}" data-doctype="${code}">
      <div class="ic ${category}"><i class="fa-solid fa-file-lines"></i></div>
      <div style="flex:1;min-width:0">
        <div class="nm">${label}</div>
        <div class="meta">
          ${d.file_size?`${(d.file_size/1024).toFixed(0)} ko · `:''}
          ${d.issued_at?`émis ${d.issued_at}`:''}${d.expires_at?` · expire ${d.expires_at}`:''}
          ${d.notes?` · <i>${d.notes}</i>`:''}
        </div>
      </div>
      <span class="badge-st ${status}">${statusLabel}</span>
      <div class="acts">
        ${d.status==='pending'?'<button data-act="approve" title="Valider ce document" style="color:#16a34a;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;cursor:pointer">✓ Valider</button><button data-act="reject" title="Refuser ce document" style="color:#dc2626;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:600;cursor:pointer">✗ Refuser</button>':''}
        ${d.file_path?'<button data-act="dl" title="Télécharger"><i class="fa-solid fa-download"></i></button>':''}
        ${d.file_path&&d.signature_status==='none'?'<button data-act="sign" title="Envoyer pour signature électronique" style="color:#7c3aed"><i class="fa-solid fa-pen-nib"></i></button>':''}
        ${d.signature_status==='pending'?'<span title="En attente de signature" style="font-size:11px;color:#d97706;font-weight:600;padding:2px 6px;background:#fffbeb;border-radius:6px">⏳ Signature</span>':''}
        ${d.signature_status==='signed'?'<span title="Signé électroniquement" style="font-size:11px;color:#16a34a;font-weight:600;padding:2px 6px;background:#f0fdf4;border-radius:6px">✅ Signé</span>':''}
        <button data-act="del" class="del" title="Supprimer"><i class="fa-solid fa-trash"></i></button>
      </div>
    </div>`;
  }).join('');
  $('docs').innerHTML=items;
  $('docs').querySelectorAll('.docitem').forEach(it=>{
    const did=it.dataset.did; const d=list.find(x=>x.id===did);
    it.querySelectorAll('button[data-act]').forEach(b=>b.onclick=async ev=>{ev.stopPropagation();const act=b.dataset.act;
      if(act==='approve'){
        if(!confirm('Valider ce document ?'))return;
        try{
          await BE.setDocument(hotelId,s.id,d.doc_type,'provided');
          await BE.logAudit('document_approve','employee_document',d.id,s.id,{doc_type:d.doc_type});
          flash('Document validé');drawEmployeeDocs(s);
          // Mettre à jour la matrice Documents RH si ouverte
          if(_dxData[s.id]) {_dxData[s.id][d.doc_type]={status:'provided',expires_at:d.expires_at,file_path:d.file_path}; if(typeof _dxRender==='function') try{_dxRender();}catch(ex){} }
        }catch(e){flash('Erreur : '+e.message);}
      }else if(act==='reject'){
        const reason=prompt('Motif de refus (optionnel) :','');
        if(reason===null)return;
        try{
          await BE.setDocument(hotelId,s.id,d.doc_type,'missing');
          if(reason) await BE.sendPortalMessage(hotelId,s.id,`Votre document "${d.doc_type}" a été refusé.${reason?' Motif : '+reason:''} Merci de le déposer à nouveau depuis votre portail.`).catch(()=>{});
          await BE.logAudit('document_reject','employee_document',d.id,s.id,{doc_type:d.doc_type,reason});
          flash('Document refusé');drawEmployeeDocs(s);
          if(_dxData[s.id]) {_dxData[s.id][d.doc_type]={status:'missing',expires_at:null,file_path:null}; if(typeof _dxRender==='function') try{_dxRender();}catch(ex){} }
        }catch(e){flash('Erreur : '+e.message);}
      }else if(act==='dl'){
        try{const url=await BE.getSignedDocUrl(d.file_path);await BE.logAudit('document_download','employee_document',d.id,s.id,{doc_type:d.doc_type});window.open(url,'_blank');}
        catch(e){flash('Erreur : '+(e.message||e));}
      }else if(act==='sign'){
        openSignatureModal(s,d);
      }else if(act==='del'){
        if(!confirm('Supprimer ce document ?'))return;
        try{await BE.deleteEmployeeDocument(d.id);await BE.logAudit('document_delete','employee_document',d.id,s.id,{doc_type:d.doc_type});flash('Document supprimé');drawEmployeeDocs(s);}
        catch(e){flash('Erreur : '+(e.message||e));}
      }
    });
  });
}

async function submitSignatureRequest(employeeId, documentId){
  const fn=$('sig_fn')?.value.trim(), ln=$('sig_ln')?.value.trim();
  const email=$('sig_email')?.value.trim(), phone=$('sig_phone')?.value.trim();
  if(!fn||!ln||!email){flash('Prénom, nom et email sont requis');return;}
  const s=staff.find(x=>x.id===employeeId); if(!s) return;
  const btn=$('sigSendBtn'); if(btn) btn.disabled=true;
  const prog=$('sigProgress'); if(prog){prog.style.display='';prog.textContent='Envoi en cours…';}
  try{
    const {data:{session}}=await BE.sb.auth.getSession();
    const resp=await fetch(`${SUPABASE_FUNCTIONS_URL}/yousign-create`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${session?.access_token}`,'Content-Type':'application/json'},
      body:JSON.stringify({
        document_id:documentId, employee_id:employeeId, hotel_id:hotelId,
        signer_first_name:fn, signer_name:ln, signer_email:email,
        signer_phone:phone||null,
      }),
    });
    const result=await resp.json();
    if(!resp.ok||result.error) throw new Error(result.error||'Erreur inconnue');
    closeModal();
    flash('✅ Demande de signature envoyée — le salarié peut signer depuis son portail');
    // Rafraîchir la liste des documents
    const sObj=staff.find(x=>x.id===employeeId);
    if(sObj) await drawEmployeeDocs(sObj);
  }catch(e){
    if(prog){prog.style.color='#dc2626';prog.textContent='Erreur : '+e.message;}
    if(btn) btn.disabled=false;
  }
}

      }
      if(wp.pattern_type==='rotating_cycle'){
        if(wp.cycle_start_date) $('ewpCycleStart').value=wp.cycle_start_date;
        if(wp.cycle_length_days) $('ewpCycleLen').value=wp.cycle_length_days;
        buildCycleDaysGrid(wp.cycle_length_days||14, wp.cycle_days||[]);
      }
      // Stocker dans l'objet pour algo auto-remplissage
      Object.assign(s,{work_pattern_type:wp.pattern_type,fixed_days_off:wp.fixed_days_off,cycle_start_date:wp.cycle_start_date,cycle_length_days:wp.cycle_length_days,cycle_days:wp.cycle_days});
    }).catch(()=>{});
  }

// Constantes codes protégés (ne jamais écraser)
const PROTECTED_CODES = new Set(['CP','RTT','MAL','MAT','CSS','AE','F','PAT','ABS','REC','FORM']);

function buildCycleDaysGrid(len, existing){
  const el=$('ewpCycleDays'); if(!el)return;
  const n=parseInt(len)||14;
  el.style.gridTemplateColumns=`repeat(${Math.min(n,7)},1fr)`;
  const existMap=Object.fromEntries((existing||[]).map(d=>[d.day,d.status]));
  el.innerHTML=Array.from({length:n},(_,i)=>{
    const day=i+1;
    const st=existMap[day]||'work';
    return `<div data-cday="${day}" data-status="${st}"

  }).join('');
}

function toggleCycleDay(el){

}

// ─── SOURCE DE VÉRITÉ UNIQUE pour toutes les opérations de date-cycle ──────────
//
// Principe : les dates voyagent TOUJOURS comme des strings 'YYYY-MM-DD'.
// Toute arithmétique utilise exclusivement les méthodes UTC de Date (getUTC*/setUTC*).
// new Date('YYYY-MM-DD') est parsé en UTC midnight par le standard ECMAScript.
// Aucune variable locale (T00:00:00, getDate, getMonth…) ne touche au chemin de cycle.
//
// Les seules fonctions qui font de l'arithmétique de date :
//   addDays(str, n) → str         (avancer de n jours)
//   dateDiffDays(a, b) → int      (différence en jours entiers)
//   dateStrRange(from, to) → str[] (liste de toutes les dates de la période)
//   weekdayOf(str) → 0-6          (0=dim, UTC-safe)
// ─────────────────────────────────────────────────────────────────────────────

function addDays(dateStr, n){
  // Parse en UTC midnight, ajoute n*86400s, retourne la date UTC résultante
  const ms=new Date(dateStr).getTime()+n*86400000;
  return new Date(ms).toISOString().slice(0,10);
}

function dateDiffDays(startStr, endStr){
  // Différence exacte en jours entiers, immune timezone et DST
  return Math.round((new Date(endStr).getTime()-new Date(startStr).getTime())/86400000);
}

function dateStrRange(fromStr, toStr){
  // Retourne toutes les dates YYYY-MM-DD de fromStr à toStr inclus
  const result=[];
  let cur=fromStr;
  while(cur<=toStr){ result.push(cur); cur=addDays(cur,1); }
  return result;
}

function weekdayOf(dateStr){
  // Jour de la semaine 0=dim, 1=lun … 6=sam — basé UTC, pas de conversion locale
  return new Date(dateStr).getUTCDay();
}

// Formate une Date locale en 'YYYY-MM-DD' — UNIQUEMENT pour les cas où l'on
// veut la date locale (affichage "aujourd'hui", labels). PAS pour le cycle.
function localIso(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

// ─── CALCUL DU CODE CYCLE ────────────────────────────────────────────────────
//
// Signature : computeCodeForDate(emp, dateStr, pattern)
//   dateStr : 'YYYY-MM-DD'  ← toujours une string, jamais un Date object
//   Retourne : {code: 'P'|'', reason: string} | null
//
// null = pas de règle applicable (avant le début du cycle, pattern invalide…)
// ''   = repos
// 'P'  = présent / travail
//
function computeCodeForDate(emp, dateStr, pattern){
  if(!pattern||pattern.pattern_type==='manual') return null;

  if(pattern.pattern_type==='fixed_days_off'){
    const wd=weekdayOf(dateStr); // 0=dim, 100% UTC, pas de local
    const fdo=pattern.fixed_days_off||[];
    return fdo.includes(wd)?{code:'',reason:'Repos fixe'}:{code:'P',reason:'Jour travaillé'};
  }

  if(pattern.pattern_type==='rotating_cycle'){
    if(!pattern.cycle_start_date||!pattern.cycle_length_days||!pattern.cycle_days?.length) return null;
    const diffDays=dateDiffDays(pattern.cycle_start_date, dateStr);
    if(diffDays<0) return null;                         // avant le début du cycle
    const idx=diffDays % pattern.cycle_length_days;     // idx 0-based → J(idx+1)
    const entry=(pattern.cycle_days||[]).find(e=>+e.day===(idx+1));
    if(!entry) return null;
    return entry.status==='work'
      ?{code:'P',  reason:`Cycle J${idx+1} travail`}
      :{code:'',   reason:`Cycle J${idx+1} repos`};
  }

  return null;
}

async function computeAutoFill(){
  const scope=$('afScope').value;
  const fromStr=$('afFrom').value;
  const toStr=$('afTo').value;
  const safeOnly=$('afSafe').checked;
  const protectAbs=$('afProtect').checked;
  if(!fromStr||!toStr){throw new Error('Dates de période requises');}
  if(fromStr>toStr){throw new Error('Date de fin avant date de début');}

  // Sélectionner les employés
  let targetEmps=visibleRows;
  if(scope==='dept'){
    const dept=$('afDept').value;
    if(!dept){throw new Error('Sélectionnez un service');}
    targetEmps=visibleRows.filter(s=>(s.department||'Sans service')===dept);
  } else if(scope==='emp'){
    const eid=$('afEmp').value;
    targetEmps=visibleRows.filter(s=>s.id===eid);
  }

  // Charger les planning existants sur toute la période (mois par mois, UTC-safe)
  const months=new Set();
  {
    let cur2=fromStr;
    while(cur2<=toStr){
      const [y2,m2]=cur2.split('-').map(Number);
      months.add(y2+'-'+(m2-1)); // m2-1 = index JS
      // avancer au premier jour du mois suivant
      const nm=m2===12?`${y2+1}-01-01`:`${y2}-${String(m2+1).padStart(2,'0')}-01`;
      cur2=nm;
    }
  }
  const existingRows=[];
  for(const mk of months){
    const [y,m]=mk.split('-').map(Number);
    const rows=await BE.listMonthPlanning(hotelId,y,m).catch(()=>[]);
    existingRows.push(...rows);
  }
  const existMap=new Map(existingRows.map(r=>[r.employee_id+'|'+r.day,r.status||'']));

  // Charger les patterns
  const patternMap={};
  await Promise.all(targetEmps.map(async emp=>{
    patternMap[emp.id]=await BE.listWorkPattern(hotelId,emp.id).catch(()=>null);
  }));

  const toCreate=[];
  const skipped=[];
  const protected_=[];
  const noRule=[];
  const conflicts=[];

  // Itérer sur chaque (employé, date)
  for(const emp of targetEmps){
    const pat=patternMap[emp.id];
    if(!pat||pat.pattern_type==='manual'){
      noRule.push({emp,reason:'Mode manuel / aucune règle'});
      continue;
    }
    if(pat.pattern_type==='rotating_cycle'&&(!pat.cycle_start_date||!pat.cycle_length_days||!pat.cycle_days?.length)){
      noRule.push({emp,reason:'Cycle incomplet (manque date de départ ou jours)'});
      continue;
    }

    for(const ds of dateStrRange(fromStr,toStr)){
      const key=emp.id+'|'+ds;
      const existing=existMap.get(key);

      // Protéger les absences/congés
      if(protectAbs&&existing!==undefined&&PROTECTED_CODES.has(existing)){
        protected_.push({emp,date:ds,existing,reason:'Absence/congé protégé'});
        continue;
      }

      // Mode sécurisé : ne toucher que les vides
      if(safeOnly&&existing!==undefined&&existing!==''){
        skipped.push({emp,date:ds,existing,reason:'Cellule déjà renseignée'});
        continue;
      }

      const result=computeCodeForDate(emp, ds, pat); // passe la string, pas un Date
      if(result===null){
        // Avant le cycle — ignorer silencieusement
        continue;
      }

      toCreate.push({hotel_id:hotelId,employee_id:emp.id,day:ds,status:result.code,duration:result.code==='P'?1:null,reason:result.reason,old_value:existing||''});
    }
  }

  return {toCreate,skipped,protected_,noRule,conflicts,targetEmps,patternMap,fromStr,toStr};
}

function renderAutoFillSummary(r){
  const workCount=r.toCreate.filter(x=>x.status==='P').length;
  const offCount=r.toCreate.filter(x=>x.status==='').length;
  const noRuleNames=[...new Set(r.noRule.map(x=>`${x.emp.last_name} ${x.emp.first_name}`))];

async function applyAutoFill(r){
  if(!r.toCreate.length) return;
  // Sauvegarder le planning
  // Repos = cellule vide = pas de ligne en base (delete). Séparer en 2 listes.
  const toInsert=r.toCreate.filter(x=>x.status==='P');
  const toDelete=r.toCreate.filter(x=>x.status==='').map(x=>({hotel_id:x.hotel_id,employee_id:x.employee_id,day:x.day}));
  const upserts=toInsert.map(x=>({hotel_id:x.hotel_id,employee_id:x.employee_id,day:x.day,status:'P',duration:1}));
  await BE.savePlanning(hotelId, upserts, toDelete);
  // Sauvegarder l'historique du run (best-effort)
  try{
    const run=await BE.saveGenerationRun(hotelId,{
      scope_type:$('afScope').value==='all'?'establishment':($('afScope').value==='dept'?'service':'employee'),
      scope_id:$('afScope').value==='dept'?$('afDept').value:($('afScope').value==='emp'?$('afEmp').value:null),
      period_start:r.fromStr, period_end:r.toStr,
      mode:$('afSafe').checked?'safe':'force',
      status:'done',
      summary_json:{created:r.toCreate.length,skipped:r.skipped.length,protected:r.protected_.length,no_rule:r.noRule.length}
    });
    if(run?.id){
      const items=r.toCreate.map(x=>({run_id:run.id,employee_id:x.employee_id,date:x.day,old_value:x.old_value||'',new_value:x.status,action:'created',reason:x.reason}));
      await BE.saveGenerationItems(items);
    }
  }catch(e){console.warn('Historique génération non sauvegardé:',e);}
}

/* ---- Helper : brancher la drop zone sur un input ---- */
function wireDropzone(inputId, onFileChange){
  const dz   = $('dz_'+inputId);
  const inp  = $(inputId);
  const fc   = $('fc_'+inputId);
  const fcN  = $('fc_name_'+inputId);
  const fcS  = $('fc_size_'+inputId);
  const fcRm = $('fc_rm_'+inputId);
  const fmtSz= b => b<1024*1024 ? (b/1024).toFixed(0)+' Ko' : (b/1024/1024).toFixed(1)+' Mo';
  const setFile = f => {
    if(!f){ fc.classList.remove('on'); inp.value=''; if(onFileChange) onFileChange(null); return; }
    fcN.textContent=f.name; fcS.textContent=fmtSz(f.size); fc.classList.add('on');
    if(onFileChange) onFileChange(f);
  };
  inp.onchange = e => setFile(e.target.files[0]||null);
  fcRm.onclick = e => { e.stopPropagation(); setFile(null); };
  dz.addEventListener('dragover',  e=>{ e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', ()=> dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e=>{ e.preventDefault(); dz.classList.remove('drag-over'); const f=e.dataTransfer.files[0]; if(f){ const dt=new DataTransfer(); dt.items.add(f); inp.files=dt.files; setFile(f); } });
}

function loadScript(src){return new Promise((res,rej)=>{
  if(document.querySelector(`script[data-src="${src}"]`)) return res();
  const s=document.createElement('script');s.src=src;s.dataset.src=src;
  s.onload=()=>res();s.onerror=()=>rej(new Error('Échec de chargement : '+src));
  document.head.appendChild(s);
});}

/* ===================== IMPORT EXCEL ===================== */
const _strip=s=>(s==null?'':String(s)).normalize('NFKD').replace(/[\u0300-\u036f]/g,'');
function normName(raw){return _strip(raw).replace(/\([^)]*\)/g,' ').toUpperCase().replace(/[^A-Z0-9 ]/g,' ').replace(/\s+/g,' ').trim();}
function _tok(n){return n.split(' ').filter(x=>x.length>=3);}
function levRatio(a,b){const m=a.length,n=b.length;if(!m||!n)return 0;
  const d=Array.from({length:m+1},(_,i)=>{const r=Array(n+1).fill(0);r[0]=i;return r;});
  for(let j=0;j<=n;j++)d[0][j]=j;
  for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));
  return 1-d[m][n]/Math.max(m,n);}
function sameName(a,b){if(!a||!b)return false;if(a===b)return true;
  const ta=_tok(a),tb=_tok(b),pa=a.split(' ')[0],pb=b.split(' ')[0];
  const A=new Set(ta),B=new Set(tb);
  const subset=ta.length&&tb.length&&([...A].every(x=>B.has(x))||[...B].every(x=>A.has(x)));
  if(subset&&pa===pb)return true;
  return levRatio(a,b)>=0.88;}
function mapCode(raw){
  if(raw==null)return null;
  if(typeof raw==='number'){if(raw<=0)return null;return {code:'P',dur:Math.abs(raw-0.5)<1e-9?0.5:1};}
  let s=String(raw).trim();if(!s||s==='.'||s==='²'||s==='-')return null;
  if(s==='1/2'||s==='0,5'||s==='0.5')return {code:'P',dur:0.5};
  if(/^1\s*\+$/.test(s))return {code:'P',dur:1};
  const num=s.replace(',','.');if(/^\d+(\.\d+)?$/.test(num)){const v=parseFloat(num);if(v<=0)return null;return {code:'P',dur:Math.abs(v-0.5)<1e-9?0.5:1};}
  const c=_strip(s).replace(/\([^)]*\)/g,'').trim().toUpperCase().replace(/\s+/g,'');
  const M={P:'P',CP:'CP',AR:'MAL',MAL:'MAL',F:'F',AB:'AE',HV:'P',RTT:'RTT',MAT:'MAT',CSS:'CSS',AE:'AE',GHH:'AE'};
  if(M[c])return {code:M[c],dur:1};
  if(['RECEPTION','ETAGE','TECH','DIRE','DIRECTION'].includes(c))return null;
  return {code:'__IGN__',dur:0};
}
let pendingImport=null;
function showImportMsg(html, withRun){
  $('modal').innerHTML=`<div class="mh">Import Excel</div><div class="mb">${html}</div>`

async function handleImport(file){
  showImportMsg(`<i class="fa-solid fa-spinner fa-spin" style="color:var(--violet)"></i> Analyse du fichier…`, false);
  let XLSX; try{XLSX=await import('https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm');}
  catch(e){return showImportMsg('Erreur de chargement du lecteur Excel : '+e.message, false);}
  const wb=XLSX.read(await file.arrayBuffer(),{type:'array',cellDates:true});
  const found={}; let ignored=0;
  wb.SheetNames.forEach(sn=>{
    const ws=wb.Sheets[sn];const rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true,blankrows:false});
    if(rows.length<3)return;
    const dateRow=rows[1]||[];const dayCols=[];
    dateRow.forEach((v,i)=>{if(v instanceof Date&&!isNaN(v))dayCols.push([i,v]);});
    if(!dayCols.length)return;
    const yr=dayCols[0][1].getFullYear();if(yr!==2025&&yr!==2026)return;
    let svc='';
    for(let r=2;r<rows.length;r++){const row=rows[r]||[];const nameRaw=row[1];
      if(row[0]!=null&&String(row[0]).trim()!=='')svc=String(row[0]).trim();
      if(nameRaw==null||String(nameRaw).trim()==='')continue;
      const nm=normName(nameRaw);if(!nm)continue;
      if(/RATIO|CHAMBRE|FEMME CHAMBRE|RESTE A VENDRE|A FAIRE|EN EXTRA|PROGRAM|TOTAL|OCCUPATION/.test(nm))continue;
      let key=Object.keys(found).find(k=>sameName(k,nm));
      if(!key){key=nm;const clean=String(nameRaw).replace(/\([^)]*\)/g,'').replace(/\s+/g,' ').trim();const p=clean.split(' ');
        found[key]={first:p[0]||clean,last:p.slice(1).join(' '),role:svc,dept:svc,days:{}};}
      dayCols.forEach(([ci,dt])=>{const m=mapCode(row[ci]);if(!m)return;if(m.code==='__IGN__'){ignored++;return;}
        const iso=`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
        found[key].days[iso]={code:m.code,dur:m.dur};});
    }
  });
  const collabs=Object.values(found);
  const nEntries=collabs.reduce((s,c)=>s+Object.keys(c.days).length,0);
  if(!collabs.length||!nEntries) return showImportMsg('Aucune donnée 2025–2026 détectée dans ce fichier.', false);
  pendingImport={collabs,nEntries,ignored};
  const hotelName=hotels.find(h=>h.id===hotelId)?.name||'';
  showImportMsg(
    `<div style="font-size:14px;line-height:1.7">
      <b>${collabs.length}</b> collaborateurs · <b>${nEntries}</b> saisies (2025–2026)
      ${ignored?`· <b>${ignored}</b> cellules ignorées`:''}
      <div style="margin-top:10px;color:var(--ink2)">Importer dans : <b>${hotelName}</b></div>
      <div style="margin-top:8px;color:var(--muted);font-size:12px">Les collaborateurs déjà présents seront réutilisés (correspondance par nom). Les jours existants seront remplacés par les valeurs du fichier.</div>
    </div>`, true);
}
async function runImport(){
  const {collabs}=pendingImport;
  showImportMsg(`<i class="fa-solid fa-spinner fa-spin" style="color:var(--violet)"></i> Import en cours…`, false);
  try{
    // matcher avec les employés existants (par nom normalisé)
    const existing=staff.map(s=>({s,nm:normName(`${s.first_name} ${s.last_name}`)}));
    const toCreate=[],mapEmp={};
    collabs.forEach(c=>{const nm=normName(`${c.first} ${c.last}`);
      const hit=existing.find(e=>sameName(e.nm,nm));
      if(hit) mapEmp[nm]=hit.s.id;
      else toCreate.push({first_name:c.first,last_name:c.last,role:c.role||null,department:c.dept||null,contract_type:'CDI',active:true});});
    if(toCreate.length){
      const created=await BE.addEmployeesBulk(hotelId,toCreate);
      created.forEach(row=>{mapEmp[normName(`${row.first_name} ${row.last_name}`)]=row.id;});
    }
    // construire les upserts staff_planning
    const ups=[];
    collabs.forEach(c=>{const eid=mapEmp[normName(`${c.first} ${c.last}`)];if(!eid)return;
      Object.entries(c.days).forEach(([iso,v])=>{ups.push({hotel_id:hotelId,employee_id:eid,day:iso,status:v.code,duration:v.dur});});});
    // envoi par paquets (limite Supabase ≈ 1000/req)
    const CHUNK=500;
    for(let i=0;i<ups.length;i+=CHUNK){await BE.savePlanning(hotelId,ups.slice(i,i+CHUNK),[]);}
    // recharger
    staff=await BE.listEmployees(hotelId); await loadMonth();
    showImportMsg(`<i class="fa-solid fa-circle-check" style="color:var(--green)"></i> Import terminé — <b>${collabs.length}</b> collaborateurs, <b>${ups.length}</b> entrées.`, false);
  }catch(e){showImportMsg('Erreur d\'import : '+(e.message||e), false); console.error(e);}
}

/* ===================== BOOT ===================== */
async function boot(){
  // Sécurité : si l'URL commence par /salarie, rediriger vers le portail salarié
  if(window.location.pathname.startsWith('/salarie')){
    window.location.replace('/salarie');
    return;
  }

  // Traiter le token Supabase arrivant via /auth/callback (invitation manager)
  const hash = window.location.hash;
  const search = window.location.search;
  const hasToken = hash.includes('access_token')
    || search.includes('access_token')
    || search.includes('code=');

  // Brancher le file input Excel une seule fois (présent dans le DOM global)
  $('xlsxFile').onchange=e=>{const f=e.target.files[0]; if(f) handleImport(f); e.target.value='';};
  try{
    if(TEST_MODE){ BE=makeTestBE(); await start(); return; }
    BE=await makeRealBE();
    const qp=new URLSearchParams(search);
    const linkType=qp.get('type'); // 'invite' | 'recovery' | null
    if(hasToken){
      if(search.includes('code=')){
        const code=qp.get('code');
        await BE.sb.auth.exchangeCodeForSession(code);
      }
      window.history.replaceState(null,'','/');
    }
    const {data:{session}}=await BE.sb.auth.getSession();
    if(!session){ renderLogin(); return; }
    // Invitation ou réinitialisation → forcer la création du mot de passe
    if(linkType==='invite'||linkType==='recovery'){ renderManagerSetPwd(); return; }
    await start();
  }catch(e){showFatal(e);}
}
boot();

/* ===================== ASSISTANT RH IA ===================== */
let aiMessages=[];
let aiOpen=false;

function _buildAiContext(){
  const actStaff=staff.filter(s=>s.active!==false);
  const depCounts={};
  actStaff.forEach(s=>{if(s.department) depCounts[s.department]=(depCounts[s.department]||0)+1;});
  const today=new Date().toISOString().slice(0,10);
  return {
    hotel_name: hotelName||'Hôtel',
    total_active_staff: actStaff.length,
    departments: deps.map(d=>({name:d.name,count:depCounts[d.name]||0})),
    contracts: CONTRACTS.reduce((acc,c)=>{acc[c]=actStaff.filter(s=>s.contract_type===c).length;return acc;},{} ),
    today,
  };
}

async function sendAiMessage(){
  const inp=$('aiInput');
  const txt=inp.value.trim();
  if(!txt)return;
  inp.value='';
  aiMessages.push({role:'user',content:txt});
  _renderAiChat();
  $('aiSend').disabled=true;
  // Indicateur de frappe
  const typingId='ai-typing-'+Date.now();
  const box=$('aiMessages');
  if(box) box.insertAdjacentHTML('beforeend',`<div id="${typingId}" style="display:flex;gap:8px;align-items:center;margin-bottom:10px;color:var(--muted);font-size:12px"><i class="fa-solid fa-circle-notch fa-spin"></i> L'assistant rédige…</div>`);
  $('aiScrollAnchor')?.scrollIntoView({behavior:'smooth'});
  try{
    const ctx=_buildAiContext();
    const resp=await fetch(`${SUPABASE_URL}/functions/v1/rh-assistant`,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_ANON_KEY}`},
      body:JSON.stringify({hotel_id:hotelId,messages:aiMessages,context:ctx}),
    });
    const data=await resp.json().catch(()=>({}));
    if(!resp.ok||data.error){
      const code=data.error||'';
      if(code==='NOT_CONFIGURED'){
        aiMessages.push({role:'assistant',content:'⚙️ **Assistant IA non configuré**\n\nLa clé API Anthropic n\'est pas encore renseignée dans Supabase.\n\nContactez votre administrateur pour activer cette fonctionnalité.'});
      } else {
        aiMessages.push({role:'assistant',content:'Une erreur temporaire s\'est produite. Veuillez réessayer dans quelques instants.'});
      }
    } else {
      aiMessages.push({role:'assistant',content:data.reply});
    }
  }catch(e){
    aiMessages.push({role:'assistant',content:'Impossible de joindre l\'assistant. Vérifiez votre connexion et réessayez.'});
  }
  document.getElementById(typingId)?.remove();
  _renderAiChat();
  $('aiSend').disabled=false;
}

function _renderAiChat(){
  const box=$('aiMessages');
  if(!box)return;
  box.innerHTML=aiMessages.map(m=>{
    const isUser=m.role==='user';
    return `<div style="display:flex;justify-content:${isUser?'flex-end':'flex-start'};margin-bottom:10px">
      <div style="max-width:82%;padding:10px 14px;border-radius:${isUser?'14px 14px 4px 14px':'14px 14px 14px 4px'};
        background:${isUser?'var(--violet)':'#F3F4F6'};color:${isUser?'#fff':'var(--ink)'};font-size:13px;line-height:1.5;
        white-space:pre-wrap;word-break:break-word">${m.content.replace(/</g,'&lt;')}</div>
    </div>`;
  }).join('')+'<div id="aiScrollAnchor"></div>';
  $('aiScrollAnchor')?.scrollIntoView({behavior:'smooth'});
}

function toggleAiPanel(){
  aiOpen=!aiOpen;
  const panel=$('aiPanel');
  if(!panel)return;
  panel.style.display=aiOpen?'flex':'none';
  if(aiOpen&&!aiMessages.length){
    aiMessages=[{role:'assistant',content:`Bonjour ! Je suis votre assistant RH Flowtym.\nJe peux vous aider à analyser vos données RH, répondre à vos questions sur les effectifs, les absences, les formations, et plus encore.\nQue puis-je faire pour vous ?`}];
    _renderAiChat();
    setTimeout(()=>$('aiInput')?.focus(),100);
  }
}
</script>
