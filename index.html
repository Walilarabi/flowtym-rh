/* ===================== VUE POINTAGE ===================== */
let pDay = new Date().toISOString().slice(0,10);   // jour sélectionné dans Pointage
let pSearchQ = '';

function isoToday(){ return new Date().toISOString().slice(0,10); }
function timeOnly(ts){ if(!ts)return ''; const d=new Date(ts); return d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); }
function minutesBetween(a,b){ return Math.max(0, Math.round((new Date(b)-new Date(a))/60000)); }
function hoursLabel(min){ if(min<=0) return '—'; const h=Math.floor(min/60), m=min%60; return m?`${h}h${String(m).padStart(2,'0')}`:`${h}h`; }
function buildTs(day,timeStr){
  // day = 'YYYY-MM-DD', timeStr = 'HH:MM' -> 'YYYY-MM-DDTHH:MM:00' interprété en heure locale
  return new Date(`${day}T${timeStr}:00`).toISOString();
}

async function renderPointage(){
  const hName = hotels.find(h=>h.id===hotelId)?.name || '';
  $('view').innerHTML = `<div class="page">
    <div class="phead">
      <div><h1>Pointage</h1><div class="sub">${hName} · saisie des heures réelles travaillées</div></div>
      <div class="actions">
        <input type="date" id="ptDay" value="${pDay}" max="${isoToday()}" style="font-family:inherit;padding:8px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;background:#fff">
        <button class="btn g" id="ptToday"><i class="fa-solid fa-calendar-day"></i> Aujourd'hui</button>
        <div class="search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" id="ptSearch" placeholder="Rechercher…" value="${pSearchQ}"></div>
        <button class="btn p" id="ptAdd"><i class="fa-solid fa-plus"></i> Pointage</button>
      </div>
    </div>
    <div id="ptStats" class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))"></div>
    <div class="box" style="padding:0"><div id="ptList">Chargement…</div></div>
  </div>`;
  $('ptDay').onchange = e => { pDay = e.target.value; redrawPointage(); };
  $('ptToday').onclick = () => { pDay = isoToday(); $('ptDay').value = pDay; redrawPointage(); };
  $('ptSearch').oninput = e => { pSearchQ = e.target.value.toLowerCase(); redrawPointage(); };
  $('ptAdd').onclick = () => openClockingForm(null);
  redrawPointage();
}

async function redrawPointage(){
  $('ptList').innerHTML = 'Chargement…';
  try{
    const [clockings] = await Promise.all([ BE.listClockings(hotelId, pDay) ]);
    // récupérer le planning prévu pour ce jour (depuis committed s'il s'agit du mois courant, sinon refetch)
    let planMap = new Map(); // employee_id → {status, duration}
    const [py,pm,pd] = pDay.split('-').map(Number);
    if(py===cur.getFullYear() && pm-1===cur.getMonth()){
      committed.forEach((v,k)=>{ const [eid,day]=k.split('|'); if(day===pDay) planMap.set(eid,v); });
    }else{
      try{
        const rows = await BE.listMonthPlanning(hotelId, py, pm-1);
        rows.filter(r=>r.day===pDay).forEach(r=>planMap.set(r.employee_id, {status:r.status, duration:Number(r.duration)}));
      }catch(e){ /* tolérant */ }
    }

    // construire la liste : tous les actifs (ou search match) + ceux qui ont pointé
    const q = pSearchQ;
    const employees = staff.filter(s => s.active && (!q || `${s.first_name} ${s.last_name} ${s.role||''}`.toLowerCase().includes(q)))
      .sort((a,b)=>a.last_name.localeCompare(b.last_name));

    // grouper les pointages par employé
    const byEmp = new Map();
    clockings.forEach(c=>{ if(!byEmp.has(c.employee_id)) byEmp.set(c.employee_id, []); byEmp.get(c.employee_id).push(c); });

    // KPI du jour
    let nPresent=0, nAbsent=0, nNoClock=0, totalMin=0, openSessions=0;
    employees.forEach(s=>{
      const plan = planMap.get(s.id);
      const cks  = byEmp.get(s.id) || [];
      if(cks.length){
        nPresent++;
        cks.forEach(c=>{
          if(c.clock_out_ts){ totalMin += minutesBetween(c.clock_in_ts, c.clock_out_ts) - (c.break_minutes||0); }
          else openSessions++;
        });
      } else if(plan && CMAP[plan.status]?.cat==='paid'){ nAbsent++; }
        else if(plan && CMAP[plan.status]?.cat==='abs'){ nAbsent++; }
        else if(plan && plan.status==='P'){ nNoClock++; }
    });

    $('ptStats').innerHTML = `
      <div class="kpi v"><div class="ic"><i class="fa-solid fa-user-check"></i></div><div class="n">${nPresent}</div><div class="l">Pointés ce jour</div></div>
      <div class="kpi a"><div class="ic"><i class="fa-solid fa-user-clock"></i></div><div class="n">${nNoClock}</div><div class="l">Prévus mais non pointés</div></div>
      <div class="kpi b"><div class="ic"><i class="fa-solid fa-stopwatch"></i></div><div class="n">${openSessions}</div><div class="l">Sessions en cours</div></div>
      <div class="kpi g"><div class="ic"><i class="fa-regular fa-clock"></i></div><div class="n">${hoursLabel(totalMin)}</div><div class="l">Heures totales du jour</div></div>`;

    if(!employees.length){ $('ptList').innerHTML='<div style="padding:24px;text-align:center;color:var(--muted)">Aucun collaborateur actif.</div>'; return; }

    $('ptList').innerHTML = `<table class="tbl" style="border:0;border-radius:14px">
      <thead><tr><th>Collaborateur</th><th>Planifié</th><th>Pointages</th><th style="text-align:right">Heures réelles</th><th></th></tr></thead>
      <tbody>
      ${employees.map(s=>{
        const plan = planMap.get(s.id);
        const cks  = byEmp.get(s.id) || [];
        let realMin = 0;
        cks.forEach(c=>{ if(c.clock_out_ts) realMin += minutesBetween(c.clock_in_ts, c.clock_out_ts) - (c.break_minutes||0); });
        const planStatus = plan ? (CMAP[plan.status]?.lab || plan.status) : 'Repos';
        const planBg = plan ? CMAP[plan.status]?.bg : '#f4f4f7';
        const planFg = plan ? CMAP[plan.status]?.fg : '#999';
        const planExpected = plan && plan.status==='P' ? (plan.duration===0.5 ? '½ jour' : 'Journée') : '';
        const sessionsHtml = cks.length
          ? cks.map(c=>{
              const dur = c.clock_out_ts ? minutesBetween(c.clock_in_ts,c.clock_out_ts)-(c.break_minutes||0) : 0;
              const open = !c.clock_out_ts;
              return `<span class="ck" data-cid="${c.id}" style="display:inline-flex;align-items:center;gap:6px;background:${open?'#fef3c7':'#f4f2fd'};color:${open?'#92400e':'var(--violet-d)'};padding:4px 10px;border-radius:8px;font-size:12px;font-weight:600;margin:2px;cursor:pointer">
                ${timeOnly(c.clock_in_ts)} → ${c.clock_out_ts ? timeOnly(c.clock_out_ts) : '<i>en cours</i>'}
                ${c.break_minutes ? `<span style="font-weight:500;opacity:.75">pause ${c.break_minutes}min</span>`:''}
                ${dur ? `<span style="font-weight:700;opacity:.7">· ${hoursLabel(dur)}</span>`:''}
              </span>`;
            }).join('')
          : '<span style="color:var(--muted);font-size:12px;font-style:italic">— Aucun pointage —</span>';
        return `<tr>
          <td><b>${s.first_name} ${s.last_name}</b><div style="font-size:11.5px;color:var(--muted);font-weight:500">${s.role||'—'}</div></td>
          <td><span class="tag" style="background:${planBg};color:${planFg};font-weight:700">${planStatus}</span> ${planExpected?`<span style="font-size:11px;color:var(--muted);margin-left:4px">${planExpected}</span>`:''}</td>
          <td>${sessionsHtml}</td>
          <td style="text-align:right"><b style="font-size:14px;color:${realMin>0?'var(--green)':'var(--muted)'}">${realMin>0?hoursLabel(realMin):'—'}</b></td>
          <td style="text-align:right"><button class="btn p" data-add-for="${s.id}" style="padding:5px 10px;font-size:11.5px"><i class="fa-solid fa-plus"></i></button></td>
        </tr>`;
      }).join('')}
      </tbody></table>`;

    // Click sur un pointage → éditer
    $('ptList').querySelectorAll('.ck').forEach(el=>el.onclick=()=>{
      const c = clockings.find(x=>x.id===el.dataset.cid);
      if(c) openClockingForm(c);
    });
    // Bouton + sur chaque ligne → ajouter pointage pour ce collaborateur
    $('ptList').querySelectorAll('[data-add-for]').forEach(b=>b.onclick=()=>{
      openClockingForm(null, b.dataset.addFor);
    });
  }catch(e){ $('ptList').innerHTML=`<div style="padding:24px;color:var(--red)">Erreur : ${e.message||e}</div>`; }
}

function openClockingForm(c, presetEmpId){
  // c = pointage existant (édition) ou null (création)
  // presetEmpId = id employé pré-sélectionné (création depuis une ligne)
  const isEdit = !!c;
  const emp = isEdit ? staff.find(s=>s.id===c.employee_id) : (presetEmpId ? staff.find(s=>s.id===presetEmpId) : null);
  const day = isEdit ? c.day : pDay;
  const tin  = isEdit && c.clock_in_ts  ? new Date(c.clock_in_ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
  const tout = isEdit && c.clock_out_ts ? new Date(c.clock_out_ts).toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}) : '';
  const empOptions = staff.filter(s=>s.active).sort((a,b)=>a.last_name.localeCompare(b.last_name))
    .map(s=>`<option value="${s.id}" ${(emp&&s.id===emp.id)?'selected':''}>${s.first_name} ${s.last_name}${s.role?' · '+s.role:''}</option>`).join('');

  $('modal').innerHTML = mhHTML('fa-regular fa-clock', isEdit?'Modifier le pointage':'Nouveau pointage') + `
  <div class="mb">
    <div class="row2">
      <div class="fld"><label>Collaborateur *</label>
        <select id="ck_emp" ${isEdit?'disabled':''}><option value="">— choisir —</option>${empOptions}</select>
      </div>
      <div class="fld"><label>Jour *</label>
        <input type="date" id="ck_day" value="${day}" max="${isoToday()}">
      </div>
    </div>
    <div class="row2">
      <div class="fld"><label>Heure d'arrivée *</label><input type="time" id="ck_in" value="${tin}"></div>
      <div class="fld"><label>Heure de départ <span style="font-weight:400;color:var(--muted)">(laisser vide si en cours)</span></label><input type="time" id="ck_out" value="${tout}"></div>
    </div>
    <div class="fld" style="max-width:200px"><label>Pause (min, non rémunérée)</label>

    </div>
    <div class="fld"><label>Notes <span style="font-weight:400;color:var(--muted)">(facultatif)</span></label>
      <textarea id="ck_notes" rows="2" placeholder="ex : remplacement de X, heures sup validées par…">${c?.notes||''}</textarea>
    </div>
  </div>
  <div class="mact">
    ${isEdit?'<button class="btn d" id="ck_del" style="margin-right:auto"><i class="fa-solid fa-trash"></i> Supprimer</button>':''}
    <button class="btn g" id="ck_cancel">Annuler</button>
    <button class="btn p" id="ck_save"><i class="fa-solid fa-check"></i> ${isEdit?'Enregistrer':'Créer'}</button>
  </div>`;
  $('modalbg').classList.add('on');
  $('ck_cancel').onclick = closeModal;
  $('ck_save').onclick = async () => {
    const eid  = $('ck_emp').value || c?.employee_id;
    const d    = $('ck_day').value;
    const tinV = $('ck_in').value;
    const toutV= $('ck_out').value;
    const brk  = parseInt($('ck_brk').value||'0',10) || 0;
    const notes= $('ck_notes').value.trim() || null;
    if(!eid){ flash('Choisissez un collaborateur'); return; }
    if(!d || !tinV){ flash('Le jour et l\'heure d\'arrivée sont obligatoires'); return; }
    const clock_in_ts  = buildTs(d, tinV);
    let clock_out_ts   = toutV ? buildTs(d, toutV) : null;
    if(clock_out_ts && new Date(clock_out_ts) <= new Date(clock_in_ts)){
      // heure de sortie avant l'heure d'entrée → on suppose une fin de service le lendemain
      clock_out_ts = buildTs(new Date(new Date(d).getTime()+86400000).toISOString().slice(0,10), toutV);
    }
    try{
      if(isEdit){
        await BE.updateClocking(c.id, {day:d, clock_in_ts, clock_out_ts, break_minutes:brk, notes, employee_id:eid});
      }else{
        await BE.addClocking(hotelId, {employee_id:eid, day:d, clock_in_ts, clock_out_ts, break_minutes:brk, notes, source:'manual'});
      }
      closeModal(); flash(isEdit?'Pointage mis à jour':'Pointage créé');
      pDay = d;
      if(view==='pointage') redrawPointage();
    }catch(e){ flash('Erreur : '+(e.message||e)); }
  };
  const del = $('ck_del');
  if(del) del.onclick = async () => {
    if(!confirm(`Supprimer ce pointage ?`)) return;
    try{
      await BE.deleteClocking(c.id);
      closeModal(); flash('Pointage supprimé');
      if(view==='pointage') redrawPointage();
    }catch(e){ flash('Erreur : '+(e.message||e)); }
  };
}

function countAbsenceDays(startDate, endDate, halfDayStart, halfDayEnd) {
  const s = new Date(startDate), e = new Date(endDate);
  let days = 0;
  const c = new Date(s);
  while(c <= e) { days++; c.setDate(c.getDate()+1); }
  if(halfDayStart) days -= 0.5;
  if(halfDayEnd) days -= 0.5;
  return Math.max(days, 0.5);
}

async function syncAbsenceToPlanning(req) {
  const planCode = req.absence_types?.planning_code || absenceTypes.find(t=>t.code===req.type_code)?.planning_code;
  if(!planCode) return;
  const upserts = [];
  const s = new Date(req.start_date), e = new Date(req.end_date);
  const c = new Date(s); let day = 0;
  while(c <= e) {
    const dayIso = c.toISOString().slice(0,10);
    let duration = 1.0;
    const isLast = c.getTime() === e.getTime();
    if(day === 0 && req.half_day_start && isLast && req.half_day_end) duration = 0.5;
    else if(day === 0 && req.half_day_start) duration = 0.5;
    else if(isLast && req.half_day_end) duration = 0.5;
    upserts.push({hotel_id:req.hotel_id, employee_id:req.employee_id, day:dayIso, status:planCode, duration});
    c.setDate(c.getDate()+1); day++;
  }
  await BE.savePlanning(req.hotel_id, upserts, []);
}

async function removeAbsenceFromPlanning(req) {
  const planCode = req.absence_types?.planning_code || absenceTypes.find(t=>t.code===req.type_code)?.planning_code;
  if(!planCode) return;
  const deletes = [];
  const s = new Date(req.start_date), e = new Date(req.end_date);
  const c = new Date(s);
  while(c <= e) {
    deletes.push({hotel_id:req.hotel_id, employee_id:req.employee_id, day:c.toISOString().slice(0,10)});
    c.setDate(c.getDate()+1);
  }
  await BE.savePlanning(req.hotel_id, [], deletes);
}

      <label style="display:inline-flex;gap:8px;align-items:center;cursor:pointer"><input type="checkbox" id="abs_hds"> <span>Demi-journée début</span>
        <select id="abs_hds_p" style="display:none;margin-left:4px"><option value="matin">Matin</option><option value="après-midi">Après-midi</option></select>
      </label>
      <label style="display:inline-flex;gap:8px;align-items:center;cursor:pointer"><input type="checkbox" id="abs_hde"> <span>Demi-journée fin</span>
        <select id="abs_hde_p" style="display:none;margin-left:4px"><option value="matin">Matin</option><option value="après-midi">Après-midi</option></select>
      </label>
    </div>
    <div style="background:var(--violet-bg);border:1px solid #d4c9f9;border-radius:10px;padding:11px 16px;font-size:13px;margin-bottom:14px;display:flex;align-items:center;gap:10px">
      <i class="fa-regular fa-clock" style="color:var(--violet-d)"></i>
      <span style="color:var(--muted)">Nombre de jours :</span>
      <b id="abs_days_preview" style="color:var(--violet-d)">—</b>
      <span id="abs_bal_warn" style="color:#d97706;margin-left:6px;font-size:12px"></span>
    </div>
    <div class="fld"><label>Commentaire <span style="font-weight:400;color:var(--muted)">(facultatif)</span></label>
      <textarea id="abs_note" rows="2" placeholder="Précisez si nécessaire…"></textarea>
    </div>
    <div class="fld" id="abs_file_wrap">
      <label>Pièce jointe <span id="abs_file_req" style="color:var(--red);font-size:11px"></span></label>
      ${dropzoneHTML('abs_file')}
    </div>
  </div>
  <div class="mact">
    <button class="btn g" id="abs_cancel">Annuler</button>
    <button class="btn p" id="abs_submit"><i class="fa-solid fa-paper-plane"></i> Soumettre</button>
  </div>`;
  $('modalbg').classList.add('on');
  $('abs_cancel').onclick = closeModal;

  const updateDays = () => {
    const s=$('abs_start').value, e=$('abs_end').value;
    const hds=$('abs_hds').checked, hde=$('abs_hde').checked;
    if(!s||!e||e<s){ $('abs_days_preview').textContent='—'; return; }
    const d = countAbsenceDays(s,e,hds,hde);
    $('abs_days_preview').textContent = d + ' jour(s)';
    // Balance warning for CP/RTT
    const typeCode = $('abs_type').value;
    const t = absenceTypes.find(x=>x.code===typeCode);
    if(t?.debit_balance) {
      const empId = $('abs_emp').value;
      if(empId) {
        BE.listAbsenceBalances(hotelId, new Date().getFullYear()).then(bals => {
          const b = bals.find(x=>x.employee_id===empId && x.type_code===typeCode);
          const remaining = b ? (b.entitled - b.taken + b.adjusted) : 0;
          const warn = $('abs_bal_warn');
          if(warn) warn.textContent = d > remaining ? `⚠ Solde insuffisant (${remaining} j disponibles)` : '';
        }).catch(()=>{});
      }
    } else { const w=$('abs_bal_warn'); if(w) w.textContent=''; }
  };

  wireDropzone('abs_file', ()=>{});

  $('abs_hds').onchange = e => { $('abs_hds_p').style.display=e.target.checked?'':'none'; updateDays(); };
  $('abs_hde').onchange = e => { $('abs_hde_p').style.display=e.target.checked?'':'none'; updateDays(); };
  $('abs_start').onchange = updateDays;
  $('abs_end').onchange = updateDays;
  $('abs_type').onchange = () => {
    const t = absenceTypes.find(x=>x.code===$('abs_type').value);
    const req = $('abs_file_req');
    if(req) req.textContent = t?.requires_attachment ? '(obligatoire)' : '(facultatif)';
    updateDays();
  };
  $('abs_emp').onchange = updateDays;

  $('abs_submit').onclick = async () => {
    const empId = $('abs_emp').value;
    const typeCode = $('abs_type').value;
    const start = $('abs_start').value;
    const end = $('abs_end').value;
    if(!empId||!typeCode||!start||!end){ flash('Champs obligatoires manquants'); return; }
    if(end < start){ flash('La date de fin doit être ≥ à la date de début'); return; }
    const hds = $('abs_hds').checked, hde = $('abs_hde').checked;
    const days = countAbsenceDays(start, end, hds, hde);
    const payload = {
      employee_id: empId,
      type_code: typeCode,
      start_date: start,
      end_date: end,
      half_day_start: hds,
      half_day_start_period: hds ? $('abs_hds_p').value : null,
      half_day_end: hde,
      half_day_end_period: hde ? $('abs_hde_p').value : null,
      days_count: days,
      note: $('abs_note').value.trim() || null,
    };
    try {
      $('abs_submit').disabled = true;
      const req = await BE.createAbsenceRequest(hotelId, payload);
      // Log submit action in history
      try { await BE.listApprovalHistory(hotelId, req.id); } catch(e2) {} // read-only
      // If direction/admin auto-approve
      if(canApproveAbsences()) {
        // option to auto-approve, but for now just submit
      }
      closeModal(); flash('Demande soumise'); renderAbsRequests();
    } catch(e) { flash('Erreur : '+(e.message||e)); $('abs_submit').disabled=false; }
  };
}

async function openApproveRejectModal(reqId, action) {
  const allReqs = await BE.listAbsenceRequests(hotelId, {});
  const req = allReqs.find(r=>r.id===reqId); if(!req) return;
  const emp = staff.find(e=>e.id===req.employee_id);
  const isApprove = action==='approve', isReject = action==='reject', isCancel = action==='cancel';
  const title = isApprove ? 'Approuver la demande' : isReject ? 'Refuser la demande' : 'Annuler la demande';
  const color = isApprove ? 'var(--green)' : 'var(--red)';
  const icon = isApprove ? 'fa-check' : isReject ? 'fa-xmark' : 'fa-ban';

  $('modal').innerHTML = `
    <div class="mh">
      <div class="mh-ic" style="background:${isApprove?'var(--green-bg)':isReject?'var(--red-bg)':'#fff3cd'};color:${color}"><i class="fa-solid ${icon}"></i></div>
      <div class="mh-ti"><h2>${title}</h2></div>
      <button class="mh-x" onclick="closeModal()" title="Fermer"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="mb">
      <div style="background:#f8f9fb;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:16px;font-size:13.5px">
        <div style="font-weight:700;margin-bottom:4px">${emp ? emp.first_name+' '+emp.last_name : '—'}</div>
        <div style="color:var(--ink2)">${req.absence_types?.label||req.type_code} · ${req.start_date}${req.end_date!==req.start_date?' → '+req.end_date:''} · <b>${req.days_count}</b> jour(s)</div>
      </div>
      <div class="fld">
        <label>Commentaire${isReject?' <span style="color:var(--red)">*</span>':' <span style="font-weight:400;color:var(--muted)">(facultatif)</span>'}</label>
        <textarea id="appr_comment" rows="3" placeholder="${isReject?'Motif du refus obligatoire':'Commentaire optionnel…'}"></textarea>
        <div class="field-err" id="appr_comment_err">Le motif de refus est obligatoire.</div>
      </div>
    </div>
    <div class="mact">
      <button class="btn g" id="appr_cancel">Annuler</button>
      <button class="btn" id="appr_confirm" style="background:${color};color:#fff"><i class="fa-solid ${icon}"></i> ${isApprove?'Approuver':isReject?'Refuser':'Annuler la demande'}</button>
    </div>`;
  $('modalbg').classList.add('on');
  $('appr_cancel').onclick = closeModal;
  $('appr_confirm').onclick = async () => {
    const comment = $('appr_comment').value.trim();
    if(isReject && !comment){ $('appr_comment_err')?.classList.add('on'); return; }
    try {
      $('appr_confirm').disabled = true;
      const newStatus = isApprove ? 'approved' : isReject ? 'rejected' : 'cancelled';
      await BE.updateAbsenceRequestStatus(reqId, newStatus, null, userEmail, comment||null, hotelId, req.employee_id);
      if(isApprove) {
        await syncAbsenceToPlanning(req);
        // Debit balance if CP/RTT
        const t = req.absence_types;
        if(t?.debit_balance && t?.balance_type) {
          const year = new Date(req.start_date).getFullYear();
          const bals = await BE.listAbsenceBalances(hotelId, year);
          const bal = bals.find(b=>b.employee_id===req.employee_id && b.type_code===t.balance_type);
          const newTaken = (bal?.taken||0) + req.days_count;
          await BE.upsertAbsenceBalance(hotelId, req.employee_id, year, t.balance_type, {taken: newTaken});
          await BE.addBalanceMovement(hotelId, req.employee_id, t.balance_type, year, -req.days_count, `Approbation demande ${reqId}`, reqId, null);
        }
      }
      if(isCancel) {
        await removeAbsenceFromPlanning(req);
        // Recredit balance
        const t = req.absence_types;
        if(t?.debit_balance && t?.balance_type) {
          const year = new Date(req.start_date).getFullYear();
          const bals = await BE.listAbsenceBalances(hotelId, year);
          const bal = bals.find(b=>b.employee_id===req.employee_id && b.type_code===t.balance_type);
          const newTaken = Math.max(0, (bal?.taken||0) - req.days_count);
          await BE.upsertAbsenceBalance(hotelId, req.employee_id, year, t.balance_type, {taken: newTaken});
          await BE.addBalanceMovement(hotelId, req.employee_id, t.balance_type, year, +req.days_count, `Annulation demande ${reqId}`, reqId, null);
        }
      }
      closeModal(); flash(isApprove?'Demande approuvée':isReject?'Demande refusée':'Demande annulée');
      renderAbsRequests();
    } catch(e) { flash('Erreur : '+(e.message||e)); $('appr_confirm').disabled=false; }
  };
}

const RECRUIT_STAGES=[
  {key:'nouveau',    label:'Nouveau',       bg:'#EEF2FF',fg:'#4338CA'},
  {key:'preselection',label:'Pré-sélection',bg:'#FEF3C7',fg:'#92400E'},
  {key:'entretien',  label:'Entretien',     bg:'#DBEAFE',fg:'#1D4ED8'},
  {key:'offre',      label:'Offre',         bg:'#F0FDF4',fg:'#166534'},
  {key:'embauche',   label:'Embauché ✓',    bg:'#C6EFCE',fg:'#0F5132'},
  {key:'refuse',     label:'Refusé',        bg:'#FFD9D9',fg:'#7B0000'},
];
const RECRUIT_STAGES_MAP=Object.fromEntries(RECRUIT_STAGES.map(s=>[s.key,s]));

async function renderRecruitment(){

async function drawRecruitBoard(){
  const bd=$('recBoard'); if(!bd)return;
  try{
    const [cands,postings]=await Promise.all([BE.listCandidates(hotelId),BE.listJobPostings(hotelId)]);
    bd.innerHTML=`<div style="display:flex;gap:14px;min-width:max-content;padding-bottom:8px">
      ${RECRUIT_STAGES.map(st=>{
        const col=cands.filter(c=>c.stage===st.key);
        return `<div style="width:240px;flex-shrink:0">
          <div style="background:${st.bg};color:${st.fg};padding:7px 12px;border-radius:10px 10px 0 0;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:space-between">
            ${st.label}<span style="background:rgba(0,0,0,.1);border-radius:20px;padding:1px 8px;font-size:11px">${col.length}</span></div>
          <div style="background:#f9f9fb;border:1px solid #e5e7eb;border-top:none;border-radius:0 0 10px 10px;min-height:120px;padding:8px;display:flex;flex-direction:column;gap:8px" data-stage="${st.key}">
            ${col.map(c=>recruitCard(c)).join('')}
            ${st.key!=='embauche'&&st.key!=='refuse'?`<button class="btn g" data-addstage="${st.key}" style="font-size:11px;padding:5px 8px;margin-top:4px;opacity:.7"><i class="fa-solid fa-plus"></i> Ajouter</button>`:''}
          </div></div>`;
      }).join('')}
    </div>`;
    bd.querySelectorAll('[data-cid]').forEach(el=>el.onclick=()=>openCandidateFiche(el.dataset.cid,cands.find(c=>c.id===el.dataset.cid)));
    bd.querySelectorAll('[data-addstage]').forEach(btn=>btn.onclick=()=>openCandidateForm(null,btn.dataset.addstage));
  }catch(e){bd.innerHTML=`<div style="padding:20px;color:var(--red)">Erreur : ${e.message||e}</div>`;}
}

function recruitCard(c){
  const st=RECRUIT_STAGES_MAP[c.stage]||RECRUIT_STAGES_MAP['nouveau'];
  return `<div class="card" data-cid="${c.id}" style="cursor:pointer;padding:10px 12px">

    ${c.email?`<div style="font-size:11px;color:var(--muted)">${c.email}</div>`:''}
    <div style="margin-top:6px;font-size:11px;color:var(--muted)">${c.created_at?.slice(0,10)||''}</div>

}

function openCandidateForm(c,defaultStage){
  const stOpts=RECRUIT_STAGES.map(s=>`<option value="${s.key}" ${(c?.stage||defaultStage||'nouveau')===s.key?'selected':''}>${s.label}</option>`).join('');
  const empOpts=staff.filter(e=>e.active).sort((a,b)=>a.last_name.localeCompare(b.last_name)).map(e=>`<option value="${e.id}" ${c?.converted_employee_id===e.id?'selected':''}>${e.first_name} ${e.last_name}</option>`).join('');
  $('modal').innerHTML=mhHTML('fa-solid fa-user-plus',c?'Modifier le candidat':'Nouveau candidat')+`
  <div class="mb">
    <div class="row3">
      <div class="fld"><label>Prénom *</label><input id="cf_fn" value="${c?.first_name||''}" placeholder="Prénom"></div>
      <div class="fld"><label>Nom *</label><input id="cf_ln" value="${c?.last_name||''}" placeholder="Nom"></div>
      <div class="fld"><label>Étape</label><select id="cf_st">${stOpts}</select></div>
    </div>
    <div class="row3">
      <div class="fld"><label>E-mail</label><input id="cf_em" type="email" value="${c?.email||''}" placeholder="email@…"></div>
      <div class="fld"><label>Téléphone</label><input id="cf_ph" value="${c?.phone||''}" placeholder="06…"></div>
      <div class="fld"><label>Poste visé</label><input id="cf_jt" value="${c?.job_title||''}" placeholder="ex : Réceptionniste"></div>
    </div>
    <div class="fld"><label>Notes</label><textarea id="cf_no" rows="3" style="min-height:70px">${c?.notes||''}</textarea></div>
  </div>
  <div class="mact">
    <button class="btn g" id="cf_cancel">Annuler</button>
    ${c?`<button class="btn d" id="cf_del"><i class="fa-solid fa-trash"></i> Supprimer</button>`:''}
    <button class="btn p" id="cf_save"><i class="fa-solid fa-check"></i> ${c?'Enregistrer':'Créer'}</button>
  </div>`;
  $('modalbg').classList.add('on');
  $('cf_cancel').onclick=closeModal;
  if(c) $('cf_del').onclick=async()=>{if(!confirm('Supprimer ce candidat ?'))return;await BE.deleteCandidate(c.id);closeModal();await drawRecruitBoard();};
  $('cf_save').onclick=async()=>{
    const fn=$('cf_fn').value.trim(),ln=$('cf_ln').value.trim();
    if(!fn&&!ln){flash('Prénom ou nom requis');return;}

    try{
      if(c) await BE.updateCandidate(c.id,p);
      else await BE.saveCandidate(hotelId,p);

  };

async function renderTrainingCatalog(){
  const el=$('trainsub'); if(!el)return;
  el.innerHTML=`<div style="display:flex;justify-content:flex-end;margin-bottom:12px">
    <button class="btn p" id="trainNew"><i class="fa-solid fa-plus"></i> Nouvelle formation</button></div>
    <div id="trainList">Chargement…</div>`;
  $('trainNew').onclick=()=>openTrainingForm(null);
  try{
    const list=await BE.listTrainingCatalog(hotelId);
    if(!list.length){$('trainList').innerHTML='<div style="padding:30px;text-align:center;color:var(--muted)">Aucune formation. Créez la première.</div>';return;}
    $('trainList').innerHTML=`<table class="tbl"><thead><tr><th>Formation</th><th>Catégorie</th><th>Fréquence</th><th>Tous postes</th><th>Statut</th><th></th></tr></thead><tbody>
      ${list.map(t=>`<tr><td><b>${t.title}</b>${t.description?`<br><span style="font-size:11px;color:var(--muted)">${t.description}</span>`:''}</td>
        <td>${t.category||'—'}</td>
        <td>${t.frequency_months===12?'Annuelle':t.frequency_months===24?'Biennale':t.frequency_months===36?'Triennale':t.frequency_months+' mois'}</td>
        <td>${t.required_for_all?'<span class="ok">Oui</span>':'Non'}</td>
        <td>${t.active?'<span class="ok">Active</span>':'<span class="ko">Archivée</span>'}</td>
        <td><button data-edit="${t.id}" title="Modifier"><i class="fa-solid fa-pen"></i></button>
            <button data-del="${t.id}" title="Supprimer" style="color:var(--red)"><i class="fa-solid fa-trash"></i></button></td>
      </tr>`).join('')}
    </tbody></table>`;
    $('trainList').querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openTrainingForm(list.find(t=>t.id===b.dataset.edit)));
    $('trainList').querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Supprimer cette formation ?'))return;

  }catch(e){$('trainList').innerHTML=`<div style="padding:20px;color:var(--red)">Erreur : ${e.message}</div>`;}

async function renderTrainingMatrix(){
  const el=$('trainsub'); if(!el)return;
  el.innerHTML='Chargement…';
  try{
    const [catalog,ets,actStaff]=await Promise.all([BE.listTrainingCatalog(hotelId),BE.listEmployeeTrainings(hotelId),Promise.resolve(staff.filter(s=>s.active))]);
    const activeCatalog=catalog.filter(t=>t.active);
    if(!activeCatalog.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--muted)">Aucune formation active. Créez des formations dans le catalogue.</div>';return;}
    const today=new Date().toISOString().slice(0,10);
    const etMap=new Map(); ets.forEach(e=>etMap.set(e.employee_id+'|'+e.training_id,e));
    el.innerHTML=`<div style="overflow-x:auto"><table class="tbl" style="font-size:11.5px">
      <thead><tr><th style="white-space:nowrap">Collaborateur</th>${activeCatalog.map(t=>`<th style="max-width:90px;word-break:break-word;text-align:center" title="${t.title}">${t.title}<br><span style="font-weight:400;color:var(--muted)">${t.frequency_months} mois</span></th>`).join('')}</tr></thead>
      <tbody>${actStaff.sort((a,b)=>a.last_name.localeCompare(b.last_name)).map(emp=>`<tr>
        <td style="white-space:nowrap"><b>${emp.first_name} ${emp.last_name}</b><br><span style="font-size:10.5px;color:var(--muted)">${emp.role||''}</span></td>
        ${activeCatalog.map(t=>{
          const et=etMap.get(emp.id+'|'+t.id);
          const expired=et?.expiry_date&&et.expiry_date<today;
          const warning=et?.expiry_date&&!expired&&et.expiry_date<new Date(Date.now()+60*86400000).toISOString().slice(0,10);
          const cls=!et?'':'done';
          const ic=!et?'<i class="fa-regular fa-circle" style="color:#ccc"></i>':expired?'<i class="fa-solid fa-circle-exclamation" style="color:var(--red)"></i>':warning?'<i class="fa-solid fa-clock" style="color:#d97706"></i>':'<i class="fa-solid fa-circle-check" style="color:var(--green)"></i>';
          const lbl=!et?'':et.completed_date?et.completed_date.slice(0,10):'';
          return `<td style="text-align:center;cursor:pointer" data-eid="${emp.id}" data-tid="${t.id}" data-cat="${t.title}" title="${et?.expiry_date?'Expire : '+et.expiry_date:''}">${ic}<br><span style="font-size:10px;color:var(--muted)">${lbl}</span></td>`;
        }).join('')}
      </tr>`).join('')}
    </tbody></table></div>
    <div style="margin-top:10px;font-size:11.5px;color:var(--muted)"><i class="fa-solid fa-circle-check" style="color:var(--green)"></i> À jour &nbsp; <i class="fa-solid fa-clock" style="color:#d97706"></i> Expire bientôt &nbsp; <i class="fa-solid fa-circle-exclamation" style="color:var(--red)"></i> Expiré &nbsp; <i class="fa-regular fa-circle" style="color:#ccc"></i> Non renseigné</div>`;
    el.querySelectorAll('td[data-eid]').forEach(td=>td.onclick=()=>{
      const et=etMap.get(td.dataset.eid+'|'+td.dataset.tid);
      const tr=activeCatalog.find(t=>t.id===td.dataset.tid);
      const emp=staff.find(e=>e.id===td.dataset.eid);
      openEmployeeTrainingForm(emp,tr,et,()=>renderTrainingMatrix());
    });
  }catch(e){el.innerHTML=`<div style="padding:20px;color:var(--red)">Erreur : ${e.message}</div>`;}
}

function openEmployeeTrainingForm(emp,training,et,onSave){
  $('modal').innerHTML=mhHTML('fa-solid fa-graduation-cap',`${emp.first_name} ${emp.last_name}`,training.title)+`
  <div class="mb">
    <div class="row3">
      <div class="fld"><label>Statut</label><select id="etf_st">
        <option value="todo" ${(!et||et.status==='todo')?'selected':''}>À faire</option>
        <option value="done" ${et?.status==='done'?'selected':''}>Effectuée</option>
        <option value="expired" ${et?.status==='expired'?'selected':''}>Expirée</option>
        <option value="na" ${et?.status==='na'?'selected':''}>Non applicable</option>
      </select></div>
      <div class="fld"><label>Date réalisation</label><input type="date" id="etf_cd" value="${et?.completed_date||''}"></div>
      <div class="fld"><label>Date expiration</label><input type="date" id="etf_ed" value="${et?.expiry_date||''}"></div>
    </div>
    <div class="fld"><label>Notes</label><textarea id="etf_no" rows="2">${et?.notes||''}</textarea></div>
  </div>
  <div class="mact">
    <button class="btn g" onclick="closeModal()">Annuler</button>
    <button class="btn p" id="etf_save"><i class="fa-solid fa-check"></i> Enregistrer</button>
  </div>`;
  $('modalbg').classList.add('on');
  $('etf_save').onclick=async()=>{
    const p={status:$('etf_st').value,completed_date:$('etf_cd').value||null,expiry_date:$('etf_ed').value||null,notes:$('etf_no').value||null};
    // auto-compute expiry if done and no expiry
    if(p.status==='done'&&p.completed_date&&!p.expiry_date){
      const d=new Date(p.completed_date); d.setMonth(d.getMonth()+training.frequency_months);
      p.expiry_date=d.toISOString().slice(0,10);
    }
    try{await BE.upsertEmployeeTraining(hotelId,emp.id,training.id,p);flash('Enregistré');closeModal();onSave&&onSave();}
    catch(e){flash('Erreur : '+e.message);}
  };
}

async function drawMedicalList(){
  const el=$('medList'); if(!el)return;
  try{

    const today=new Date().toISOString().slice(0,10);
    const soon=new Date(Date.now()+60*86400000).toISOString().slice(0,10);
    // Alerts
    const alerts=visits.filter(v=>v.next_visit_date&&v.next_visit_date<=soon&&!v.returned_date);
    const alertsEl=$('medAlerts');
    if(alertsEl&&alerts.length){
      alertsEl.innerHTML=`<div style="background:#fef3c7;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:13px;color:#92400e">

        ${alerts.map(v=>{const e=v.employees;return `<span style="margin-left:8px;background:rgba(0,0,0,.08);padding:2px 8px;border-radius:6px">${e?e.first_name+' '+e.last_name:v.employee_id} (${v.next_visit_date})</span>`;}).join('')}
      </div>`;
    }
    if(!visits.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--muted)">Aucune visite enregistrée.</div>';return;}

      ${visits.map(v=>{const mt=MED_TYPES[v.visit_type]||{label:v.visit_type,color:'#f4f4f4',fg:'#666'};
        const e=v.employees; const overdue=v.next_visit_date&&v.next_visit_date<today;
        return `<tr>
          <td><b>${e?e.first_name+' '+e.last_name:'—'}</b></td>
          <td style="font-size:12px">${e?.department||'—'}</td>
          <td><span style="background:${mt.color};color:${mt.fg};padding:2px 8px;border-radius:6px;font-size:11.5px;font-weight:600">${mt.label}</span></td>
          <td>${v.visit_date}</td>
          <td style="color:${overdue?'var(--red)':v.next_visit_date&&v.next_visit_date<=soon?'#d97706':'inherit'}">${v.next_visit_date||'—'}${overdue?' <i class="fa-solid fa-triangle-exclamation"></i>':''}</td>

        </tr>`;}).join('')}

    el.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openMedicalForm(visits.find(v=>v.id===b.dataset.edit)));
    el.querySelectorAll('[data-del]').forEach(b=>b.onclick=async()=>{
      if(!confirm('Supprimer cette visite ?'))return;
      try{await BE.deleteMedicalVisit(b.dataset.del);flash('Supprimé');await drawMedicalList();}catch(e){flash('Erreur : '+e.message);}
    });
  }catch(e){el.innerHTML=`<div style="padding:20px;color:var(--red)">Erreur : ${e.message}</div>`;}
}

      </select></div>
      <div class="fld"><label>Date visite *</label><input type="date" id="mf_vd" value="${v?.visit_date||new Date().toISOString().slice(0,10)}"></div>
    </div>

      </select></div>
      <div class="fld"><label>Médecin</label><input id="mf_dr" value="${v?.doctor||''}" placeholder="Dr …"></div>

  </div>
  <div class="mact">

async function drawOrgTree(){
  const el=$('orgTree'); if(!el)return;
  const actStaff=staff.filter(s=>s.active);
  // Build tree from manager_id
  const roots=actStaff.filter(s=>!s.manager_id||!actStaff.find(e=>e.id===s.manager_id));
  const byMgr=new Map();
  actStaff.forEach(s=>{if(s.manager_id){if(!byMgr.has(s.manager_id))byMgr.set(s.manager_id,[]);byMgr.get(s.manager_id).push(s);}});
  // Group roots by dept if no manager hierarchy
  const deptGroups=new Map();
  roots.forEach(s=>{const d=s.department||'Sans service';if(!deptGroups.has(d))deptGroups.set(d,[]);deptGroups.get(d).push(s);});
  function nodeCard(s,depth){
    const reports=byMgr.get(s.id)||[];
    return `<div style="display:inline-flex;flex-direction:column;align-items:center;margin:0 8px">
      <div class="card" data-emp="${s.id}" style="cursor:pointer;width:140px;text-align:center;padding:10px 8px;border:2px solid ${depth===0?'var(--violet)':'var(--line)'};border-radius:12px;background:#fff">
        <div class="av" style="width:34px;height:34px;border-radius:50%;background:${avBg(s)};margin:0 auto 6px">${avInner(s)}</div>
        <div style="font-weight:700;font-size:12px;line-height:1.2">${s.first_name}<br>${s.last_name}</div>
        <div style="font-size:10.5px;color:var(--muted);margin-top:3px">${s.role||'—'}</div>
      </div>
      ${reports.length?`<div style="border-left:2px solid var(--line);height:20px"></div>
        <div style="display:flex;border-top:2px solid var(--line)">
          ${reports.map(r=>nodeCard(r,depth+1)).join('')}
        </div>`:''}
    </div>`;
  }
  if(!actStaff.length){el.innerHTML='<div style="padding:30px;text-align:center;color:var(--muted)">Aucun collaborateur actif.</div>';return;}
  let html='<div id="orgInner" style="padding:20px">';
  deptGroups.forEach((emps,dept)=>{
    html+=`<div style="margin-bottom:30px"><div style="font-size:11px;font-weight:700;color:var(--violet-d);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;padding:4px 10px;background:var(--violet-bg);border-radius:8px;display:inline-block">${dept}</div>
      <div style="display:flex;flex-wrap:wrap;gap:16px">${emps.map(s=>nodeCard(s,0)).join('')}</div></div>`;
  });
  html+='</div>';
  el.innerHTML=html;
  el.querySelectorAll('[data-emp]').forEach(c=>c.onclick=()=>openFiche(c.dataset.emp));
}

async function exportOrgPNG(){
  const el=$('orgInner'); if(!el){flash('Organigramme non chargé');return;}
  try{
    if(!window.html2canvas) await loadScript('https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js');
    const canvas=await window.html2canvas(el,{backgroundColor:'#ffffff',scale:2});
    const a=document.createElement('a'); a.download='organigramme.png'; a.href=canvas.toDataURL('image/png'); a.click();
    flash('PNG exporté');
  }catch(e){flash('Erreur export : '+e.message);}
}

function _genPassword(){
  const adjs=['Bleu','Vert','Rose','Gris','Brun','Ciel','Beau','Grand'];
  const noms=['Hotel','Royal','Plaza','Parc','Soleil','Matin','Foyer'];
  const n=Math.floor(Math.random()*900+100);
  return adjs[Math.floor(Math.random()*adjs.length)]+noms[Math.floor(Math.random()*noms.length)]+n;
}
function _copyText(txt,btn){
  navigator.clipboard.writeText(txt).then(()=>{
    const orig=btn.innerHTML; btn.innerHTML='<i class="fa-solid fa-check"></i>';
    setTimeout(()=>{btn.innerHTML=orig;},2000);
  });
}

  function updateKioskUI(openCk){
    const st=$('kstatus'); const ki=$('kclkin'); const ko=$('kclkout');

function fmtMin(m){const h=Math.floor(m/60),mn=Math.round(m%60);return h>0?`${h}h${mn>0?mn.toString().padStart(2,'0'):''}`:mn+'min';}

let trMonth=new Date().toISOString().slice(0,7); // YYYY-MM
async function renderTracking(){
  const hName=hotels.find(h=>h.id===hotelId)?.name||'';
  $('view').innerHTML=`<div class="page">
    <div class="phead">
      <div><h1>Suivi du temps</h1><div class="sub">${hName} · heures réelles vs planifiées</div></div>
      <div class="actions">
        <input type="month" id="trMonth" value="${trMonth}" style="font-family:inherit;padding:8px 12px;border:1px solid var(--line);border-radius:10px;font-size:13px;background:#fff">
        <button class="btn g" id="trExport"><i class="fa-solid fa-file-csv"></i> CSV</button>
      </div>
    </div>
    <div id="trKpis" class="kpis" style="grid-template-columns:repeat(auto-fit,minmax(160px,1fr))"></div>
    <div class="box" style="padding:0"><div id="trTable">Chargement…</div></div>
  </div>`;
  $('trMonth').onchange=e=>{trMonth=e.target.value;drawTracking();};
  $('trExport').onclick=()=>exportTrackingCSV();
  await drawTracking();
}
async function drawTracking(){
  const el=$('trTable'); if(!el)return;
  el.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted)">Chargement…</div>';
  const [y,m]=trMonth.split('-').map(Number);
  const from=iso(y,m,1), to=iso(y,m,dim(y,m));
  try{
    const [planRows, clockRows]=await Promise.all([
      BE.listMonthPlanning(hotelId,y,m),
      BE.listClockingsByRange(hotelId,from,to)
    ]);
    const active=staff.filter(s=>s.active!==false);
    // index planning by empId+day
    const planMap=new Map();
    planRows.forEach(r=>planMap.set(r.employee_id+'|'+r.day, r.status));
    // index clockings by empId
    const clockMap=new Map();
    clockRows.forEach(c=>{
      if(!clockMap.has(c.employee_id)) clockMap.set(c.employee_id,[]);
      clockMap.get(c.employee_id).push(c);
    });
    const nd=dim(y,m);
    const rows=active.map(emp=>{
      let planned=0,worked=0,cp=0,rtt=0,abs=0,extraMin=0;
      for(let d=1;d<=nd;d++){
        const k=emp.id+'|'+iso(y,m,d);
        const st=planMap.get(k)||'';
        if(st==='P'||st==='PE') planned++;
        if(st==='CP') cp++;
        if(st==='RTT') rtt++;
        if(st==='MAL'||st==='ABS'||st==='MAT'||st==='CSS') abs++;
      }
      const cks=clockMap.get(emp.id)||[];
      cks.forEach(c=>{
        if(c.clock_out_ts) extraMin+=minutesBetween(c.clock_in_ts,c.clock_out_ts)-(c.break_minutes||0);
      });
      worked=Math.round(extraMin/60*10)/10;
      const plannedH=planned*7; // 7h par jour planifié par défaut
      const diff=Math.round((worked-plannedH)*10)/10;
      return {emp,planned,cp,rtt,abs,worked,plannedH,diff};
    });
    // KPIs
    const totalPlannedH=rows.reduce((s,r)=>s+r.plannedH,0);
    const totalWorked=rows.reduce((s,r)=>s+r.worked,0);
    const totalDiff=Math.round((totalWorked-totalPlannedH)*10)/10;
    const withClock=rows.filter(r=>r.worked>0).length;
    const kpiEl=$('trKpis');
    if(kpiEl) kpiEl.innerHTML=[
      {icon:'fa-users',label:'Collaborateurs actifs',val:active.length,color:''},
      {icon:'fa-clock',label:'Heures planifiées',val:totalPlannedH+'h',color:''},
      {icon:'fa-stopwatch',label:'Heures pointées',val:totalWorked+'h',color:''},
      {icon:'fa-chart-line',label:'Écart global',val:(totalDiff>0?'+':'')+totalDiff+'h',color:totalDiff>=0?'#16a34a':'#dc2626'},
    ].map(k=>`<div class="kc"><div class="kv" style="${k.color?'color:'+k.color:''}">${k.val}</div><div class="kl"><i class="fa-solid ${k.icon}"></i> ${k.label}</div></div>`).join('');
    // Table
    window._trRows=rows;
    const diffColor=d=>d>0?'color:#16a34a;font-weight:600':d<0?'color:#dc2626;font-weight:600':'color:var(--muted)';
    el.innerHTML=`<table class="rtable">
      <thead><tr>
        <th>Collaborateur</th><th>Service</th><th>Contrat</th>
        <th style="text-align:center">Jours P/PE</th>
        <th style="text-align:center">CP</th>
        <th style="text-align:center">RTT</th>
        <th style="text-align:center">Abs.</th>
        <th style="text-align:right">Planifié (h)</th>
        <th style="text-align:right">Pointé (h)</th>
        <th style="text-align:right">Écart</th>
      </tr></thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td><b>${r.emp.last_name} ${r.emp.first_name}</b></td>
          <td>${r.emp.department||'—'}</td>
          <td style="font-size:11px;color:var(--muted)">${r.emp.contract_type||'—'}</td>
          <td style="text-align:center">${r.planned}</td>
          <td style="text-align:center">${r.cp||'—'}</td>
          <td style="text-align:center">${r.rtt||'—'}</td>
          <td style="text-align:center">${r.abs||'—'}</td>
          <td style="text-align:right">${r.plannedH}h</td>
          <td style="text-align:right">${r.worked>0?r.worked+'h':'<span style="color:var(--muted)">—</span>'}</td>
          <td style="text-align:right;${diffColor(r.diff)}">${r.worked>0?(r.diff>0?'+':'')+r.diff+'h':'—'}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }catch(e){el.innerHTML=`<div style="padding:24px;color:#dc2626">${e.message}</div>`;}
}
function exportTrackingCSV(){
  const rows=window._trRows||[];
  const hdr='Nom,Prénom,Service,Contrat,Jours planifiés,CP,RTT,Abs,Heures planifiées,Heures pointées,Écart\n';
  const body=rows.map(r=>[
    r.emp.last_name, r.emp.first_name, r.emp.department||'', r.emp.contract_type||'',
    r.planned, r.cp, r.rtt, r.abs, r.plannedH, r.worked, r.diff
  ].join(',')).join('\n');
  const blob=new Blob(['﻿'+hdr+body],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`suivi_temps_${trMonth}.csv`; a.click();
}

async function drawPayroll(){
  const el=$('pyTable'); if(!el)return;
  el.innerHTML='<div style="padding:24px;text-align:center;color:var(--muted)">Chargement…</div>';
  const [y,m]=pyMonth.split('-').map(Number);
  const from=iso(y,m,1), to=iso(y,m,dim(y,m));
  try{
    const [planRows, clockRows]=await Promise.all([
      BE.listMonthPlanning(hotelId,y,m),
      BE.listClockingsByRange(hotelId,from,to)
    ]);
    const active=staff.filter(s=>s.active!==false);
    const planMap=new Map(); planRows.forEach(r=>planMap.set(r.employee_id+'|'+r.day, r.status));
    const clockMap=new Map(); clockRows.forEach(c=>{if(!clockMap.has(c.employee_id))clockMap.set(c.employee_id,[]);clockMap.get(c.employee_id).push(c);});
    const nd=dim(y,m);
    const rows=active.map(emp=>{
      let P=0,PE=0,CP=0,RTT=0,MAL=0,MAT=0,CSS=0,AE=0,F=0,PAT=0,ABS=0,REC=0,FORM=0,repos=0;
      for(let d=1;d<=nd;d++){
        const st=planMap.get(emp.id+'|'+iso(y,m,d))||'';
        if(!st){repos++;continue;}
        if(st==='P') P++;
        else if(st==='PE') PE++;
        else if(st==='CP') CP++;
        else if(st==='RTT') RTT++;
        else if(st==='MAL') MAL++;
        else if(st==='MAT') MAT++;
        else if(st==='CSS') CSS++;
        else if(st==='AE') AE++;
        else if(st==='F') F++;
        else if(st==='PAT') PAT++;
        else if(st==='ABS') ABS++;
        else if(st==='REC') REC++;
        else if(st==='FORM') FORM++;
      }
      const cks=clockMap.get(emp.id)||[];
      let totalMin=0;
      cks.forEach(c=>{if(c.clock_out_ts) totalMin+=minutesBetween(c.clock_in_ts,c.clock_out_ts)-(c.break_minutes||0);});
      const totalH=Math.round(totalMin/60*100)/100;
      const plannedH=(P+PE)*7;
      const heuresSup=Math.max(0,Math.round((totalH-plannedH)*100)/100);
      return {emp,P,PE,CP,RTT,MAL,MAT,CSS,AE,F,PAT,ABS,REC,FORM,repos,totalH,plannedH,heuresSup};

      const totP=rows.reduce((s,r)=>s+r.P+r.PE,0);
      const totCP=rows.reduce((s,r)=>s+r.CP,0);
      const totRTT=rows.reduce((s,r)=>s+r.RTT,0);
      const totSup=rows.reduce((s,r)=>s+r.heuresSup,0);
      kpiEl.innerHTML=[
        {icon:'fa-calendar-check',label:'Jours travaillés (P+PE)',val:totP},
        {icon:'fa-umbrella-beach',label:'Congés payés (CP)',val:totCP},
        {icon:'fa-couch',label:'RTT',val:totRTT},
        {icon:'fa-plus-circle',label:'Heures supplémentaires',val:Math.round(totSup*100)/100+'h'},
      ].map(k=>`<div class="kc"><div class="kv">${k.val}</div><div class="kl"><i class="fa-solid ${k.icon}"></i> ${k.label}</div></div>`).join('');
    }
    el.innerHTML=`<table class="rtable">
      <thead><tr>
        <th>Collaborateur</th><th>Service</th><th>Contrat</th>
        <th title="Présent" style="text-align:center">P</th>
        <th title="Présence Extra" style="text-align:center">PE</th>
        <th title="Congé payé" style="text-align:center">CP</th>
        <th title="RTT" style="text-align:center">RTT</th>
        <th title="Maladie" style="text-align:center">MAL</th>
        <th title="Maternité" style="text-align:center">MAT</th>
        <th title="Autres abs." style="text-align:center">Abs.</th>
        <th title="Fériés" style="text-align:center">F</th>
        <th style="text-align:right">Planifié (h)</th>
        <th style="text-align:right">Pointé (h)</th>
        <th style="text-align:right;color:#f59e0b">H. Sup.</th>
      </tr></thead>
      <tbody>
        ${rows.map(r=>`<tr>
          <td><b>${r.emp.last_name} ${r.emp.first_name}</b></td>
          <td>${r.emp.department||'—'}</td>
          <td style="color:var(--muted)">${r.emp.contract_type||'—'}</td>

          <td style="text-align:center;color:#9d174d">${r.MAL||'—'}</td>
          <td style="text-align:center;color:#7c3aed">${r.MAT||'—'}</td>
          <td style="text-align:center;color:#dc2626">${(r.CSS+r.AE+r.PAT+r.ABS+r.REC+r.FORM)||'—'}</td>
          <td style="text-align:center;color:var(--muted)">${r.F||'—'}</td>
          <td style="text-align:right">${r.plannedH}h</td>
          <td style="text-align:right">${r.totalH>0?r.totalH+'h':'—'}</td>
          <td style="text-align:right;font-weight:600;color:${r.heuresSup>0?'#f59e0b':'var(--muted)'}">${r.heuresSup>0?'+'+r.heuresSup+'h':'—'}</td>

  }catch(e){el.innerHTML=`<div style="padding:24px;color:#dc2626">${e.message}</div>`;}

const REQ_TYPE_LABELS={conge_paye:'Congé payé',rtt:'RTT',absence_exceptionnelle:'Absence exceptionnelle',
  maladie:'Maladie',extra:'Demande d\'extra',echange_shift:'Échange de shift',autre:'Autre'};
const REQ_STATUS_LABELS={pending:'En attente',approved:'Approuvée',rejected:'Refusée',cancelled:'Annulée'};
const REQ_STATUS_COLORS={pending:'#f59e0b',approved:'#22c55e',rejected:'#ef4444',cancelled:'#9ca3af'};

async function renderPortalInbox(){
  $('view').innerHTML=`<div class="phead"><div><h1><i class="fa-solid fa-inbox" style="margin-right:8px;color:var(--violet)"></i>Demandes portail</h1><div class="sub">Demandes des salariés via l'application mobile</div></div></div>
  <div style="padding:0 24px 24px">
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px">
      <select id="piFilterStatus" class="input" style="width:auto">
        <option value="">Tous les statuts</option>
        <option value="pending">En attente</option>
        <option value="approved">Approuvées</option>
        <option value="rejected">Refusées</option>
        <option value="cancelled">Annulées</option>
      </select>
      <select id="piFilterType" class="input" style="width:auto">
        <option value="">Tous les types</option>
        ${Object.entries(REQ_TYPE_LABELS).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}
      </select>
      <div style="flex:1"></div>
      <span id="piCount" style="color:var(--ink2);font-size:13px;align-self:center"></span>
    </div>
    <div id="piList"><div class="loading"><div class="spinner"></div></div></div>
  </div>`;
  const applyFilters=()=>loadPortalInbox($('piFilterStatus').value,$('piFilterType').value);
  $('piFilterStatus').onchange=applyFilters;
  $('piFilterType').onchange=applyFilters;
  await loadPortalInbox('pending','');
  $('piFilterStatus').value='pending';
}

async function loadPortalInbox(statusFilter,typeFilter){
  const list=$('piList'); if(!list) return;
  list.innerHTML='<div class="loading"><div class="spinner"></div></div>';
  let q=BE.db.from('portal_requests')
    .select('id,type,date_start,date_end,message,status,manager_comment,created_at,employee:employees(first_name,last_name,role,department)')
    .eq('hotel_id',hotelId).order('created_at',{ascending:false}).limit(200);
  if(statusFilter) q=q.eq('status',statusFilter);
  if(typeFilter)   q=q.eq('type',typeFilter);
  const {data,error}=await q;
  if(error){list.innerHTML=`<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>${error.message}</p></div>`;return;}
  const rows=data||[];
  const cEl=$('piCount'); if(cEl) cEl.textContent=`${rows.length} demande${rows.length!==1?'s':''}`;
  if(!rows.length){list.innerHTML='<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>Aucune demande</p></div>';return;}
  list.innerHTML=rows.map(r=>{
    const emp=r.employee||{};
    const name=`${emp.first_name||''} ${emp.last_name||''}`.trim()||'—';
    const col=REQ_STATUS_COLORS[r.status]||'#9ca3af';
    const dates=r.date_end&&r.date_end!==r.date_start?`${fmtDate(r.date_start)} → ${fmtDate(r.date_end)}`:fmtDate(r.date_start);
    return `<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="openPortalRequest('${r.id}')">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:15px">${esc(name)}</div>
          <div style="font-size:12px;color:var(--ink2)">${esc(emp.role||'')}${emp.department?' · '+esc(emp.department):''}</div>
        </div>
        <div style="text-align:right">
          <span style="background:${col}22;color:${col};font-size:12px;font-weight:600;padding:3px 10px;border-radius:20px">${REQ_STATUS_LABELS[r.status]||r.status}</span>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--ink2)">
        <span><i class="fa-solid fa-tag" style="margin-right:4px"></i>${REQ_TYPE_LABELS[r.type]||r.type}</span>
        <span><i class="fa-regular fa-calendar" style="margin-right:4px"></i>${dates}</span>
        <span style="margin-left:auto;font-size:11px">${new Date(r.created_at).toLocaleDateString('fr-FR')}</span>
      </div>
      ${r.message?`<div style="margin-top:8px;font-size:13px;color:var(--ink);background:var(--bg2);padding:8px 12px;border-radius:8px;white-space:pre-wrap">${esc(r.message)}</div>`:''}
      ${r.manager_comment?`<div style="margin-top:6px;font-size:12px;color:var(--violet);background:var(--violet-bg);padding:6px 10px;border-radius:6px"><i class="fa-solid fa-comment-dots" style="margin-right:4px"></i>${esc(r.manager_comment)}</div>`:''}
    </div>`;
  }).join('');
}

function fmtDate(d){if(!d)return'—';return new Date(d+'T00:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}

async function openPortalRequest(id){
  const {data:r,error}=await BE.db.from('portal_requests')
    .select('*,employee:employees(id,first_name,last_name,role,department)')
    .eq('id',id).single();
  if(error||!r){flash('Impossible de charger la demande');return;}
  const emp=r.employee||{};
  const name=`${emp.first_name||''} ${emp.last_name||''}`.trim()||'—';
  const col=REQ_STATUS_COLORS[r.status]||'#9ca3af';
  const dates=r.date_end&&r.date_end!==r.date_start?`${fmtDate(r.date_start)} → ${fmtDate(r.date_end)}`:fmtDate(r.date_start);
  const canAct=r.status==='pending';
  showModal(`
    <div style="padding:24px;min-width:320px;max-width:560px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
        <div style="flex:1">
          <div style="font-size:18px;font-weight:700">${esc(name)}</div>
          <div style="font-size:13px;color:var(--ink2)">${esc(emp.role||'')}${emp.department?' · '+esc(emp.department):''}</div>
        </div>
        <span style="background:${col}22;color:${col};font-size:13px;font-weight:600;padding:4px 12px;border-radius:20px">${REQ_STATUS_LABELS[r.status]||r.status}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">
        <div><div style="font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px">Type</div><div style="font-weight:600">${REQ_TYPE_LABELS[r.type]||r.type}</div></div>
        <div><div style="font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px">Dates</div><div style="font-weight:600">${dates}</div></div>
        <div><div style="font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px">Soumis le</div><div>${new Date(r.created_at).toLocaleDateString('fr-FR')}</div></div>
        ${r.attachment_url?`<div><div style="font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px">Justificatif</div><div><a href="${esc(r.attachment_url)}" target="_blank" style="color:var(--violet)">Voir le fichier</a></div></div>`:''}
      </div>
      ${r.message?`<div style="margin-bottom:16px"><div style="font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">Message du salarié</div><div style="background:var(--bg2);padding:12px;border-radius:8px;font-size:13px;white-space:pre-wrap">${esc(r.message)}</div></div>`:''}
      ${canAct?`
      <div style="margin-bottom:16px">
        <label style="font-size:11px;color:var(--ink2);text-transform:uppercase;letter-spacing:.5px;display:block;margin-bottom:4px">Commentaire (optionnel)</label>
        <textarea id="piComment" class="input" style="width:100%;height:80px;resize:vertical" placeholder="Motif de décision, informations complémentaires…"></textarea>
      </div>
      <div style="display:flex;gap:12px">
        <button class="btn p" style="flex:1" onclick="decidePortalRequest('${id}','approved')"><i class="fa-solid fa-check"></i> Approuver</button>
        <button class="btn" style="flex:1;background:#fee2e2;color:#dc2626;border-color:#fca5a5" onclick="decidePortalRequest('${id}','rejected')"><i class="fa-solid fa-xmark"></i> Refuser</button>
        <button class="btn g" onclick="closeModal()">Annuler</button>
      </div>
      `:`<div style="text-align:center;padding:12px 0"><button class="btn g" onclick="closeModal()">Fermer</button></div>`}
    </div>`);
}

async function decidePortalRequest(id,decision){
  const comment=$('piComment')?.value.trim()||null;
  const {error}=await BE.db.from('portal_requests').update({
    status:decision,
    manager_comment:comment,
    decided_at:new Date().toISOString()
  }).eq('id',id).eq('hotel_id',hotelId);
  if(error){flash('Erreur: '+error.message);return;}
  closeModal();
  flash(decision==='approved'?'Demande approuvée ✓':'Demande refusée');
  await loadPortalInbox($('piFilterStatus')?.value||'',$('piFilterType')?.value||'');
}

async function loadPortalSection(s){
  const el=$('portalSection'), badge=$('portalStatusBadge');
  if(!el) return;
  const enabled=s.portal_enabled||false;
  if(badge) badge.innerHTML=enabled
    ?`<span style="font-size:10.5px;background:#f0fdf4;color:#16a34a;padding:2px 8px;border-radius:6px;font-weight:600"><i class="fa-solid fa-check"></i> Activé</span>`
    :`<span style="font-size:10.5px;background:#fef9c3;color:#854d0e;padding:2px 8px;border-radius:6px;font-weight:600">Non activé</span>`;

  if(enabled){
    el.innerHTML=`<div style="font-size:12.5px;color:var(--ink2);margin-bottom:10px">Le salarié a accès à son espace en ligne.</div>
      <button class="btn g" style="width:100%;margin-bottom:8px;justify-content:center;font-size:12px" onclick="reinvitePortal('${s.id}','${(s.email||'').replace(/'/g,"\\'")}')">
        <i class="fa-solid fa-envelope-circle-check"></i> Renvoyer l'invitation
      </button>
      <button class="btn d" style="width:100%;justify-content:center;font-size:12px" onclick="disablePortal('${s.id}')">
        <i class="fa-solid fa-ban"></i> Désactiver l'accès portail
      </button>`;
  } else {
    el.innerHTML=`<div style="font-size:12.5px;color:var(--ink2);margin-bottom:10px">
      ${s.email?'Invitez ce salarié à accéder à son espace : planning, pointage, coffre-fort, demandes.':'<span style="color:var(--red)"><i class="fa-solid fa-triangle-exclamation"></i> Email requis pour activer le portail.</span>'}
    </div>
    ${s.email?`<button class="btn p" style="width:100%;justify-content:center;font-size:12px" onclick="invitePortal('${s.id}','${(s.email||'').replace(/'/g,"\\'")}')">
      <i class="fa-solid fa-paper-plane"></i> Inviter au portail
    </button>`:'<button class="btn g" style="width:100%;justify-content:center;font-size:12px" onclick="closeFiche();openEmpForm(staffObj(\''+s.id+'\'))"><i class="fa-solid fa-pen"></i> Ajouter un email d\'abord</button>'}`;
  }
}

function staffObj(id){ return staff.find(x=>x.id===id); }

async function invitePortal(eid, email){
  if(!email){flash('Email manquant');return;}
  if(!confirm(`Envoyer une invitation portail à ${email} ?`)) return;
  try{
    const {data:tok,error}=await BE.sb.rpc('pl_portal_invite',{p_employee_id:eid});
    if(error) throw error;
    // Envoyer un magic link Supabase avec l'email du salarié
    const {error:me}=await BE.sb.auth.admin?.inviteUserByEmail
      ? await BE.sb.auth.admin.inviteUserByEmail(email,{redirectTo:window.location.origin+'/portal.html'})
      : {error:null};
    flash('Invitation envoyée à '+email+' ✓');
    const s=staff.find(x=>x.id===eid);
    if(s){s.portal_enabled=true;loadPortalSection(s);}
  }catch(e){
    // Fallback si RPC non encore déployée
    flash('Portail activé. Invitez le salarié manuellement à : '+window.location.origin+'/portal.html');
    const s=staff.find(x=>x.id===eid); if(s){s.portal_enabled=true;loadPortalSection(s);}
  }
}

async function reinvitePortal(eid, email){
  if(!email){flash('Email manquant');return;}
  flash('Renvoi de l\'invitation à '+email+'…');
  await invitePortal(eid, email);
}

async function disablePortal(eid){
  if(!confirm('Désactiver l\'accès portail de ce salarié ?')) return;
  try{
    const {error}=await BE.sb.from('employees').update({portal_enabled:false,portal_auth_id:null}).eq('id',eid);
    if(error) throw error;
    flash('Accès portail désactivé');
    const s=staff.find(x=>x.id===eid); if(s){s.portal_enabled=false;loadPortalSection(s);}
  }catch(e){flash('Erreur : '+e.message);}
}

  const s=staff.find(x=>x.id===eid); if(!s)return;

  $('drawer').innerHTML=`

      <div class="av photo-drop" id="ficheAv" data-eid="${s.id}" style="background:${avBg(s)};cursor:pointer;position:relative" title="Glissez une photo ou cliquez pour changer">${avInner(s)}<div class="photo-overlay"><i class="fa-solid fa-camera"></i></div></div>
      <input type="file" id="fichePhotoIn" accept="image/*" style="display:none">

      <div class="fr"><span class="k">Statut</span><span class="v" style="${s.active?'color:var(--green)':'color:var(--red)'}">${s.active?'Actif':'Parti'}</span></div>
      ${!s.active&&s.departure_date?`<div class="fr"><span class="k">Date de départ</span><span class="v">${s.departure_date}</span></div>`:''}
      ${full?`<div class="fr"><span class="k">Date d'entrée</span><span class="v">${s.hire_date||'—'}</span></div>
      <div class="fr"><span class="k">Jours de repos</span><span class="v">${restNames}</span></div>`:''}
      <div class="fr"><span class="k">Téléphone</span><span class="v">${s.phone||'—'}</span></div>
      <div class="fr"><span class="k">E-mail</span><span class="v">${s.email||'—'}</span></div>
      ${full?`<div class="fr"><span class="k">Adresse</span><span class="v">${s.address||'—'}</span></div>
      <div class="fr"><span class="k">Contact d'urgence</span><span class="v">${s.emergency_contact||'—'}</span></div>`:''}
    </div>
    ${full?`<div class="sec"><h4>État civil <span style="font-size:10.5px;color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0;margin-left:6px">— RGPD sensible</span></h4>
      <div class="fr"><span class="k">Date de naissance</span><span class="v">${s.birth_date||'—'}</span></div>
      <div class="fr"><span class="k">Lieu de naissance</span><span class="v">${s.birth_place||'—'}</span></div>
      <div class="fr"><span class="k">Nationalité</span><span class="v">${s.nationality||'—'}</span></div>
      <div class="fr"><span class="k">N° sécu sociale</span><span class="v" style="font-family:'SFMono-Regular',monospace;font-size:12px">${s.social_security_number||'—'}</span></div>
      ${s.residency_permit_number?`<div class="fr"><span class="k">Titre de séjour</span><span class="v">${s.residency_permit_number}${s.residency_permit_expires?` (exp. ${s.residency_permit_expires})`:''}</span></div>`:''}
    </div>`:''}
    ${full?'<div class="sec"><h4>Documents RH <button class="btn p" data-upload style="float:right;padding:5px 10px;font-size:11.5px"><i class="fa-solid fa-upload"></i> Ajouter</button></h4><div id="docs">Chargement…</div></div>':''}
    ${full?`<div class="sec"><h4>Portail salarié <span id="portalStatusBadge" style="float:right"></span></h4>
      <div id="portalSection">Chargement…</div></div>`:''}
    ${full?`<div class="sec" style="display:flex;gap:10px"><button class="btn g" data-edit style="flex:1;justify-content:center"><i class="fa-solid fa-pen"></i> Modifier</button>
      ${s.active
        ? '<button class="btn d" data-del style="flex:1;justify-content:center"><i class="fa-solid fa-trash"></i> Marquer comme parti</button>'
        : '<button class="btn p" data-react style="flex:1;justify-content:center"><i class="fa-solid fa-rotate-left"></i> Réactiver</button>'}</div>`:''}`;
  $('dbg').classList.add('on'); $('drawer').classList.add('on');
  $('drawer').querySelector('[data-x]').onclick=closeFiche;
  // Photo drag-and-drop / click on fiche avatar
  const ficheAv=$('ficheAv'), fichePhotoIn=$('fichePhotoIn');
  if(ficheAv&&fichePhotoIn){
    const applyPhoto=async file=>{
      if(!file||!file.type.startsWith('image/'))return;
      ficheAv.style.opacity='0.5';
      try{await saveEmployeePhoto(s,file); ficheAv.style.background=avBg(s); ficheAv.innerHTML=avInner(s)+'<div class="photo-overlay"><i class="fa-solid fa-camera"></i></div>'; render();}
      catch(e){flash('Erreur photo : '+e.message);}
      finally{ficheAv.style.opacity='';}
    };
    ficheAv.onclick=()=>fichePhotoIn.click();
    fichePhotoIn.onchange=e=>applyPhoto(e.target.files[0]);
    ficheAv.ondragover=e=>{e.preventDefault();ficheAv.classList.add('drag-over');};
    ficheAv.ondragleave=()=>ficheAv.classList.remove('drag-over');
    ficheAv.ondrop=e=>{e.preventDefault();ficheAv.classList.remove('drag-over');applyPhoto(e.dataTransfer.files[0]);};
    // Bouton supprimer photo (visible seulement si photo présente)
    if(s.photo_url){
      const delPhotoBtn=document.createElement('button');
      delPhotoBtn.className='btn d'; delPhotoBtn.title='Supprimer la photo';
      delPhotoBtn.style.cssText='position:absolute;bottom:-10px;right:-10px;padding:3px 7px;font-size:11px;z-index:2';
      delPhotoBtn.innerHTML='<i class="fa-solid fa-trash"></i>';
      delPhotoBtn.onclick=async e=>{
        e.stopPropagation();
        if(!confirm('Supprimer la photo de ce collaborateur ?'))return;
        try{
          await BE.updateEmployee(s.id,{photo_url:null});
          s.photo_url=null;
          ficheAv.style.background=avBg(s); ficheAv.innerHTML=avInner(s)+'<div class="photo-overlay"><i class="fa-solid fa-camera"></i></div>';
          delPhotoBtn.remove(); render(); flash('Photo supprimée');

      };
      ficheAv.style.position='relative';
      ficheAv.appendChild(delPhotoBtn);
    }
  }
  // Section Portail salarié
  if(full && $('portalSection')) loadPortalSection(s);

  const ed=$('drawer').querySelector('[data-edit]');
  if(ed) ed.onclick=()=>{closeFiche();openEmpForm(s);};
  const dl=$('drawer').querySelector('[data-del]');
  if(dl) dl.onclick=async()=>{
    const today=new Date().toISOString().slice(0,10);
    const d=prompt(`Date de départ pour ${s.first_name} ${s.last_name} ? (format AAAA-MM-JJ, par défaut aujourd'hui)`, today);
    if(d===null) return;
    const date=d.trim()||today;
    if(!/^\d{4}-\d{2}-\d{2}$/.test(date)){flash('Format de date invalide (AAAA-MM-JJ)');return;}
    await BE.updateEmployee(s.id, {active:false, departure_date:date});
    s.active=false; s.departure_date=date;
    closeFiche(); render(); flash('Collaborateur marqué comme parti');};
  const rc=$('drawer').querySelector('[data-react]');
  if(rc) rc.onclick=async()=>{
    await BE.updateEmployee(s.id, {active:true, departure_date:null});
    s.active=true; s.departure_date=null;
    closeFiche(); render(); flash('Collaborateur réactivé');};
  if(!full) return;
  $('drawer').querySelector('[data-upload]').onclick=()=>openDocUploadForm(s);
  await drawEmployeeDocs(s);
}

async function drawEmployeeDocs(s){
  const list = await BE.listDocumentsForEmployee(hotelId, s.id);
  if(!list.length){$('docs').innerHTML='<div style="padding:14px;color:var(--muted);font-size:12.5px;font-style:italic">Aucun document. Cliquez sur Ajouter pour téléverser un fichier (CNI, RIB, contrat signé, etc.).</div>';return;}
  const today = new Date();
  const items = list.sort((a,b)=>{const dt=DOC_TYPES.findIndex(x=>x[0]===a.doc_type)-DOC_TYPES.findIndex(x=>x[0]===b.doc_type);return dt;}).map(d=>{
    const dt = DOC_TYPES.find(x=>x[0]===d.doc_type) || ['autre','Autre','other',false];
    const [code,label,category]=dt;
    let status='valid', statusLabel='Valide';
    if(d.status==='missing'){status='missing';statusLabel='Manquant';}
    else if(d.expires_at){
      const exp=new Date(d.expires_at);
      const diff=Math.round((exp-today)/86400000);
      if(diff<0){status='expired';statusLabel=`Expiré ${-diff} j`;}
      else if(diff<30){status='expiring_soon';statusLabel=`Expire dans ${diff} j`;}
    }
    return `<div class="docitem" data-did="${d.id}">
      <div class="ic ${category}"><i class="fa-solid fa-file-lines"></i></div>
      <div style="flex:1;min-width:0">
        <div class="nm">${label}</div>
        <div class="meta">
          ${d.file_size?`${(d.file_size/1024).toFixed(0)} ko · `:''}
          ${d.issued_at?`émis ${d.issued_at}`:''}${d.expires_at?` · expire ${d.expires_at}`:''}
          ${d.notes?` · <i>${d.notes}</i>`:''}
        </div>
      </div>
      <span class="badge-st ${status}">${statusLabel}</span>
      <div class="acts">
        ${d.file_path?'<button data-act="dl" title="Télécharger"><i class="fa-solid fa-download"></i></button>':''}
        ${d.file_path&&d.signature_status==='none'?'<button data-act="sign" title="Envoyer pour signature électronique" style="color:#7c3aed"><i class="fa-solid fa-pen-nib"></i></button>':''}
        ${d.signature_status==='pending'?'<span title="En attente de signature" style="font-size:11px;color:#d97706;font-weight:600;padding:2px 6px;background:#fffbeb;border-radius:6px">⏳ Signature</span>':''}

        openSignatureModal(s,d);

        catch(e){flash('Erreur : '+(e.message||e));}
      }
    });
  });

async function submitSignatureRequest(employeeId, documentId){
  const fn=$('sig_fn')?.value.trim(), ln=$('sig_ln')?.value.trim();
  const email=$('sig_email')?.value.trim(), phone=$('sig_phone')?.value.trim();
  if(!fn||!ln||!email){flash('Prénom, nom et email sont requis');return;}
  const s=staff.find(x=>x.id===employeeId); if(!s) return;
  const btn=$('sigSendBtn'); if(btn) btn.disabled=true;
  const prog=$('sigProgress'); if(prog){prog.style.display='';prog.textContent='Envoi en cours…';}
  try{
    const {data:{session}}=await BE.sb.auth.getSession();
    const resp=await fetch(`${SUPABASE_FUNCTIONS_URL}/yousign-create`,{
      method:'POST',
      headers:{'Authorization':`Bearer ${session?.access_token}`,'Content-Type':'application/json'},
      body:JSON.stringify({
        document_id:documentId, employee_id:employeeId, hotel_id:hotelId,
        signer_first_name:fn, signer_name:ln, signer_email:email,
        signer_phone:phone||null,
      }),
    });
    const result=await resp.json();
    if(!resp.ok||result.error) throw new Error(result.error||'Erreur inconnue');
    closeModal();
    flash('✅ Demande de signature envoyée — le salarié peut signer depuis son portail');
    // Rafraîchir la liste des documents
    const sObj=staff.find(x=>x.id===employeeId);
    if(sObj) await drawEmployeeDocs(sObj);
  }catch(e){
    if(prog){prog.style.color='#dc2626';prog.textContent='Erreur : '+e.message;}
    if(btn) btn.disabled=false;
  }
}

/* ---- Helper : brancher la drop zone sur un input ---- */
function wireDropzone(inputId, onFileChange){
  const dz   = $('dz_'+inputId);
  const inp  = $(inputId);
  const fc   = $('fc_'+inputId);
  const fcN  = $('fc_name_'+inputId);
  const fcS  = $('fc_size_'+inputId);
  const fcRm = $('fc_rm_'+inputId);
  const fmtSz= b => b<1024*1024 ? (b/1024).toFixed(0)+' Ko' : (b/1024/1024).toFixed(1)+' Mo';
  const setFile = f => {
    if(!f){ fc.classList.remove('on'); inp.value=''; if(onFileChange) onFileChange(null); return; }
    fcN.textContent=f.name; fcS.textContent=fmtSz(f.size); fc.classList.add('on');
    if(onFileChange) onFileChange(f);
  };
  inp.onchange = e => setFile(e.target.files[0]||null);
  fcRm.onclick = e => { e.stopPropagation(); setFile(null); };
  dz.addEventListener('dragover',  e=>{ e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', ()=> dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e=>{ e.preventDefault(); dz.classList.remove('drag-over'); const f=e.dataTransfer.files[0]; if(f){ const dt=new DataTransfer(); dt.items.add(f); inp.files=dt.files; setFile(f); } });
}
